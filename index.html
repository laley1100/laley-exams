<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz App</title>

<style>
body{
font-family: Arial;
background: linear-gradient(135deg,#ffb6d9,#cdb4ff);
text-align:center;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
width:70%;
margin:auto;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

button{
margin:8px;
padding:10px 15px;
border:none;
border-radius:12px;
cursor:pointer;
background:#d63384;
color:white;
font-size:14px;
}

button:disabled{
background:gray;
cursor:not-allowed;
}

small{
display:block;
color:gray;
font-size:12px;
}

.correct{
color:green;
font-weight:bold;
}

.wrong{
color:red;
font-weight:bold;
}
</style>
</head>

<body>

<h2>💗 Choose Subject</h2>

<div id="menu">
<button onclick="start('comm')">Communication</button>
<button onclick="start('path')">Pathology</button>
<button onclick="start('ip')">Intellectual Property</button>
</div>

<div class="card" id="quiz" style="display:none;">

<h3 id="q"></h3>
<small id="q_ar"></small>

<div id="options"></div>

<p id="result"></p>

<button id="nextBtn" onclick="next()" disabled>Next 💗</button>

</div>

<script>

// ================= DATA =================
const examApp = {
comm:[
{
q:"Therapeutic communication is best defined as",
q_ar:"التواصل العلاجي يُعرّف بأنه",
options:[
["Casual conversation","محادثة عادية"],
["Professional planned communication","تواصل مهني مخطط"],
["Medical instructions only","تعليمات فقط"],
["Calming patient only","تهدئة فقط"]
],
a:1
},
{
q:"Shared understanding helps to",
q_ar:"الفهم المشترك يساعد على",
options:[
["Achieve goals","تحقيق الأهداف"],
["Reduce documentation","تقليل التوثيق"],
["Save time","توفير الوقت"],
["Limit interaction","تقليل التفاعل"]
],
a:0
}
],

path:[
{
q:"Water percentage in body",
q_ar:"نسبة الماء في الجسم",
options:[
["40%","40٪"],
["50%","50٪"],
["60%","60٪"],
["70%","70٪"]
],
a:2
},
{
q:"Non-pitting edema occurs in",
q_ar:"الوذمة غير الانطباعية تحدث في",
options:[
["Cardiac","قلبية"],
["Renal","كلوية"],
["Nutritional","غذائية"],
["Lymphatic","لمفاوية"]
],
a:3
}
],

ip:[
{
q:"حقوق الملكية الفكرية هي",
q_ar:"",
options:[
["قابلة للتنازل"],
["حقوق معنوية"],
["مالية فقط"],
["حجز عليها"]
],
a:1
}
]

};

let subject="";
let index=0;
let answered=false;

// ================= START =================
function start(s){
subject=s;
index=0;
document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";
show();
}

// ================= SHOW =================
function show(){
answered=false;
document.getElementById("nextBtn").disabled=true;

let q = examApp[subject][index];

document.getElementById("q").innerText=q.q;
document.getElementById("q_ar").innerText=q.q_ar;

let html="";

q.options.forEach((o,i)=>{
html += `
<button onclick="check(${i})">
${o[0]}
<small>${o[1]||""}</small>
</button><br>
`;
});

document.getElementById("options").innerHTML=html;
document.getElementById("result").innerText="";
}

// ================= CHECK =================
function check(i){
if(answered) return;

answered=true;

let q = examApp[subject][index];
let correct = q.a;

if(i===correct){
document.getElementById("result").innerHTML="💗💗 Correct";
}else{
document.getElementById("result").innerHTML=
"💔 Wrong<br>Correct Answer: " + q.options[correct][0];
}

document.getElementById("nextBtn").disabled=false;
}

// ================= NEXT =================
function next(){
index++;

if(index>=examApp[subject].length){
document.getElementById("quiz").innerHTML="💗 Finished!";
return;
}

show();
}

</script>

</body>
</html>
