<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Exam Platform 🤍</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background: linear-gradient(135deg,#ffd6e8,#d8c7ff);
}

h1{
    text-align:center;
    margin:20px;
    color:#5a3d7a;
}

.container{
    width:92%;
    max-width:900px;
    margin:auto;
}

.cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

.card{
    width:170px;
    padding:18px;
    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(10px);
    border-radius:18px;
    cursor:pointer;
    text-align:center;
    font-weight:bold;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    background:rgba(255,255,255,0.4);
}

#q-text{
    font-size:19px;
    margin:15px 0;
    text-align:right;
}

#options{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.option{
    width:90%;
    max-width:500px;
    padding:14px;
    margin:8px;
    border-radius:14px;
    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.3);
    cursor:pointer;
    transition:0.2s;
    text-align:right;
}

.option:hover{background:rgba(255,255,255,0.4);}
.option.selected{background:#d8b4fe;}

.correct{color:green;font-weight:bold;}
.wrong{color:red;font-weight:bold;}

.controls{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:20px;
    flex-wrap:wrap;
}

.btn{
    padding:10px 18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.next{background:#a78bfa;color:white;}
.back{background:#fbbf24;}
.home{background:#f472b6;color:white;}

.btn:hover{transform:scale(1.05);}

@media(max-width:768px){
    .card{width:100%;}
}
</style>
</head>

<body>

<h1>Exam Platform 🤍</h1>

<div class="container">

<div id="menu">
    <h2 style="text-align:center">اختارالمادة</h2>

    <div class="cards">
        <div class="card" onclick="start('ip')">🤍 ملكية فكرية</div>

        <div class="card" onclick="start('cc')">Communication 🤍</div>
        <div class="card" onclick="start('bio')">Biostatistics</div>
        <div class="card" onclick="start('health')">🩺 السلامة الصحية</div>
    </div>
</div>

<div id="quiz" style="display:none;">
    <h3 id="q-text"></h3>
    <div id="feedback"></div>
    <div id="options"></div>

    <div class="controls">
        <button class="btn back" onclick="prevQ()">رجوع</button>
        <button class="btn next" onclick="nextQ()">التالي</button>
        <button class="btn home" onclick="goHome()">الرئيسية</button>
    </div>
</div>

</div>

cc: [
    { q: "1) Therapeutic communication is best defined as:", ar: "التعريف الأفضل للتواصل العلاجي:", options: ["Casual conversation", "A planned, deliberate, professional act", "Giving medical instructions only", "Talking to calm the patient"], answer: 1 },
    { q: "2) Shared understanding of information helps to:", ar: "الفهم المشترك للمعلومات يساعد في:", options: ["Achieve desired patient-care goals", "Reduce documentation", "Save time only", "Limit patient interaction"], answer: 0 },
    { q: "3) Using silence in communication allows the patient:", ar: "استخدام الصمت في التواصل يسمح للمريض بـ:", options: ["Feel ignored", "Think and gain insight", "Lose interest", "End the conversation"], answer: 1 },
    { q: "4) Exploring is best described as:", ar: "وصف تقنية الاستكشاف (Exploring):", options: ["Changing the subject", "Delving further into a topic", "Giving medical advice", "Summarizing data"], answer: 1 },
    { q: "5) Clarification is used when the paramedic wants to:", ar: "تستخدم تقنية التوضيح (Clarification) لـ:", options: ["Check understanding", "Challenge the patient", "Give instructions", "End communication"], answer: 0 },
    { q: "6) Example of clarification is:", ar: "مثال على تقنية التوضيح:", options: ["Why did you do that?", "Tell me everything again.", "What do you mean by ‘sicker than usual’?", "You are wrong."], answer: 2 },
    { q: "7) Reflecting focuses on:", ar: "تقنية الانعكاس (Reflecting) تركز على:", options: ["Only medical facts", "Client’s feelings and content", "Paramedic’s opinion", "Documentation"], answer: 1 },
    { q: "8) Functional-professional touch is used primarily for:", ar: "اللمس المهني الوظيفي يُستخدم لـ:", options: ["Clinical care", "Emotional bonding", "Social greetings", "Intimacy"], answer: 0 },
    { q: "9) When explaining procedures, paramedics should consider:", ar: "عند شرح الإجراءات، يجب مراعاة:", options: ["Only time constraints", "Documentation only", "Personal opinions", "Age and language barriers"], answer: 3 },
    { q: "10) Therapeutic impasses are best described as:", ar: "وصف المآزق العلاجية (Therapeutic impasses):", options: ["Successful interactions", "Blocks in the paramedic-client relationship", "Legal issues", "Communication goals"], answer: 1 },
    { q: "11) Communication failures in clinical settings mainly lead to:", ar: "إخفاقات التواصل تؤدي إلى:", options: ["Improved teamwork", "Faster discharge", "Adverse patient events", "Reduced workload"], answer: 2 },
    { q: "12) Communication is best described as:", ar: "وصف التواصل:", options: ["One-way process", "Two-way process", "Written process only", "Technological process"], answer: 1 },
    { q: "13) Which factor can negatively affect patient handover:", ar: "عامل يؤثر سلباً على تسليم المريض:", options: ["Noise and interruptions", "Clear documentation", "Structured tools", "Team collaboration"], answer: 0 },
    { q: "14) Patient handover refers to the transfer of:", ar: "تسليم المريض (Handover) يعني:", options: ["Medical equipment", "Responsibility and accountability of patient care", "Hospital policies", "Financial records"], answer: 1 },
    { q: "15) Which of the following is NOT a benefit of effective handover:", ar: "أي مما يلي ليس من فوائد التسليم الفعال؟", options: ["Accurate information transfer", "Enhanced patient safety", "Increased workload", "Faster prioritization of care"], answer: 2 },
    { q: "16) During handover of critical patients, the recommended pause duration is:", ar: "فترة التوقف الموصى بها عند تسليم مريض حرج:", options: ["5–10 seconds", "20–30 seconds", "1–2 minutes", "No pause is required"], answer: 1 },
    { q: "17) SBAR stands for:", ar: "اختصار SBAR يعني:", options: ["Signs, Background, Action, Response", "Situation, Background, Assessment, Recommendation", "Symptoms, Baseline, Assessment, Report", "Status, Body, Airway, Response"], answer: 1 },
    { q: "18) IMIST-AMBO includes all the following EXCEPT:", ar: "IMIST-AMBO يتضمن كل ما يلي عدا:", options: ["Mechanism of injury", "Treatments and trends", "Allergies", "Financial status"], answer: 3 },
    { q: "19) One limitation of SBAR in paramedic-ED handover is that it:", ar: "أحد قيود SBAR في التسليم:", options: ["Is too complex", "Lacks prehospital-specific details", "Is too long", "Is not structured"], answer: 1 },
    { q: "20) Which tool emphasizes patient identification more strongly:", ar: "أداة تؤكد على هوية المريض:", options: ["SBAR", "ISBAR", "SOAP", "ATMIST"], answer: 1 },
    { q: "21) What should you avoid when communicating with a hard-of-hearing patient?", ar: "تجنب فعله مع مريض ضعيف السمع:", options: ["Using a paper and pen", "Shouting", "Facing the patient", "Asking short questions"], answer: 1 },
    { q: "22) How should a paramedic handle an overly talkative patient?", ar: "كيف تتعامل مع مريض كثير الكلام؟", options: ["Allow to speak entirely", "Interrupt politely to focus", "Ignore stories", "Avoid further questions"], answer: 1 },
    { q: "23) What is a common pitfall that paramedics should avoid during patient interviews?", ar: "ما هو الخطأ الشائع الذي يجب تجنبه أثناء مقابلات المرضى؟", options: ["Active listening", "Using medical jargon", "Showing empathy", "Asking open-ended questions"], answer: 1 },
    { q: "24) Which of the following is an example of non-verbal communication?", ar: "أي مما يلي مثال على التواصل غير اللفظي؟", options: ["Speaking clearly", "Facial expressions", "Written reports", "Asking questions"], answer: 1 },
    { q: "25) Empathy is best described as:", ar: "التعاطف (Empathy) يوصف بـ:", options: ["Feeling sorry for someone", "Understanding and sharing the patient’s feelings", "Agreeing with the patient", "Ignoring the patient’s emotions"], answer: 1 },
    { q: "26) Which of the following is an open-ended question?", ar: "أي مما يلي يعتبر سؤالاً مفتوحاً؟", options: ["Does your chest hurt?", "How would you describe your pain?", "Are you allergic to penicillin?", "Is your pain constant?"], answer: 1 },
    { q: "27) The 'Active Listening' technique involves:", ar: "تقنية 'الاستماع النشط' تتضمن:", options: ["Waiting for your turn to talk", "Maintaining eye contact and nodding", "Thinking about your next shift", "Interrupting to correct the patient"], answer: 1 },
    { q: "28) Cultural competence in communication means:", ar: "الكفاءة الثقافية في التواصل تعني:", options: ["Treating everyone the same regardless of background", "Understanding and respecting diverse patient beliefs", "Ignoring cultural differences", "Speaking loudly so everyone understands"], answer: 1 },
    { q: "29) When dealing with an angry patient, the paramedic should:", ar: "عند التعامل مع مريض غاضب، يجب على المسعف:", options: ["Get angry back", "Listen calmly and acknowledge feelings", "Walk away immediately", "Tell the patient to be quiet"], answer: 1 },
    { q: "30) Why is documenting 'refusal of care' crucial?", ar: "لماذا يعد توثيق 'رفض العلاج' أمراً حاسماً؟", options: ["To charge the patient more", "For legal protection and continuity of care", "To prove the patient is wrong", "It is not important"], answer: 1 },
    { q: "31) Which of the following helps in building rapport?", ar: "أي مما يلي يساعد في بناء علاقة ثقة مع المريض؟", options: ["Introducing yourself and addressing the patient by name", "Looking at your phone constantly", "Using complex medical terms", "Being impatient"], answer: 0 },
    { q: "32) Paraphrasing in communication is used to:", ar: "إعادة الصياغة (Paraphrasing) تُستخدم لـ:", options: ["Mock the patient", "Confirm you understood the patient’s meaning", "Change the patient’s words", "End the conversation quickly"], answer: 1 },
    { q: "33) The 'Golden Hour' in trauma care emphasizes:", ar: "مفهوم 'الساعة الذهبية' في رعاية الإصابات يؤكد على:", options: ["The importance of rapid communication and intervention", "That patients can wait for hours", "The need for expensive equipment", "Nothing specific"], answer: 0 },
    { q: "34) Barriers to effective communication include all except:", ar: "عوائق التواصل الفعال تشمل كل ما يلي عدا:", options: ["Environmental noise", "Physical pain", "Clear language", "Language barriers"], answer: 2 },
    { q: "35) Professional boundaries are important to:", ar: "الحدود المهنية مهمة لـ:", options: ["Maintain a healthy paramedic-patient relationship", "Make the patient feel uncomfortable", "Encourage personal friendships", "Limit patient care"], answer: 0 },
    { q: "36) Which of the following is an example of 'validation'?", ar: "أي مما يلي يعتبر مثالاً على 'التحقق' (Validation)؟", options: ["Ignoring the patient's concerns", "Acknowledging the patient's experience to show understanding", "Telling the patient to stop complaining", "Giving medical advice"], answer: 1 },
    { q: "37) When communicating with children, it is best to:", ar: "عند التواصل مع الأطفال، من الأفضل:", options: ["Use complex medical terminology", "Get down to their eye level and use simple language", "Ignore them and talk to the parent only", "Speak very loudly"], answer: 1 },
    { q: "38) Silence is a powerful communication tool because:", ar: "الصمت أداة تواصل قوية لأن:", options: ["It saves time", "It gives the patient time to reflect and process thoughts", "It makes the patient feel uncomfortable", "It stops the patient from talking"], answer: 1 },
    { q: "39) Non-verbal cues such as body language account for:", ar: "الإشارات غير اللفظية مثل لغة الجسد تمثل:", options: ["A small percentage of communication", "A significant portion of how messages are received", "Nothing in medical communication", "Only 1% of communication"], answer: 1 },
    { q: "40) Which is a key component of 'Professionalism'?", ar: "ما هو المكون الأساسي لـ 'المهنية'؟", options: ["Always being late", "Maintaining patient confidentiality and respect", "Sharing patient stories on social media", "Arguing with colleagues"], answer: 1 },
    { q: "41) The term 'empathy' is distinct from 'sympathy' because:", ar: "التعاطف (Empathy) يختلف عن الشفقة (Sympathy) لأن:", options: ["Empathy involves professional objectivity", "Sympathy is better for patients", "There is no difference", "Empathy is only for doctors"], answer: 0 },
    { q: "42) If a patient is unable to communicate, you should:", ar: "إذا كان المريض غير قادر على التواصل، يجب عليك:", options: ["Give up on communication", "Look for alternative ways (e.g., writing, gestures, or family input)", "Speak to them anyway", "Leave the room"], answer: 1 },
    { q: "43) Which of the following is a barrier to communication?", ar: "أي مما يلي يعتبر عائقاً للتواصل؟", options: ["Active listening", "Cultural differences", "Eye contact", "Empathy"], answer: 1 },
    { q: "44) 'Summarizing' the patient's information helps to:", ar: "تلخيص معلومات المريض يساعد في:", options: ["Confuse the patient", "Ensure accuracy and understanding for both parties", "Save time by cutting the conversation", "Change the subject"], answer: 1 },
    { q: "45) When you are stressed, you should:", ar: "عندما تكون تحت ضغط، يجب عليك:", options: ["Take it out on the patient", "Maintain professional composure and focus on the task", "Quit the job immediately", "Ignore the patient's needs"], answer: 1 },
    { q: "46) Why is it important to use 'Patient-Centered' care?", ar: "لماذا من المهم استخدام الرعاية المتمحورة حول المريض؟", options: ["It focuses on the provider's comfort", "It addresses the patient's specific needs, values, and preferences", "It is required only by law", "It saves no time"], answer: 1 },
    { q: "47) What is the benefit of 'Eye Contact'?", ar: "ما هي فائدة التواصل البصري؟", options: ["It intimidates the patient", "It shows engagement and builds trust", "It is unnecessary", "It is considered rude"], answer: 1 },
    { q: "48) When communicating with the elderly, you should:", ar: "عند التواصل مع كبار السن، يجب عليك:", options: ["Treat them like children", "Be patient and speak clearly, avoiding rapid-fire questions", "Ignore their experience", "Rush the conversation"], answer: 1 },
    { q: "49) The tone of your voice:", ar: "نبرة صوتك:", options: ["Doesn't matter in communication", "Communicates emotions and professionalism alongside words", "Should always be monotone", "Is only for medical reports"], answer: 1 },
    { q: "50) Informed consent requires:", ar: "الموافقة المستنيرة تتطلب:", options: ["The patient to sign without reading", "The patient to fully understand the risks and benefits", "The paramedic to decide for the patient", "Nothing, it's automatic"], answer: 1 },
    { q: "51) When dealing with a language barrier, you should:", ar: "عند التعامل مع حاجز لغوي، يجب عليك:", options: ["Speak louder", "Use simple words, gestures, or an interpreter", "Ignore the patient", "Assume what they need"], answer: 1 },
    { q: "52) A common documentation mistake is:", ar: "خطأ شائع في التوثيق الطبي:", options: ["Being too detailed", "Writing illegible or incomplete entries", "Using a black pen", "Signing the report"], answer: 1 },
    { q: "53) 'Reflecting' the patient's statement is useful to:", ar: "عكس (Reflecting) كلام المريض مفيد لـ:", options: ["Interrupt them", "Show that you are listening and encourage them to continue", "End the interview", "Prove them wrong"], answer: 1 },
    { q: "54) Which behavior shows lack of interest?", ar: "أي سلوك يظهر قلة الاهتمام؟", options: ["Nodding", "Looking at your watch or phone repeatedly", "Leaning forward", "Maintaining eye contact"], answer: 1 },
    { q: "55) The purpose of the 'Handover' is:", ar: "الغرض من تسليم المريض (Handover) هو:", options: ["To complain about the patient", "To ensure continuity of quality care", "To finish the shift early", "To hide errors"], answer: 1 },
    { q: "56) Providing 'Reassurance' should be:", ar: "تقديم 'الطمأنة' يجب أن يكون:", options: ["Always based on facts, not false promises", "Given even if it's a lie", "Avoided completely", "Based on personal opinions"], answer: 0 },
    { q: "57) If a patient asks a question you don't know the answer to:", ar: "إذا سأل المريض سؤالاً لا تعرف إجابته:", options: ["Make something up", "Honestly admit you don't know and seek the information", "Tell them it's not their business", "Change the subject"], answer: 1 },
    { q: "58) The 'Pre-hospital' environment is different because:", ar: "بيئة ما قبل المستشفى تختلف لأنها:", options: ["Always calm", "Unpredictable and time-sensitive", "Only about paperwork", "Has no communication needs"], answer: 1 },
    { q: "59) Being 'Non-judgmental' means:", ar: "أن تكون 'غير محكم' (Non-judgmental) يعني:", options: ["Agreeing with everything", "Accepting the patient as they are without forming biased opinions", "Ignoring all behaviors", "Being indifferent"], answer: 1 },
    { q: "60) Final goal of all professional communication:", ar: "الهدف النهائي من كل تواصل مهني:", options: ["To talk a lot", "To provide safe, efficient, and compassionate care", "To look smart", "To pass the test"], answer: 1 }

    let current=0;
let questions=[];
let answers=[];
let locked=false;

function start(cat){
    playClick();

    questions=bank[cat];
    current=0;
    answers=new Array(questions.length).fill(null);

    document.getElementById("menu").style.display="none";
    document.getElementById("quiz").style.display="block";

    showQuestion();
}

function showQuestion(){
    locked=false;

    let q=questions[current];

    document.getElementById("q-text").innerHTML =
        q.q + "<br><small>"+(q.ar||"")+"</small>";

    let box=document.getElementById("options");
    let fb=document.getElementById("feedback");

    box.innerHTML="";
    fb.innerHTML="";

    q.options.forEach((o,i)=>{
        let div=document.createElement("div");
        div.className="option";
        div.innerText=o;

        div.onclick=()=>selectAnswer(i);
        box.appendChild(div);
    });
}

function selectAnswer(i){
    if(locked) return;

    playClick();

    let q = questions[current];
    answers[current] = i;
    locked = true;

    let fb = document.getElementById("feedback");
    let options = document.querySelectorAll(".option");

    options.forEach(opt=>{
        opt.style.background="";
        opt.style.color="";
    });

    if(i === q.answer){
        fb.innerHTML=`<div class="correct">✔ صح 🤍</div>`;
        playCorrect();
        options[i].style.background="#86efac";
    }else{
        fb.innerHTML=`
        <div class="wrong">❌ غلط 💔</div>
        <div>الإجابة الصحيحة: <b>${q.options[q.answer]}</b></div>
        `;
        options[i].style.background="#fca5a5";
        options[q.answer].style.background="#86efac";
    }
}

function nextQ(){
    if(answers[current] === null){
        alert("جاوبي أول 😅");
        return;
    }

    if(current < questions.length - 1){
        current++;
        showQuestion();
    }else{
        showResult();
    }
}

function prevQ(){
    if(current > 0){
        current--;
        showQuestion();
    }
}

function showResult(){

    let score=0;
    let wrongList="";

    questions.forEach((q,i)=>{

        if(answers[i] === q.answer){
            score++;
        }else{

            wrongList += `
            <div style="margin:20px 0;padding:15px;border-radius:12px;background:rgba(255,255,255,0.3)">
                
                ❌ <b>${q.q}</b><br><br>

                <b>الخيارات:</b>
                <ol>
                    ${q.options.map((opt,idx)=>{
                        let style="";

                        if(idx === q.answer){
                            style="color:green;font-weight:bold;";
                        }

                        if(idx === answers[i] && answers[i] !== q.answer){
                            style="color:red;font-weight:bold;text-decoration:line-through;";
                        }

                        return `<li style="${style}">${opt}</li>`;
                    }).join("")}
                </ol>

                ✔ الإجابة الصحيحة: <b style="color:green">${q.options[q.answer]}</b><br>

                ❌ إجابتك: <b style="color:red">
                    ${answers[i] !== null ? q.options[answers[i]] : "ما جاوبتي"}
                </b>

            </div>
            `;
        }
    });

    document.getElementById("quiz").innerHTML = `
        <h2 style="text-align:center">النتيجة 🤍</h2>
        <h3 style="text-align:center">${score} / ${questions.length}</h3>

        <h3>الأخطاء:</h3>
        ${wrongList || "<p>فل مارك 🎉🤍</p>"}

        <div style="text-align:center">
            <button class="btn home" onclick="location.reload()">الرئيسية</button>
        </div>
    `;
}

function goHome(){
    location.reload();
}

</script>

</body>
</html>
