<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz Platform</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#f5f0ff;
  padding:20px;
}

h1{
  color:#6b4bd1;
}

button{
  display:block;
  width:80%;
  margin:10px auto;
  padding:12px;
  border:none;
  border-radius:15px;
  background:#f7d9e6;
  cursor:pointer;
}

button:hover{
  background:#f3c6da;
}

.menu-btn{
  background:#d8ccff;
  font-size:18px;
}

.correct{
  color:green;
  font-weight:bold;
}

.wrong{
  color:red;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>Quiz Platform</h1>

<div id="menu">
  <button class="menu-btn" onclick="start('comm')">Communication Concept</button>
  <button class="menu-btn" onclick="start('path')">Pathology</button>
  <button class="menu-btn" onclick="start('law')">حقوق الملكية الفكرية</button>
</div>

<div id="quiz"></div>
<div id="feedback"></div>

<button id="next" style="display:none;" onclick="nextQ()">Next</button>

<h2 id="result"></h2>

<script>

let questions=[];
let index=0;
let score=0;

function start(subject){

  if(subject==="comm"){
    questions=comm;
  }

  if(subject==="path"){
    questions=path;
  }

  if(subject==="law"){
    questions=law;
  }

  document.getElementById("menu").style.display="none";
  index=0;
  score=0;
  load();
}

function load(){

  let q=questions[index];

  document.getElementById("quiz").innerHTML=`
    <h3>${q.q}</h3>
    ${q.options.map((o,i)=>`
      <button onclick="check(${i})">${o}</button>
    `).join("")}
  `;

  document.getElementById("feedback").innerHTML="";
  document.getElementById("next").style.display="none";
}

function check(i){

  let q=questions[index];

  let btns=document.querySelectorAll("button");
  btns.forEach(b=>{
    if(b.id!=="next") b.disabled=true;
  });

  if(i===q.answer){
    score++;
    document.getElementById("feedback").innerHTML=
    "<div class='correct'>Correct 💚</div>";
  }else{
    document.getElementById("feedback").innerHTML=
    "<div class='wrong'>Wrong 💔</div><div class='correct'>Correct Answer: "+q.options[q.answer]+"</div>";
  }

  document.getElementById("next").style.display="block";
}

function nextQ(){
  index++;

  if(index<questions.length){
    load();
  }else{
    document.getElementById("quiz").innerHTML="";
    document.getElementById("feedback").innerHTML="";
    document.getElementById("next").style.display="none";

    document.getElementById("result").innerHTML=
    "Score: "+score+" / "+questions.length;
  }
}
