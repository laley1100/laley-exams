<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Quiz Platform</title>

<style>
body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#f3e8ff,#fde2f3);
padding:20px;
}

h1{
color:#7b2cbf;
}

.menu button{
padding:12px;
margin:10px;
width:80%;
border:none;
border-radius:20px;
background:#e0c3fc;
cursor:pointer;
font-size:16px;
}

.quiz button{
padding:10px;
margin:8px;
width:90%;
border:none;
border-radius:15px;
background:#f2d7ff;
cursor:pointer;
}

.correct{background:lightgreen !important;}
.wrong{background:#ffb3b3 !important;}
</style>
</head>

<body>

<h1>Quiz Platform 💗</h1>

<div class="menu" id="menu">
<button onclick="start(0)">حقوق الملكية الفكرية 💗</button>
<button onclick="start(1)">Communication Concept 💗</button>
<button onclick="start(2)">Pathology 💗</button>
</div>

<div id="quiz" class="quiz"></div>

<script>

/* 🎵 أصوات */
const clickSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
const wrongSound = new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3");
const correctSound = new Audio("https://www.soundjay.com/buttons/sounds/button-4.mp3");

let current=0;
let score=0;
let answered=false;
let bank=[];

/* ⚖️ المادة 1 حقوق الملكية (20 سؤال) */
const rights=[
{
q:"1- من خصائص العنصر المعنوي لحق المؤلف:\nأ- عدم قابليته للتنازل عنه أو التعامل به\nب- قابليته للتنازل عنه والتعامل به\nج- يسقط بالتقادم\nد- قابليته للحجز",
a:0
},
{
q:"2- حق المؤلف يعتبر حقًا لصيقًا بشخصية الإنسان وهذا ما أُطلق عليه بموجب اتفاقية WIPO:\nأ- المصنف أو المؤلف\nب- المؤلف أو المبدع أو المبتكر\nج- السلطة الأبوية\nد- الاستغلال والتصرف",
a:1
},
{
q:"3- من أشكال التنازل عن العنصر المعنوي:\nأ- البيع، الهبة، التبرع\nب- المصنف أو المؤلف\nج- التبرع وأخذ قيمته\nد- يسقط بالتقادم",
a:0
},
{
q:"4- إذا تنازل أو باع الفرد المؤلف أو المنتج الخاص به هل ينتقل العنصر المعنوي؟\nأ- لا\nب- نعم\nج- جزئي\nد- غير واضح",
a:0
},
{
q:"5- تنازل المؤلف عن حقوقه المالية لا يستتبع ذلك:\nأ- الحقوق المعنوية\nب- الهبة\nج- التبرع\nد- البيع",
a:0
}
];

/* 🧠 المادة 2 Communication */
const comm=[
{
q:"1- Therapeutic communication is:\nأ- casual talk\nب- professional planned act\nج- medical orders\nد- comfort talk",
a:1
},
{
q:"2- Silence allows patient to:\nأ- ignore\nب- think\nج- end talk\nد- confuse",
a:1
}
];

/* 🧬 المادة 3 Pathology */
const path=[
{
q:"1- Body water percentage is:\nأ- 40%\nب- 50%\nج- 60%\nد- 70%",
a:2
},
{
q:"2- Most common thrombus:\nأ- arterial\nب- venous\nج- capillary\nد- cardiac",
a:1
}
];

function start(i){
clickSound.play();
document.getElementById("menu").style.display="none";
current=0;
score=0;

if(i===0) bank=rights;
if(i===1) bank=comm;
if(i===2) bank=path;

show();
}

function show(){
answered=false;
let q=bank[current];

document.getElementById("quiz").innerHTML=
`<h2>${q.q}</h2>`+
["A","B","C","D"].map((x,i)=>
`<button onclick="check(${i},this)">${x}</button>`
).join("");
}

function check(i,btn){
if(answered) return;
answered=true;

let q=bank[current];
let buttons=document.querySelectorAll("button");

if(i===q.a){
btn.classList.add("correct");
correctSound.play();
score++;
}else{
btn.classList.add("wrong");
buttons[q.a].classList.add("correct");
wrongSound.play();
}

setTimeout(()=>{
current++;
if(current<bank.length){
show();
}else{
document.getElementById("quiz").innerHTML=
`<h2>انتهى الاختبار 💗</h2><h3>النتيجة: ${score}/${bank.length}</h3>`;
}
},1000);
}

</script>

</body>
</html>
