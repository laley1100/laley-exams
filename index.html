<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exam App</title>

<style>
body{
font-family: Arial;
background: linear-gradient(135deg,#ffb6d9,#cdb4ff);
text-align:center;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
width:75%;
margin:auto;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

button{
margin:8px;
padding:10px 15px;
border:none;
border-radius:12px;
cursor:pointer;
background:#d63384;
color:white;
font-size:14px;
}

button:disabled{
background:gray;
cursor:not-allowed;
}

small{
display:block;
color:gray;
font-size:12px;
}

#result{
font-weight:bold;
}
</style>
</head>

<body>

<h2>💗 Choose Subject</h2>

<div id="menu">
<button onclick="start('comm')">Communication</button>
<button onclick="start('path')">Pathology</button>
<button onclick="start('ip')">Intellectual Property</button>
</div>

<div class="card" id="quiz" style="display:none;">

<h3 id="q"></h3>
<small id="q_ar"></small>

<div id="options"></div>

<p id="result"></p>

<button id="nextBtn" onclick="next()" disabled>Next 💗</button>

</div>

<script>

// ================= FULL 20 QUESTIONS EACH =================
const examApp = {

comm: Array.from({length:20}, (_,i)=>({
q:"Communication Question "+(i+1),
q_ar:"سؤال التواصل "+(i+1),
options:[
["Option A","الخيار أ"],
["Option B","الخيار ب"],
["Option C","الخيار ج"],
["Option D","الخيار د"]
],
a:1
})),

path: Array.from({length:20}, (_,i)=>({
q:"Pathology Question "+(i+1),
q_ar:"سؤال الباثولوجي "+(i+1),
options:[
["Option A","الخيار أ"],
["Option B","الخيار ب"],
["Option C","الخيار ج"],
["Option D","الخيار د"]
],
a:2
})),

ip: Array.from({length:20}, (_,i)=>({
q:"سؤال الملكية الفكرية "+(i+1),
q_ar:"",
options:[
["الخيار أ"],
["الخيار ب"],
["الخيار ج"],
["الخيار د"]
],
a:1
}))

};

// ================= SYSTEM =================
let subject="";
let index=0;
let answered=false;

function start(s){
subject=s;
index=0;
document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";
show();
}

function show(){
answered=false;
document.getElementById("nextBtn").disabled=true;

let q = examApp[subject][index];

document.getElementById("q").innerText=q.q;
document.getElementById("q_ar").innerText=q.q_ar;

let html="";

q.options.forEach((o,i)=>{
html += `
<button onclick="check(${i})">
${o[0]}
<small>${o[1]||""}</small>
</button><br>
`;
});

document.getElementById("options").innerHTML=html;
document.getElementById("result").innerText="";
}

function check(i){
if(answered) return;
answered=true;

let q = examApp[subject][index];
let correct = q.a;

if(i===correct){
document.getElementById("result").innerText="💗 Correct";
}else{
document.getElementById("result").innerText="💔 Wrong - Correct: " + q.options[correct][0];
}

document.getElementById("nextBtn").disabled=false;
}

function next(){
index++;
if(index>=examApp[subject].length){
document.getElementById("quiz").innerHTML="💗 Finished!";
return;
}
show();
}

</script>

</body>
</html>
