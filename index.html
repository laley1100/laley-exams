<html lang="en">
<head>
<meta charset="UTF-8">

<title>EXAM PLATFORM 🤍</title>

<style>
/* إعدادات الخلفية المتدرجة والتأثيرات التفاعلية الرائعة */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #fff0f6 0%, #f2e7fe 50%, #e6f2ff 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
}

/* حاوية العرض بتأثير الإطار الزجاجي المضيء والمحترف */
.container {
    background: rgba(255, 255, 255, 0.85); 
    width: 100%;
    max-width: 750px;
    padding: 40px 30px;
    border-radius: 32px;
    border: 2px solid rgba(255, 255, 255, 0.8); 
    box-shadow: 0 20px 45px rgba(219, 39, 119, 0.08), 
                0 8px 20px rgba(139, 92, 246, 0.06),
                inset 0 0 12px rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    position: relative;
}

#title { 
    font-size: 34px; 
    font-weight: 900; 
    color: #db2777; 
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    text-shadow: 2px 2px 5px rgba(219, 39, 119, 0.12);
    text-align: center;
}

.subtitle {
    color: #7c3aed; 
    font-size: 16px; 
    font-weight: 600; 
    margin-top: 0;
    margin-bottom: 35px;
    text-align: center;
    opacity: 0.85;
}

.menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.menuBtn { 
    background: rgba(245, 235, 255, 0.6); 
    color: #5b21b6; 
    padding: 24px 20px;
    border: 1px solid rgba(233, 213, 255, 0.8);
    border-radius: 22px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    box-shadow: 0 4px 15px rgba(124, 58, 237, 0.04);
} 

.menuBtn::after, .option::after, button.action-btn.next::after, button.action-btn.homeBtn::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -60%;
    width: 30%;
    height: 200%;
    background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
    transform: rotate(30deg);
    transition: none;
    pointer-events: none;
}

.menuBtn:hover::after, .option:hover::after, button.action-btn.next:hover::after, button.action-btn.homeBtn:hover::after {
    left: 140%;
    transition: all 0.75s ease-in-out;
}

.menuBtn:hover {
    background: rgba(233, 213, 255, 0.9);
    transform: translateY(-5px);
    border-color: #c084fc;
    box-shadow: 0 12px 24px rgba(124, 58, 237, 0.12);
}

.menuBtn span.badge {
    font-size: 12px;
    background: #ffffff;
    padding: 4px 12px;
    border-radius: 50px;
    color: #6d28d9;
    font-weight: 800;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
}

.option {
    display: block;
    margin: 16px auto;
    padding: 18px 22px;
    background: rgba(255, 247, 237, 0.7); 
    border: 1px solid rgba(255, 237, 213, 0.95);
    border-radius: 18px;
    cursor: pointer;
    width: 100%;
    box-sizing: border-box;
    text-align: left;
    font-size: 15px;
    font-weight: 600;
    color: #4a3e56;
    position: relative;
    overflow: hidden;
    transition: all 0.25s ease;
    box-shadow: 0 2px 8px rgba(251, 146, 60, 0.02);
}

.option:hover {
    background: rgba(255, 237, 213, 0.95);
    border-color: #fed7aa;
    transform: translateX(4px);
}

.option.correct-flash {
    background: #ecfdf5;
    border-color: #10b981;
    color: #065f46;
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
}

.option.wrong-flash {
    background: #fff1f2;
    border-color: #fb7185;
    color: #9f1239;
    box-shadow: 0 4px 12px rgba(251, 113, 133, 0.15);
}

.controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 30px;
}

button.action-btn {
    padding: 14px 28px;
    border: none;
    border-radius: 18px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

button.action-btn:hover {
    opacity: 0.95;
    transform: translateY(-2px);
}

.next { background: linear-gradient(135deg, #f472b6, #db2777); color: white; box-shadow: 0 4px 15px rgba(219, 39, 119, 0.25); } 
.back { background: #e2e8f0; color: #475569; border: 1px solid #cbd5e1; }
.homeBtn { background: linear-gradient(135deg, #c084fc, #9333ea); color: white; box-shadow: 0 4px 15px rgba(147, 51, 234, 0.25); }

.small { font-size: 15px; line-height: 1.6; margin-top: 12px; color: #c2410c; font-weight: 600; direction: rtl; text-align: right; background: rgba(255, 247, 237, 0.5); padding: 10px 15px; border-radius: 12px; }
.feedback { margin-top: 20px; font-weight: 700; font-size: 16px; padding: 14px; border-radius: 16px; direction: rtl; text-align: right; animation: fadeIn 0.3s ease; }

.screen { display: none; }
.active { display: block; animation: fadeIn 0.4s ease-out; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>

function playCuteSound() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc1 = audioCtx.createOscillator();
        const gain1 = audioCtx.createGain();
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(523.25, audioCtx.currentTime);
        gain1.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc1.connect(gain1);
        gain1.connect(audioCtx.destination);
        osc1.start();
        osc1.stop(audioCtx.currentTime + 0.1);

        setTimeout(() => {
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(659.25, audioCtx.currentTime);
            gain2.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start();
            osc2.stop(audioCtx.currentTime + 0.15);
        }, 60);
    } catch (e) {
        console.log("Audio not supported");
    }
}

    { q: "6. Liquefactive necrosis is typically characteristic of:", ar: "التنخر التميعي هو نموذجي ومميز لـ:", options: ["Myocardial infarctions and renal ischemic events", "Infarctions within the central nervous system (brain) and focal suppurative bacterial infections", "Chronic mycobacterial infections like tuberculosis", "Acute enzymatic destruction seen in acute pancreatitis"], answer: 1 },
    { q: "7. Caseous necrosis is a distinct form found characteristically in:", ar: "التنخر الجبني هو شكل متميز يوجد بشكل خاص في:", options: ["Ischemic myocardial necrosis", "Infections caused by Mycobacterium tuberculosis (Tuberculosis)", "Acute pancreatic fat necrosis secondary to enzyme leakage", "Tertiary syphilitic lesions known as gummas"], answer: 1 },
    { q: "8. Acute inflammation is clinically and histologically characterized by:", ar: "الالتهاب الحاد يتميز سريرياً ونسيجياً بـ:", options: ["A slow, insidious onset dominated by lymphocytes and tissue fibrosis", "Rapid onset (minutes/hours), fluid exudation (edema), and extensive neutrophil accumulation", "The formation of structured epithelioid granulomas", "The replacement of normal tissue architecture with permanent dense scar tissue"], answer: 1 },
    { q: "9. The five cardinal signs of acute inflammation include:", ar: "تشمل العلامات الخمس الأساسية للالتهاب الحاد:", options: ["Pallor, hypothermia, tissue shrinkage, numbness, and rigid immobility", "Heat (calor), redness (rubor), swelling (tumor), pain (dolor), and loss of function (functio laesa)", "Fibrosis, intracellular calcification, atrophy, apoptosis, and amyloidosis", "Atrophy, hypertrophy, hyperplasia, metaplasia, and dysplasia"], answer: 1 },
    { q: "10. The predominant cellular components involved in chronic inflammation are:", ar: "المكونات الخلوية السائدة المشاركة في الالتهاب المزمن هي:", options: ["Neutrophils and blood platelets", "Macrophages, lymphocytes, and plasma cells", "Eosinophils and basophilic granulocytes", "Erythrocytes and endothelial cells"], answer: 1 },
    { q: "11. Granulomatous inflammation is a specialized morphological pattern of:", ar: "الالتهاب الحبيبي هو نمط شكلي متخصص من:", options: ["Acute inflammation responding to pyogenic bacteria", "Chronic inflammation characterized by collections of activated macrophages or epithelioid cells", "Reversible adaptive responses seen in epithelial tissues", "Malignant cellular transformations in connective tissues"], answer: 1 },
    { q: "12. Hypertrophy is formally defined as an:", ar: "الضخامة (Hypertrophy) تُعرّف رسمياً بأنها:", options: ["Increase in the total absolute number of cells within a tissue", "Increase in the size of individual cells, leading to an increase in the size of the organ", "Reversible substitution of one mature cell type by another adult cell type", "Abnormal, disordered cellular development and architectural loss"], answer: 1 },
    { q: "13. Hyperplasia is formally defined as an:", ar: "فرط التنسج (Hyperplasia) يُعرّف رسمياً بأنه:", options: ["Increase in the volume and structural size of individual cells", "Increase in the absolute number of cells within an organ or tissue in response to a stimulus", "Disordered, pre-cancerous cellular growth pattern", "Shrinkage in cell size due to a loss of nutritional support"], answer: 1 },
    { q: "14. Metaplasia represents a cellular adaptation characterized by:", ar: "الحؤول النسيجي (Metaplasia) يمثل تكيفاً خلوياً يتميز بـ:", options: ["An uncontrolled, autonomous malignant cellular proliferation", "A reversible change in which one adult cell type is replaced by another adult cell type", "A progressive decrease in cell number and size within a tissue", "A complete failure of a primitive organ to develop during embryonic life"], answer: 1 },
    { q: "15. Dysplasia is histologically characterized by:", ar: "عسر التنسج (Dysplasia) يتميز نسيجياً بـ:", options: ["Perfectly coordinated adaptive tissue restructuring", "Disordered growth, atypical cellular features, and loss of architectural orientation (pre-cancerous)", "A fully benign, non-progressive adaptive process that never transforms", "Programmed cell death designed to clean up defective cells"], answer: 1 },
    { q: "16. Benign neoplasms are typically characterized as being:", ar: "الأورام الحميدة تتميز عادةً بأنها:", options: ["Highly invasive, rapidly growing, and capable of widespread metastasis", "Slow-growing, well-circumscribed, encapsulated, and remaining localized without metastasis", "Inevititably fatal within a short period if not treated with aggressive chemotherapy", "Lacking any differentiated cellular structures under standard microscopic review"], answer: 1 },
{ q: "17. The Chi-square test of independence is primarily applied to examine association between:", ar: "يُطبق اختبار كاي تربيع للاستقلالية بشكل أساسي لفحص العلاقة أو الارتباط بين المتغيرات الفئوية (Categorical).", options: ["Continuous data variables", "Comparing means of multiple groups", "Categorical variables", "Measuring correlation between continuous variables"], answer: 2 },    { q: "18. Metastasis explicitly refers to the process of:", ar: "الانتقال/الانتشار (Metastasis) يشير صراحةً إلى عملية:", options: ["Local tumor expansion within the primary organ of origin", "The spread of tumor cells to distant, discontinuous anatomical sites", "The reversible differentiation of benign cells into normal structures", "The acute inflammatory reaction surrounding a necrotic tumor core"], answer: 1 },
    { q: "19. A Carcinoma is precisely defined as a malignant neoplasm arising from:", ar: "الكارسينوما تُعرّف بدقة بأنها ورم خبيث ينشأ من:", options: ["Mesenchymal or connective tissue elements", "Epithelial cell origin (including squamous, glandular, or transitional surfaces)", "Lymphoid cells and bone marrow precursors", "Glial supportive cells of the central nervous system"], answer: 1 },
    { q: "20. A Sarcoma is precisely defined as a malignant neoplasm arising from:", ar: "الساركوما تُعرّف بدقة بأنها ورم خبيث ينشأ من:", options: ["Surface epithelial cell linings", "Mesenchymal or connective tissue origin (such as bone, cartilage, muscle, or fat)", "Glandular epithelial tissues and structures", "The protective coverings of the brain and spinal cord"], answer: 1 },
    { q: "21. Edema is defined as the accumulation of excess fluid within:", ar: "الوذمة تُعرّف بأنها تجمع السوائل الزائدة داخل:", options: ["The intravascular space increasing total blood volume", "The interstitial tissue spaces or body cavities", "The intracellular cytoplasm causing universal cell bursting", "The main lymphatic ducts exclusively"], answer: 1 },
    { q: "22. A Thrombus is defined as:", ar: "الجلطة/الخثرة تُعرّف بأنها:", options: ["A detached piece of material traveling freely through the bloodstream", "An intravascular solid or semi-solid mass formed from blood constituents within the living cardiovascular system", "A benign vascular tumor commonly found in the skin layers", "An accumulation of free serous fluid within the lower lungs"], answer: 1 },
    { q: "23. An Embolus is defined as a:", ar: "الصمة تُعرّف بأنها:", options: ["Stationary blood clot tightly attached to an injured vessel wall", "Detached intravascular solid, liquid, or gaseous mass carried by the blood to a site distant from its point of origin", "Normal regulatory protein found in healthy human plasma", "Type of phagocytic white blood cell migrating into injured tissue"], answer: 1 },
    { q: "24. Ischemia is defined as:", ar: "نقص التروية يُعرّف بأنه:", options: ["An enhanced and excessive oxygen supply to a metabolic tissue", "A deficiency of arterial blood supply to a tissue or organ, compromising oxygen and nutrient delivery", "The proper and physiological drainage of local interstitial fluid volumes", "A systemic infection caused by blood-borne viable bacteria"], answer: 1 },
    { q: "25. An Infarction is an anatomical area of:", ar: "الاحتشاء هو منطقة تشريحية من:", options: ["Ischemic necrosis caused by occlusion of either the arterial supply or the venous drainage", "Acute inflammatory suppuration and abscess formation", "Benign neoplastic cellular proliferation and expansion", "Reversible hydropic cellular swelling and glycogen loading"], answer: 0 },
    { q: "26. Systemic Shock is fundamentally characterized by:", ar: "الصدمة الجهازية تتميز أساساً بـ:", options: ["Severe systemic hypertension and slowed heart rates", "Systemic hypoperfusion resulting from insufficient cardiac output or reduced effective circulating blood volume", "Localized tissue edema restricted to the lower extremities", "A permanent pathologically elevated cardiac output rate"], answer: 1 },
    { q: "27. Primary tuberculosis characteristically involves the formation of the:", ar: "السل الأولي يتضمن بشكل مميز تكوين:", options: ["Extensive cavitation within the bilateral lung apices", "Ghon complex, which consists of a parenchymal lung lesion combined with involved draining lymph nodes", "Widespread caseous lesions throughout every major systemic organ", "Ischemic infarction zones across the upper renal cortex"], answer: 1 },
    { q: "28. Secondary tuberculosis typically occurs in a:", ar: "السل الثانوي يحدث عادةً في:", options: ["Completely unexposed, non-immunized pediatric individual", "Previously sensitized host, frequently localized to the lung apices with marked caseous necrosis and cavitation", "Infant population presenting with acute skin lesions only", "Patient's bone marrow without affecting pulmonary air spaces"], answer: 1 },
    { q: "29. Atherosclerosis is a chronic vascular disease that primarily affects:", ar: "تصلب الشرايين هو مرض وعائي مزمن يؤثر بشكل أساسي على:", options: ["Small microscopic capillaries and thin post-capillary venules", "Large and medium-sized elastic and muscular arteries (e.g., aorta, coronary arteries)", "Systemic veins and specialized deep venules", "The main collecting lymphatic vessels within the limbs"], answer: 1 },
    { q: "30. The major structural components of an advanced atherosclerotic plaque include:", ar: "تشمل المكونات الهيكلية الرئيسية للعصيدة الشريانية المتقدمة:", options: ["Neutrophils, fibrin networks, and acute serous exudate fluids exclusively", "Smooth muscle cells, macrophages, T lymphocytes, extracellular matrix (collagen), and intracellular/extracellular lipids", "Granulomatous giant cells and widespread caseous necrotic debris", "Pure calcium crystals without any lipid or cellular elements"], answer: 1 },
    { q: "31. The most common anatomical site for the occurrence of a myocardial infarction is the:", ar: "الموقع التشريحى الأكثر شيوعاً لحدوث احتشاء عضلة القلب هو:", options: ["Free wall of the right atrium", "Anterior or lateral walls of the left ventricle", "Posterior surface of the right ventricle", "Interatrial septum near the sinus node"], answer: 1 },
    { q: "32. The predominant microscopic change observed 1 to 2 days after a myocardial infarction is:", ar: "التغير المجهري السائد الملاحظ بعد يوم إلى يومين من احتشاء عضلة القلب هو:", options: ["Dense collagenous fibrosis and complete scar consolidation", "Coagulative necrosis of myocytes with a prominent acute neutrophilic infiltrate", "Extensive granulation tissue formation rich in new capillaries", "Complete cellular regeneration of cardiac myocytes back to normal"], answer: 1 },
    { q: "33. Lobar pneumonia is characterized anatomically by:", ar: "يتميز الالتهاب الرئوي الفصي تشريحياً بـ:", options: ["Patchy, multi-focal consolidation distributed randomly across multiple lobes", "Diffuse, uniform consolidation and hepatization involving an entire anatomical lobe of the lung", "The presence of chronic caseating granulomas centered within the lung apices", "Severe fibrotic thickening and scarring confined to the bronchiolar walls"], answer: 1 },
    { q: "34. Bronchopneumonia is histopathologically distinguished by:", ar: "يتميز الالتهاب الرئوي القصبي نسيجياً بـ:", options: ["A homogenous, continuous consolidation of an entire single pulmonary lobe", "Patchy, acute suppurative inflammatory consolidation centered directly on bronchioles and adjacent alveoli", "Universal caseous necrosis of the alveolar septa without cellular response", "Diffuse, non-suppurative interstitial infiltration by mature lymphocytes"], answer: 1 },
    { q: "35. Chronic bronchitis is clinically diagnosed and defined based on:", ar: "يتم تشخيص وتعريف التهاب الشعب الهوائية المزمن سريرياً بناءً على:", options: ["An acute viral destruction of the main large bronchial epithelial linings", "A persistent productive cough for at least 3 consecutive months in at least 2 successive years", "The permanent anatomical destruction of the interalveolar walls", "The finding of structured non-caseating granulomas along the respiratory tract"], answer: 1 },
    { q: "36. Emphysema is histopathologically characterized by:", ar: "يتميز نفاخ الرئتين نسيجياً بـ:", options: ["Acute, completely reversible smooth muscle bronchospasm inside the airways", "Permanent, abnormal enlargement of airspaces distal to terminal bronchioles, accompanied by destruction of alveolar walls", "Massive fluid accumulation and transudation within the local pleural cavity space", "Extensive dense fibrotic scarring and architectural obliteration of the visceral pleura"], answer: 1 },
    { q: "37. The defining histopathological triad of liver cirrhosis features:", ar: "الثلاثية النسيجية المحددة لتليف الكبد تشمل:", options: ["Universal simple fatty change, mild portal edema, and normal lobular veins", "Diffuse fibrosis, conversion of normal liver architecture into regenerative nodules, and vascular rearrangement", "A localized benign epithelial adenoma expanding slowly without altering architecture", "Acute neutrophilic lobular infiltration with complete absence of collagen deposition"], answer: 1 },
    { q: "38. The primary global risk factor for developing primary hepatocellular carcinoma is:", ar: "عامل الخطر العالمي الرئيسي لتطور سرطان الكبد الأولي هو:", options: ["The regular long-term use of standard over-the-counter aspirin", "Chronic infection with Hepatitis B or C virus (HBV/HCV) and underlying liver cirrhosis", "An acute episode of uncomplicated bacterial cholecystitis", "The presence of isolated congenital Gilbert syndrome"], answer: 1 },
    { q: "39. The major causative etiological agent responsible for chronic gastritis and peptic ulcers is:", ar: "العامل المسبب الرئيسي المسؤول عن التهاب المعدة المزمن والقرحة الهضمية هو:", options: ["High dietary intake of insoluble vegetable fibers", "Infection with the Gram-negative spiral bacterium Helicobacter pylori", "Excessive daily consumption of pure filtered water", "Chronic deficiency in vitamin C dietary supplementation"], answer: 1 },
    { q: "40. Peptic ulcer disease occurs most commonly within which anatomical locations?", ar: "تحدث القرحة الهضمية بشكل أكثر شيوعاً في أي المواقع التشريحية؟", options: ["The distal esophagus and the descending colon segments", "The stomach (antrum/lesser curvature) and the proximal first part of the duodenum", "The mid-jejunum and the distal areas of the ileum", "The vermiform appendix lumen exclusively"], answer: 1 },
    { q: "41. The histological gold standard required to establish a diagnosis of acute appendicitis is:", ar: "المعيار الذهبي النسيجي المطلوب لتأكيد تشخيص التهاب الزائدة الدودية الحاد هو:", options: ["The presence of dense clusters of mature lymphocytes in the mucosal layer", "Neutrophilic infiltration within the muscularis propria layer of the appendix wall", "Well-formed granulomas presenting inside the outer serosal coverings", "Extensive lamellar fibrosis completely obliterating the central appendiceal lumen"], answer: 1 },
    { q: "42. The primary screening and diagnostic procedure recommended for colorectal carcinoma is:", ar: "الإجراء الفحصي والتشخيصي الرئيسي الموصى به لسرطان القولون والمستقيم هو:", options: ["A standard plain abdominal flat-plate X-ray scan", "Full colonoscopy combined with direct tissue biopsy and histopathological review", "A series of routine baseline serum liver function blood panels", "The assessment of total serum amylase and lipase concentration levels"], answer: 1 },
    { q: "43. Nephrotic syndrome is clinically and biochemically defined by which constellation?", ar: "المتلازمة الكلوية تُعرّف سريرياً وحيوياً بـ:", options: ["Gross hematuria, acute oliguria, and significant systemic hypertension", "Heavy proteinuria (>3.5 g/day), hypoalbuminemia, hyperlipidemia, and severe generalized edema", "Anuria, high fever, widespread skin rash, and joint pain", "Isolated glycosuria combined with profound polyuria and weight loss"], answer: 1 },
    { q: "44. Nephritic syndrome is clinically distinguished from nephrotic syndrome by presenting with:", ar: "تتميز المتلازمة الكلوية الالتهابية عن المتلازمة الكلوية بوجود:", options: ["Massive isolated proteinuria without any cellular elements in urine", "Hematuria (blood in urine), azotemia, hypertension, and mild-to-moderate proteinuria", "A completely normal glomerular filtration rate and zero urinary changes", "Pathologically elevated blood glucose and massive fluid intake requirements"], answer: 1 },
    { q: "45. The most common benign neoplasm of the breast in young adult women is:", ar: "الورم الحميد الأكثر شيوعاً في الثدي لدى النساء الشابات هو:", options: ["Infiltrating ductal adenocarcinoma of the breast", "Fibroadenoma, a well-defined fibroepithelial tumor", "Intraductal papilloma localized within the primary lactiferous ducts", "Malignant phyllodes tumor expanding rapidly into the chest wall"], answer: 1 },
    { q: "46. The most common morphological type of malignant breast cancer is:", ar: "النوع الشكلي الأكثر شيوعاً لسرطان الثدي الخبيث هو:", options: ["Lobular carcinoma in situ remaining confined to the terminal lobules", "Infiltrating (invasive) ductal carcinoma", "Medullary carcinoma presenting with dense lymphoid tissue", "Mucinous (colloid) carcinoma forming large gelatinous lakes"], answer: 1 },
    { q: "47. Osteosarcoma is histologically characterized by the explicit production of:", ar: "تتميز الساركوما العظمية نسيجياً بالإنتاج الصريح لـ:", options: ["Purely benign, mature hyaline cartilage matrices", "Malignant osteoid (immature bone matrix) directly synthesized by neoplastic spindle cells", "Chronic granulomatous bone destruction and secondary repair tissue", "Uric acid crystal deposition creating localized tophi formations"], answer: 1 },
    { q: "48. Rheumatoid arthritis is pathologically characterized as a chronic:", ar: "يتميز التهاب المفاصل الروماتويدي مرضياً بأنه مرض مزمن:", options: ["Degenerative wear-and-tear disease of the articular hyaline cartilage layers", "Chronic autoimmune synovitis leading to joint destruction, pannus formation, and ankylosis", "Acute purulent joint infection secondary to direct hematogenous bacterial seeding", "Metabolic disorder caused by monosodium urate crystal precipitation in joint cavities"], answer: 1 },
    { q: "49. The classic clinical and pathological triad describing acute bacterial meningitis consists of:", ar: "تتكون الثلاثية السريرية المرضية الكلاسيكية التي تصف التهاب السحايا البكتيري الحاد من:", options: ["Severe hypotension, diffuse maculopapular rash, and watery diarrhea", "Fever, headache, and nuchal rigidity (stiff neck representing meningeal irritation)", "Generalized grand mal seizures, sudden total blindness, and massive polyuria", "Acute crushing chest pain, productive purulent cough, and severe dyspnea"], answer: 1 },
    { q: "50. Glaucoma is pathologically characterized by:", ar: "يتميز مرض المياه الزرقاء (الجلوكوما) مرضياً بـ:", options: ["A progressive opacity of the crystalline lens matrix", "An abnormal increase in intraocular pressure leading to progressive optic nerve damage and visual field loss", "Severe acute purulent inflammation of the outer conjunctiva", "The sudden accumulation of subretinal fluid causing total detachment"], answer: 1 }
],

// هنا تضع مصفوفة أسئلة مادة الإحصاء الـ 83 سؤالاً
// استبدل bio: [], بهذا الجزء بالكامل:
bio: [
    { q: "1. Hypothesis testing is a statistical method used to:", ar: "اختبار الفرضيات هو طريقة إحصائية تُستخدم لاتخاذ القرارات أو استخلاص الاستنتاجات حول المجتمع بناءً على بيانات العينة.", options: ["Make decisions or draw conclusions about a population based on sample data", "Predict future financial trends without any data", "Collect and clean raw data from the field", "Avoid any kind of statistical analysis"], answer: 0 },
    { q: "2. The null hypothesis (H₀) usually states that:", ar: "الفرضية الصفرية (H₀) تنص عادةً على عدم وجود تأثير أو عدم وجود فرق حقيقي بين المجموعات.", options: ["There is a strong and significant effect", "There is no effect or no real difference between groups", "A strong relationship exists between variables", "The sample data is biased and completely invalid"], answer: 1 },
    { q: "3. The alternative hypothesis (H₁) states that:", ar: "الفرضية البديلة (H₁) تشير إلى وجود تأثير حقيقي، أو اختلاف، أو علاقة بين المتغيرات محل الدراسة.", options: ["No difference exists between the studied groups", "There is a real effect, difference, or relationship in the population", "The study data are totally invalid and corrupt", "The statistical test is inconclusive"], answer: 1 },
    { q: "4. The common significance level (α) used in hypothesis testing is:", ar: "مستوى المعنوية الشائع (ألفا) المستخدم في اختبار الفرضيات هو 0.05، وهو ما يعني نسبة خطأ مقبولة 5%.", options: ["0.01", "0.05", "0.10", "0.50"], answer: 1 },
    { q: "5. A right-tailed test is appropriate when the alternative hypothesis predicts a:", ar: "يكون اختبار الطرف الأيمن مناسباً عندما تتوقع الفرضية البديلة زيادة أو قيمة أكبر من القيمة المرجعية.", options: ["Decrease in the outcome parameter", "Increase or a value higher than the baseline reference", "Any change regardless of its direction", "No difference or zero change at all"], answer: 1 },
    { q: "6. A left-tailed test is appropriate when the alternative hypothesis predicts a:", ar: "يكون اختبار الطرف الأيسر مناسباً عندما تتوقع الفرضية البديلة نقصاناً أو انخفاضاً عن القيمة المرجعية.", options: ["Increase in the outcome parameter", "Decrease or a value lower than the baseline reference", "Any change regardless of its direction", "No difference or zero change at all"], answer: 1 },
    { q: "7. A two-tailed test is used when the alternative hypothesis predicts:", ar: "يُستخدم الاختبار ذو الطرفين عندما تتوقع الفرضية البديلة وجود أي اختلاف أو تغير، بغض النظر عن اتجاهه (زيادة أو نقصان).", options: ["Only an increase in the parameter value", "Only a decrease in the parameter value", "Any difference or change in either direction from the baseline", "No hypothesis is formally stated"], answer: 2 },
    { q: "8. An example of a two-tailed hypothesis statement is:", ar: "مثال على الفرضية ذات الطرفين: ضغط الدم بعد تناول الدواء لا يساوي ضغط الدم المرجعي (قد يكون أعلى أو أقل).", options: ["Blood pressure is greater than baseline", "Blood pressure is strictly less than baseline", "Blood pressure is not equal to baseline (BP ≠ baseline)", "Blood pressure is exactly equal to baseline"], answer: 2 },
    { q: "9. In most biomedical research studies, which type of test is standard and preferred?", ar: "في معظم أبحاث الطب الحيوي، يُعتبر الاختبار ذو الطرفين (Two-tailed) هو المعيار المفضل لتجنب التحيز.", options: ["One-tailed test", "Two-tailed test", "Random statistical test", "No hypothesis testing at all"], answer: 1 },
    { q: "10. One-tailed tests are generally considered risky because they:", ar: "تُعتبر الاختبارات ذات الطرف الواحد خطيرة عموماً لأنها قد تؤدي إلى رفع معدل الرفض الخاطئ وتتجاهل التغيرات في الاتجاه المعاكس.", options: ["Are less statistically powerful", "Can overlook unexpected differences in the opposite direction and increase error rates", "Require massive sample sizes to be valid", "Cannot be computed by standard software"], answer: 1 },
    { q: "11. Which of the following is a classic example of a parametric statistical test?", ar: "أي مما يلي يُعد مثالاً كلاسيكياً على الاختبارات الإحصائية المعلمية (التي تفترض التوزيع الطبيعي)؟", options: ["Mann–Whitney U test", "Wilcoxon signed-rank test", "Student's t-test", "Kruskal–Wallis test"], answer: 2 },
    { q: "12. The Analysis of Variance (ANOVA) is primarily used to compare means among:", ar: "تحليل التباين (ANOVA) يُستخدم أساساً لمقارنة المتوسطات الحسابية بين ثلاث مجموعات مستقلة أو أكثر.", options: ["Two groups only", "Three or more independent groups", "One group measured at a single time point", "Paired or matched clinical samples"], answer: 1 },
    { q: "13. Non-parametric statistical tests are selected when data assumes:", ar: "يتم اختيار الاختبارات غير المعلمية عندما لا تتبع البيانات توزيعاً محدداً (مثل التوزيع الطبيعي)، أو تكون رتبية.", options: ["A strict normal distribution", "No specific underlying distribution (Distribution-free data)", "An extremely large and clean sample size", "Interval or ratio level scale data exclusively"], answer: 1 },
    { q: "14. The Wilcoxon signed-rank test is the non-parametric alternative to the:", ar: "اختبار ويلكوكسون للرتب الموقعة هو البديل غير المعلمي لاختبار t للعينات المرتبطة (قبل وبعد).", options: ["Independent samples t-test", "Paired samples t-test", "One-way ANOVA", "Pearson correlation test"], answer: 1 },
    { q: "15. The Kruskal–Wallis test serves as the non-parametric alternative to the:", ar: "اختبار كروسكال واليس هو البديل غير المعلمي لتحليل التباين أحادي الاتجاه (One-way ANOVA).", options: ["One-way ANOVA", "Independent samples t-test", "Chi-square test of independence", "Pearson linear correlation"], answer: 0 },
    { q: "16. A major advantage of non-parametric tests over parametric tests is that they are:", ar: "الميزة الكبرى للاختبارات غير المعلمية هي أنها قوية ولا تتأثر بالقيم المتطرفة أو الالتواء الشديد في البيانات.", options: ["Dependent on strict normality assumptions", "Robust to outliers and highly skewed distribution scales", "Always more precise and powerful", "Based purely on calculating mean values"], answer: 1 },
    { q: "17. The Chi-square test of independence is primarily applied to examine association between:", ar: "يُطبق اختبار كاي تربيع للاستقلالية بشكل أساسي لفحص العلاقة أو الارتباط بين المتغيرات الفئوية (Categorical).", options: ["Continuous data variables", "Comparing means of multiple groups", "Testing association between categorical variables", "Measuring correlation between continuous variables"], answer: 2 },
    { q: "18. Type I error in hypothesis testing occurs when we:", ar: "يحدث خطأ من النوع الأول عندما نرفض الفرضية الصفرية وهي صحيحة في الواقع.", options: ["Reject the null hypothesis when it is actually true", "Accept the null hypothesis when it is actually false", "Fail to reject an incorrect alternative hypothesis", "Use a sample size that is too small for analysis"], answer: 0 },
    { q: "19. Type II error in hypothesis testing occurs when we:", ar: "يحدث خطأ من النوع الثاني عندما نفشل في رفض الفرضية الصفرية وهي خاطئة في الواقع.", options: ["Reject the null hypothesis when it is true", "Fail to reject the null hypothesis when it is actually false", "Set the alpha level exactly at 0.05", "Correctly accept a true alternative hypothesis"], answer: 1 },
    { q: "20. The probability of committing a Type I error is equal to:", ar: "احتمالية ارتكاب خطأ من النوع الأول تساوي مستوى المعنوية المحدد (Alpha).", options: ["The significance level (alpha)", "The power of the statistical test", "The beta level of error", "The confidence interval width"], answer: 0 },
    { q: "21. The power of a statistical test is mathematically defined as:", ar: "قوة الاختبار الإحصائي تُعرف رياضياً بأنها القدرة على رفض الفرضية الصفرية الخاطئة بشكل صحيح (1 - Beta).", options: ["1 - alpha", "1 - beta", "alpha + beta", "alpha / beta"], answer: 1 },
    { q: "22. To increase the power of a statistical study, researchers should:", ar: "لزيادة قوة الدراسة الإحصائية، يجب على الباحثين زيادة حجم العينة المعالجة.", options: ["Decrease the sample size", "Increase the sample size", "Increase the rate of Type II errors", "Avoid using any parametric testing procedures"], answer: 1 },
    { q: "23. If the computed p-value is less than or equal to the alpha level (p ≤ α), we:", ar: "إذا كانت القيمة الاحتمالية المحسوبة أقل من أو تساوي مستوى ألفا، فإننا نرفض الفرضية الصفرية.", options: ["Accept the null hypothesis as absolutely true", "Reject the null hypothesis in favor of the alternative", "Fail to reject the null hypothesis altogether", "Declare the data completely corrupted and invalid"], answer: 1 },
    { q: "24. If the computed p-value is greater than the alpha level (p > α), we:", ar: "إذا كانت القيمة الاحتمالية المحسوبة أكبر من مستوى ألفا، فإننا نفشل في رفض الفرضية الصفرية.", options: ["Reject the alternative hypothesis completely", "Fail to reject the null hypothesis", "Prove that there is a massive clinical effect", "Change the raw data to match our prediction"], answer: 1 },
    { q: "25. P-value stands for:", ar: "يرمز مصطلح P-value إلى القيمة الاحتمالية (Probability value).", options: ["Population value", "Parametric value", "Probability value", "Prediction value"], answer: 2 },
    { q: "26. In a standard normal distribution (Z-distribution), the mean and standard deviation are:", ar: "في التوزيع الطبيعي المعياري، يكون المتوسط دائماً صفر والانحراف المعياري واحداً.", options: ["Mean = 1, SD = 0", "Mean = 0, SD = 1", "Mean = 0, SD = 0", "Mean = 1, SD = 1"], answer: 1 },
    { q: "27. The critical Z-value for a two-tailed test at an alpha level of 0.05 is:", ar: "قيمة Z الحرجة لاختبار ذو طرفين عند مستوى معنوية 0.05 هي 1.96.", options: ["1.64", "1.96", "2.58", "3.29"], answer: 1 },
    { q: "28. The paired t-test is specifically designed to compare means from:", ar: "اختبار t للعينات المرتبطة مصمم لمقارنة المتوسطات الناتجة عن نفس المجموعة قبل وبعد التدخل العلاجي.", options: ["Two entirely independent groups of subjects", "The same group of subjects measured at two different times (e.g., before and after)", "Three or more completely separate clinical trial groups", "A single group compared against a global population mean"], answer: 1 },
    { q: "29. The independent samples t-test compares the means of:", ar: "اختبار t للعينات المستقلة يقارن بين متوسطات مجموعتين منفصلتين تماماً عن بعضهما.", options: ["Two unrelated or independent groups", "The same group under two distinct treatments sequentially", "A group before and after taking a clinical medication", "Multiple variables within a single individual over time"], answer: 0 },
    { q: "30. Which test is the non-parametric equivalent to the independent samples t-test?", ar: "ما هو الاختبار غير المعلمي البديل لاختبار t للعينات المستقلة؟", options: ["Wilcoxon signed-rank test", "Mann–Whitney U test (Wilcoxon rank-sum test)", "Kruskal–Wallis test", "Friedman test"], answer: 1 },
    { q: "31. Linear regression analysis is primarily utilized to:", ar: "تحليل الانحدار الخطي يُستخدم أساساً للتنبؤ بقيمة متغير تابع بناءً على متغير مستقل.", options: ["Predict the value of a dependent variable based on an independent variable", "Check if a distribution is perfectly symmetrical", "Calculate the simple mode of a categorical data set", "Classify continuous data into qualitative groups"], answer: 0 },
    { q: "32. In the linear equation y = mx + c, 'm' represents the:", ar: "في المعادلة الخطية، يمثل الرمز 'm' ميل الخط المستقيم (Slope).", options: ["Y-intercept value", "Independent variable data", "Slope of the regression line", "Residual error margin"], answer: 2 },
    { q: "33. In the linear equation y = mx + c, 'c' represents the:", ar: "في المعادلة الخطية، يمثل الرمز 'c' نقطة التقاطع مع محور الصادات (Y-intercept).", options: ["Slope of the line", "Y-intercept where x equals zero", "Dependent variable value", "Correlation coefficient index"], answer: 1 },
    { q: "34. The Pearson correlation coefficient (r) measures the strength and direction of a:", ar: "معامل ارتباط بيرسون يقيس قوة واتجاه العلاقة الخطية بين متغيرين مستمرين.", options: ["Non-linear non-parametric association", "Linear relationship between two continuous variables", "Difference between multiple independent sample variances", "Categorical dependency between qualitative traits"], answer: 1 },
    { q: "35. A Pearson correlation coefficient value of r = -1 indicates a:", ar: "قيمة معامل ارتباط بيرسون عند -1 تدل على وجود ارتباط خطي عكسي تام.", options: ["Perfect positive linear relationship", "Perfect negative linear relationship", "Complete absence of any linear relationship", "Weak non-significant inverse association"], answer: 1 },
    { q: "36. A Pearson correlation coefficient value of r = 0 indicates:", ar: "قيمة معامل ارتباط بيرسون عند صفر تدل على عدم وجود أي ارتباط خطي بين المتغيرات.", options: ["A perfect inverse linear association", "No linear relationship or correlation at all", "A strong and highly valid causal mechanism", "An error in entering data points"], answer: 1 },
    { q: "37. The coefficient of determination (R²) indicates:", ar: "معامل التحديد (R²) يوضح نسبة التباين في المتغير التابع التي يمكن تفسيرها بواسطة المتغير المستقل.", options: ["The absolute error rate in linear equations", "The proportion of variance in the dependent variable explained by the independent variable", "The probability of committing a critical Type I error", "The exact slope degree of a multi-variable curve"], answer: 1 },
    { q: "38. Spearman's rank correlation is chosen instead of Pearson's when:", ar: "يتم اختيار معامل ارتباط سبيرمان للرتب بدلاً من بيرسون عندما تكون البيانات رتبية أو لا تتبع التوزيع الطبيعي.", options: ["Data are strictly normally distributed and continuous", "Data are ordinal, skewed, or the relationship is non-linear but monotonic", "Comparing the means of exactly three separate groups", "The sample size is infinitely massive and clean"], answer: 1 },
    { q: "39. Which of the following is considered a measure of central tendency?", ar: "أي مما يلي يُعتبر مقياساً من مقاييس النزعة المركزية؟", options: ["Standard deviation", "Variance", "Mean", "Range"], answer: 2 },
    { q: "40. The middle value in a sorted data set is formally known as the:", ar: "القيمة الوسطى في مجموعة بيانات مرتبة تُعرف رسمياً باسم الوسيط (Median).", options: ["Mean", "Median", "Mode", "Variance"], answer: 1 }
{ q: "41. The value that appears most frequently in a data set is the:", ar: "القيمة الأكثر تكراراً في مجموعة البيانات تُعرف باسم المنوال (Mode).", options: ["Mean", "Median", "Mode", "Standard deviation"], answer: 2 },
    { q: "42. The difference between the highest and lowest values in a data set is the:", ar: "الفرق بين أعلى وأقل قيمة في مجموعة البيانات يُسمى المدى (Range).", options: ["Variance", "Standard deviation", "Range", "Interquartile range"], answer: 2 },
    { q: "43. Standard deviation is mathematically defined as the:", ar: "الانحراف المعياري يُعرف رياضياً بأنه الجذر التربيعي للتباين.", options: ["Square of the variance", "Square root of the variance", "Average of all data points", "Absolute difference between mean and mode"], answer: 1 },
    { q: "44. The square of the standard deviation is known as the:", ar: "مربع الانحراف المعياري يُعرف باسم التباين (Variance).", options: ["Mean absolute deviation", "Variance", "Range", "Standard error"], answer: 1 },
    { q: "45. Standard error of the mean (SEM) quantifies:", ar: "الخطأ المعياري للمتوسط (SEM) يقيس مدى دقة متوسط العينة في تقدير متوسط المجتمع.", options: ["The variability within a single sample", "How precisely the sample mean estimates the true population mean", "The total percentage of errors made during data collection", "The probability of rejecting a true null hypothesis"], answer: 1 },
    { q: "46. As the sample size (n) increases, the Standard Error of the Mean (SEM) will:", ar: "كلما زاد حجم العينة (n)، فإن الخطأ المعياري للمتوسط (SEM) سوف يقل.", options: ["Increase proportionally", "Decrease", "Remain completely unchanged", "Fluctuate randomly in either direction"], answer: 1 },
    { q: "47. In a perfectly symmetrical normal distribution:", ar: "في التوزيع الطبيعي المتماثل تماماً، يتساوى المتوسط والوسيط والمنوال.", options: ["Mean > Median > Mode", "Mean < Median < Mode", "Mean = Median = Mode", "Mean and Median are equal, but Mode is zero"], answer: 2 },
    { q: "48. A distribution is considered positively skewed when the tail extends towards the:", ar: "يُعتبر التوزيع ملتوياً بشكل إيجابي (يميني) عندما يمتد الطرف نحو القيم الأكبر (اليمين).", options: ["Left side (lower values)", "Right side (higher values)", "Center from both directions equally", "Top vertical axis exclusively"], answer: 1 },
    { q: "49. In a positively skewed distribution, the relationship between measures is:", ar: "في التوزيع الملتوي إيجابياً، يكون المتوسط الحسابي أكبر من الوسيط والوسيط أكبر من المنوال.", options: ["Mean < Median < Mode", "Mean > Median > Mode", "Mean = Median = Mode", "Mode is always greater than the Mean"], answer: 1 },
    { q: "50. A distribution is considered negatively skewed when the tail extends towards the:", ar: "يُعتبر التوزيع ملتوياً بشكل سلبي (يساري) عندما يمتد الطرف نحو القيم الأصغر (اليسار).", options: ["Right side (higher values)", "Left side (lower values)", "Both sides symmetrically", "None of the above"], answer: 1 },
    { q: "51. In a negatively skewed distribution, the correct order is:", ar: "في التوزيع الملتوي سلبيًا، يكون المتوسط الحسابي أقل من الوسيط والوسيط أقل من المنوال.", options: ["Mean < Median < Mode", "Mean > Median > Mode", "Mean = Median = Mode", "Mode is equal to the Mean"], answer: 0 },
    { q: "52. The Interquartile Range (IQR) measures the spread of the:", ar: "المدى الربيعي (IQR) يقيس مدى انتشار الـ 50% الوسطى من البيانات.", options: ["Entire data set from start to end", "Middle 50% of the data points", "Highest 10% of the sample values", "Lowest 25% of the ranked parameters"], answer: 1 },
    { q: "53. The Interquartile Range (IQR) is calculated as:", ar: "يُحسب المدى الربيعي بطرح الربيع الأول من الربيع الثالث (Q3 - Q1).", options: ["Q3 - Q1", "Q4 - Q1", "Q2 - Q1", "Q3 - Q2"], answer: 0 },
    { q: "54. An outlier in a data set is formally defined as an observation that:", ar: "القيمة المتطرفة في مجموعة البيانات تُعرف رسمياً بأنها قيمة تبتعد بشكل غير طبيعي عن باقي البيانات.", options: ["Lies very close to the sample mean", "Is abnormally far from the rest of the data points", "Equals exactly zero in all measurements", "Appears frequently in categorical categories"], answer: 1 },
    { q: "55. According to the empirical rule, what percentage of data falls within 1 standard deviation of the mean in a normal distribution?", ar: "وفقاً للقاعدة التجريبية، تقع حوالي 68% من البيانات ضمن انحراف معياري واحد من المتوسط في التوزيع الطبيعي.", options: ["50%", "68%", "95%", "99.7%"], answer: 1 },
    { q: "56. What percentage of data falls within 2 standard deviations of the mean in a normal distribution?", ar: "تقع حوالي 95% من البيانات ضمن انحرافين معياريين من المتوسط في التوزيع الطبيعي.", options: ["68%", "90%", "95%", "99.7%"], answer: 2 },
    { q: "57. What percentage of data falls within 3 standard deviations of the mean in a normal distribution?", ar: "تقع حوالي 99.7% من البيانات ضمن ثلاثة انحرافات معيارية من المتوسط في التوزيع الطبيعي.", options: ["75%", "95%", "98%", "99.7%"], answer: 3 },
    { q: "58. The Central Limit Theorem states that as sample size grows large, the sampling distribution of the mean approaches a:", ar: "تنص نظرية النهاية المركزية على أنه عندما يصبح حجم العينة كبيراً، يقترب توزيع المعاينة للمتوسط من التوزيع الطبيعي.", options: ["Binomial distribution", "Uniform distribution", "Normal distribution", "Poisson distribution"], answer: 2 },
    { q: "59. For the Central Limit Theorem to hold true without knowing the population distribution, the sample size is usually recommended to be:", ar: "لتطبيق نظرية النهاية المركزية، يُوصى عادةً بأن يكون حجم العينة 30 أو أكثر.", options: ["n ≥ 5", "n ≥ 15", "n ≥ 30", "n ≥ 100"], answer: 2 },
    { q: "60. A 95% confidence interval implies that:", ar: "فترة الثقة 95% تعني أننا واثقون بنسبة 95% من أن الفترة تحتوي على متوسط المجتمع الحقيقي.", options: ["95% of all sample data points lie exactly within this designated interval", "We are 95% confident that the calculated interval contains the true population parameter", "There is a 5% chance that our calculated sample mean is completely wrong", "The study has a total power index of exactly 95%"], answer: 1 },
    { q: "61. If a 95% confidence interval for an odds ratio contains the value 1.0, it indicates:", ar: "إذا احتوت فترة الثقة 95% لنسبة الأرجحية على القيمة 1.0، فهذا يشير إلى عدم وجود دلالة إحصائية.", options: ["A highly significant statistical association", "No statistically significant association or difference", "A critical mistake in math computations", "A strong causal relationship between parameters"], answer: 1 },
    { q: "62. If a 95% confidence interval for a mean difference contains the value 0, it means:", ar: "إذا احتوت فترة الثقة 95% لفرق المتوسطات على القيمة صفر، فهذا يعني أن الفرق ليس له دلالة إحصائية.", options: ["The difference is statistically significant", "The difference is not statistically significant", "The sample size is too massive to evaluate", "The alpha level must be rejected instantly"], answer: 1 },
    { q: "63. The probability of an event ranges strictly between:", ar: "تتراوح احتمالية حدوث أي حدث بدقة بين صفر وواحد (0 و 1).", options: ["-1 and +1", "0 and 100 exclusively", "0 and 1", "Any real number without limitations"], answer: 2 },
    { q: "64. If two events are mutually exclusive, it explicitly means that:", ar: "إذا كان الحدثان مانعين لبعضهما تبادلياً (Mutually exclusive)، فهذا يعني أنهما لا يمكن أن يحدثا معاً في نفس الوقت.", options: ["They can never occur at the same time", "The occurrence of one completely changes the probability of the other", "They always happen together sequentially", "They are fully dependent on external variables"], answer: 0 },
    { q: "65. In a diagnostic test, Sensitivity is defined as the ability to correctly identify those:", ar: "في الاختبارات التشخيصية، تُعرف الحساسية (Sensitivity) بأنها القدرة على تحديد الأشخاص المصابين بالمرض بشكل صحيح.", options: ["With the disease (True Positive rate)", "Without the disease (True Negative rate)", "Who will develop the condition in the future", "Who are completely immune to the studied disease"], answer: 0 },
    { q: "66. In a diagnostic test, Specificity is defined as the ability to correctly identify those:", ar: "تُعرف الخصوصية (Specificity) بأنها القدرة على تحديد الأشخاص غير المصابين بالمرض بشكل صحيح.", options: ["With the disease properly", "Without the disease (True Negative rate)", "Who represent false positive readings", "Who require emergency critical care"], answer: 1 },
    { q: "67. Positive Predictive Value (PPV) indicates the probability that a person:", ar: "القيمة التنبؤية الإيجابية (PPV) تشير إلى احتمالية أن يكون الشخص مصاباً فعلياً بالمرض إذا جاءت نتيجة فحصية إيجابية.", options: ["With a positive test result actually has the disease", "With a negative test result is completely free of disease", "Will test positive again in a future clinical session", "Is a true false-negative outlier case"], answer: 0 },
    { q: "68. Negative Predictive Value (NPV) indicates the probability that a person:", ar: "القيمة التنبؤية السلبية (NPV) تشير إلى احتمالية أن يكون الشخص خالياً فعلياً من المرض إذا جاءت نتيجة فحصية سلبية.", options: ["With a positive result is healthy", "With a negative test result is actually free of the disease", "Will develop symptoms within a fixed time frame", "Has been misdiagnosed by standard medical staff"], answer: 1 },
    { q: "69. An epidemiological study that observes a population at a single specific point in time is a:", ar: "الدراسة الوبائية التي تلاحظ مجتمعاً معيناً في نقطة زمنية واحدة محددة تُسمى دراسة مستعرضة (Cross-sectional).", options: ["Cohort study", "Case-control study", "Cross-sectional study", "Randomized controlled trial"], answer: 2 },
    { q: "70. A study that compares a group of people with a disease to a group without the disease retrospectively is a:", ar: "الدراسة التي تقارن مجموعة من الأشخاص المصابين بمرض مع مجموعة غير مصابة بأثر رجعي تُسمى دراسة الحالات والشواهد (Case-control).", options: ["Cohort study", "Case-control study", "Cross-sectional study", "Clinical trial"], answer: 1 },
    { q: "71. A prospective study that follows a group of exposed and unexposed individuals over time is a:", ar: "الدراسة المستقبلية التي تتابع مجموعة من الأفراد المعرضين وغير المعرضين لعامل معين بمرور الوقت هي دراسة أتراب (Cohort).", options: ["Case-control study", "Cohort study", "Cross-sectional study", "Meta-analysis panel"], answer: 1 },
    { q: "72. The measure of association typically calculated in a Case-Control study is the:", ar: "مقياس الارتباط الذي يُحسب عادة في دراسات الحالات والشواهد هو نسبة الأرجحية (Odds Ratio).", options: ["Relative Risk", "Odds Ratio", "Attributable Risk", "Incidence Rate"], answer: 1 },
    { q: "73. The measure of association typically calculated in a Cohort study is the:", ar: "مقياس الارتباط الذي يُحسب عادة في دراسات الأتراب هو الخطر النسبي (Relative Risk).", options: ["Odds Ratio", "Relative Risk", "Prevalence Rate", "Sensitivity Index"], answer: 1 },
    { q: "74. The gold standard study design for establishing causal relationships in clinical interventions is the:", ar: "التصميم البحثي المعياري الذهبي لإثبات العلاقات السببية في التدخلات السريرية هو التجربة العشوائية المحكومة (RCT).", options: ["Retrospective cohort study", "Case-control survey", "Randomized Controlled Trial (RCT)", "Cross-sectional descriptive assessment"], answer: 2 },
    { q: "75. In a double-blind study design:", ar: "في تصميم الدراسة ثنائية التعمية، لا يعرف المريض ولا الطبيب الباحث من يتلقى العلاج الحقيقي ومن يتلقى العلاج الوهمي.", options: ["Only the patient does not know which treatment they receive", "Only the evaluating physician is kept unaware of assignments", "Both the subject and the investigator are kept unaware of the treatment assignment", "The data analyst uses special encrypted access codes"], answer: 2 },
    { q: "76. Confounding in an epidemiological study occurs when:", ar: "يحدث الاختلاط/الالتباس (Confounding) في الدراسة الوبائية عندما يتدخل متغير خارجي ويسهم في تشويه العلاقة بين السبب والنتيجة.", options: ["The sample size is inadequate to perform proper math tests", "An extraneous variable distorts the true relationship between the exposure and the outcome", "Data entries are mixed up by clerical workers", "The statistical power index reaches its maximum scale"], answer: 1 },
    { q: "77. Incidence is defined as the number of:", ar: "معدل الحدوث (Incidence) يُعرف بأنه عدد الحالات الجديدة الناشئة في مجتمع معين خلال فترة زمنية محددة.", options: ["Existing cases of a disease in a population at a specific time", "New cases of a disease that develop in a population during a specified time period", "Total deaths resulting directly from a diagnosed clinical condition", "Patients who successfully fully recover from a chronic disease"], answer: 1 },
    { q: "78. Prevalence is defined as the number of:", ar: "معدل الانتشار (Prevalence) يُعرف بأنه إجمالي عدد الحالات القائمة (القديمة والجديدة) في المجتمع عند نقطة زمنية محددة.", options: ["New cases diagnosed during a fixed monthly period", "All existing cases (old and new) of a disease in a population at a given point in time", "Severe adverse effects caused by experimental medications", "Subjects lost during long prospective follow-up steps"], answer: 1 },
    { q: "79. The primary goal of a scatter plot diagram is to visualize the:", ar: "الهدف الأساسي من مخطط المخطط المبعثر (Scatter plot) هو إظهار طبيعة العلاقة بين متغيرين مستمرين.", options: ["Proportions of categorical groups within a sample", "Relationship or correlation between two continuous variables", "Frequency distribution of a single ordinal dataset", "Survival rates of clinical subjects over several decades"], answer: 1 },
    { q: "80. Which chart type is best suited to display the frequency distribution of continuous data divided into intervals?", ar: "أي نوع من المخططات هو الأنسب لعرض التوزيع التكراري للبيانات المستمرة المقسمة إلى فترات؟", options: ["Pie chart", "Bar chart", "Histogram", "Line graph"], answer: 2 },
    { q: "81. A Pie chart is specifically used to demonstrate:", ar: "يُستخدم المخطط الدائري (Pie chart) خصيصاً لتوضيح النسب المئوية أو الأجزاء المكونة للكل.", options: ["The linear progression of values over long years", "Proportions or percentages of a categorical variable relative to a whole", "The residual variance margins around a regression curve", "The direct difference between two matched pair group means"], answer: 1 },
    { q: "82. Survival analysis methods, like the Kaplan-Meier curve, are unique because they handle:", ar: "طرق تحليل البقاء (مثل منحنى كابلان-ماير) فريدة من نوعها لأنها تتعامل مع البيانات الخاضعة للرقابة/المبتورة (Censored data).", options: ["Strictly symmetrical non-skewed bell curves", "Censored data where the event of interest has not occurred during follow-up", "Qualitative variables that cannot be sorted ranked", "Only sample sets with sizes smaller than ten units"], answer: 1 },
    { q: "83. A systematic review that uses quantitative methods to combine and contrast results from multiple independent studies is a:", ar: "المراجعة المنهجية التي تستخدم طرقاً كمية لدمج وتحليل نتائج دراسات مستقلة متعددة تُسمى تحليل بعدي (Meta-analysis).", options: ["Cohort overview panel", "Case report description", "Meta-analysis", "Cross-sectional synthesis"], answer: 2 }
]
]

function startQuiz(sub) {
    subject = sub;
    current = 0;
    answered = {};
    isShowingFeedback = false;
    
    if(!bank[subject] || bank[subject].length === 0) {
        alert("هذه المادة فارغة حالياً في الكود، يرجى نسخ ولصق أسئلتها داخل مصفوفتها المخصصة في ملف الـ HTML الخاص بك.");
        return;
    }
    
    document.getElementById("menu").classList.remove("active");
    document.getElementById("quiz").classList.add("active");
    showQuestion();
}

function showQuestion() {
    isShowingFeedback = false;
    const qData = bank[subject][current];
    const total = bank[subject].length;
    
    document.getElementById("progressBadge").innerText = `Question ${current + 1} of ${total}`;
    document.getElementById("question").innerText = qData.q;
    document.getElementById("translation").innerText = qData.ar || "لا يوجد ترجمة متوفرة حالياً.";
    
    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";
    
    document.getElementById("feedback").style.display = "none";
    document.getElementById("feedback").className = "feedback";
    
    document.getElementById("backBtn").disabled = (current === 0);
    document.getElementById("backBtn").style.opacity = (current === 0) ? "0.4" : "1";
    
    qData.options.forEach((opt, idx) => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.innerText = opt;
        
        if (answered[current] !== undefined) {
            if (idx === qData.answer) {
                btn.classList.add("correct-flash");
            } else if (idx === answered[current]) {
                btn.classList.add("wrong-flash");
            }
            btn.disabled = true;
        } else {
            btn.onclick = () => selectOption(idx);
        }
        optionsDiv.appendChild(btn);
    });
    
    if (answered[current] !== undefined) {
        showFeedbackUI(answered[current] === qData.answer);
    }
}

function selectOption(idx) {
    if (isShowingFeedback || answered[current] !== undefined) return;
    
    const qData = bank[subject][current];
    answered[current] = idx;
    isShowingFeedback = true;
    
    const options = document.querySelectorAll(".option");
    options.forEach(b => b.disabled = true);
    
    const isCorrect = (idx === qData.answer);
    
    if (isCorrect) {
        options[idx].classList.add("correct-flash");
        playCuteSound();
    } else {
        options[idx].classList.add("wrong-flash");
        options[qData.answer].classList.add("correct-flash");
    }
    
    showFeedbackUI(isCorrect);
}

function showFeedbackUI(isCorrect) {
    const fb = document.getElementById("feedback");
    fb.style.display = "block";
    if (isCorrect) {
        fb.innerText = "أحسنت! إجابتك صحيحة وممتازة ✨👏";
        fb.className = "feedback correct-flash";
        fb.style.color = "#065f46";
    } else {
        fb.innerText = "إجابة خاطئة، حاول التركيز والتعلم من الإجابة الصحيحة المحددة بالأخضر 💡";
        fb.className = "feedback wrong-flash";
        fb.style.color = "#9f1239";
    }
}

function nextQuestion() {
    if (current < bank[subject].length - 1) {
        current++;
        showQuestion();
    } else {
        alert("لقد وصلت إلى نهاية أسئلة هذه المادة بنجاح! 🎉");
    }
}

function backQuestion() {
    if (current > 0) {
        current--;
        showQuestion();
    }
}

function goMenu() {
    document.getElementById("quiz").classList.remove("active");
    document.getElementById("menu").classList.add("active");
}
</script>
