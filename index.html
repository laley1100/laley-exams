<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Quiz Platform 💜</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: linear-gradient(135deg, #f8e8ff, #ffe6f0);
}

h1 { color: #6a0dad; }

button {
  padding: 12px;
  margin: 10px;
  width: 80%;
  border-radius: 15px;
  border: none;
  cursor: pointer;
  background: #e9d8ff;
}

button:hover { background: #d6b3ff; }

.cute {
  background: #7b2cbf;
  color: white;
  border-radius: 25px;
}

.en { font-weight: bold; }
.ar { font-size: 13px; color: #666; }

#quizBox { display:none; }
</style>
</head>

<body>

<h1>💜 Quiz Platform</h1>

<div id="menu">
  <button class="cute" onclick="startQuiz('rights')">⚖️ حقوق الملكية</button>
  <button class="cute" onclick="startQuiz('comm')">💬 Communication</button>
  <button class="cute" onclick="startQuiz('path')">🧫 Pathology</button>
</div>

<div id="quizBox">
  <h2 id="qNum"></h2>
  <div id="question"></div>
  <div id="answers"></div>
  <div id="feedback"></div>
  <button class="cute" onclick="next()">Next 💜</button>
</div>

<script>

let current = 0;
let score = 0;
let questions = [];

/* ⚖️ عربي فقط */
const rightsQuestions = [
{q_en:"حقوق الملكية الفكرية هي",q_ar:"حقوق الملكية الفكرية هي",
options:[{en:"قابلة للتنازل دائمًا",ar:"قابلة للتنازل دائمًا"},
{en:"حقوق معنوية لا يمكن التنازل عنها",ar:"حقوق معنوية لا يمكن التنازل عنها"},
{en:"حقوق مالية فقط",ar:"حقوق مالية فقط"},
{en:"يمكن الحجز عليها",ar:"يمكن الحجز عليها"}],answer:1},

{q_en:"حق المؤلف مرتبط بـ",q_ar:"حق المؤلف مرتبط بـ",
options:[{en:"المنتج فقط",ar:"المنتج فقط"},
{en:"المبدع أو المؤلف",ar:"المبدع أو المؤلف"},
{en:"الحكومة",ar:"الحكومة"},
{en:"السوق",ar:"السوق"}],answer:1},

{q_en:"التنازل عن الحقوق المعنوية",q_ar:"التنازل عن الحقوق المعنوية",
options:[{en:"مسموح",ar:"مسموح"},
{en:"غير مسموح",ar:"غير مسموح"},
{en:"مشروط",ar:"مشروط"},
{en:"مؤقت",ar:"مؤقت"}],answer:1},

{q_en:"بيع العمل يعني",q_ar:"بيع العمل يعني",
options:[{en:"نقل الحقوق المعنوية",ar:"نقل الحقوق المعنوية"},
{en:"نقل النسخة المادية فقط",ar:"نقل النسخة المادية فقط"},
{en:"نقل كل الحقوق",ar:"نقل كل الحقوق"},
{en:"إلغاء الملكية",ar:"إلغاء الملكية"}],answer:1},

{q_en:"الحقوق المالية يمكن",q_ar:"الحقوق المالية يمكن",
options:[{en:"التنازل عنها",ar:"التنازل عنها"},
{en:"لا يمكن التنازل",ar:"لا يمكن التنازل"},
{en:"إلغاؤها",ar:"إلغاؤها"},
{en:"تجاهلها",ar:"تجاهلها"}],answer:0},

{q_en:"الحقوق المعنوية هي",q_ar:"الحقوق المعنوية هي",
options:[{en:"مالية",ar:"مالية"},
{en:"شخصية",ar:"شخصية"},
{en:"تجارية",ar:"تجارية"},
{en:"مؤقتة",ar:"مؤقتة"}],answer:1},

{q_en:"الحقوق التي يمكن الحجز عليها",q_ar:"الحقوق التي يمكن الحجز عليها",
options:[{en:"المعنوية",ar:"المعنوية"},
{en:"المالية",ar:"المالية"},
{en:"لا شيء",ar:"لا شيء"},
{en:"كلاهما",ar:"كلاهما"}],answer:1},

{q_en:"العنصر المادي يظهر عند",q_ar:"العنصر المادي يظهر عند",
options:[{en:"التفكير",ar:"التفكير"},
{en:"نشر العمل",ar:"نشر العمل"},
{en:"الفكرة فقط",ar:"الفكرة فقط"},
{en:"عمل مخفي",ar:"عمل مخفي"}],answer:1},

{q_en:"الحق يعني",q_ar:"الحق يعني",
options:[{en:"سلطة ومنفعة",ar:"سلطة ومنفعة"},
{en:"اسم فقط",ar:"اسم فقط"},
{en:"قانون فقط",ar:"قانون فقط"},
{en:"واجب",ar:"واجب"}],answer:0},

{q_en:"من الحقوق المعنوية للمؤلف",q_ar:"من الحقوق المعنوية للمؤلف",
options:[{en:"تعديل حر",ar:"تعديل حر"},
{en:"منع التشويه",ar:"منع التشويه"},
{en:"بيع العمل",ar:"بيع العمل"},
{en:"تجاهل العمل",ar:"تجاهل العمل"}],answer:1},

{q_en:"المؤلف وحده يستطيع",q_ar:"المؤلف وحده يستطيع",
options:[{en:"نشر العمل لأول مرة",ar:"نشر العمل لأول مرة"},
{en:"البيع فقط",ar:"البيع فقط"},
{en:"تجاهل القانون",ar:"تجاهل القانون"},
{en:"نقل الحقوق المعنوية",ar:"نقل الحقوق المعنوية"}],answer:0},

{q_en:"المؤلف يختار طريقة النشر",q_ar:"المؤلف يختار طريقة النشر",
options:[{en:"الطباعة",ar:"الطباعة"},
{en:"التسجيل",ar:"التسجيل"},
{en:"البث",ar:"البث"},
{en:"كل ما سبق",ar:"كل ما سبق"}],answer:3},

{q_en:"حق نسبة العمل يعني",q_ar:"حق نسبة العمل يعني",
options:[{en:"وضع اسم المؤلف",ar:"وضع اسم المؤلف"},
{en:"إخفاء الاسم",ar:"إخفاء الاسم"},
{en:"بيع العمل",ar:"بيع العمل"},
{en:"حذف العمل",ar:"حذف العمل"}],answer:0},

{q_en:"يمكن للمؤلف رفض النشر",q_ar:"يمكن للمؤلف رفض النشر",
options:[{en:"نعم",ar:"نعم"},
{en:"لا",ar:"لا"},
{en:"أحيانًا",ar:"أحيانًا"},
{en:"حسب العقد",ar:"حسب العقد"}],answer:0},

{q_en:"النشر بدون اسم يعني",q_ar:"النشر بدون اسم يعني",
options:[{en:"إخفاء الهوية",ar:"إخفاء الهوية"},
{en:"عمل مزيف",ar:"عمل مزيف"},
{en:"غير قانوني",ar:"غير قانوني"},
{en:"بيع الحقوق",ar:"بيع الحقوق"}],answer:0},

{q_en:"الترجمة بدون إذن",q_ar:"الترجمة بدون إذن",
options:[{en:"مسموح",ar:"مسموح"},
{en:"اعتداء",ar:"اعتداء"},
{en:"اختياري",ar:"اختياري"},
{en:"استخدام حر",ar:"استخدام حر"}],answer:1},

{q_en:"الترجمة الضارة تعتبر",q_ar:"الترجمة الضارة تعتبر",
options:[{en:"طبيعي",ar:"طبيعي"},
{en:"اعتداء",ar:"اعتداء"},
{en:"مسموح",ar:"مسموح"},
{en:"تجاهل",ar:"تجاهل"}],answer:1},

{q_en:"يمكن للمؤلف منع",q_ar:"يمكن للمؤلف منع",
options:[{en:"تشويه العمل",ar:"تشويه العمل"},
{en:"القراءة",ar:"القراءة"},
{en:"التفكير",ar:"التفكير"},
{en:"الدراسة",ar:"الدراسة"}],answer:0},

{q_en:"تشمل الحقوق المعنوية",q_ar:"تشمل الحقوق المعنوية",
options:[{en:"سحب العمل",ar:"سحب العمل"},
{en:"بيع",ar:"بيع"},
{en:"تجاهل",ar:"تجاهل"},
{en:"إلغاء القانون",ar:"إلغاء القانون"}],answer:0},

{q_en:"إذا لم يوجد ورثة تذهب الحقوق إلى",q_ar:"إذا لم يوجد ورثة تذهب الحقوق إلى",
options:[{en:"الدولة",ar:"الدولة"},
{en:"صديق",ar:"صديق"},
{en:"السوق",ar:"السوق"},
{en:"شركة",ar:"شركة"}],answer:0}
];

/* 💬 Communication و 🧫 Pathology موجودة عندك مسبقًا — خليهـم مثل ماهم */

/* الربط */
function startQuiz(type){
  if(type==='rights') questions = rightsQuestions;
  if(type==='comm') questions = commQuestions;
  if(type==='path') questions = pathQuestions;

  current=0; score=0;
  document.getElementById("menu").style.display="none";
  document.getElementById("quizBox").style.display="block";
  loadQuestion();
}

function loadQuestion(){
  let q=questions[current];
  document.getElementById("qNum").innerText="Question "+(current+1);
  document.getElementById("question").innerHTML=
    `<div class="en">${q.q_en}</div><div class="ar">${q.q_ar}</div>`;
  document.getElementById("answers").innerHTML=
    q.options.map((o,i)=>`<button onclick="check(${i})">
    <div class="en">${o.en}</div><div class="ar">${o.ar}</div></button>`).join("");
  document.getElementById("feedback").innerHTML="";
}

function check(i){
  let q=questions[current];
  document.getElementById("feedback").innerHTML =
    i===q.answer ? "💚 Correct" : "💔 Wrong";
}

function next(){
  current++;
  if(current<questions.length) loadQuestion();
  else document.getElementById("quizBox").innerHTML=
  "<h2>💜 Finished</h2><p>Score: "+score+"/"+questions.length+"</p>";
}

</script>

</body>
</html>
