<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Quiz App</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffd6e7,#d9c2ff);
text-align:center;
color:#222;
}

/* بدون خلفية بيضاء */
.card{
width:85%;
margin:auto;
margin-top:40px;
padding:20px;
border-radius:20px;
}

button{
padding:10px 18px;
margin:8px;
border:none;
border-radius:15px;
background:#ffb6c1;
cursor:pointer;
font-weight:bold;
}

button:hover{background:#dda0dd;}

/* 🔥 توسيط الخيارات */
.option{
display:block;
padding:10px;
margin:8px auto;
border-radius:10px;
background:#f3e6ff;
cursor:pointer;
text-align:center;
width:70%;
}

.correct{background:#b6ffb6 !important;}
.wrong{background:#ffb6b6 !important;}

.small{font-size:12px;color:#444;}

#nextBtn{background:#caa6ff;}
</style>
</head>

<body>

<div id="home" class="card">
<h2>💗 اختاري المادة</h2>
<button onclick="start('rights')">حقوق الملكية الفكرية</button>
<button onclick="start('comm')">Communication Concept</button>
<button onclick="start('path')">Pathology</button>
</div>

<div id="quiz" class="card" style="display:none">

<h3 id="title"></h3>
<div id="qnum"></div>

<h2 id="question"></h2>
<p class="small" id="translation"></p>

<div id="options"></div>

<div id="result"></div>

<div style="margin-top:10px;font-weight:bold">
Score: <span id="score">0</span>
</div>

<button id="nextBtn" onclick="next()">Next 💗</button>

</div>

<script>

let i=0;
let score=0;
let qset=[];

/* ================= حقوق الملكية الفكرية (عربي فقط) ================= */
const rights=[
{q:"من خصائص العنصر المعنوي لحق المؤلف",options:["عدم قابليته للتنازل","قابليته للتنازل","يسقط بالتقادم","قابليته للحجز"],a:0},
{q:"حق المؤلف مرتبط بشخصية الإنسان",options:["المصنف","المؤلف","الحكومة","السوق"],a:1},
{q:"من أشكال التنازل",options:["البيع والهبة","التبرع","التقادم","الحجز"],a:0},
{q:"بيع المصنف يعني",options:["نقل معنوي","نقل مادي","نقل كل الحقوق","إلغاء"],a:1},
{q:"الحقوق المعنوية",options:["تنتقل","لا تنتقل","تباع","تسقط"],a:1},
{q:"الحق الذي يقبل الحجز",options:["المعنوي","المالي","كلاهما","لا شيء"],a:1},
{q:"العنصر المادي يظهر عند",options:["التفكير","النشر","الفكرة","الخيال"],a:1},
{q:"الترجمة بدون إذن",options:["مسموح","اعتداء","اختياري","حر"],a:1},
{q:"إساءة الترجمة",options:["اعتداء","طبيعي","مسموح","تجاهل"],a:0},
{q:"بدون ورثة",options:["الدولة","صديق","شركة","سوق"],a:0}
];

/* ================= Communication (سؤال + ترجمة + خيارات مترجمة) ================= */
const comm=[
{
q:"Therapeutic communication is best defined as",
tr:"التواصل العلاجي يُعرّف بأنه",
options:[
"Casual conversation - محادثة عادية",
"Planned professional communication - تواصل مهني مخطط",
"Medical orders only - أوامر طبية فقط",
"Random talking - كلام عشوائي"
],a:1
},
{
q:"Shared understanding helps",
tr:"الفهم المشترك يساعد",
options:[
"Achieve goals - تحقيق الأهداف",
"Confusion - ارتباك",
"Delay care - تأخير الرعاية",
"Ignore patient - تجاهل المريض"
],a:0
},
{
q:"Silence allows patient to",
tr:"الصمت يسمح للمريض أن",
options:[
"Think - يفكر",
"Ignore - يتجاهل",
"Leave - يغادر",
"End talk - ينهي الحديث"
],a:0
},
{
q:"Exploring means",
tr:"الاستكشاف يعني",
options:[
"Dig deeper - التعمق",
"Stop - توقف",
"Ignore - تجاهل",
"Close topic - إغلاق"
],a:0
},
{
q:"Clarification is used to",
tr:"التوضيح يستخدم لـ",
options:[
"Check understanding - التأكد من الفهم",
"Confuse - إرباك",
"End conversation - إنهاء",
"Shout - صراخ"
],a:0
}
];

/* ================= Pathology ================= */
const path=[
{
q:"Water percentage in body",
tr:"نسبة الماء في الجسم",
options:["40% - 40%","50% - 50%","60% - 60%","70% - 70%"],a:2
},
{
q:"Neoplasm is",
tr:"الورم هو",
options:["Inflammation - التهاب","Uncontrolled growth - نمو غير طبيعي","Normal tissue - نسيج طبيعي","Infection - عدوى"],a:1
},
{
q:"Benign tumor",
tr:"الورم الحميد",
options:["Well differentiated - متمايز جيداً","Metastasis - انتشار","Invasion - غزو","Spread - انتشار"],a:0
},
{
q:"Malignant tumor",
tr:"الورم الخبيث",
options:["Aggressive - عدواني","Benign - حميد","Normal - طبيعي","Healing - شفاء"],a:0
},
{
q:"Metastasis means",
tr:"الانتشار",
options:["Spread - انتشار","Stop - توقف","Heal - شفاء","Shrink - انكماش"],a:0
}
];

/* ================= SYSTEM ================= */

function start(type){
i=0;
score=0;
document.getElementById("score").innerText=0;

if(type==="rights") qset=rights;
if(type==="comm") qset=comm;
if(type==="path") qset=path;

document.getElementById("home").style.display="none";
document.getElementById("quiz").style.display="block";

document.getElementById("title").innerText=
type==="rights"?"حقوق الملكية الفكرية":
type==="comm"?"Communication Concept":"Pathology";

show();
}

function show(){
let q=qset[i];

document.getElementById("qnum").innerText="Question "+(i+1);
document.getElementById("question").innerText=q.q;
document.getElementById("translation").innerText=q.tr||"";

let box=document.getElementById("options");
box.innerHTML="";

q.options.forEach((o,idx)=>{
let d=document.createElement("div");
d.className="option";
d.innerText=o;
d.onclick=()=>check(idx);
box.appendChild(d);
});

document.getElementById("result").innerHTML="";
}

function check(idx){
let q=qset[i];
let all=document.querySelectorAll(".option");

all.forEach(x=>x.onclick=null);

if(idx===q.a){
all[idx].classList.add("correct");
document.getElementById("result").innerHTML="💚 صح";
score++;
document.getElementById("score").innerText=score;
}else{
all[idx].classList.add("wrong");
all[q.a].classList.add("correct");
document.getElementById("result").innerHTML="💔 غلط - الإجابة الصحيحة بالأخضر";
}
}

function next(){
i++;
if(i<qset.length) show();
else document.getElementById("quiz").innerHTML=
`<h2>خلص الاختبار 💗</h2><h3>Score: ${score}/${qset.length}</h3>`;
}

</script>

</body>
</html>
