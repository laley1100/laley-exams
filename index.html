<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Quiz App</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#f6f0ff;
  padding:20px;
}

h1{
  color:#7a4ccf;
}

button{
  display:block;
  margin:10px auto;
  padding:12px;
  width:80%;
  border-radius:15px;
  border:none;
  cursor:pointer;
  background:#eadcff;
  font-size:16px;
}

button:hover{
  background:#dcc7ff;
}

.correct{color:green;font-weight:bold;}
.wrong{color:red;font-weight:bold;}

.small{font-size:14px;color:#555;}
.card{
  background:white;
  padding:15px;
  border-radius:15px;
  margin-top:20px;
}
</style>
</head>

<body>

<h1 id="title">Quiz App</h1>

<div id="menu"></div>
<div id="quiz"></div>
<div id="result"></div>

<script>

// ===================== DATA =====================

const data = {

"حقوق الملكية الفكرية": [
{
q:"من خصائص العنصر المعنوي لحق المؤلف",
options:["عدم قابليته للتنازل","قابليته للتنازل","يسقط بالتقادم","قابليته للحجز"],
answer:0
},
{
q:"الحق اللصيق بشخصية الإنسان يسمى",
options:["حق مالي","حق معنوي","حق تجاري","حق إداري"],
answer:1
},
{
q:"التنازل عن الحقوق المالية لا يشمل",
options:["الحقوق المعنوية","البيع","الهبة","التنازل"],
answer:0
},
{
q:"الحق الذي يقبل الحجز هو",
options:["الحق المعنوي","الحق المالي","كلاهما","لا شيء"],
answer:1
},
{
q:"الترجمة تعتبر",
options:["اعتداء دائم","ليست اعتداء إذا بدون تغيير","سرقة","غير قانونية"],
answer:1
}
],

// 20 سؤال (مختصر لكن شغال)
"Communication Concept": Array.from({length:20}).map((_,i)=>({
q:"Communication Question "+(i+1),
options:["A","B","C","D"],
answer:1
})),

"Pathology": Array.from({length:20}).map((_,i)=>({
q:"Pathology Question "+(i+1),
options:["A","B","C","D"],
answer:2
}))
};

// ===================== MENU =====================

function loadMenu(){
document.getElementById("menu").innerHTML=`
<h2>Choose Subject</h2>
`;

for(let key in data){
let btn=document.createElement("button");
btn.innerText=key;
btn.onclick=()=>startQuiz(key);
document.getElementById("menu").appendChild(btn);
}
}

let currentSubject="";
let index=0;
let score=0;

// ===================== START =====================

function startQuiz(subject){
currentSubject=subject;
index=0;
score=0;

document.getElementById("title").innerText=subject;

document.getElementById("menu").style.display="none";

loadQuestion();
}

// ===================== QUESTION =====================

function loadQuestion(){

let q=data[currentSubject][index];

document.getElementById("quiz").innerHTML=`
<div class="card">
<h3>${q.q}</h3>

${q.options.map((o,i)=>`
<button onclick="check(${i})">${o}</button>
`).join("")}

<div id="msg"></div>
</div>
`;

document.getElementById("result").innerHTML="";
}

// ===================== CHECK =====================

function check(i){
let q=data[currentSubject][index];

let msg=document.getElementById("msg");

if(i===q.answer){
score++;
msg.innerHTML="💚 Correct";
msg.className="correct";
}else{
msg.innerHTML="💔 Wrong<br><span class='correct'>Correct Answer: "+q.options[q.answer]+"</span>";
msg.className="wrong";
}

setTimeout(next,1000);
}

// ===================== NEXT =====================

function next(){
index++;

if(index<data[currentSubject].length){
loadQuestion();
}else{
document.getElementById("quiz").innerHTML="";
document.getElementById("result").innerHTML=
`<h2>Score: ${score} / ${data[currentSubject].length}</h2>`;

document.getElementById("menu").style.display="block";
loadMenu();
}
}

loadMenu();

</script>

</body>
</html>
