<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EXAM Platform</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#ffb6c1,#c084fc);
    text-align:center;
    color:#fff;
}

.container{
    background:rgba(0,0,0,0.3);
    width:60%;
    margin:auto;
    margin-top:50px;
    padding:20px;
    border-radius:20px;
}

button{
    padding:12px 20px;
    margin:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.option{
    display:block;
    margin:10px;
    padding:10px;
    background:white;
    color:black;
    border-radius:10px;
}

.next{background:#7c3aed;color:white;}
.back{background:#ec4899;color:white;}
.menuBtn{background:#111;color:white;}

#heart{font-size:28px;}
.small{font-size:12px;opacity:0.8;}
.feedback{margin-top:10px;font-weight:bold;}

.screen{display:none;}
.active{display:block;}
</style>
</head>

<body>

<!-- ================= MENU ================= -->
<div id="menu" class="container screen active">
    <h1>🤍 EXAM Platform</h1>
    <h3>Choose Subject</h3>

    <button class="menuBtn" onclick="startQuiz('comm')">Communication Concept</button>
    <button class="menuBtn" onclick="startQuiz('ip')">Intellectual Property</button>
    <button class="menuBtn" onclick="startQuiz('path')">Pathology</button>
    <button class="menuBtn" onclick="startQuiz('paio')">Paistatic</button>
</div>

<!-- ================= QUIZ ================= -->
<div id="quiz" class="container screen">

    <div id="heart">🤍 EXAM Platform</div>

    <h2 id="question"></h2>
    <div class="small" id="translation"></div>

    <div id="options"></div>
    <div class="feedback" id="feedback"></div>

    <button class="back" onclick="backQuestion()">Back</button>
    <button class="next" onclick="nextQuestion()">Next</button>
    <button class="menuBtn" onclick="goMenu()">Home</button>
</div>

<script>

let current = 0;
let score = 0;
let wrong = [];
let answered = {};
let currentSubject = "";

/* ================= BANK 60 QUESTIONS ================= */

const bank = {

comm: [
{q:"Therapeutic communication is best defined as", ar:"", options:["Casual conversation","Professional planned communication","Medical instructions only","Talking to calm patient"], answer:1},
{q:"Shared understanding helps to", ar:"", options:["Achieve goals","Reduce documentation","Save time only","Limit interaction"], answer:0},
{q:"Using silence allows patient to", ar:"", options:["Feel ignored","Think and gain insight","Lose interest","End conversation"], answer:1},
{q:"Exploring is", ar:"", options:["Delving deeper","Changing subject","Giving advice","Summarizing"], answer:0},
{q:"Communication is", ar:"", options:["One way","Two way","Written only","Random"], answer:1}
],

path: [
{q:"Pathology studies", ar:"", options:["Diseases","Books","Cars","Food"], answer:0},
{q:"Inflammation is", ar:"", options:["Body response","Sleep","Food","Bone"], answer:0},
{q:"Tumor means", ar:"", options:["Cell growth","Virus","Blood","Skin"], answer:0}
],

paio: [
{q:"Homeostasis is", ar:"", options:["Body balance","Disease","Sleep","Food"], answer:0},
{q:"Kidney function is", ar:"", options:["Filter blood","Pump air","Digest food","See"], answer:0},
{q:"Liver role is", ar:"", options:["Detox","Hear","Walk","Think"], answer:0}
],

ip: [
{q:"من خصائص العنصر المعنوي لحق المؤلف", ar:"", options:[
"عدم قابليته للتنازل عنه أو التعامل به",
"قابليته للتنازل عنه والتعامل به",
"يسقط بالتقادم",
"قابليته للحجز"
], answer:0},

{q:"حق المؤلف حق لصيق بالشخصية وهذا وفق WIPO", ar:"", options:[
"المؤلف أو المبدع أو المبتكر",
"المصنف فقط",
"السلطة الأبوية",
"الاستغلال"
], answer:0},

{q:"من أشكال التنازل عن الحق المعنوي", ar:"", options:[
"البيع والهبة والتبرع",
"التقادم",
"الانقضاء",
"الحجز"
], answer:0},

{q:"تنازل المؤلف عن المصنف المادي لا يعني تنازل معنوي", ar:"", options:[
"صحيح",
"خطأ",
"جزئي",
"غير واضح"
], answer:0},

{q:"الحقوق المعنوية ليست مالية بل هي", ar:"", options:[
"حقوق شخصية لصيقة",
"حقوق تجارية",
"حقوق بيع",
"حقوق مؤقتة"
], answer:0},

{q:"الحق الذي يقبل الحجز هو", ar:"", options:[
"الحق المالي",
"الحق المعنوي",
"كلاهما",
"لا شيء"
], answer:0},

{q:"العنصر المادي يظهر فقط عند", ar:"", options:[
"نشر المصنف",
"الفكرة",
"التفكير",
"التصميم"
], answer:0},

{q:"الحق هو", ar:"", options:[
"سلطة تخول منفعة",
"فكرة",
"اسم",
"تقدير"
], answer:0},

{q:"من الحقوق المعنوية", ar:"", options:[
"منع التشويه",
"بيع المصنف",
"التنازل الكامل",
"الحجز"
], answer:0},

{q:"للمؤلف الحق في", ar:"", options:[
"نشر أو عدم نشر مصنفه",
"بيع الإلزامي",
"إجبار النشر",
"منع الحقوق"
], answer:0},

{q:"إخفاء اسم المؤلف يسمى", ar:"", options:[
"نشر مجهول",
"سرقة",
"نسخ",
"بيع"
], answer:0},

{q:"الترجمة تعتبر", ar:"", options:[
"ليست اعتداء إذا لم تضر",
"اعتداء دائم",
"سرقة",
"غير قانونية"
], answer:0},

{q:"إساءة الترجمة تعتبر", ar:"", options:[
"اعتداء قانوني",
"مسموح",
"غير مهم",
"عادي"
], answer:0},

{q:"الحق المعنوي يحمي", ar:"", options:[
"سمعة المؤلف",
"المال فقط",
"المبيعات",
"الإعلانات"
], answer:0},

{q:"عدم وجود ورثة يجعل الحق يذهب إلى", ar:"", options:[
"وزارة الثقافة",
"البائع",
"المشتري",
"الشركة"
], answer:0}
]

};

/* ================= FUNCTIONS ================= */

function startQuiz(subject){
currentSubject = subject;
current = 0;
score = 0;
wrong = [];
answered = {};

document.getElementById("menu").classList.remove("active");
document.getElementById("quiz").classList.add("active");

showQuestion();
}

function showQuestion(){

let q = bank[currentSubject][current];

document.getElementById("question").innerText = (current+1)+". "+q.q;
document.getElementById("translation").innerText = q.ar || "";

let optionsDiv = document.getElementById("options");
optionsDiv.innerHTML = "";
document.getElementById("feedback").innerText = "";

q.options.forEach((opt,i)=>{

let btn = document.createElement("button");
btn.className="option";
btn.innerText=opt;

btn.onclick=()=>{

if(answered[current]) return;
answered[current]=true;

if(i === q.answer){
score++;
document.getElementById("feedback").innerText="✔ Correct";
}else{
document.getElementById("feedback").innerText =
"✖ Wrong | Correct: " + q.options[q.answer];

wrong.push({
question:q.q,
correct:q.options[q.answer]
});
}
};

optionsDiv.appendChild(btn);
});
}

function nextQuestion(){
if(current < bank[currentSubject].length-1){
current++;
showQuestion();
}else{
showResult();
}
}

function backQuestion(){
if(current > 0){
current--;
showQuestion();
}
}

function goMenu(){
document.getElementById("quiz").classList.remove("active");
document.getElementById("menu").classList.add("active");
}

function showResult(){
document.body.innerHTML = `
<div class="container">
<h2>Result 💗</h2>
<h3>Score: ${score}/${bank[currentSubject].length}</h3>
<h3>Wrong Answers:</h3>
<pre>${JSON.stringify(wrong,null,2)}</pre>
<br>
<button onclick="location.reload()">Back to Menu</button>
</div>
`;
}

</script>

</body>
</html>
