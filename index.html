<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Quiz Platform</title>

<style>
body{
font-family: Arial;
direction: rtl;
background:#f5f5f5;
margin:0;
padding:0;
}

header{
background:#111;
color:#fff;
padding:15px;
text-align:center;
}

.container{padding:20px;}

button{
padding:10px 15px;
margin:10px;
cursor:pointer;
border:none;
background:#222;
color:white;
border-radius:8px;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 0 5px #ccc;
}

.option{display:block;margin:5px 0;}

.correct{color:green;}
.wrong{color:red;}
</style>
</head>

<body>

<header>
<h2>📚 منصة الاختبار</h2>
</header>

<div class="container">

<div id="menu">
<h3>اختر المادة</h3>
<button onclick="startQuiz('m1')">المادة 1</button>
<button onclick="startQuiz('m2')">المادة 2</button>
<button onclick="startQuiz('m3')">المادة 3</button>
<button onclick="startQuiz('m4')">المادة 4</button>
</div>

<div id="quiz" style="display:none"></div>

</div>

<script>

const data = {

m1: [ /* حطي أسئلتك هنا */ ],

m2: [ /* حطي أسئلتك هنا */ ],

m3: [ /* حطي أسئلتك هنا */ ],

m4: [ /* 👈 لازم أنتِ ترسلي أسئلة هذه المادة */ ]

};

let current = [];

function startQuiz(m){

if(!data[m] || data[m].length === 0){
alert("❌ لا توجد أسئلة في هذه المادة");
return;
}

document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";
current = data[m];
render();
}

function render(){
let html="";

current.forEach((item,i)=>{
html+=`
<div class="card">
<p><b>${i+1}. ${item.q}</b></p>
${item.o.map((opt,idx)=>
`<label class="option">
<input type="radio" name="q${i}" value="${idx}">
${["أ","ب","ج","د"][idx]} - ${opt}
</label>`
).join("")}
</div>
`;
});

html+=`<button onclick="submitQuiz()">تصحيح</button>`;
document.getElementById("quiz").innerHTML=html;
}

function submitQuiz(){
let score=0;

current.forEach((item,i)=>{
let ans=document.querySelector(`input[name=q${i}]:checked`);
if(ans && parseInt(ans.value)===item.a) score++;
});

document.getElementById("quiz").innerHTML=
`<h2>النتيجة: ${score} / ${current.length}</h2>
<button onclick="location.reload()">رجوع</button>`;
}

</script>

</body>
</html>
