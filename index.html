<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EXAM PLATFORM 🤍</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffe4ec, #e0c3fc);
    text-align: center;
    color: #3d3a4e; /* لون داكن ناعم بديل للأسود الحاد */
    margin: 0;
    padding: 20px;
}

.container {
    background: #fdfbf7; /* لون كريمي ناعم ودافئ مريح جداً للعين */
    width: 75%;
    max-width: 750px;
    margin: auto;
    margin-top: 30px;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

/* تنسيق القائمة الرئيسية لتصبح عمودين */
.menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-top: 25px;
}

button {
    padding: 14px 20px;
    margin: 5px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 15px;
    font-weight: bold;
    transition: all 0.2s ease;
}

button:hover {
    opacity: 0.9;
    transform: translateY(-1px);
}

.option {
    display: block;
    margin: 12px auto;
    padding: 14px;
    background: #f4efe6; /* خلفية الخيارات بلون مريح متناسق */
    border: 1px solid #e6dec9;
    border-radius: 12px;
    cursor: pointer;
    width: 90%;
    text-align: left;
    font-size: 15px;
    color: #4a4656;
}

.option:hover {
    background: #eae2d0;
}

.option.selected {
    background: #dbeafe;
    border-color: #3b82f6;
    color: #1e40af;
}

.option.correct-flash {
    background: #d1fae5;
    border-color: #10b981;
    color: #065f46;
}

.option.wrong-flash {
    background: #fee2e2;
    border-color: #ef4444;
    color: #991b1b;
}

.next { background: #7c3aed; color: white; }
.back { background: #ec4899; color: white; }
.menuBtn { background: #4a4357; color: white; margin: 0; } /* أزرار المنيو متناسقة وبدون هوامش عشوائية */

#title { font-size: 28px; font-weight: bold; color: #5b21b6; }
.small { font-size: 15px; opacity: 0.9; margin-top: 8px; color: #6d28d9; font-weight: bold; direction: rtl; text-align: right; }
.feedback { margin-top: 20px; font-weight: bold; font-size: 18px; padding: 12px; border-radius: 12px; direction: rtl; text-align: right; }

.screen { display: none; }
.active { display: block; }

/* تقرير الأخطاء النهائي منسق للغة العربية بالكامل */
.wrong-report {
    text-align: right;
    direction: rtl;
    background: #fff5f5;
    padding: 15px;
    margin-top: 12px;
    border-right: 5px solid #ef4444;
    border-radius: 10px;
}
.wrong-report span {
    display: inline-block;
    margin-top: 4px;
}
</style>
</head>

{ q: "59) What is diagonal communication?", ar: "ما هو الاتصال المائل أو المتشابك (Diagonal communication)؟", options: ["Communication between employees of the same department", "Communication between employees of different departments at different levels", "Communication between employees and customers", "Communication between managers and subordinates"], answer: 1 },
{ q: "60) What is informal communication?", ar: "ما هو الاتصال غير الرسمي (العفوي)؟", options: ["Communication that follows a prescribed path", "Communication that occurs outside the formal network", "Communication that uses professional language", "Communication that is slow and orderly"], answer: 1 }
];

const bank = {
    bio: biostatQuestions,
    path: pathologyQuestions,
    ip: ipQuestions,
    cc: ccQuestions
};

/* ============================
   ENGINE FUNCTIONS
============================ */

function startQuiz(sub) {
    subject = sub;
    current = 0;
    answered = {}; 
    isShowingFeedback = false;
    
    document.getElementById("menu").classList.remove("active");
    document.getElementById("quiz").classList.add("active");
    
    showQuestion();
}

function showQuestion() {
    const questions = bank[subject];
    const qData = questions[current];
    
    isShowingFeedback = false;
    
    document.getElementById("nextBtn").innerText = "Next";
    document.getElementById("backBtn").style.display = current > 0 ? "inline-block" : "none";
    
    document.getElementById("feedback").innerText = "";
    document.getElementById("feedback").className = "feedback";
    document.getElementById("feedback").style.background = "transparent";
    
    // فحص إذا كان السؤال إنجليزي أو عربي لتحديد المحاذاة والاتجاه بدقة
    const questionEl = document.getElementById("question");
    if (/[\u0600-\u06FF]/.test(qData.q)) {
        questionEl.style.direction = "rtl";
        questionEl.style.textAlign = "right";
    } else {
        questionEl.style.direction = "ltr";
        questionEl.style.textAlign = "left";
    }
    questionEl.innerText = qData.q;
    
    // معالجة الترجمة العربية بخط صغير لضمان بقاء النقطتين الرأسيتين في مكانها الصحيح
    const transEl = document.getElementById("translation");
    if (qData.ar) {
        transEl.style.display = "block";
        transEl.style.direction = "rtl";
        transEl.style.textAlign = "right";
        transEl.innerText = qData.ar;
    } else {
        transEl.style.display = "none";
        transEl.innerText = "";
    }
    
    const optionsContainer = document.getElementById("options");
    optionsContainer.innerHTML = "";
    
    qData.options.forEach((optionText, index) => {
        const button = document.createElement("button");
        button.className = "option";
        button.innerText = optionText;
        
        if (answered[current] === index) {
            button.classList.add("selected");
        }
        
        // دعم اتجاه النص الكامل للخيارات العربية (حقوق الملكية الفكرية) لحل مشاكل القلب
        if (/[\u0600-\u06FF]/.test(optionText)) {
            button.style.textAlign = "right";
            button.style.direction = "rtl";
        } else {
            button.style.textAlign = "left";
            button.style.direction = "ltr";
        }
        
        button.onclick = () => {
            if (!isShowingFeedback) {
                selectOption(index);
            }
        };
        optionsContainer.appendChild(button);
    });
}

function selectOption(index) {
    answered[current] = index;
    const options = document.querySelectorAll(".option");
    options.forEach((opt, idx) => {
        if (idx === index) {
            opt.classList.add("selected");
        } else {
            opt.classList.remove("selected");
        }
    });
}

function nextQuestion() {
    const questions = bank[subject];
    const qData = questions[current];
    
    if (answered[current] === undefined) {
        const feedbackEl = document.getElementById("feedback");
        feedbackEl.style.color = "#dc2626";
        feedbackEl.style.direction = "rtl";
        feedbackEl.style.textAlign = "right";
        feedbackEl.innerText = "الرجاء اختيار إجابة أولاً.";
        return;
    }
    
    if (!isShowingFeedback) {
        isShowingFeedback = true;
        const selectedIdx = answered[current];
        const correctIdx = qData.answer;
        const optionsHTML = document.querySelectorAll(".option");
        
        const feedbackEl = document.getElementById("feedback");
        feedbackEl.style.direction = "rtl";
        feedbackEl.style.textAlign = "right";
        
        if (selectedIdx === correctIdx) {
            optionsHTML[selectedIdx].classList.remove("selected");
            optionsHTML[selectedIdx].classList.add("correct-flash");
            feedbackEl.style.color = "#047857";
            feedbackEl.style.background = "#d1fae5";
            feedbackEl.innerText = "إجابتك صحيحة! ❤️";
        } else {
            optionsHTML[selectedIdx].classList.remove("selected");
            optionsHTML[selectedIdx].classList.add("wrong-flash");
            optionsHTML[correctIdx].classList.add("correct-flash");
            
            feedbackEl.style.color = "#b91c1c";
            feedbackEl.style.background = "#fee2e2";
            feedbackEl.innerText = `إجابتك غلط 💔 الإجابة الصح هي: (${qData.options[correctIdx]})`;
        }
        
        document.getElementById("nextBtn").innerText = "Continue";
        return; 
    }
    
    if (current < questions.length - 1) {
        current++;
        showQuestion();
    } else {
        showResults();
    }
}

function backQuestion() {
    if (current > 0 && !isShowingFeedback) {
        current--;
        showQuestion();
    }
}

function showResults() {
    const questions = bank[subject];
    let score = 0;
    let wrongQuestionsHTML = "";
    
    questions.forEach((qData, index) => {
        if (answered[index] === qData.answer) {
            score++;
        } else {
            const userChoice = answered[index] !== undefined ? qData.options[answered[index]] : "لم يتم حلّه";
            const correctChoice = qData.options[qData.answer];
            
            wrongQuestionsHTML += `
                <div class="wrong-report">
                    <strong>سؤال:</strong> ${qData.q} <br>
                    ${qData.ar ? `<small style="color:#555; display:block; margin: 4px 0;">${qData.ar}</small>` : ''}
                    <span style="color:#ef4444;">❌ إجابتك: ${userChoice}</span><br>
                    <span style="color:#10b981;">✅ الإجابة الصحيحة: ${correctChoice}</span>
                </div>
            `;
        }
    });
    
    const questionEl = document.getElementById("question");
    questionEl.style.direction = "rtl";
    questionEl.style.textAlign = "center";
    questionEl.innerText = "اكتمل الاختبار! 🎉";
    
    document.getElementById("translation").innerText = "";
    document.getElementById("backBtn").style.display = "none";
    document.getElementById("nextBtn").style.display = "none";
    
    let resultHeader = `<h3 style="direction: rtl; text-align: center;">نتيجتك الإجمالية هي: ${score} من ${questions.length}</h3>`;
    
    if (score === questions.length) {
        document.getElementById("options").innerHTML = resultHeader + `<div class="feedback" style="background:#d1fae5; color:#047857; padding:15px; font-size:20px; text-align:center;">أداء أسطوري وممتاز جداً! علامة كاملة 🎉❤️</div>`;
    } else {
        document.getElementById("options").innerHTML = resultHeader + `
            <h4 style="color:#b91c1c; margin-top:25px; text-align:right; direction:rtl;">📋 قائمة الأسئلة التي أخطأت فيها والحل الصح:</h4>
            <div style="max-height: 400px; overflow-y: auto; border: 1px solid #e6dec9; padding: 10px; border-radius: 12px; background:#fbf9f3;">
                ${wrongQuestionsHTML}
            </div>
        `;
    }
    
    document.getElementById("feedback").innerText = "";
    document.getElementById("feedback").style.background = "transparent";
}

function goMenu() {
    document.getElementById("nextBtn").style.display = "inline-block";
    document.getElementById("quiz").classList.remove("active");
    document.getElementById("menu").classList.add("active");
}

</script>
