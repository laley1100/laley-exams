<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Exam</title>

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ffc0cb,#caa6ff);
}

.option{
display:block;
margin:10px auto;
padding:10px;
width:70%;
border-radius:12px;
background:#f3e6ff;
cursor:pointer;
}

.correct{background:#b6ffb6;}
.wrong{background:#ffb6b6;}

button{
padding:10px;
margin:10px;
border:none;
border-radius:10px;
background:#ffb6c1;
cursor:pointer;
}

#tr{font-size:13px;color:#444}
</style>
</head>

<body>

<div id="home">
<h2>اختاري المادة 💗</h2>
<button onclick="start('rights')">حقوق الملكية الفكرية</button>
<button onclick="start('comm')">Communication</button>
<button onclick="start('path')">Pathology</button>
</div>

<div id="quiz" style="display:none">

<h2 id="title"></h2>
<h3 id="qnum"></h3>

<h2 id="q"></h2>
<p id="tr"></p>

<div id="options"></div>

<h3>Score: <span id="score">0</span></h3>

<button onclick="next()">Next 💗</button>
</div>

<script>

let i=0,score=0,qset=[];

/* ================= الحقوق الفكرية (20 عربي) ================= */
const rights=[
{q:"من خصائص العنصر المعنوي لحق المؤلف عدم قابليته للتنازل عنه",o:["أ","ب","ج","د"],a:0},
{q:"حق المؤلف حق لصيق بشخصية الإنسان",o:["أ","ب","ج","د"],a:0},
{q:"الحقوق المعنوية لا يمكن التنازل عنها",o:["أ","ب","ج","د"],a:0},
{q:"بيع المصنف لا ينقل الحقوق المعنوية",o:["أ","ب","ج","د"],a:0},
{q:"الحقوق المالية يمكن التنازل عنها",o:["أ","ب","ج","د"],a:0},
{q:"الحقوق المعنوية لا تسقط بالتقادم",o:["أ","ب","ج","د"],a:0},
{q:"الحق المالي يمكن الحجز عليه",o:["أ","ب","ج","د"],a:0},
{q:"العنصر المادي يظهر عند نشر المصنف",o:["أ","ب","ج","د"],a:0},
{q:"الحق هو سلطة تحقق منفعة",o:["أ","ب","ج","د"],a:0},
{q:"من الحقوق المعنوية منع التشويه",o:["أ","ب","ج","د"],a:0},
{q:"للمؤلف حق نشر مصنفه لأول مرة",o:["أ","ب","ج","د"],a:0},
{q:"للمؤلف اختيار طريقة النشر",o:["أ","ب","ج","د"],a:0},
{q:"من حق المؤلف نسبة المصنف إليه",o:["أ","ب","ج","د"],a:0},
{q:"يجوز استخدام اسم مستعار",o:["أ","ب","ج","د"],a:0},
{q:"الترجمة بدون إذن تعد اعتداء",o:["أ","ب","ج","د"],a:0},
{q:"إساءة الترجمة تعتبر اعتداء",o:["أ","ب","ج","د"],a:0},
{q:"للمؤلف حق منع التشويه",o:["أ","ب","ج","د"],a:0},
{q:"الحقوق المعنوية شخصية لصيقة",o:["أ","ب","ج","د"],a:0},
{q:"يجوز سحب المصنف من التداول",o:["أ","ب","ج","د"],a:0},
{q:"إذا لم يوجد ورثة تنتقل الحقوق للدولة",o:["أ","ب","ج","د"],a:0}
];

/* ========== Communication (20 مع ترجمة) ========== */
const comm=[
{q:"Therapeutic communication is best defined as",tr:"التواصل العلاجي",o:["Casual conversation","Planned professional act","Instructions only","Calming talk"],a:1},
{q:"Shared understanding helps to",tr:"الفهم المشترك",o:["Achieve goals","Reduce paperwork","Save time","Limit interaction"],a:0},
{q:"Silence allows patient to",tr:"الصمت",o:["Ignored","Think","Lose interest","End talk"],a:1},
{q:"Exploring is",tr:"الاستكشاف",o:["Change topic","Dig deeper","Advice","Summary"],a:1},
{q:"Clarification is used to",tr:"التوضيح",o:["Check understanding","Challenge","Order","End"],a:0},
{q:"Reflecting focuses on",tr:"الانعكاس",o:["Facts","Feelings","Opinion","Docs"],a:1},
{q:"Communication is",tr:"التواصل",o:["One way","Two way","Written","None"],a:1},
{q:"Handover means",tr:"التسليم",o:["Equipment","Responsibility","Policy","Money"],a:1},
{q:"Noise affects communication",tr:"الضوضاء",o:["Yes","No","Maybe","Never"],a:0},
{q:"SBAR is",tr:"SBAR",o:["Tool","Disease","Drug","None"],a:0},
{q:"Failure leads to",tr:"الفشل",o:["Safety","Errors","Success","None"],a:1},
{q:"Touch is",tr:"اللمس",o:["Clinical","Social","Random","None"],a:0},
{q:"Impasses are",tr:"عوائق",o:["Blocks","Success","Help","None"],a:0},
{q:"Handover improves",tr:"التسليم",o:["Safety","Risk","Errors","None"],a:0},
{q:"Communication is exchange of",tr:"التواصل",o:["Info","Money","Tools","None"],a:0},
{q:"Clarification example",tr:"مثال",o:["What do you mean","Ignore","Stop","Leave"],a:0},
{q:"Silence is",tr:"الصمت",o:["Therapeutic","Bad","Wrong","None"],a:0},
{q:"SBAR stands for",tr:"SBAR",o:["Correct model","Wrong","Random","None"],a:0},
{q:"Communication reduces",tr:"التواصل",o:["Errors","Safety","Time","None"],a:0},
{q:"Handover is transfer of",tr:"التسليم",o:["Care","Money","Goods","None"],a:0}
];

/* ========== Pathology (20 مع ترجمة) ========== */
const path=[
{q:"Approximately 60% of body weight is water",tr:"نسبة الماء",o:["40","50","60","70"],a:2},
{q:"Non-pitting edema occurs in",tr:"وذمة",o:["Cardiac","Renal","Nutritional","Lymphatic"],a:3},
{q:"Physiological hyperemia occurs in",tr:"فرط الدم",o:["Inflammation","Exercise","Failure","Obstruction"],a:1},
{q:"Most common thrombus is",tr:"خثرة",o:["Arterial","Capillary","Venous","Cardiac"],a:2},
{q:"Septic thrombus is",tr:"خثرة",o:["Aseptic","Red","Septic","Mixed"],a:2},
{q:"Hypovolemic shock caused by",tr:"صدمة",o:["Bleeding","Infection","Allergy","Stress"],a:0},
{q:"Amyloidosis affects",tr:"أميلويد",o:["Liver","Spleen","Heart","Kidney"],a:3},
{q:"Neoplasm is",tr:"ورم",o:["Normal","Abnormal growth","Inflammation","Infection"],a:1},
{q:"Benign tumor is",tr:"حميد",o:["Metastatic","Well differentiated","Invasive","Malignant"],a:1},
{q:"Local invasion is",tr:"غزو",o:["Confined","Penetration","Spread blood","Seeds"],a:1},
{q:"Benign tumor feature",tr:"حميد",o:["Irregular","Well defined","Necrotic","Ulcer"],a:1},
{q:"Malignant tumor surface",tr:"خبيث",o:["Smooth","Ulcerative","Small","Mobile"],a:1},
{q:"Benign tumor harm",tr:"ضرر",o:["Brain","Skin","Bone","Muscle"],a:0},
{q:"Metastasis is",tr:"انتشار",o:["Local","Distant spread","Shrink","Heal"],a:1},
{q:"Carcinoma arises from",tr:"سرطان",o:["Epithelium","Bone","Fat","Muscle"],a:0},
{q:"Prognosis depends on",tr:"التنبؤ",o:["Blood type","Radiosensitivity","Hair","Age only"],a:1},
{q:"Most common sarcoma",tr:"ساركوما",o:["Fibro","Leio","Lipo","Angio"],a:2},
{q:"Leiomyosarcoma is",tr:"ورم",o:["Benign","Malignant","Normal","None"],a:1},
{q:"Adenoma risk leads to",tr:"أدينوما",o:["Cancer","Cold","Pain","Fever"],a:0},
{q:"Gold standard diagnosis",tr:"تشخيص",o:["Blood","IHC","H&E histology","CT"],a:2}
];

/* ================= logic ================= */

function start(type){
i=0;score=0;

if(type==="rights") qset=rights;
if(type==="comm") qset=comm;
if(type==="path") qset=path;

document.getElementById("home").style.display="none";
document.getElementById("quiz").style.display="block";

document.getElementById("title").innerText=type;
show();
}

function show(){
let q=qset[i];

document.getElementById("qnum").innerText="Q"+(i+1);
document.getElementById("q").innerText=q.q;
document.getElementById("tr").innerText=q.tr||"";

let box=document.getElementById("options");
box.innerHTML="";

q.o.forEach((x,idx)=>{
let d=document.createElement("div");
d.className="option";
d.innerText=x;

d.onclick=()=>check(idx,q.a);
box.appendChild(d);
});
}

function check(sel,ans){
let opts=document.querySelectorAll(".option");

opts.forEach(o=>o.onclick=null);

if(sel===ans){
opts[sel].classList.add("correct");
score++;
}else{
opts[sel].classList.add("wrong");
opts[ans].classList.add("correct");
}

document.getElementById("score").innerText=score;
}

function next(){
i++;
if(i<qset.length) show();
else document.getElementById("quiz").innerHTML=
`<h2>Finished 💗</h2><h3>${score}/60</h3>`;
}
</script>

</body>
</html>
