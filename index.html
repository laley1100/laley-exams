let currentSub = "", idx = 0, wrongAnswers = [];
function start(sub) { 
    currentSub = sub; idx = 0; wrongAnswers = [];
    document.getElementById('menu').style.display = 'none';
    document.getElementById('quiz').className = 'container screen active';
   function render() {
    let q = data[currentSub][idx];
    let html = `<h3>${q.q}</h3><span class="arabic-text">${q.ar}</span>`; // عرض السؤال والترجمة
    q.opt.forEach((o, i) => { 
        html += `<button class="option" onclick="check(this, ${i}, ${q.ans})">${o}</button>`; 
    });
    document.getElementById('quiz-content').innerHTML = html;
}
}
function check(btn, sel, corr, qText) {
    if(sel === corr) btn.className = 'option correct';
    else { btn.className = 'option wrong'; wrongAnswers.push(qText); }
    setTimeout(() => {
        if(idx < data[currentSub].length - 1) { idx++; render(); }
        else {
            let res = wrongAnswers.length === 0 ? "أحسنتِ! لا توجد أخطاء." : "الأخطاء: <ul>" + wrongAnswers.map(w => `<li>${w}</li>`).join('') + "</ul>";
            document.getElementById('quiz-content').innerHTML = `<h2>انتهت المادة 🎉</h2>${res}`;
        }
    }, 500);
}
</script>
