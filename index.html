<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Quiz</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background: linear-gradient(to right,#ffd6ec,#e6ccff);
}

h1{
    color:#a64dff;
}

button{
    padding:12px;
    margin:10px;
    width:250px;
    border:none;
    border-radius:10px;
    background:#ffb6d9;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

.option{
    display:block;
    margin:10px auto;
    width:80%;
    padding:10px;
    border-radius:10px;
    border:1px solid #ccc;
    cursor:pointer;
    background:#fff;
}

.small{
    font-size:12px;
    color:#777;
}

.correct{
    color:#ff66b2;
    font-weight:bold;
}

.wrong{
    color:#999;
}
</style>
</head>

<body>

<h1>اختاري المادة 💗</h1>

<div id="menu">
<button onclick="startQuiz('ip')">حقوق الملكية الفكرية</button><br>
<button onclick="startQuiz('comm')">Communication Concepts</button><br>
<button onclick="startQuiz('patho')">Pathology</button>
</div>

<div id="quiz" style="display:none;"></div>

<script>

let current=0;
let score=0;
let questions=[];

function startQuiz(type){
document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";
current=0;
score=0;

if(type==="comm") questions=commQuestions;
if(type==="patho") questions=pathoQuestions;
if(type==="ip") questions=ipQuestions;

showQuestion();
}

function showQuestion(){
let q=questions[current];

let html=`<h2>${current+1}/20</h2>`;

if(q.ar){
html+=`<p>${q.en}</p>
<p class="small">${q.ar}</p>`;
}else{
html+=`<p>${q.q}</p>`;
}

q.options.forEach((opt,i)=>{
html+=`<div class="option" onclick="check(${i})">${opt}</div>`;
});

document.getElementById("quiz").innerHTML=html;
}

function check(i){
let q=questions[current];
let correctIndex=q.answer;

let options=document.querySelectorAll(".option");

options.forEach((el,index)=>{
el.onclick=null;

if(index===correctIndex){
el.classList.add("correct");
el.innerHTML += " 💗 صح";
}
if(index===i && i!==correctIndex){
el.classList.add("wrong");
el.innerHTML += " 💔 غلط";
}
});

if(i===correctIndex) score++;

setTimeout(()=>{
current++;
if(current<questions.length){
showQuestion();
}else{
document.getElementById("quiz").innerHTML=
`<h2>خلصتي 💗</h2>
<p>درجتك: ${score}/20</p>
<button onclick="location.reload()">إعادة</button>`;
}
},1500);
}
