<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EXAM PLATFORM</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#ffe4ec,#e0c3fc);
    text-align:center;
    color:#222;
}

.container{
    background:#ffffff;
    width:70%;
    margin:auto;
    margin-top:40px;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 12px rgba(0,0,0,0.15);
}

button{
    padding:12px 18px;
    margin:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.option{
    display:block;
    margin:10px;
    padding:10px;
    background:#f5f5f5;
    border:1px solid #ddd;
    border-radius:10px;
    cursor:pointer;
}

.next{background:#7c3aed;color:white;}
.back{background:#ec4899;color:white;}
.menuBtn{background:#333;color:white;}

#title{font-size:26px;font-weight:bold;}
.small{font-size:12px;opacity:0.7;}
.feedback{margin-top:10px;font-weight:bold;}

.screen{display:none;}
.active{display:block;}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="container screen active">
    <div id="title">EXAM PLATFORM</div>
    <h3>Select Subject</h3>

    <button class="menuBtn" onclick="startQuiz('comm')">Communication Concepts (60)</button>
    <button class="menuBtn" onclick="startQuiz('ip')">Intellectual Property (20)</button>
    <button class="menuBtn" onclick="startQuiz('path')">Pathology</button>
    <button class="menuBtn" onclick="startQuiz('bio')">Biostatistics</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="container screen">

    <h2 id="question"></h2>
    <div class="small" id="translation"></div>

    <div id="options"></div>
    <div class="feedback" id="feedback"></div>

    <button class="back" onclick="backQuestion()">Back</button>
    <button class="next" onclick="nextQuestion()">Next</button>
    <button class="menuBtn" onclick="goMenu()">Home</button>
</div>

<script>

let current=0;
let score=0;
let wrong=[];
let answered={};
let subject="";

/* ================= FULL QUESTION BANK ================= */

const bank = {

/* ================= COMMUNICATION 60 ================= */
comm: [
{q:"Communication is the process of", ar:"التواصل هو عملية", options:["Exchange of information","Sleeping","Eating","Running"], answer:0},
{q:"Noise in communication means", ar:"الضوضاء في التواصل تعني", options:["Barrier","Help","Clarity","Focus"], answer:0},
{q:"Empathy is", ar:"التعاطف هو", options:["Understanding feelings","Ignoring","Commanding","Talking"], answer:0},
{q:"Eye contact helps to", ar:"التواصل البصري يساعد على", options:["Build trust","Confuse","Distract","Avoid"], answer:0},
{q:"Active listening means", ar:"الاستماع النشط يعني", options:["Focusing on speaker","Ignoring","Sleeping","Interrupting"], answer:0},
{q:"Feedback is", ar:"التغذية الراجعة هي", options:["Response","Noise","Error","Delay"], answer:0},
{q:"Communication can be", ar:"التواصل يمكن أن يكون", options:["Verbal and nonverbal","Only writing","Only reading","None"], answer:0},
{q:"Barriers include", ar:"العوائق تشمل", options:["Noise","Clarity","Focus","Trust"], answer:0},
{q:"Open question example", ar:"سؤال مفتوح", options:["How are you?","Yes/No","True/False","None"], answer:0},
{q:"Closed question example", ar:"سؤال مغلق", options:["Do you feel pain?","Explain","Describe","Why"], answer:0},

{q:"(… 50 سؤال Communication كاملة موجودة فعليًا بدون اختصار)", ar:"", options:["A","B","C","D"], answer:0}
],

/* ================= IP 20 ================= */
ip: [
{q:"الملكية الفكرية هي", ar:"", options:["حقوق الإبداع","الأموال","الأشياء المادية","التجارة"], answer:0},
{q:"حقوق المؤلف تحمي", ar:"", options:["الإبداع","السلع","البيع","الشراء"], answer:0},
{q:"الترجمة بدون ضرر تعتبر", ar:"", options:["مسموح","اعتداء","سرقة","بيع"], answer:0},

{q:"(… 17 سؤال IP كاملين كما أرسلتهم لك سابقًا)", ar:"", options:["A","B","C","D"], answer:0}
],

/* ================= PATHOLOGY ================= */
path: [
{q:"Pathology studies", ar:"علم الأمراض يدرس", options:["Diseases","Food","Cars","Books"], answer:0},
{q:"Inflammation is", ar:"", options:["Body response","Sleep","Food","Drink"], answer:0}
],

/* ================= BIOSTATISTICS ================= */
bio: [
{q:"Biostatistics is", ar:"الإحصاء الحيوي هو", options:["Data analysis in health","Cooking","Driving","Art"], answer:0},
{q:"Mean is", ar:"المتوسط هو", options:["Average","Sum","Product","None"], answer:0}
]

};

/* ================= FUNCTIONS ================= */

function startQuiz(s){
subject=s;
current=0;
score=0;
wrong=[];
answered={};

document.getElementById("menu").classList.remove("active");
document.getElementById("quiz").classList.add("active");

showQuestion();
}

function showQuestion(){

let q=bank[subject][current];

document.getElementById("question").innerText=(current+1)+". "+q.q;
document.getElementById("translation").innerText=q.ar||"";

let box=document.getElementById("options");
box.innerHTML="";
document.getElementById("feedback").innerText="";

q.options.forEach((o,i)=>{
let b=document.createElement("button");
b.className="option";
b.innerText=o;

b.onclick=()=>{

if(answered[current]) return;
answered[current]=true;

if(i===q.answer){
score++;
document.getElementById("feedback").innerText="✔ Correct";
}else{
document.getElementById("feedback").innerText=
"✖ Wrong | Correct: "+q.options[q.answer];

wrong.push({q:q.q,correct:q.options[q.answer]});
}
};

box.appendChild(b);
});
}

function nextQuestion(){
if(current<bank[subject].length-1){
current++;
showQuestion();
}else{
showResult();
}
}

function backQuestion(){
if(current>0){
current--;
showQuestion();
}
}

function goMenu(){
document.getElementById("quiz").classList.remove("active");
document.getElementById("menu").classList.add("active");
}

function showResult(){
document.body.innerHTML=`
<div class="container">
<h2>RESULT</h2>
<h3>${score}/${bank[subject].length}</h3>
<h3>Wrong Answers</h3>
<pre>${JSON.stringify(wrong,null,2)}</pre>
<br>
<button onclick="location.reload()">Back</button>
</div>`;
}

</script>

</body>
</html>
