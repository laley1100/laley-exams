<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Quiz</title>

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ffc0cb,#caa6ff);
}

/* ❌ حذف أي خلفية بيضاء */
.card{
margin-top:40px;
padding:20px;
}

/* توسيط كامل */
.option{
display:block;
margin:10px auto;
padding:10px;
width:70%;
border-radius:12px;
background:#f3e6ff;
cursor:pointer;
}

.correct{background:#b6ffb6;}
.wrong{background:#ffb6b6;}

button{
padding:10px 15px;
margin:10px;
border:none;
border-radius:10px;
background:#ffb6c1;
cursor:pointer;
}

#nextBtn{background:#d6a6ff;}
</style>
</head>

<body>

<div id="home">
<h2>اختاري المادة 💗</h2>
<button onclick="start('rights')">حقوق الملكية الفكرية</button>
<button onclick="start('comm')">Communication</button>
<button onclick="start('path')">Pathology</button>
</div>

<div id="quiz" style="display:none">

<h2 id="title"></h2>
<h3 id="qnum"></h3>

<h2 id="q"></h2>
<p id="tr" style="font-size:13px;color:#444"></p>

<div id="options"></div>

<p id="result"></p>
<h3>Score: <span id="score">0</span></h3>

<button id="nextBtn" onclick="next()">Next 💗</button>

</div>

<script>

let i=0;
let score=0;
let qset=[];

/* ================= حقوق الملكية الفكرية (عربي فقط) ================= */
const rights=[
{q:"من خصائص العنصر المعنوي لحق المؤلف",o:["عدم قابليته للتنازل","قابليته للتنازل","يسقط بالتقادم","قابليته للحجز"],a:0},
{q:"حق المؤلف مرتبط بشخصية الإنسان",o:["المصنف","المؤلف","الحكومة","السوق"],a:1}
];

/* ================= Communication (مترجم بالكامل) ================= */
const comm=[
{
q:"Therapeutic communication is best defined as",
tr:"التواصل العلاجي يُعرّف بأنه",
o:[
"محادثة عادية - Casual conversation",
"تواصل مهني مخطط - Planned professional communication",
"أوامر طبية فقط - Medical instructions only",
"كلام لتهدئة المريض - Talking to calm patient"
],
a:1
},
{
q:"Shared understanding helps to",
tr:"الفهم المشترك يساعد على",
o:[
"تحقيق أهداف الرعاية - Achieve care goals",
"تقليل التوثيق - Reduce documentation",
"إضاعة الوقت - Waste time",
"تقليل التواصل - Limit interaction"
],
a:0
}
];

/* ================= Pathology (مترجم بالكامل) ================= */
const path=[
{
q:"Approximately what percentage of body weight is water?",
tr:"تقريبًا كم نسبة الماء في الجسم؟",
o:["40% - 40%","50% - 50%","60% - 60%","70% - 70%"],
a:2
},
{
q:"Non-pitting edema occurs in which condition?",
tr:"أي حالة يحدث فيها تورم غير قابل للانطباع؟",
o:[
"وذمة قلبية - Cardiac edema",
"وذمة كلوية - Renal edema",
"وذمة غذائية - Nutritional edema",
"وذمة لمفاوية - Lymphatic edema"
],
a:3
}
];

/* ================= SYSTEM ================= */

function start(type){
i=0;
score=0;
document.getElementById("score").innerText=0;

if(type==="rights") qset=rights;
if(type==="comm") qset=comm;
if(type==="path") qset=path;

document.getElementById("home").style.display="none";
document.getElementById("quiz").style.display="block";

document.getElementById("title").innerText=type;
show();
}

function show(){
let q=qset[i];

document.getElementById("qnum").innerText="Question "+(i+1);
document.getElementById("q").innerText=q.q;
document.getElementById("tr").innerText=q.tr||"";

let box=document.getElementById("options");
box.innerHTML="";

q.o.forEach((x,idx)=>{
let d=document.createElement("div");
d.className="option";
d.innerText=x;
d.onclick=()=>check(idx);
box.appendChild(d);
});
}

function check(idx){
let q=qset[i];
let opts=document.querySelectorAll(".option");

opts.forEach(o=>o.onclick=null);

if(idx===q.a){
opts[idx].classList.add("correct");
document.getElementById("result").innerText="💚 صح";
score++;
}else{
opts[idx].classList.add("wrong");
opts[q.a].classList.add("correct");
document.getElementById("result").innerText="💔 غلط - الإجابة الصحيحة بالأخضر";
}

document.getElementById("score").innerText=score;
}

function next(){
i++;
if(i<qset.length) show();
else document.getElementById("quiz").innerHTML=
`<h2>خلص الاختبار 💗</h2><h3>Score: ${score}/${qset.length}</h3>`;
}

</script>

</body>
</html>
