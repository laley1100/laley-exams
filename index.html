<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXAM PLATFORM 🤍</title>

<style>
/* إعدادات الخلفية والنعومة العامة المحترفة */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #fff0f5 0%, #f1e4ff 50%, #e8f5ff 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
}

/* حاوية العرض الرئيسية الكيوت بتأثير الزجاج اللامع */
.container {
    background: rgba(255, 255, 255, 0.85); 
    width: 100%;
    max-width: 700px;
    padding: 40px 30px;
    border-radius: 30px;
    border: 2px solid rgba(255, 255, 255, 0.6); 
    box-shadow: 0 20px 50px rgba(219, 39, 119, 0.08), 
                0 4px 12px rgba(139, 92, 246, 0.04);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    position: relative;
}

/* عنوان المنصة الأنيق واللامع */
#title { 
    font-size: 34px; 
    font-weight: 900; 
    color: #db2777; 
    letter-spacing: 1px;
    margin-bottom: 8px;
    text-shadow: 2px 2px 4px rgba(219, 39, 119, 0.15);
    text-align: center;
}

.subtitle {
    color: #7c3aed; 
    font-size: 16px; 
    font-weight: 600; 
    margin-top: 0;
    margin-bottom: 35px;
    text-align: center;
    opacity: 0.85;
}

/* تقسيم أزرار المواد في عمودين متناسقين */
.menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

/* تصميم أزرار المواد الاحترافية اللامعة الكيوت */
.menuBtn { 
    background: rgba(243, 232, 255, 0.6); 
    color: #5b21b6; 
    padding: 24px 20px;
    border: 1px solid rgba(233, 213, 255, 0.8);
    border-radius: 22px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    overflow: hidden; /* لحصر لمعة الـ Hover بالداخل */
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    box-shadow: 0 4px 15px rgba(124, 58, 237, 0.05);
} 

/* تأثير البريق اللامع عند تمرير الماوس */
.menuBtn::after, .option::after, button.action-btn.next::after, button.action-btn.homeBtn::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -60%;
    width: 30%;
    height: 200%;
    background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
    transform: rotate(30deg);
    transition: none;
    pointer-events: none;
}

.menuBtn:hover::after, .option:hover::after, button.action-btn.next:hover::after, button.action-btn.homeBtn:hover::after {
    left: 140%;
    transition: all 0.75s ease-in-out;
}

.menuBtn:hover {
    background: rgba(233, 213, 255, 0.9);
    transform: translateY(-5px);
    border-color: #c084fc;
    box-shadow: 0 12px 24px rgba(124, 58, 237, 0.15);
}

.menuBtn span.badge {
    font-size: 12px;
    background: #ffffff;
    padding: 4px 12px;
    border-radius: 50px;
    color: #6d28d9;
    font-weight: 800;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

/* خيارات الأسئلة النود المشمشي والوردي المتناسقة والموزونة */
.option {
    display: block;
    margin: 16px auto;
    padding: 18px 22px;
    background: rgba(255, 247, 237, 0.7); 
    border: 1px solid rgba(255, 237, 213, 0.9);
    border-radius: 18px;
    cursor: pointer;
    width: 100%;
    box-sizing: border-box;
    text-align: left;
    font-size: 15px;
    font-weight: 600;
    color: #4a3e56; /* لون نص احترافي دافئ */
    position: relative;
    overflow: hidden;
    transition: all 0.25s ease;
    box-shadow: 0 2px 8px rgba(251, 146, 60, 0.03);
}

.option:hover {
    background: #ffedd5;
    border-color: #fed7aa;
    transform: translateX(4px);
}

.option.selected {
    background: #fce7f3; 
    border-color: #f472b6;
    color: #9d174d;
    box-shadow: 0 4px 12px rgba(244, 114, 182, 0.2);
}

.option.correct-flash {
    background: #ecfdf5;
    border-color: #10b981;
    color: #065f46;
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
}

.option.wrong-flash {
    background: #fff1f2;
    border-color: #fb7185;
    color: #9f1239;
    box-shadow: 0 4px 12px rgba(251, 113, 133, 0.2);
}

/* أزرار التحكم بالأسئلة */
.controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 30px;
}

button.action-btn {
    padding: 14px 28px;
    border: none;
    border-radius: 18px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

button.action-btn:hover {
    opacity: 0.95;
    transform: translateY(-2px);
}

button.action-btn:active {
    transform: scale(0.97);
}

.next { background: linear-gradient(135deg, #f472b6, #db2777); color: white; box-shadow: 0 4px 15px rgba(219, 39, 119, 0.3); } 
.back { background: #e2e8f0; color: #475569; border: 1px solid #cbd5e1; }
.homeBtn { background: linear-gradient(135deg, #c084fc, #9333ea); color: white; box-shadow: 0 4px 15px rgba(147, 51, 234, 0.3); }

/* نصوص التوضيح والترجمات المريحة */
.small { font-size: 15px; line-height: 1.6; margin-top: 12px; color: #c2410c; font-weight: 600; direction: rtl; text-align: right; background: rgba(255, 247, 237, 0.5); padding: 10px 15px; border-radius: 12px; }
.feedback { margin-top: 20px; font-weight: 700; font-size: 16px; padding: 14px; border-radius: 16px; direction: rtl; text-align: right; animation: fadeIn 0.3s ease; }

.screen { display: none; }
.active { display: block; animation: fadeIn 0.4s ease-out; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* تقرير الأخطاء النهائي المرتب */
.wrong-report {
    text-align: right;
    direction: rtl;
    background: rgba(254, 242, 242, 0.8);
    padding: 18px;
    margin-top: 16px;
    border-right: 5px solid #f43f5e;
    border-radius: 16px;
    box-shadow: 0 2px 8px rgba(244, 63, 94, 0.0
