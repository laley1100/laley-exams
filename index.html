<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exam System</title>

<style>
body{
font-family: Arial;
background: linear-gradient(135deg,#ff9ed1,#bda0ff);
text-align:center;
padding:20px;
}

.card{
background: rgba(255,255,255,0.25);
padding:20px;
border-radius:20px;
width:85%;
margin:auto;
}

button{
display:block;
margin:10px auto;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:#ff4fa3;
color:white;
width:70%;
}

button.correct{background:#2ecc71 !important;}
button.wrong{background:#e74c3c !important;}

#nextBtn{background:#6c5ce7;}
small{display:block;font-size:12px;}
</style>
</head>

<body>

<h2>💗 Exam System</h2>

<div id="menu">
<button onclick="start('comm')">Communication</button>
<button onclick="start('path')">Pathology</button>
<button onclick="start('ip')">الملكية الفكرية</button>
</div>

<div class="card" id="quiz" style="display:none">

<h3 id="q"></h3>
<p id="q_ar"></p>

<div id="options"></div>

<p id="result"></p>

<button id="nextBtn" onclick="next()" disabled>Next</button>

</div>
