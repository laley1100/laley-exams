<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Quiz</title>

<style>
body{
font-family:Arial;
background:#fff0f6;
text-align:center;
direction:rtl;
}
h1{color:#d63384;}
button{
display:block;
margin:10px auto;
padding:10px;
width:300px;
border:none;
border-radius:10px;
background:#e599f7;
color:white;
font-size:16px;
cursor:pointer;
}
.question{font-size:20px;margin:20px;}
.small{font-size:14px;color:#555;}
.option{
display:block;
margin:8px auto;
padding:10px;
width:300px;
background:#f8d7ff;
border-radius:10px;
cursor:pointer;
}
.correct{background:#b2f2bb !important;}
.wrong{background:#ffa8a8 !important;}
.result{font-size:20px;margin-top:10px;}
</style>
</head>

<body>

<h1>اختاري المادة 💗</h1>

<div id="menu">
<button onclick="startQuiz('ip')">حقوق الملكية الفكرية</button>
<button onclick="startQuiz('comm')">Communication Concept</button>
<button onclick="startQuiz('path')">Pathology</button>
</div>

<div id="quiz" style="display:none">
<h2 id="title"></h2>
<div id="qnum"></div>
<div id="question" class="question"></div>
<div id="options"></div>
<div id="result" class="result"></div>
</div>

<script>
let current=0;
let data=[];

function startQuiz(type){
document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";
current=0;

if(type=="ip"){title.innerText="حقوق الملكية الفكرية 💗";data=ip;}
if(type=="comm"){title.innerText="Communication Concept 💗";data=comm;}
if(type=="path"){title.innerText="Pathology 💗";data=path;}

show();
}

function show(){
let q=data[current];
qnum.innerText=(current+1)+" / 20";

if(q.en){
question.innerHTML=q.en+"<div class='small'>"+q.ar+"</div>";
}else{
question.innerText=q.q;
}

options.innerHTML="";
result.innerText="";

q.options.forEach((opt,i)=>{
let div=document.createElement("div");
div.className="option";

if(opt.en){
div.innerHTML=opt.en+"<div class='small'>"+opt.ar+"</div>";
}else{
div.innerText=opt;
}

div.onclick=()=>check(i,div);
options.appendChild(div);
});
}

function check(i,btn){
let q=data[current];
let all=document.querySelectorAll(".option");
all.forEach(b=>b.onclick=null);

if(i==q.answer){
btn.classList.add("correct");
result.innerText="✅ صح 💗";
}else{
btn.classList.add("wrong");
all[q.answer].classList.add("correct");
result.innerText="❌ غلط 💔";
}

setTimeout(()=>{
current++;
if(current<data.length){show();}
else{
question.innerText="خلصتي 🎉";
options.innerHTML="";
result.innerText="";
}
},1500);
}
