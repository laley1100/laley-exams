<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz Platform</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#f5f0ff;
  padding:20px;
}

h1{
  color:#7a4ccf;
}

.subject-btn{
  display:block;
  width:80%;
  margin:10px auto;
  padding:15px;
  border:none;
  border-radius:20px;
  background:#e8ddff;
  cursor:pointer;
  font-size:18px;
  transition:0.3s;
}

.subject-btn:hover{
  background:#d6c7ff;
}

button{
  padding:12px;
  margin:8px auto;
  width:80%;
  border-radius:15px;
  border:none;
  display:block;
  cursor:pointer;
  background:#ffe6f0;
}

button:hover{
  background:#ffd1e6;
}

.correct{color:green;font-weight:bold;}
.wrong{color:red;font-weight:bold;}

.cute{
  background:#cdb7ff;
  color:white;
  border-radius:25px;
}
</style>
</head>

<body>

<h1>Quiz Platform ♡</h1>

<div id="menu">
  <button class="subject-btn" onclick="selectSubject('communication')">Communication Concept</button>
  <button class="subject-btn" onclick="selectSubject('pathology')">Pathology</button>
  <button class="subject-btn" onclick="selectSubject('law')">حقوق الملكية الفكرية</button>
</div>

<div id="quiz"></div>
<div id="feedback"></div>

<button id="nextBtn" class="cute" onclick="nextQ()" style="display:none;">Next</button>

<h2 id="final"></h2>

<script>

function playSound(){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.type="sine";
  osc.frequency.value=600;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=>osc.stop(),150);
}

let questions=[];
let current=0;
let score=0;

function selectSubject(sub){
  playSound();

  if(sub==="communication"){
    questions = communication;
  }
  if(sub==="pathology"){
    questions = pathology;
  }
  if(sub==="law"){
    questions = law;
  }

  document.getElementById("menu").style.display="none";
  document.getElementById("final").innerHTML="";
  current=0;
  score=0;
  loadQ();
}

function loadQ(){
  const q = questions[current];

  document.getElementById("quiz").innerHTML = `
    <h3>${q.q}</h3>
    ${q.options.map((o,i)=>`
      <button onclick="check(${i})">${o}</button>
    `).join("")}
  `;

  document.getElementById("feedback").innerHTML="";
  document.getElementById("nextBtn").style.display="none";
}

function check(i){
  const q = questions[current];

  document.querySelectorAll("button").forEach(b=>{
    if(b.id!=="nextBtn") b.disabled=true;
  });

  if(i===q.answer){
    score++;
    document.getElementById("feedback").innerHTML=
    "<div class='correct'>Correct 💚</div>";
  }else{
    document.getElementById("feedback").innerHTML=
    "<div class='wrong'>Wrong 💔</div><div class='correct'>Correct: "+q.options[q.answer]+"</div>";
  }

  document.getElementById("nextBtn").style.display="block";
}

function nextQ(){
  current++;
  if(current<questions.length){
    loadQ();
  }else{
    document.getElementById("quiz").innerHTML="";
    document.getElementById("feedback").innerHTML="";
    document.getElementById("final").innerHTML=
    "Score: "+score+" / "+questions.length;
  }
}

/* =========================

</script>
