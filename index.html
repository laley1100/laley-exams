            { q: "15. يحق للمؤلف أن يبقي الرابطة بينه وبين مؤلفه مجهولة بأن:", ar: "إبقاء الرابطة مجهولة:", options: ["أن ينشره دون ذكر اسمه", "نشر اسم مستعار محدد", "الابتعاد عن التدقيق", "الترجمة للمصنف"], answer: 0 },
            { q: "16. هل تعتبر الترجمة للمصنف تعديلًا للنص وبالتالي اعتداء؟", ar: "الترجمة للمصنف:", options: ["لا تعتبر اعتداء إذا أشار المترجم لمواطن التغيير", "تعتبر ترجمة اعتداء", "ليس واجباً أخذ الإذن", "اعتداء يجيز للمؤلف عدم المساس"], answer: 0 },
            { q: "17. إذا كان بالترجمة إساءة إلى سمعة المؤلف ومكانته فيعتبر ذلك:", ar: "في حال إساءة الترجمة لسمعة المؤلف:", options: ["ليس اعتداء", "اعتداء يجيز للمؤلف اللجوء للقضاء", "التغاضي عن ذلك", "نسبة المصنف للمترجم"], answer: 1 },
            { q: "18. بموجب السلطة المعنوية من حق المؤلف أن:", ar: "حق المؤلف في حماية سمعته:", options: ["يمنع أي عمل فيه إضرار بشرفه أو سمعته", "ليس واجباً أخذ الإذن", "تداول المصنف دون إذن", "التغاضي عن ذلك"], answer: 0 },
            { q: "19. من حقوق المؤلف المعنوية ما يلي:", ar: "من الحقوق المعنوية:", options: ["حظر طرح مصنفه للتداول", "عدم سحب مصنفه المتداول", "البيع", "لا يحظر"], answer: 0 },
            { q: "20. إذا لم يكن للمؤلف ورثة تباشر الحقوق على المصنف من قبل:", ar: "في حال عدم وجود ورثة:", options: ["القاضي", "الهبة للغير", "البيع للغير", "وزارة الثقافة"], answer: 3 }
        ]
    };
let currentSub = "", currentIdx = 0, userAnswers = {};

    function start(sub) {
        currentSub = sub; currentIdx = 0; userAnswers = {};
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        render();
    }

    function render() {
        const q = bank[currentSub][currentIdx];
        document.getElementById('q-title').innerText = q.q;
        document.getElementById('q-count').innerText = `سؤال ${currentIdx + 1} من ${bank[currentSub].length}`;
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        q.options.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'option' + (userAnswers[currentIdx] === i ? (i === q.answer ? ' correct' : ' wrong') : '');
            div.innerText = opt;
            div.onclick = () => { userAnswers[currentIdx] = i; render(); };
            container.appendChild(div);
        });
    }

    function changeQ(dir) {
        if (currentIdx + dir >= 0 && currentIdx + dir < bank[currentSub].length) {
            currentIdx += dir; render();
        }
    }

    function showResults() {
        let html = `<h3>نتائج مراجعتك</h3>`;
        let hasErrors = false;
        
        bank[currentSub].forEach((q, i) => {
            if (userAnswers[i] !== q.answer) {
                hasErrors = true;
                html += `<div style="border-bottom:1px solid #ccc; margin:10px 0; padding:10px;">
                    <p><strong>س:</strong> ${q.q}</p>
                    <p style="color:#991b1b;">❌ إجابتك: ${q.options[userAnswers[i]] || 'لم تجاوبي'}</p>
                    <p style="color:#22c55e;">✅ الإجابة الصحيحة: ${q.options[q.answer]}</p>
                </div>`;
            }
        });

        if (!hasErrors) html += `<p>ممتازة! لا توجد أخطاء 🎉</p>`;
        html += `<button onclick="location.reload()">العودة للرئيسية 🏠</button>`;
        document.getElementById('quiz').innerHTML = html;
    }
</script>
</body>
</html>
