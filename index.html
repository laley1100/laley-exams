<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXAM PLATFORM 🤍</title>

<style>
/* إعدادات الخلفية المتدرجة والناعمة البعيدة عن البياض التقليدي */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #fff0f6 0%, #f2e7fe 50%, #e6f2ff 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
}

/* حاوية العرض الرئيسية بتأثير الإطار الزجاجي المضيء والمحترف */
.container {
    background: rgba(255, 255, 255, 0.85); 
    width: 100%;
    max-width: 750px;
    padding: 40px 30px;
    border-radius: 32px;
    border: 2px solid rgba(255, 255, 255, 0.8); 
    box-shadow: 0 20px 45px rgba(219, 39, 119, 0.08), 
                0 8px 20px rgba(139, 92, 246, 0.06),
                inset 0 0 12px rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    position: relative;
}

#title { 
    font-size: 34px; 
    font-weight: 900; 
    color: #db2777; 
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    text-shadow: 2px 2px 5px rgba(219, 39, 119, 0.12);
    text-align: center;
}

.subtitle {
    color: #7c3aed; 
    font-size: 16px; 
    font-weight: 600; 
    margin-top: 0;
    margin-bottom: 35px;
    text-align: center;
    opacity: 0.85;
}

.menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.menuBtn { 
    background: rgba(245, 235, 255, 0.6); 
    color: #5b21b6; 
    padding: 24px 20px;
    border: 1px solid rgba(233, 213, 255, 0.8);
    border-radius: 22px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    box-shadow: 0 4px 15px rgba(124, 58, 237, 0.04);
} 

.menuBtn::after, .option::after, button.action-btn.next::after, button.action-btn.homeBtn::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -60%;
    width: 30%;
    height: 200%;
    background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
    transform: rotate(30deg);
    transition: none;
    pointer-events: none;
}

.menuBtn:hover::after, .option:hover::after, button.action-btn.next:hover::after, button.action-btn.homeBtn:hover::after {
    left: 140%;
    transition: all 0.75s ease-in-out;
}

.menuBtn:hover {
    background: rgba(233, 213, 255, 0.9);
    transform: translateY(-5px);
    border-color: #c084fc;
    box-shadow: 0 12px 24px rgba(124, 58, 237, 0.12);
}

.menuBtn span.badge {
    font-size: 12px;
    background: #ffffff;
    padding: 4px 12px;
    border-radius: 50px;
    color: #6d28d9;
    font-weight: 800;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
}

.option {
    display: block;
    margin: 16px auto;
    padding: 18px 22px;
    background: rgba(255, 247, 237, 0.7); 
    border: 1px solid rgba(255, 237, 213, 0.95);
    border-radius: 18px;
    cursor: pointer;
    width: 100%;
    box-sizing: border-box;
    text-align: left;
    font-size: 15px;
    font-weight: 600;
    color: #4a3e56;
    position: relative;
    overflow: hidden;
    transition: all 0.25s ease;
    box-shadow: 0 2px 8px rgba(251, 146, 60, 0.02);
}

.option:hover {
    background: rgba(255, 237, 213, 0.95);
    border-color: #fed7aa;
    transform: translateX(4px);
}

.option.selected {
    background: #fce7f3; 
    border-color: #f472b6;
    color: #9d174d;
    box-shadow: 0 4px 12px rgba(244, 114, 182, 0.15);
}

.option.correct-flash {
    background: #ecfdf5;
    border-color: #10b981;
    color: #065f46;
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
}

.option.wrong-flash {
    background: #fff1f2;
    border-color: #fb7185;
    color: #9f1239;
    box-shadow: 0 4px 12px rgba(251, 113, 133, 0.15);
}

.controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 30px;
}

button.action-btn {
    padding: 14px 28px;
    border: none;
    border-radius: 18px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

button.action-btn:hover {
    opacity: 0.95;
    transform: translateY(-2px);
}

button.action-btn:active {
    transform: scale(0.97);
}

.next { background: linear-gradient(135deg, #f472b6, #db2777); color: white; box-shadow: 0 4px 15px rgba(219, 39, 119, 0.25); } 
.back { background: #e2e8f0; color: #475569; border: 1px solid #cbd5e1; }
.homeBtn { background: linear-gradient(135deg, #c084fc, #9333ea); color: white; box-shadow: 0 4px 15px rgba(147, 51, 234, 0.25); }

.small { font-size: 15px; line-height: 1.6; margin-top: 12px; color: #c2410c; font-weight: 600; direction: rtl; text-align: right; background: rgba(255, 247, 237, 0.5); padding: 10px 15px; border-radius: 12px; }
.feedback { margin-top: 20px; font-weight: 700; font-size: 16px; padding: 14px; border-radius: 16px; direction: rtl; text-align: right; animation: fadeIn 0.3s ease; }

.screen { display: none; }
.active { display: block; animation: fadeIn 0.4s ease-out; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div id="menu" class="container screen active">
    <div id="title">EXAM PLATFORM 🤍</div>
    <div class="subtitle">Select Your Subject To Start ✨</div>

    <div class="menu-grid">
        <button class="menuBtn" onclick="startQuiz('bio')">
            <span>📊 Biostatistics</span>
            <span class="badge">17 Qs</span>
        </button>
        <button class="menuBtn" onclick="startQuiz('path')">
            <span>🔬 Pathology</span>
            <span class="badge">50 Qs</span>
        </button>
        <button class="menuBtn" onclick="startQuiz('ip')">
            <span>💡 Intellectual Property</span>
            <span class="badge">20 Qs</span>
        </button>
        <button class="menuBtn" onclick="startQuiz('cc')">
            <span>💬 Communication</span>
            <span class="badge">60 Qs</span>
        </button>
    </div>
</div>

<div id="quiz" class="container screen">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <span style="font-weight: 800; color: #db2777; font-size: 14px; letter-spacing: 0.5px;">EXAM PLATFORM 🤍</span>
        <span id="progressBadge" style="font-size: 13px; color: #7c3aed; font-weight: bold; background: #f3e8ff; padding: 5px 12px; border-radius: 12px; box-shadow: 0 2px 5px rgba(124, 58, 237, 0.05);"></span>
    </div>
    
    <h2 id="question" style="margin-top: 20px; font-size: 21px; color: #3b0764; line-height: 1.5; font-weight: 700;"></h2>
    <div class="small" id="translation"></div>

    <div id="options" style="margin-top: 25px;"></div>
    <div class="feedback" id="feedback"></div>

    <hr style="border: 0; border-top: 1px solid #fce7f3; margin: 30px 0;">
    
    <div class="controls">
        <button class="action-btn back" id="backBtn" onclick="backQuestion()">Back</button>
        <button class="action-btn homeBtn" onclick="goMenu()">Home</button>
        <button class="action-btn next" id="nextBtn" onclick="nextQuestion()">Next</button>
    </div>
</div>

<script>
let current = 0;
let answered = {}; 
let subject = "";
let isShowingFeedback = false;

function playCuteSound() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc1 = audioCtx.createOscillator();
        const gain1 = audioCtx.createGain();
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(523.25, audioCtx.currentTime);
        gain1.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc1.connect(gain1);
        gain1.connect(audioCtx.destination);
        osc1.start();
        osc1.stop(audioCtx.currentTime + 0.1);

        setTimeout(() => {
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(659.25, audioCtx.currentTime);
            gain2.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start();
            osc2.stop(audioCtx.currentTime + 0.15);
        }, 60);
    } catch (e) {
        console.log("Audio playback not supported.");
    }
}

const bank = {
bio: [
    { q: "1. Hypothesis testing is a statistical method used to:", ar: "اختبار الفرضيات هو طريقة إحصائية تُستخدم لاتخاذ القرارات أو استخلاص الاستنتاجات حول المجتمع بناءً على بيانات العينة.", options: ["Make decisions or draw conclusions about a population based on sample data", "Predict future financial trends without any data", "Collect and clean raw data from the field", "Avoid any kind of statistical analysis"], answer: 0 },
    { q: "2. The null hypothesis (H₀) usually states that:", ar: "الفرضية الصفرية (H₀) تنص عادةً على عدم وجود تأثير أو عدم وجود فرق حقيقي بين المجموعات.", options: ["There is a strong and significant effect", "There is no effect or no real difference between groups", "A strong relationship exists between variables", "The sample data is biased and completely invalid"], answer: 1 },
    { q: "3. The alternative hypothesis (H₁) states that:", ar: "الفرضية البديلة (H₁) تشير إلى وجود تأثير حقيقي، أو اختلاف، أو علاقة بين المتغيرات محل الدراسة.", options: ["No difference exists between the studied groups", "There is a real effect, difference, or relationship in the population", "The study data are totally invalid and corrupt", "The statistical test is inconclusive"], answer: 1 },
    { q: "4. The common significance level (α) used in hypothesis testing is:", ar: "مستوى المعنوية الشائع (ألفا) المستخدم في اختبار الفرضيات هو 0.05، وهو ما يعني نسبة خطأ مقبولة 5%.", options: ["0.01", "0.05", "0.10", "0.50"], answer: 1 },
    { q: "5. A right-tailed test is appropriate when the alternative hypothesis predicts a:", ar: "يكون اختبار الطرف الأيمن مناسباً عندما تتوقع الفرضية البديلة زيادة أو قيمة أكبر من القيمة المرجعية.", options: ["Decrease in the outcome parameter", "Increase or a value higher than the baseline reference", "Any change regardless of its direction", "No difference or zero change at all"], answer: 1 },
    { q: "6. A left-tailed test is appropriate when the alternative hypothesis predicts a:", ar: "يكون اختبار الطرف الأيسر مناسباً عندما تتوقع الفرضية البديلة نقصاناً أو انخفاضاً عن القيمة المرجعية.", options: ["Increase in the outcome parameter", "Decrease or a value lower than the baseline reference", "Any change regardless of its direction", "No difference or zero change at all"], answer: 1 },
    { q: "7. A two-tailed test is used when the alternative hypothesis predicts:", ar: "يُستخدم الاختبار ذو الطرفين عندما تتوقع الفرضية البديلة وجود أي اختلاف أو تغير، بغض النظر عن اتجاهه (زيادة أو نقصان).", options: ["Only an increase in the parameter value", "Only a decrease in the parameter value", "Any difference or change in either direction from the baseline", "No hypothesis is formally stated"], answer: 2 },
    { q: "8. An example of a two-tailed hypothesis statement is:", ar: "مثال على الفرضية ذات الطرفين: ضغط الدم بعد تناول الدواء لا يساوي ضغط الدم المرجعي (قد يكون أعلى أو أقل).", options: ["Blood pressure is greater than baseline", "Blood pressure is strictly less than baseline", "Blood pressure is not equal to baseline (BP ≠ baseline)", "Blood pressure is exactly equal to baseline"], answer: 2 },
    { q: "9. In most biomedical research studies, which type of test is standard and preferred?", ar: "في معظم أبحاث الطب الحيوي، يُعتبر الاختبار ذو الطرفين (Two-tailed) هو المعيار المفضل لتجنب التحيز.", options: ["One-tailed test", "Two-tailed test", "Random statistical test", "No hypothesis testing at all"], answer: 1 },
    { q: "10. One-tailed tests are generally considered risky because they:", ar: "تُعتبر الاختبارات ذات الطرف الواحد خطيرة عموماً لأنها قد تؤدي إلى رفع معدل الرفض الخاطئ وتتجاهل التغيرات في الاتجاه المعاكس.", options: ["Are less statistically powerful", "Can overlook unexpected differences in the opposite direction and increase error rates", "Require massive sample sizes to be valid", "Cannot be computed by standard software"], answer: 1 },
    { q: "11. Which of the following is a classic example of a parametric statistical test?", ar: "أي مما يلي يُعد مثالاً كلاسيكياً على الاختبارات الإحصائية المعلمية (التي تفترض التوزيع الطبيعي)؟", options: ["Mann–Whitney U test", "Wilcoxon signed-rank test", "Student's t-test", "Kruskal–Wallis test"], answer: 2 },
    { q: "12. The Analysis of Variance (ANOVA) is primarily used to compare means among:", ar: "تحليل التباين (ANOVA) يُستخدم أساساً لمقارنة المتوسطات الحسابية بين ثلاث مجموعات مستقلة أو أكثر.", options: ["Two groups only", "Three or more independent groups", "One group measured at a single time point", "Paired or matched clinical samples"], answer: 1 },
    { q: "13. Non-parametric statistical tests are selected when data assumes:", ar: "يتم اختيار الاختبارات غير المعلمية عندما لا تتبع البيانات توزيعاً محدداً (مثل التوزيع الطبيعي)، أو تكون رتبية.", options: ["A strict normal distribution", "No specific underlying distribution (Distribution-free data)", "An extremely large and clean sample size", "Interval or ratio level scale data exclusively"], answer: 1 },
    { q: "14. The Wilcoxon signed-rank test is the non-parametric alternative to the:", ar: "اختبار ويلكوكسون للرتب الموقعة هو البديل غير المعلمي لاختبار t للعينات المرتبطة (قبل وبعد).", options: ["Independent samples t-test", "Paired samples t-test", "One-way ANOVA", "Pearson correlation test"], answer: 1 },
    { q: "15. The Kruskal–Wallis test serves as the non-parametric alternative to the:", ar: "اختبار كروسكال واليس هو البديل غير المعلمي لتحليل التباين أحادي الاتجاه (One-way ANOVA).", options: ["One-way ANOVA", "Independent samples t-test", "Chi-square test of independence", "Pearson linear correlation"], answer: 0 },
    { q: "16. A major advantage of non-parametric tests over parametric tests is that they are:", ar: "الميزة الكبرى للاختبارات غير المعلمية هي أنها قوية ولا تتأثر بالقيم المتطرفة أو الالتواء الشديد في البيانات.", options: ["Dependent on strict normality assumptions", "Robust to outliers and highly skewed distribution scales", "Always more precise and powerful", "Based purely on calculating mean values"], answer: 1 },
    { q: "17. The Chi-square test of independence is primarily applied to examine association between:", ar: "يُطبق اختبار كاي تربيع للاستقلالية بشكل أساسي لفحص العلاقة أو الارتباط بين المتغيرات الفئوية (Categorical).", options: ["Continuous data variables", "Comparing means of multiple groups", "Testing association between categorical variables", "Measuring correlation between continuous variables"], answer: 2 }
],
path: [
    { q: "1. Pathology is formally defined as the scientific study of:", ar: "يُعرّف علم الأمراض رسمياً بأنه الدراسة العلمية لـ:", options: ["Normal human anatomy and physiological parameters", "Diseases, including their essential causes, mechanisms of development, and structural/functional changes", "The synthesis and manufacturing of pharmaceutical agents", "Human psychiatric behavior and social interactions"], answer: 1 },
    { q: "2. Cell injury transition from reversible to irreversible is marked by:", ar: "يتعبر انتقال إصابة الخلية من مرحلة المرتجعة (العكوسة) إلى غير المرتجعة بـ:", options: ["Severe, permanent damage to mitochondrial function and cell membrane integrity", "Mild, transient intracellular swelling and blebbing", "A temporary reduction in the overall rate of protein synthesis", "The accumulation of glycogen particles in the cytoplasm"], answer: 0 },
    { q: "3. Apoptosis is characteristically described as:", ar: "يُوصف الموت الخلوي المبرمج (Apoptosis) مميزاً بـأنه:", options: ["Accidental and unregulated cell death resulting from severe external trauma", "Programmed, highly regulated cell death that eliminates unwanted cells without inducing inflammation", "Cellular death caused exclusively by a severe acute lack of oxygen (ischemia)", "The rapid and uncontrolled malignant proliferation of altered cells"], answer: 1 },
    { q: "4. Necrosis is a process that is always considered:", ar: "عملية التنخر (Necrosis) هي عملية تُعتبر دائماً:", options: ["A normal, programmed physiological mechanism for tissue remodeling", "A pathological process resulting from severe irreversible injury, always accompanied by inflammation", "A reversible phase of cellular adaptation to stressful conditions", "Beneficial to the survival and function of adjacent cell networks"], answer: 1 },
    { q: "5. Coagulative necrosis is the characteristic pattern typically seen in:", ar: "التنخر التجلطي هو النمط المميز الذي يُرى عادةً في:", options: ["Ischemic infarctions of the central nervous system (brain)", "Ischemic infarctions of solid visceral organs such as the heart, kidney, and spleen", "Severe localized acute bacterial and fungal infections", "Granulomatous lesions associated with pulmonary tuberculosis"], answer: 1 },
    { q: "6. Liquefactive necrosis is typically characteristic of:", ar: "التنخر التميعي هو نموذجي ومميز لـ:", options: ["Myocardial infarctions and renal ischemic events", "Infarctions within the central nervous system (brain) and focal suppurative bacterial infections", "Chronic mycobacterial infections like tuberculosis", "Acute enzymatic destruction seen in acute pancreatitis"], answer: 1 },
    { q: "7. Caseous necrosis is a distinct form found characteristically in:", ar: "التنخر الجبني هو شكل متميز يوجد بشكل خاص في:", options: ["Ischemic myocardial necrosis", "Infections caused by Mycobacterium tuberculosis (Tuberculosis)", "Acute pancreatic fat necrosis secondary to enzyme leakage", "Tertiary syphilitic lesions known as gummas"], answer: 1 },
    { q: "8. Acute inflammation is clinically and histologically characterized by:", ar: "يتمايز الالتهاب الحاد سريرياً ونسيجياً بـ:", options: ["A slow, insidious onset dominated by lymphocytes and tissue fibrosis", "Rapid onset (minutes/hours), fluid exudation (edema), and extensive neutrophil accumulation", "The formation of structured epithelioid granulomas", "The replacement of normal tissue architecture with permanent dense scar tissue"], answer: 1 },
    { q: "9. The five cardinal signs of acute inflammation include:", ar: "تشمل العلامات الخمس الأساسية للالتهاب الحاد:", options: ["Pallor, hypothermia, tissue shrinkage, numbness, and rigid immobility", "Heat (calor), redness (rubor), swelling (tumor), pain (dolor), and loss of function (functio laesa)", "Fibrosis, intracellular calcification, atrophy, apoptosis, and amyloidosis", "Atrophy, hypertrophy, hyperplasia, metaplasia, and dysplasia"], answer: 1 },
    { q: "10. The predominant cellular components involved in chronic inflammation are:", ar: "المكونات الخلوية السائدة المشاركة في الالتهاب المزمن هي:", options: ["Neutrophils and blood platelets", "Macrophages, lymphocytes, and plasma cells", "Eosinophils and basophilic granulocytes", "Erythrocytes and endothelial cells"], answer: 1 },
    { q: "11. Granulomatous inflammation is a specialized morphological pattern of:", ar: "الالتهاب الحبيبي (الورم الحبيبي) هو نمط شكلي متخصص من:", options: ["Acute inflammation responding to pyogenic bacteria", "Chronic inflammation characterized by collections of activated macrophages or epithelioid cells", "Reversible adaptive responses seen in epithelial tissues", "Malignant cellular transformations in connective tissues"], answer: 1 },
    { q: "12. Hypertrophy is formally defined as an:", ar: "الضخامة (Hypertrophy) تُعرّف رسمياً بأنها:", options: ["Increase in the total absolute number of cells within a tissue", "Increase in the size of individual cells, leading to an increase in the size of the organ", "Reversible substitution of one mature cell type by another adult cell type", "Abnormal, disordered cellular development and architectural loss"], answer: 1 },
    { q: "13. Hyperplasia is formally defined as an:", ar: "فرط التنسج (Hyperplasia) يُعرّف رسمياً بأنه:", options: ["Increase in the volume and structural size of individual cells", "Increase in the absolute number of cells within an organ or tissue in response to a stimulus", "Disordered, pre-cancerous cellular growth pattern", "Shrinkage in cell size due to a loss of nutritional support"], answer: 1 },
    { q: "14. Metaplasia represents a cellular adaptation characterized by:", ar: "الحؤول النسيجي (Metaplasia) يمثل تكيفاً خلوياً يتميز بـ:", options: ["An uncontrolled, autonomous malignant cellular proliferation", "A reversible change in which one adult cell type is replaced by another adult cell type", "A progressive decrease in cell number and size within a tissue", "A complete failure of a primitive organ to develop during embryonic life"], answer: 1 },
    { q: "15. Dysplasia is histologically characterized by:", ar: "عسر التنسج (Dysplasia) يتميز نسيجياً بـ:", options: ["Perfectly coordinated adaptive tissue restructuring", "Disordered growth, atypical cellular features, and loss of architectural orientation (pre-cancerous)", "A fully benign, non-progressive adaptive process that never transforms", "Programmed cell death designed to clean up defective cells"], answer: 1 },
    { q: "16. Benign neoplasms are typically characterized as being:", ar: "الأورام الحميدة تتميز عادةً بأنها:", options: ["Highly invasive, rapidly growing, and capable of widespread metastasis", "Slow-growing, well-circumscribed, encapsulated, and remaining localized without metastasis", "Inevititably fatal within a short period if not treated with aggressive chemotherapy", "Lacking any differentiated cellular structures under standard microscopic review"], answer: 1 },
    { q: "17. Malignant neoplasms characteristically display:", ar: "الأورام الخبيثة تظهر بشكل مميز:", options: ["Slow, expansile growth restricted within a fibrous protective capsule", "Invasive growth, destruction of adjacent normal tissues, and the capacity for distant metastasis", "A perfectly normal cellular morphology and architectural arrangement", "An absence of clinical impact on the patient's physiological state"], answer: 1 },

cc: []
};

function startQuiz(sub) {
    subject = sub;
    current = 0;
    answered = {};
    isShowingFeedback = false;
    
    if(!bank[subject] || bank[subject].length === 0) {
        alert("This subject is empty or under development!");
        return;
    }
    
    document.getElementById("menu").classList.remove("active");
    document.getElementById("quiz").classList.add("active");
    showQuestion();
}

function showQuestion() {
    isShowingFeedback = false;
    const qData = bank[subject][current];
    const total = bank[subject].length;
    
    document.getElementById("progressBadge").innerText = `Question ${current + 1} of ${total}`;
    document.getElementById("question").innerText = qData.q;
    document.getElementById("translation").innerText = qData.ar || "لا يوجد ترجمة متوفرة حالياً.";
    
    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";
    
    document.getElementById("feedback").style.display = "none";
    document.getElementById("feedback").className = "feedback";
    
    // إعدادات زر العودة للخلف
    document.getElementById("backBtn").disabled = (current === 0);
    document.getElementById("backBtn").style.opacity = (current === 0) ? "0.4" : "1";
    
    qData.options.forEach((opt, idx) => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.innerText = opt;
        
        // إذا كان السؤال تمت الإجابة عليه مسبقاً
        if (answered[current] !== undefined) {
            if (idx === qData.answer) {
                btn.classList.add("correct-flash");
            } else if (idx === answered[current]) {
                btn.classList.add("wrong-flash");
            }
            btn.disabled = true;
        } else {
            btn.onclick = () => selectOption(idx);
        }
        optionsDiv.appendChild(btn);
    });
    
    if (answered[current] !== undefined) {
        showFeedbackUI(answered[current] === qData.answer);
    }
}

function selectOption(idx) {
    if (isShowingFeedback || answered[current] !== undefined) return;
    
    const qData = bank[subject][current];
    answered[current] = idx;
    isShowingFeedback = true;
    
    const options = document.querySelectorAll(".option");
    options.forEach(b => b.disabled = true);
    
    const isCorrect = (idx === qData.answer);
    
    if (isCorrect) {
        options[idx].classList.add("correct-flash");
        playCuteSound();
    } else {
        options[idx].classList.add("wrong-flash");
        options[qData.answer].classList.add("correct-flash");
    }
    
    showFeedbackUI(isCorrect);
}

function showFeedbackUI(isCorrect) {
    const fb = document.getElementById("feedback");
    fb.style.display = "block";
    if (isCorrect) {
        fb.innerText = "أحسنت! إجابتك صحيحة وممتازة ✨👏";
        fb.className = "feedback correct-flash";
        fb.style.color = "#065f46";
    } else {
        fb.innerText = "إجابة خاطئة، حاول التركيز والتعلم من الإجابة الصحيحة المحددة بالأخضر 💡";
        fb.className = "feedback wrong-flash";
        fb.style.color = "#9f1239";
    }
}

function nextQuestion() {
    if (current < bank[subject].length - 1) {
        current++;
        showQuestion();
    } else {
        alert("لقد وصلت إلى نهاية أسئلة هذه المادة بنجاح! 🎉");
    }
}

function backQuestion() {
    if (current > 0) {
        current--;
        showQuestion();
    }
}

function goMenu() {
    document.getElementById("quiz").classList.remove("active");
    document.getElementById("menu").classList.add("active");
}
</script>
