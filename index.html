<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz Platform</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#ffb6c1,#c084fc);
    text-align:center;
    color:#fff;
}

.container{
    background:rgba(0,0,0,0.3);
    width:60%;
    margin:auto;
    margin-top:50px;
    padding:20px;
    border-radius:20px;
}

button{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.next{background:#7c3aed;color:white;}
.back{background:#ec4899;color:white;}

.option{
    display:block;
    margin:10px;
    padding:10px;
    background:white;
    color:black;
    border-radius:10px;
}

#heart{
    font-size:30px;
}
</style>
</head>

<body>

<div class="container">
    <div id="heart">🤍 Quiz Platform</div>
    <h2 id="question">Question</h2>

    <div id="options"></div>

    <button class="back" onclick="backQuestion()">Back</button>
    <button class="next" onclick="nextQuestion()">Next</button>
</div>

<script>
let current = 0;
let score = 0;
let wrong = [];

const questions = [
{
q: "Therapeutic communication is best defined as",
options: ["Casual conversation", "Professional planned communication", "Medical orders", "Talking only"],
answer: 1
},
{
q: "Shared understanding helps to",
options: ["Achieve goals", "Waste time", "Reduce care", "Ignore patient"],
answer: 0
},
{
q: "Using silence allows patient to",
options: ["Feel ignored", "Think and reflect", "Stop talking", "Confuse"],
answer: 1
}
];

function showQuestion(){
let q = questions[current];

document.getElementById("question").innerText =
(current+1) + ". " + q.q;

let optionsDiv = document.getElementById("options");
optionsDiv.innerHTML = "";

q.options.forEach((opt,i)=>{
let btn = document.createElement("button");
btn.className = "option";
btn.innerText = opt;

btn.onclick = ()=>{
checkAnswer(i);
};

optionsDiv.appendChild(btn);
});
}

function checkAnswer(i){
let q = questions[current];

if(i === q.answer){
score++;
document.getElementById("heart").innerText = "💗 Correct!";
} else {
wrong.push({
question: q.q,
correct: q.options[q.answer]
});
document.getElementById("heart").innerText = "💔 Wrong!";
}
}

function nextQuestion(){
if(current < questions.length-1){
current++;
showQuestion();
document.getElementById("heart").innerText = "🤍 Quiz Platform";
}else{
showResult();
}
}

function backQuestion(){
if(current > 0){
current--;
showQuestion();
}
}

function showQuestion();
showQuestion();
</script>

</body>
</html>
