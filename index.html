/* ============================
   BANK
============================ */
const bank = {
    bio: biostatQuestions,
    path: pathologyQuestions,
    ip: ipQuestions,
    cc: ccQuestions
};

/* ============================
   ENGINE FUNCTIONS
============================ */

function startQuiz(sub) {
    subject = sub;
    current = 0;
    answered = {}; 
    
    document.getElementById("menu").classList.remove("active");
    document.getElementById("quiz").classList.add("active");
    
    showQuestion();
}

function showQuestion() {
    const questions = bank[subject];
    const qData = questions[current];
    
    document.getElementById("feedback").innerText = "";
    document.getElementById("question").innerText = qData.q;
    document.getElementById("translation").innerText = qData.ar || "";
    
    const optionsContainer = document.getElementById("options");
    optionsContainer.innerHTML = "";
    
    qData.options.forEach((optionText, index) => {
        const button = document.createElement("button");
        button.className = "option";
        button.innerText = optionText;
        
        if (answered[current] === index) {
            button.classList.add("selected");
        }
        
        // دعم التوجيه من اليمين لليسار إذا كانت الخيارات باللغة العربية
        if (/[\u0600-\u06FF]/.test(optionText)) {
            button.style.textAlign = "right";
            button.style.direction = "rtl";
        }
        
        button.onclick = () => selectOption(index);
        optionsContainer.appendChild(button);
    });
}

function selectOption(index) {
    answered[current] = index;
    const options = document.querySelectorAll(".option");
    options.forEach((opt, idx) => {
        if (idx === index) {
            opt.classList.add("selected");
        } else {
            opt.classList.remove("selected");
        }
    });
}

function nextQuestion() {
    const questions = bank[subject];
    
    if (answered[current] === undefined) {
        document.getElementById("feedback").style.color = "#dc2626";
        document.getElementById("feedback").innerText = "الرجاء اختيار إجابة قبل الانتقال للسؤال التالي.";
        return;
    }
    
    if (current < questions.length - 1) {
        current++;
        showQuestion();
    } else {
        showResults();
    }
}

function backQuestion() {
    if (current > 0) {
        current--;
        showQuestion();
    }
}

function showResults() {
    const questions = bank[subject];
    let score = 0;
    
    questions.forEach((qData, index) => {
        if (answered[index] === qData.answer) {
            score++;
        }
    });
    
    document.getElementById("question").innerText = "اكتمل الاختبار!";
    document.getElementById("translation").innerText = "";
    document.getElementById("options").innerHTML = `<h3>نتيجتك هي: ${score} من ${questions.length}</h3>`;
    document.getElementById("feedback").style.color = "#059669";
    document.getElementById("feedback").innerText = score === questions.length ? "أداء ممتاز! 🎉" : "عمل جيد، بالتوفيق في المرات القادمة.";
}

function goMenu() {
    document.getElementById("quiz").classList.remove("active");
    document.getElementById("menu").classList.add("active");
}
