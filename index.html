<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXAM PLATFORM 🤍</title>

<style>
/* إعدادات الخلفية المتدرجة والناعمة البعيدة عن البياض التقليدي */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #fff0f6 0%, #f2e7fe 50%, #e6f2ff 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
}

/* حاوية العرض الرئيسية بتأثير الإطار الزجاجي المضيء والمحترف */
.container {
    background: rgba(255, 255, 255, 0.85); 
    width: 100%;
    max-width: 750px;
    padding: 40px 30px;
    border-radius: 32px;
    border: 2px solid rgba(255, 255, 255, 0.8); 
    box-shadow: 0 20px 45px rgba(219, 39, 119, 0.08), 
                0 8px 20px rgba(139, 92, 246, 0.06),
                inset 0 0 12px rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    position: relative;
}

#title { 
    font-size: 34px; 
    font-weight: 900; 
    color: #db2777; 
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    text-shadow: 2px 2px 5px rgba(219, 39, 119, 0.12);
    text-align: center;
}

.subtitle {
    color: #7c3aed; 
    font-size: 16px; 
    font-weight: 600; 
    margin-top: 0;
    margin-bottom: 35px;
    text-align: center;
    opacity: 0.85;
}

.menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.menuBtn { 
    background: rgba(245, 235, 255, 0.6); 
    color: #5b21b6; 
    padding: 24px 20px;
    border: 1px solid rgba(233, 213, 255, 0.8);
    border-radius: 22px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    box-shadow: 0 4px 15px rgba(124, 58, 237, 0.04);
} 

.menuBtn::after, .option::after, button.action-btn.next::after, button.action-btn.homeBtn::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -60%;
    width: 30%;
    height: 200%;
    background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
    transform: rotate(30deg);
    transition: none;
    pointer-events: none;
}

.menuBtn:hover::after, .option:hover::after, button.action-btn.next:hover::after, button.action-btn.homeBtn:hover::after {
    left: 140%;
    transition: all 0.75s ease-in-out;
}

.menuBtn:hover {
    background: rgba(233, 213, 255, 0.9);
    transform: translateY(-5px);
    border-color: #c084fc;
    box-shadow: 0 12px 24px rgba(124, 58, 237, 0.12);
}

.menuBtn span.badge {
    font-size: 12px;
    background: #ffffff;
    padding: 4px 12px;
    border-radius: 50px;
    color: #6d28d9;
    font-weight: 800;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
}

.option {
    display: block;
    margin: 16px auto;
    padding: 18px 22px;
    background: rgba(255, 247, 237, 0.7); 
    border: 1px solid rgba(255, 237, 213, 0.95);
    border-radius: 18px;
    cursor: pointer;
    width: 100%;
    box-sizing: border-box;
    text-align: left;
    font-size: 15px;
    font-weight: 600;
    color: #4a3e56;
    position: relative;
    overflow: hidden;
    transition: all 0.25s ease;
    box-shadow: 0 2px 8px rgba(251, 146, 60, 0.02);
}

.option:hover {
    background: rgba(255, 237, 213, 0.95);
    border-color: #fed7aa;
    transform: translateX(4px);
}

.option.selected {
    background: #fce7f3; 
    border-color: #f472b6;
    color: #9d174d;
    box-shadow: 0 4px 12px rgba(244, 114, 182, 0.15);
}

.option.correct-flash {
    background: #ecfdf5;
    border-color: #10b981;
    color: #065f46;
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
}

.option.wrong-flash {
    background: #fff1f2;
    border-color: #fb7185;
    color: #9f1239;
    box-shadow: 0 4px 12px rgba(251, 113, 133, 0.15);
}

.controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 30px;
}

button.action-btn {
    padding: 14px 28px;
    border: none;
    border-radius: 18px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

button.action-btn:hover {
    opacity: 0.95;
    transform: translateY(-2px);
}

button.action-btn:active {
    transform: scale(0.97);
}

.next { background: linear-gradient(135deg, #f472b6, #db2777); color: white; box-shadow: 0 4px 15px rgba(219, 39, 119, 0.25); } 
.back { background: #e2e8f0; color: #475569; border: 1px solid #cbd5e1; }
.homeBtn { background: linear-gradient(135deg, #c084fc, #9333ea); color: white; box-shadow: 0 4px 15px rgba(147, 51, 234, 0.25); }

.small { font-size: 15px; line-height: 1.6; margin-top: 12px; color: #c2410c; font-weight: 600; direction: rtl; text-align: right; background: rgba(255, 247, 237, 0.5); padding: 10px 15px; border-radius: 12px; }
.feedback { margin-top: 20px; font-weight: 700; font-size: 16px; padding: 14px; border-radius: 16px; direction: rtl; text-align: right; animation: fadeIn 0.3s ease; }

.screen { display: none; }
.active { display: block; animation: fadeIn 0.4s ease-out; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

function playCuteSound() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc1 = audioCtx.createOscillator();
        const gain1 = audioCtx.createGain();
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(523.25, audioCtx.currentTime);
        gain1.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc1.connect(gain1);
        gain1.connect(audioCtx.destination);
        osc1.start();
        osc1.stop(audioCtx.currentTime + 0.1);

        setTimeout(() => {
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(659.25, audioCtx.currentTime);
            gain2.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start();
            osc2.stop(audioCtx.currentTime + 0.15);
        }, 60);
    } catch (e) {
        console.log("Audio playback not supported.");
    }
}

{ q: "1. Approximately what percentage of body weight is water?", ar: "ما هي النسبة المئوية التقريبية للماء في وزن الجسم ؟", options: ["40%", "50%", "60%", "70%"], answer: 2 },
{ q: "2. Non-pitting edema occurs in which condition?", ar: "في أي حالة يحدث الوذمة غير التجويفية؟", options: ["Cardiac edema", "Renal edema", "Nutritional edema", "Lymphatic edema"], answer: 3 },
{ q: "3. Which of the following is an example of physiological hyperemia?", ar: "أي مما يلي هو مثال على فرط الدم الفسيولوجي؟", options: ["Hyperemia in acute inflammation", "Hyperemia in skeletal muscles during exercise", "Hyperemia in congestive heart failure", "Hyperemia in venous obstruction"], answer: 1 },
{ q: "4. Which type of thrombus is most common in the human body?", ar: "أي نوع من الجلطة الدموية هو الأكثر شيوعا في جسم الإنسان؟", options: ["Arterial thrombus", "Capillary thrombus", "Venous thrombus", "Cardiac mural thrombus"], answer: 2 },
{ q: "5. A thrombus that contains pyogenic bacteria is called:", ar: "تسمى الجلطة الدموية التي تحتوي على بكتيريا صديدية بـ:", options: ["Aseptic thrombus", "Red thrombus", "Septic thrombus", "Mixed thrombus"], answer: 2 },
{ q: "6. Which type of shock is most likely to affect a patient with massive hemorrhage?", ar: "أي نوع من الصدمة من المرجح أن يصيب مريضا يعاني من نزيف حاد؟", options: ["Cardiogenic shock", "Hypovolemic shock", "Anaphylactic shock", "Neurogenic shock"], answer: 1 },
{ q: "7. Amniotic fluid embolism typically occurs during:", ar: "يحدث انسداد السائل السلوي (الأمينوسي) عادة أثناء:", options: ["Early pregnancy", "Labor and delivery", "Postpartum period after 1 month", "Abdominal trauma in first trimester"], answer: 1 },
{ q: "8. Fat embolism is most commonly associated with:", ar: "يرتبط الانسداد الدهني بشكل شائع بـ:", options: ["Deep vein thrombosis", "Fractures of long bones", "Bacterial endocarditis", "Air bubble injection"], answer: 1 },
{ q: "9. Pale (white) infarcts typically occur in which of the following organs?", ar: "تحدث الاحتشاءات الشاحبة البيضاء عادة في أي من الأعضاء التالية؟", options: ["Lungs", "Small intestine", "Heart and Spleen", "Liver"], answer: 2 },
{ q: "10. Red (hemorrhagic) infarcts are typically seen in:", ar: "تظهر الاحتشاءات الحمراء (النزفية) عادة في:", options: ["Kidneys", "Spleen", "Lungs and Gastrointestinal tract", "Heart"], answer: 2 },
{ q: "11. Septic shock is primarily caused by:", ar: "تحدث الصدمة التسممية بشكل أساسي بسبب:", options: ["Severe allergic reaction", "Gram-negative or Gram-positive bacterial infections", "Acute myocardial infarction", "Spinal cord injury"], answer: 1 },
{ q: "12. What is the definition of ischemia?", ar: "ما هو تعريف نقص التروية (الإقفار)؟", options: ["Inability of cells to use oxygen", "Inadequate blood supply to a tissue or organ", "Increase in venous blood flow", "Excessive oxygenation of tissues"], answer: 1 },
{ q: "13. In decompression sickness, the bubbles are composed of:", ar: "في مرض تخفيف الضغط ، تتكون الفقاعات من:", options: ["Oxygen", "Carbon dioxide", "Nitrogen", "Helium"], answer: 2 },
{ q: "14. Chronic passive congestion of the liver leads to:", ar: "الاحتقان المزمن في الكبد يؤدي إلى مظهر كبد جوزة الطيب.", options: ["Nutmeg liver", "Fatty liver", "Cirrhosis", "Infarction"], answer: 0 },
{ q: "15. All of the following are examples of intracellular accumulations EXCEPT:", ar: "كل ما يلي أمثلة على التراكمات داخل الخلايا عدا:", options: ["Fatty change", "Cholesterol accumulation", "Amyloid deposits", "Glycogen accumulation"], answer: 2 },
{ q: "16. Which type of calcification occurs in normal tissues due to hypercalcemia?", ar: "أي نوع من التكلس يحدث في الأنسجة الطبيعية بسبب ارتفاع الكالسيوم في الدم؟", options: ["Dystrophic calcification", "Metastatic calcification", "Apoptotic calcification", "Necrotic calcification"], answer: 1 },
{ q: "17. Dystrophic calcification is typically associated with:", ar: "يرتبط التكلس الضموري (Dystrophic) عادة بـ:", options: ["Normal serum calcium levels and necrotic tissue", "Hypercalcemia and normal tissue", "Vitamin D deficiency", "Hyperparathyroidism"], answer: 0 },
{ q: "18. Cellular aging is primarily driven by:", ar: "الشيخوخة الخلوية مدفوعة بشكل أساسي بـ:", options: ["Accumulation of DNA damage and telomere shortening", "Increased mitotic activity", "Decreased lysosomal activity", "Enhanced protein synthesis"], answer: 0 },
{ q: "19. Which pigment is known as the 'wear-and-tear' pigment of aging?", ar: "أي صبغة تُعرف بصبغة الشيخوخة أو 'الاستهلاك والتآكل'؟", options: ["Melanin", "Hemosiderin", "Lipofuscin", "Bilirubin"], answer: 2 },
{ q: "20. Anthracosis is an accumulation of which exogenous pigment?", ar: "مرض Anthracosis ينتج عن تراكم أي صبغة خارجية؟", options: ["Lead", "Carbon (coal dust)", "Iron", "Silica"], answer: 1 },
{ q: "21. Fatty change (steatosis) is most commonly observed in which organ?", ar: "التغير الدهني يُلاحظ بشكل شائع في أي عضو؟", options: ["Kidneys", "Heart", "Liver", "Spleen"], answer: 2 },
{ q: "22. russell bodies are accumulations of:", ar: "أجسام راسل (Russell bodies) هي تراكمات لـ:", options: ["Lipids in macrophages", "Immunoglobulins in plasma cells", "Glycogen in hepatocytes", "Carbon in lung tissue"], answer: 1 },
{ q: "23. Which condition is associated with metastatic calcification?", ar: "أي حالة ترتبط بالتكلس النقيلي (Metastatic)؟", options: ["Atherosclerotic plaques", "Chronic renal failure / Hyperparathyroidism", "Tuberculous lymphadenitis", "Healed heart valves"], answer: 1 },
{ q: "24. Telomere shortening leads to cellular:", ar: "قصر التيلومير يؤدي إلى الشيخوخة الخلوية:", options: ["Hyperplasia", "Hypertrophy", "Senescence", "Transformation"], answer: 2 },
{ q: "25. The brown color of a chronic hematoma is due to which endogenous pigment?", ar: "اللون البني للورم الدموي المزمن يعود لصبغة:", options: ["Bilirubin", "Melanin", "Hemosiderin", "Lipofuscin"], answer: 2 },
{ q: "26. Which of the following is considered a benign tumor?", ar: "أي مما يلي يعتبر ورماً حميداً؟", options: ["Adenocarcinoma", "Fibrosarcoma", "Leiomyoma", "Melanoma"], answer: 2 },
{ q: "27. Malignant tumors of epithelial origin are called:", ar: "الأورام الخبيثة ذات الأصل الطلائي تسمى:", options: ["Sarcomas", "Carcinomas", "Lymphomas", "Adenomas"], answer: 1 },
{ q: "28. Malignant tumors of mesenchymal (connective tissue) origin are called:", ar: "الأورام الخبيثة ذات أصل النسيج الضام تسمى:", options: ["Carcinomas", "Sarcomas", "Blastomas", "Papillomas"], answer: 1 },
{ q: "29. What is the definition of anaplasia?", ar: "ما هو تعريف الـ Anaplasia؟", options: ["Increased size of cells", "Lack of differentiation", "Orderly replacement of cell types", "Premalignant change"], answer: 1 },
{ q: "30. Metaplasia is defined as:", ar: "الـ Metaplasia هي:", options: ["Uncontrolled cell proliferation", "Reversible replacement of one adult cell type by another", "Complete lack of cellular differentiation", "Increased cell numbers"], answer: 1 },
{ q: "31. Dysplasia represents:", ar: "الـ Dysplasia تمثل:", options: ["A benign neoplasm", "Disordered growth and maturation, often premalignant", "Complete regression of tissue", "Metastatic spread"], answer: 1 },
{ q: "32. The most definitive feature distinguishing a malignant tumor from a benign tumor is:", ar: "الميزة الأكثر حسماً للتفريق بين الورم الخبيث والحميد هي:", options: ["Rapid growth rate", "Cellular atypia", "Metastasis and local invasion", "Large tumor size"], answer: 2 },
{ q: "33. A benign tumor of smooth muscle is known as:", ar: "الورم الحميد في العضلات الملساء يسمى:", options: ["Rhabdomyoma", "Leiomyoma", "Lipoma", "Hemangioma"], answer: 1 },
{ q: "34. A malignant tumor of skeletal muscle is called:", ar: "الورم الخبيث في العضلات الهيكلية يسمى:", options: ["Leiomyosarcoma", "Rhabdomyosarcoma", "Fibrosarcoma", "Osteosarcoma"], answer: 1 },
{ q: "35. Which of the following tumors sounds benign but is actually malignant?", ar: "أي من الأورام التالية يبدو حميداً بالاسم لكنه خبيث في الواقع؟", options: ["Fibroma", "Chondroma", "Melanoma", "Osteoma"], answer: 2 },
{ q: "36. Carcinoma in situ implies that:", ar: "السرطانة في الموضع (Carcinoma in situ) تعني أن:", options: ["The tumor has metastasized to lymph nodes", "Malignant cells have not breached the basement membrane", "The tumor is entirely benign", "The basement membrane is completely destroyed"], answer: 1 },
{ q: "37. What is cachexia?", ar: "ما هو الدنف (Cachexia)؟", options: ["Local tumor invasion", "Wasting syndrome with weight loss and muscle atrophy in cancer patients", "A type of benign skin lesion", "Hormone secretion by non-endocrine tumors"], answer: 1 },
{ q: "38. Paraneoplastic syndromes are:", ar: "متلازمات نظير الورم (Paraneoplastic syndromes) هي:", options: ["Symptoms caused by local tumor growth", "Symptom complexes not explained by local or metastatic tumor spread", "Complications of cancer chemotherapy", "Psychological reactions to cancer diagnosis"], answer: 1 },
{ q: "39. Tumor staging (e.g., TNM system) evaluates:", ar: "تحديد مرحلة الورم (نظام TNM) يقيم:", options: ["The degree of differentiation under microscope", "The size, extent of local spread, and metastasis", "The mitotic rate of tumor cells", "The tissue of origin"], answer: 1 },
{ q: "40. Tumor grading evaluates:", ar: "درجة الورم (Grading) تقيم:", options: ["The anatomical spread of the tumor", "The degree of cellular differentiation and atypia under microscope", "The duration of symptoms", "The age of the patient"], answer: 1 },
{ q: "41. The 'T' in the TNM staging system stands for:", ar: "حرف 'T' في نظام TNM يشير إلى:", options: ["Tumor size or local extent", "Total nodes involved", "Time of onset", "Type of cancer"], answer: 0 },
{ q: "42. The 'N' in the TNM staging system stands for:", ar: "حرف 'N' في نظام TNM يشير إلى:", options: ["Necrosis within tumor", "Regional lymph node involvement", "Number of metastases", "Nuclear grade"], answer: 1 },
{ q: "43. The 'M' in the TNM staging system stands for:", ar: "حرف 'M' في نظام TNM يشير إلى:", options: ["Mitotic rate", "Metaplasia degree", "Distant metastasis", "Mutation type"], answer: 2 },
{ q: "44. Which of the following is a classic clinical sign of tumor cachexia?", ar: "أي مما يلي علامة سريرية كلاسيكية لدنف الأورام؟", options: ["Weight gain", "Unintentional weight loss and wasting", "Increased appetite", "Fluid retention and edema"], answer: 1 },
{ q: "45. An example of a paraneoplastic syndrome is:", ar: "مثال على متلازمة نظير الورم هو:", options: ["Anemia due to chronic bleeding", "Cushing syndrome caused by ACTH secretion from lung small cell carcinoma", "Jaundice due to common bile duct obstruction", "Bone pain from osteosarcoma"], answer: 1 },
{ q: "46. A patient presents with a suspicious breast lump. Which cytology technique is minimally invasive, rapid, and low-cost?", ar: "مريض يعاني من كتلة مشبوهة في الثدي. أي تقنية فحص خلوي هي أقل تدخلا، سريعة، ومنخفضة التكلفة؟", options: ["Excisional biopsy", "Fine Needle Aspiration Cytology (FNAC)", "Endoscopic biopsy", "Liquid biopsy"], answer: 1 },
{ q: "47. Which immunohistochemistry (IHC) marker would be most useful to confirm a carcinoma (epithelial origin)?", ar: "أي علامة من علامات الكيمياء المناعية النسيجية ستكون الأكثر فائدة لتأكيد وجود سرطانة ذات أصل طلائي؟", options: ["Vimentin", "Cytokeratin", "CD34", "Ki-67"], answer: 1 },
{ q: "48. A high Ki-67 proliferation index on IHC suggests:", ar: "ماذا يشير ارتفاع مؤشر التكاثر Ki-67 في الكيمياء المناعية النسيجية؟", options: ["Benign tumor", "Low-grade malignancy", "High proliferative activity", "Hormone receptor positivity"], answer: 2 },
{ q: "49. Flow cytometry is particularly useful in diagnosing:", ar: "يعتبر تحليل التدفق الخلوي (Flow cytometry) مفيدا بشكل خاص في تشخيص:", options: ["Liver cirrhosis", "Lung adenocarcinoma", "Leukemias and lymphomas", "Breast carcinoma"], answer: 2 }
],
cc: [
{ q: "1) Therapeutic communication is best defined as", ar: "يُعرّف التواصل العلاجي بأفضل شكل على أنه:", options: ["Casual conversation between paramedic and patient", "A planned, deliberate, professional act using communication techniques", "Giving medical instructions only", "Talking to calm the patient"], answer: 1 },
{ q: "2) Shared understanding of information helps to", ar: "الفهم المشترك للمعلومات يساعد على:", options: ["Achieve desired patient-care goals", "Reduce documentation", "Save time only", "Limit patient interaction"], answer: 0 },
{ q: "3) Using silence in communication allows the patient", ar: "استخدام الصمت في التواصل يسمح للمريض بـ:", options: ["Feel ignored", "Think and gain insight", "Lose interest", "End the conversation"], answer: 1 },
{ q: "4) Exploring is best described as", ar: "الاستكشاف (Exploring) يوصف بأفضل شكل بأنه:", options: ["Changing the subject", "Delving further into a topic", "Giving medical advice", "Summarizing data"], answer: 1 },
{ q: "5) Clarification is used when the paramedic wants to", ar: "التوضيح (Clarification) يُستخدم عندما يريد المسعف أن:", options: ["Check understanding", "Challenge the patient", "Give instructions", "End communication"], answer: 0 },
{ q: "6) Example of clarification is", ar: "مثال على التوضيح هو قيدك لـ:", options: ["“Why did you do that?”", "“Tell me everything again.”", "“What do you mean by ‘sicker than usual’?”", "“You are wrong.”"], answer: 2 },
{ q: "7) Reflecting focuses on", ar: "الانعكاس (Reflecting) يركز على:", options: ["Only medical facts", "Client’s feelings and content", "Paramedic’s opinion", "Documentation"], answer: 1 },
{ q: "8) Functional-professional touch is used primarily for", ar: "اللمس المهني-الوظيفي يُستخدم في المقام الأول لـ:", options: ["Clinical care", "Emotional bonding", "Social greetings", "Intimacy"], answer: 0 },
{ q: "9) When explaining procedures, paramedics should consider", ar: "عند شرح الإجراءات، يجب على المسعفين مراعاة:", options: ["Only time constraints", "Documentation only", "Personal opinions", "Age and language barriers"], answer: 3 },
{ q: "10) Therapeutic impasses are best described as", ar: "المآزق العلاجية توصف بأفضل شكل بأنها:", options: ["Blocks in the progress of the nurse-patient relationship", "Successful outcomes", "Fast medical interventions", "Standard protocols"], answer: 0 },
{ q: "11) Active listening involves", ar: "الاستماع النشط يتضمن:", options: ["Thinking about what to say next", "Paying close attention to verbal and non-verbal cues", "Interrupting frequently", "Ignoring patient's posture"], answer: 1 },
{ q: "12) Non-verbal communication includes", ar: "التواصل غير اللفظي يشمل:", options: ["Spoken words", "Written reports", "Facial expressions, gestures, and posture", "Radio transmissions"], answer: 2 },
{ q: "13) Open-ended questions are useful because they", ar: "الأسئلة المفتوحة مفيدة لأنها:", options: ["Can be answered with 'Yes' or 'No'", "Encourage patients to share detailed information", "Limit patient response time", "Are only used for children"], answer: 1 },
{ q: "14) Closed-ended questions are best used to", ar: "الأسئلة المغلقة تُستخدم بشكل أفضل لـ:", options: ["Gather specific, focused information quickly", "Explore patient's feelings", "Build a deep relationship", "Prolong the conversation"], answer: 0 },
{ q: "15) An example of an open-ended question is", ar: "مثال على سؤال مفتوح هو:", options: ["“Are you in pain?”", "“What brought you to the hospital today?”", "“Is your name John?”", "“Do you take medications?”"], answer: 1 },
{ q: "16) An example of a closed-ended question is", ar: "مثال على سؤال مغلق هو:", options: ["“Tell me about your medical history.”", "“How does the pain feel?”", "“Did you take your medication this morning?”", "“Describe the incident.”"], answer: 2 },
{ q: "17) Restating helps the paramedic to", ar: "إعادة الصياغة (Restating) تساعد المسعف على:", options: ["Validate that the correct message was received", "Change the topic", "Correct the patient's grammar", "Show lack of interest"], answer: 0 },
{ q: "18) Giving broad openings allows the patient to", ar: "إعطاء فواتح واسعة يسمح للمريض بـ:", options: ["Answer only with 'Yes'", "Lead the direction of the conversation", "Feel limited in options", "Stop talking immediately"], answer: 1 },
{ q: "19) Summarizing is useful to", ar: "التلخيص مفيد لـ:", options: ["Introduce new topics", "Review main points and bring closure to a discussion", "Confuse the patient", "Avoid documentation"], answer: 1 },
{ q: "20) Empathy is best defined as", ar: "التعاطف (Empathy) يُعرّف بأفضل شكل على أنه:", options: ["Feeling sorry for the patient", "Understanding and sharing another person's experiences and emotions", "Ignoring emotional cues", "Agreeing with everything the patient says"], answer: 1 },
{ q: "21) Sympathy differs from empathy because sympathy involves", ar: "التعاطف الوجداني (Sympathy) يختلف عن التقمص الوجداني لأنه يتضمن:", options: ["Objective understanding", "Taking on the patient's distress as one's own feeling pitiful", "Professional distance", "Effective active listening"], answer: 1 },
{ q: "22) Barriers to effective communication include", ar: "عوائق التواصل الفعال تشمل:", options: ["Using clear language", "Active listening", "Medical jargon, high noise levels, and bias", "Maintaining eye contact"], answer: 2 },
{ q: "23) Using medical jargon with a patient can lead to", ar: "استخدام المصطلحات الطبية المعقدة مع المريض يمكن أن يؤدي إلى:", options: ["Better understanding", "Confusion and anxiety", "Faster recovery", "Improved trust"], answer: 1 },
{ q: "24) Non-therapeutic communication includes", ar: "التواصل غير العلاجي يشمل:", options: ["Giving false reassurance and judging", "Using open-ended questions", "Reflecting feelings", "Clarifying details"], answer: 0 },
{ q: "25) Saying “Everything will be fine” is an example of", ar: "قولك 'كل شيء سيكون على ما يرام' هو مثال على:", options: ["Therapeutic reassurance", "False reassurance", "Active listening", "Validating feelings"], answer: 1 },
{ q: "26) Asking “Why” questions aggressively can make the patient feel", ar: "طرح أسئلة تبدأ بـ 'لماذا' بشكل هجومي قد يجعل المريض يشعر بـ:", options: ["Defensive and judged", "Comfortable and open", "Appreciated", "Independent"], answer: 0 },
{ q: "27) Interpersonal communication occurs", ar: "التواصل بين الأشخاص (Interpersonal) يحدث:", options: ["Within oneself", "Between two or more people", "Across a whole nation", "Only via text messages"], answer: 1 },
{ q: "28) Intrapersonal communication occurs", ar: "التواصل داخل الذات (Intrapersonal) يحدث:", options: ["Between a doctor and nurse", "Within an individual’s own mind", "During a team meeting", "Through a presentation"], answer: 1 },
{ q: "29) The sender’s role in communication is to", ar: "دور المرسل في التواصل هو:", options: ["Decode the message", "Encode and transmit the message", "Provide feedback only", "Block the channel"], answer: 1 },
{ q: "30) The receiver’s role in communication is to", ar: "دور المستقبل في التواصل هو:", options: ["Create the message", "Decode and interpret the message", "Ignore non-verbal cues", "Select the medium"], answer: 1 },
{ q: "31) Feedback in communication is important because it", ar: "التغذية الراجعة (Feedback) مهمة في التواصل لأنها:", options: ["Ends the conversation immediately", "Confirms that the message was understood correctly", "Increases noise", "Changes the sender"], answer: 1 },
{ q: "32) Noise in communication refers to", ar: "الضوضاء (Noise) في التواصل تشير إلى:", options: ["Only loud sounds", "Any interference that distorts or blocks the message", "Music in the background", "The sender’s voice"], answer: 1 },
{ q: "33) Proxemics is the study of", ar: "علم القرب (Proxemics) هو دراسة:", options: ["Body language", "Personal space and distance in communication", "Voice tone", "Eye contact"], answer: 1 },
{ q: "34) Intimate distance is typically reserved for", ar: "المسافة الحميمة تكون عادة محجوزة لـ:", options: ["Public speaking", "Close relationships and physical examination (0-18 inches)", "Casual conversations", "Business meetings"], answer: 1 },
{ q: "35) Personal distance is usually used for", ar: "المسافة الشخصية تُستخدم عادة لـ:", options: ["Crowds", "Conversations with friends and colleagues (1.5 - 4 feet)", "Performing CPR", "Shouting commands"], answer: 1 },
{ q: "36) Social distance is common in", ar: "المسافة الاجتماعية شائعة في:", options: ["Physical touch", "Business and formal interactions (4-12 feet)", "Whispering secrets", "Family gatherings"], answer: 1 },
{ q: "37) Public distance is used for", ar: "المسافة العامة تُستخدم لـ:", options: ["Private consulting", "Lectures and public speaking (12+ feet)", "Patient assessment", "Handshakes"], answer: 1 },
{ q: "38) Kinesics is the study of", ar: "علم الحركة (Kinesics) هو دراسة:", options: ["Spoken words", "Body movement, gestures, and posture", "Touch frequency", "Time management"], answer: 1 },
{ q: "39) Paralanguage includes", ar: "شبه اللغة (Paralanguage) تشمل:", options: ["Written text", "Tone, pitch, speed, and volume of voice", "Sign language", "Choice of vocabulary"], answer: 1 },
{ q: "40) Maintaining appropriate eye contact shows", ar: "الحفاظ على التواصل البصري المناسب يُظهر:", options: ["Aggression", "Interest, attentiveness, and respect", "Disregard", "Boredom"], answer: 1 },
{ q: "41) Communication with pediatric patients requires", ar: "التواصل مع الأطفال يتطلب:", options: ["Using complex medical terms", "Getting down to their eye level and using simple words", "Ignoring the parents", "Speaking very loudly"], answer: 1 },
{ q: "42) When communicating with geriatric patients, paramedics should", ar: "عند التواصل مع كبار السن، يجب على المسعفين:", options: ["Assume they are all deaf", "Speak clearly, face them, and show patience", "Rush through the assessment", "Talk only to their family members"], answer: 1 },
{ q: "43) For a patient with a hearing impairment, it is helpful to", ar: "للمريض الذي يعاني من ضعف السمع، من المفيد:", options: ["Shout directly into their ear", "Face the patient so they can read lips, and use written notes", "Turn away while speaking", "Use complex language"], answer: 1 },
{ q: "44) Cultural competence in communication means", ar: "الكفاءة الثقافية في التواصل تعني:", options: ["Ignoring cultural differences", "Being aware of and respecting diverse cultural beliefs and practices", "Forcing the patient to adapt to your culture", "Speaking only one language"], answer: 1 },
{ q: "45) An example of a non-verbal barrier is", ar: "مثال على حاجز غير لفظي هو:", options: ["Speaking slowly", "Crossing arms and looking away", "Nodding during conversation", "Leaning forward towards the patient"], answer: 1 },
{ q: "46) Validation is a technique used to", ar: "التحقق (Validation) هو أسلوب يُستخدم لـ:", options: ["Check if the patient is lying", "Acknowledge and confirm the patient’s feelings or expressions", "Disapprove of patient actions", "End the interview"], answer: 1 },
{ q: "47) Directing or focusing is useful when the patient", ar: "التوجيه أو التركيز يكون مفيداً عندما يكون المريض:", options: ["Is silent", "Is rambling or disconnected, to bring them back to the main topic", "Answers clearly", "Is unconscious"], answer: 1 },
{ q: "48) Confrontation in therapeutic communication should be used", ar: "المواجهة في التواصل العلاجي يجب أن تُستخدم:", options: ["Angrily to challenge the patient", "Carefully to point out inconsistencies in information, constructively", "To prove the patient wrong", "Never, under any circumstance"], answer: 1 },
{ q: "49) Sharing observations involves", ar: "مشاركة الملاحظات تتضمن:", options: ["Judging the patient’s lifestyle", "Commenting on how the patient looks or behaves without judging", "Making fun of the patient", "Writing secret notes"], answer: 1 },
{ q: "50) Self-disclosure by a paramedic should be", ar: "الإفصاح الذاتي من قبل المسعف يجب أن يكون:", options: ["Used frequently to talk about personal problems", "Minimal and strictly focused on benefiting the patient", "Avoided completely even if helpful", "Used to show off expertise"], answer: 1 },
{ q: "51) The primary goal of a patient interview is to", ar: "الهدف الأساسي من المقابلة مع المريض هو:", options: ["Complete documentation quickly", "Gather accurate clinical and psychosocial history", "Make friends with the patient", "Bill the patient"], answer: 1 },

function startQuiz(sub) {
    subject = sub;
    current = 0;
    answered = {};
    isShowingFeedback = false;
    playCuteSound();
    
    document.getElementById("menu").classList.remove("active");
    document.getElementById("quiz").classList.add("active");
    
    showQuestion();
}

function showQuestion() {
    const qList = bank[subject];
    if (!qList || qList.length === 0) {
        alert("No questions found!");
        return;
    }
    
    const qData = qList[current];
    document.getElementById("progressBadge").innerText = `${current + 1} / ${qList.length}`;
    document.getElementById("question").innerText = qData.q;
    document.getElementById("translation").innerText = qData.ar || "";
    
    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";
    
    document.getElementById("feedback").style.display = "none";
    document.getElementById("feedback").className = "feedback";
    isShowingFeedback = false;
    
    qData.options.forEach((opt, idx) => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.innerText = opt;
        
        if (answered[current] !== undefined) {
            if (idx === qData.answer) {
                btn.classList.add("correct-flash");
            } else if (idx === answered[current]) {
                btn.classList.add("wrong-flash");
            }
        } else {
            btn.onclick = () => selectOption(idx);
        }
        
        optionsDiv.appendChild(btn);
    });
}

function selectOption(idx) {
    if (answered[current] !== undefined || isShowingFeedback) return;
    
    const qData = bank[subject][current];
    answered[current] = idx;
    isShowingFeedback = true;
    
    const optionsDiv = document.getElementById("options");
    const buttons = optionsDiv.getElementsByClassName("option");
    
    if (idx === qData.answer) {
        buttons[idx].classList.add("correct-flash");
        showFeedback(true, "إجابة صحيحة مذهلة! ✨👏");
    } else {
        buttons[idx].classList.add("wrong-flash");
        buttons[qData.answer].classList.add("correct-flash");
        showFeedback(false, "إجابة خاطئة، حاول في السؤال القادم 🌸");
    }
}

function showFeedback(isCorrect, text) {
    const fb = document.getElementById("feedback");
    fb.style.display = "block";
    fb.innerText = text;
    if (isCorrect) {
        fb.style.background = "#d1fae5";
        fb.style.color = "#065f46";
    } else {
        fb.style.background = "#ffe4e6";
        fb.style.color = "#9f1239";
    }
}

function nextQuestion() {
    const qList = bank[subject];
    if (current < qList.length - 1) {
        current++;
        showQuestion();
    } else {
        alert("🎉 لقد أكملت الاختبار بنجاح يا بطل!");
        goMenu();
    }
}

function backQuestion() {
    if (current > 0) {
        current--;
        showQuestion();
    }
}

function goMenu() {
    document.getElementById("quiz").classList.remove("active");
    document.getElementById("menu").classList.add("active");
}
</script>
