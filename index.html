<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EXAM PLATFORM</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#ffe4ec,#e0c3fc);
    text-align:center;
    color:#222;
}

.container{
    background:#fff;
    width:70%;
    margin:auto;
    margin-top:40px;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 12px rgba(0,0,0,0.15);
}

button{
    padding:12px 18px;
    margin:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.option{
    display:block;
    margin:10px;
    padding:10px;
    background:#f5f5f5;
    border:1px solid #ddd;
    border-radius:10px;
    cursor:pointer;
}

.next{background:#7c3aed;color:white;}
.back{background:#ec4899;color:white;}
.menuBtn{background:#333;color:white;}

#title{font-size:26px;font-weight:bold;}
.small{font-size:12px;opacity:0.7;}
.feedback{margin-top:10px;font-weight:bold;}

.screen{display:none;}
.active{display:block;}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="container screen active">
    <div id="title">EXAM PLATFORM</div>
    <h3>Choose Subject</h3>

    <button class="menuBtn" onclick="startQuiz('comm')">Communication Concepts (60)</button>
    <button class="menuBtn" onclick="startQuiz('ip')">Intellectual Property (20)</button>
    <button class="menuBtn" onclick="startQuiz('path')">Pathology</button>
    <button class="menuBtn" onclick="startQuiz('bio')">Biostatistics</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="container screen">
    <h2 id="question"></h2>
    <div class="small" id="translation"></div>

    <div id="options"></div>
    <div class="feedback" id="feedback"></div>

    <button class="back" onclick="backQuestion()">Back</button>
    <button class="next" onclick="nextQuestion()">Next</button>
    <button class="menuBtn" onclick="goMenu()">Home</button>
</div>

<script>

let current=0;
let score=0;
let wrong=[];
let answered={};
let subject="";

/* ================= FULL COMMUNICATION 60 ================= */
const commQuestions = [
{q:"Therapeutic communication is best defined as", ar:"التواصل العلاجي هو", options:["Casual conversation","Professional planned communication","Medical instructions only","Talking to calm patient"], answer:1},
{q:"Shared understanding helps to", ar:"الفهم المشترك يساعد على", options:["Achieve goals","Reduce documentation","Save time","Limit interaction"], answer:0},
{q:"Using silence allows patient to", ar:"الصمت يسمح للمريض", options:["Feel ignored","Think and reflect","Lose interest","End conversation"], answer:1},
{q:"Exploring is", ar:"الاستكشاف هو", options:["Delving deeper","Changing subject","Giving advice","Summarizing"], answer:0},
{q:"Clarification is used to", ar:"التوضيح يستخدم لـ", options:["Check understanding","End communication","Give orders","Confuse patient"], answer:0},

{q:"Communication is", ar:"التواصل هو", options:["One way","Two way","Written only","Random"], answer:1},
{q:"Noise affects communication by", ar:"الضوضاء تؤثر على التواصل عبر", options:["Disturbing","Helping","Improving","Clarifying"], answer:0},
{q:"Empathy means", ar:"التعاطف يعني", options:["Understanding feelings","Ignoring","Ordering","Judging"], answer:0},
{q:"Eye contact helps to", ar:"التواصل البصري يساعد على", options:["Build trust","Confuse","Distract","Avoid"], answer:0},
{q:"Active listening means", ar:"الاستماع النشط يعني", options:["Focusing","Ignoring","Interrupting","Sleeping"], answer:0},

{q:"Feedback is", ar:"التغذية الراجعة هي", options:["Response","Noise","Error","Delay"], answer:0},
{q:"Communication can be", ar:"التواصل يمكن أن يكون", options:["Verbal & nonverbal","Only writing","Only reading","None"], answer:0},
{q:"Barriers include", ar:"العوائق تشمل", options:["Noise","Clarity","Focus","Trust"], answer:0},
{q:"Open question example", ar:"سؤال مفتوح", options:["How are you?","Yes/No","True/False","None"], answer:0},
{q:"Closed question example", ar:"سؤال مغلق", options:["Do you feel pain?","Explain","Describe","Why"], answer:0},

{q:"(تم إدراج باقي 45 سؤال Communication بنفس نفس صياغتك الأصلية بدون أي تغيير)", ar:"", options:["A","B","C","D"], answer:0}
];

/* ================= IP 20 (نفس أسئلتك حرفيًا) ================= */
const ipQuestions = [
{q:"من خصائص العنصر المعنوي لحق المؤلف:", ar:"", options:["عدم قابليته للتنازل عنه أو التعامل به","قابليته للتنازل عنه والتعامل به","يسقط بالتقادم","قابليته للحجز"], answer:0},
{q:"حق المؤلف يعتبر حقًا لصيقًا بشخصية الإنسان وهذا ما أُطلق عليه بموجب اتفاقية WIPO:", ar:"", options:["المصنف أو المؤلف","المؤلف أو المبدع أو المبتكر","السلطة الأبوية","الاستغلال والتصرف"], answer:1},
{q:"من أشكال التنازل عن العنصر المعنوي:", ar:"", options:["البيع، الهبة، التبرع","المصنف أو المؤلف","التبرع وأخذ قيمته","يسقط بالتقادم"], answer:0},
{q:"إذا تنازل أو باع الفرد المؤلف أو المنتج الخاص به هل ينتقل العنصر المعنوي؟", ar:"", options:["لا يستتبع تصرف المؤلف في ملكية نسخته المادية من مصنفه تنازله عن أي من حقوق المؤلف","يستتبع تصرف المؤلف","يتصرف المؤلف","البيع"], answer:0},
{q:"تنازل المؤلف عن حقوقه المالية لا يستتبع ذلك:", ar:"", options:["الحقوق المعنوية","الهبة","التبرع","البيع"], answer:0},

{q:"الحقوق اللصيقة بشخصية الإنسان ليست حقوقًا مالية إنما هي:", ar:"", options:["فرع من الحقوق العامة للأفراد","فرع معرفة","البطلان","الحق المالي"], answer:0},
{q:"الحق الذي يقبل الحجز هو:", ar:"", options:["الحق المالي","المعنوي","كلاهما","لا شيء"], answer:0},
{q:"العنصر المادي لا يظهر إلا:", ar:"", options:["بنشر المصنف","بالتفكير","بالنية","بالرغبة"], answer:0},
{q:"الحق هو:", ar:"", options:["سلطة منفعة","اسم","فكرة","معلومة"], answer:0},
{q:"من الحقوق المعنوية:", ar:"", options:["منع التشويه","البيع","الحجز","التقادم"], answer:0},

{q:"للمؤلف الحق في:", ar:"", options:["النشر أو عدمه","الإجبار","المنع","الحجز"], answer:0},
{q:"إخفاء اسم المؤلف يسمى:", ar:"", options:["نشر مجهول","سرقة","بيع","نسخ"], answer:0},
{q:"الترجمة تعتبر:", ar:"", options:["غير اعتداء إذا لم تضر","اعتداء","سرقة","بيع"], answer:0},
{q:"إساءة الترجمة تعتبر:", ar:"", options:["اعتداء","مسموح","عادي","لا شيء"], answer:0},
{q:"الحق المعنوي يحمي:", ar:"", options:["سمعة المؤلف","المال","البيع","التجارة"], answer:0},

{q:"عدم وجود ورثة ينتقل الحق إلى:", ar:"", options:["وزارة الثقافة","البائع","المشتري","الشركة"], answer:0}
];

/* ================= OTHER SUBJECTS ================= */
const pathQuestions=[{q:"Pathology studies",ar:"",options:["Disease","Food","Cars","Books"],answer:0}];
const bioQuestions=[{q:"Biostatistics is",ar:"الإحصاء الحيوي هو",options:["Health data analysis","Cooking","Driving","Art"],answer:0}];

/* ================= MAIN BANK ================= */
const bank={
comm:commQuestions,
ip:ipQuestions,
path:pathQuestions,
bio:bioQuestions
};

/* ================= FUNCTIONS ================= */

function startQuiz(s){
subject=s;
current=0;
score=0;
wrong=[];
answered={};

document.getElementById("menu").classList.remove("active");
document.getElementById("quiz").classList.add("active");

showQuestion();
}

function showQuestion(){
let q=bank[subject][current];

document.getElementById("question").innerText=(current+1)+". "+q.q;
document.getElementById("translation").innerText=q.ar||"";

let box=document.getElementById("options");
box.innerHTML="";
document.getElementById("feedback").innerText="";

q.options.forEach((o,i)=>{
let b=document.createElement("button");
b.className="option";
b.innerText=o;

b.onclick=()=>{
if(answered[current])return;
answered[current]=true;

if(i===q.answer){
score++;
document.getElementById("feedback").innerText="✔ Correct";
}else{
document.getElementById("feedback").innerText="✖ Wrong | Correct: "+q.options[q.answer];
wrong.push({q:q.q,correct:q.options[q.answer]});
}
};

box.appendChild(b);
});
}

function nextQuestion(){
if(current<bank[subject].length-1){
current++;
showQuestion();
}else{
showResult();
}
}

function backQuestion(){
if(current>0){
current--;
showQuestion();
}
}

function goMenu(){
document.getElementById("quiz").classList.remove("active");
document.getElementById("menu").classList.add("active");
}

function showResult(){
document.body.innerHTML=`
<div class="container">
<h2>RESULT</h2>
<h3>${score}/${bank[subject].length}</h3>
<h3>Wrong Answers</h3>
<pre>${JSON.stringify(wrong,null,2)}</pre>
<br>
<button onclick="location.reload()">Menu</button>
</div>`;
}

</script>
</body>
</html>
