<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXAM PLATFORM 🤍</title>

<style>
/* إعدادات الخلفية المتدرجة والناعمة البعيدة عن البياض التقليدي */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #fff0f6 0%, #f2e7fe 50%, #e6f2ff 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
}

/* حاوية العرض الرئيسية بتأثير الإطار الزجاجي المضيء والمحترف */
.container {
    background: rgba(255, 255, 255, 0.85); 
    width: 100%;
    max-width: 750px;
    padding: 40px 30px;
    border-radius: 32px;
    border: 2px solid rgba(255, 255, 255, 0.8); 
    box-shadow: 0 20px 45px rgba(219, 39, 119, 0.08), 
                0 8px 20px rgba(139, 92, 246, 0.06),
                inset 0 0 12px rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    position: relative;
}

#title { 
    font-size: 34px; 
    font-weight: 900; 
    color: #db2777; 
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    text-shadow: 2px 2px 5px rgba(219, 39, 119, 0.12);
    text-align: center;
}

.subtitle {
    color: #7c3aed; 
    font-size: 16px; 
    font-weight: 600; 
    margin-top: 0;
    margin-bottom: 35px;
    text-align: center;
    opacity: 0.85;
}

.menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.menuBtn { 
    background: rgba(245, 235, 255, 0.6); 
    color: #5b21b6; 
    padding: 24px 20px;
    border: 1px solid rgba(233, 213, 255, 0.8);
    border-radius: 22px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    box-shadow: 0 4px 15px rgba(124, 58, 237, 0.04);
} 

.menuBtn::after, .option::after, button.action-btn.next::after, button.action-btn.homeBtn::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -60%;
    width: 30%;
    height: 200%;
    background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
    transform: rotate(30deg);
    transition: none;
    pointer-events: none;
}

.menuBtn:hover::after, .option:hover::after, button.action-btn.next:hover::after, button.action-btn.homeBtn:hover::after {
    left: 140%;
    transition: all 0.75s ease-in-out;
}

.menuBtn:hover {
    background: rgba(233, 213, 255, 0.9);
    transform: translateY(-5px);
    border-color: #c084fc;
    box-shadow: 0 12px 24px rgba(124, 58, 237, 0.12);
}

.menuBtn span.badge {
    font-size: 12px;
    background: #ffffff;
    padding: 4px 12px;
    border-radius: 50px;
    color: #6d28d9;
    font-weight: 800;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
}

.option {
    display: block;
    margin: 16px auto;
    padding: 18px 22px;
    background: rgba(255, 247, 237, 0.7); 
    border: 1px solid rgba(255, 237, 213, 0.95);
    border-radius: 18px;
    cursor: pointer;
    width: 100%;
    box-sizing: border-box;
    text-align: left;
    font-size: 15px;
    font-weight: 600;
    color: #4a3e56;
    position: relative;
    overflow: hidden;
    transition: all 0.25s ease;
    box-shadow: 0 2px 8px rgba(251, 146, 60, 0.02);
}

.option:hover {
    background: rgba(255, 237, 213, 0.95);
    border-color: #fed7aa;
    transform: translateX(4px);
}

.option.selected {
    background: #fce7f3; 
    border-color: #f472b6;
    color: #9d174d;
    box-shadow: 0 4px 12px rgba(244, 114, 182, 0.15);
}

.option.correct-flash {
    background: #ecfdf5;
    border-color: #10b981;
    color: #065f46;
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
}

.option.wrong-flash {
    background: #fff1f2;
    border-color: #fb7185;
    color: #9f1239;
    box-shadow: 0 4px 12px rgba(251, 113, 133, 0.15);
}

.controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 30px;
}

button.action-btn {
    padding: 14px 28px;
    border: none;
    border-radius: 18px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

button.action-btn:hover {
    opacity: 0.95;
    transform: translateY(-2px);
}

button.action-btn:active {
    transform: scale(0.97);
}

.next { background: linear-gradient(135deg, #f472b6, #db2777); color: white; box-shadow: 0 4px 15px rgba(219, 39, 119, 0.25); } 
.back { background: #e2e8f0; color: #475569; border: 1px solid #cbd5e1; }
.homeBtn { background: linear-gradient(135deg, #c084fc, #9333ea); color: white; box-shadow: 0 4px 15px rgba(147, 51, 234, 0.25); }

.small { font-size: 15px; line-height: 1.6; margin-top: 12px; color: #c2410c; font-weight: 600; direction: rtl; text-align: right; background: rgba(255, 247, 237, 0.5); padding: 10px 15px; border-radius: 12px; }
.feedback { margin-top: 20px; font-weight: 700; font-size: 16px; padding: 14px; border-radius: 16px; direction: rtl; text-align: right; animation: fadeIn 0.3s ease; }

.screen { display: none; }
.active { display: block; animation: fadeIn 0.4s ease-out; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div id="menu" class="container screen active">
    <div id="title">EXAM PLATFORM 🤍</div>
    <div class="subtitle">Select Your Subject To Start ✨</div>

    <div class="menu-grid">
        <button class="menuBtn" onclick="startQuiz('bio')">
            <span>📊 Biostatistics</span>
            <span class="badge">83 Qs</span>
        </button>
        <button class="menuBtn" onclick="startQuiz('path')">
            <span>🔬 Pathology</span>
            <span class="badge">49 Qs</span>
        </button>
        <button class="menuBtn" onclick="startQuiz('ip')">
            <span>💡 Intellectual Property</span>
            <span class="badge">20 Qs</span>
        </button>
        <button class="menuBtn" onclick="startQuiz('cc')">
            <span>💬 Communication</span>
            <span class="badge">60 Qs</span>
        </button>
    </div>
</div>

<div id="quiz" class="container screen">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <span style="font-weight: 800; color: #db2777; font-size: 14px; letter-spacing: 0.5px;">EXAM PLATFORM 🤍</span>
        <span id="progressBadge" style="font-size: 13px; color: #7c3aed; font-weight: bold; background: #f3e8ff; padding: 5px 12px; border-radius: 12px; box-shadow: 0 2px 5px rgba(124, 58, 237, 0.05);"></span>
    </div>
    
    <h2 id="question" style="margin-top: 20px; font-size: 21px; color: #3b0764; line-height: 1.5; font-weight: 700;"></h2>
    <div class="small" id="translation"></div>

    <div id="options" style="margin-top: 25px;"></div>
    <div class="feedback" id="feedback"></div>

    <hr style="border: 0; border-top: 1px solid #fce7f3; margin: 30px 0;">
    
    <div class="controls">
        <button class="action-btn back" id="backBtn" onclick="backQuestion()">Back</button>
        <button class="action-btn homeBtn" onclick="goMenu()">Home</button>
        <button class="action-btn next" id="nextBtn" onclick="nextQuestion()">Next</button>
    </div>
</div>

<script>
let current = 0;
let answered = {}; 
let subject = "";
let isShowingFeedback = false;

function playCuteSound() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc1 = audioCtx.createOscillator();
        const gain1 = audioCtx.createGain();
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(523.25, audioCtx.currentTime);
        gain1.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc1.connect(gain1);
        gain1.connect(audioCtx.destination);
        osc1.start();
        osc1.stop(audioCtx.currentTime + 0.1);

        setTimeout(() => {
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(659.25, audioCtx.currentTime);
            gain2.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start();
            osc2.stop(audioCtx.currentTime + 0.15);
        }, 60);
    } catch (e) {
        console.log("Audio playback not supported.");
    }
}

const bank = {
bio: [
{ q: "1. Hypothesis testing is used to:", ar: "يُستخدم اختبار الفرضيات لاتخاذ قرارات مبنية على البيانات.", options: ["Make decisions from data", "Predict future events", "Collect raw data", "Avoid statistical analysis"], answer: 0 },
{ q: "2. The null hypothesis (H₀) usually states:", ar: "الفرضية الصفرية تعني عدم وجود تأثير أو فرق.", options: ["There is an effect", "No effect or no difference", "A strong relationship exists", "The sample is biased"], answer: 1 },
{ q: "3. The alternative hypothesis (H₁) states:", ar: "الفرضية البديلة (H₁) تشير إلى وجود تأثير أو فرق.", options: ["No difference exists", "There is an effect or difference", "Data are invalid", "The test is inconclusive"], answer: 1 },
{ q: "4. Common significance level (α) used in hypothesis testing:", ar: "مستوى المعنوية الشائع (α) المستخدم في اختبار الفرضيات:", options: ["0.01", "0.05", "0.10", "0.50"], answer: 1 },
{ q: "5. A right-tailed test is used when:", ar: "يتم استخدام الاختبار ذو الطرف الأيمن عند توقع زيادة أو تحسن.", options: ["Expecting decrease", "Expecting increase/improvement", "Testing any change", "No direction assumed"], answer: 1 },
{ q: "6. A left-tailed test is used when:", ar: "يتم استخدام الاختبار ذو الطرف الأيسر عند توقع انخفاض أو تقليل.", options: ["Expecting increase", "Expecting decrease/reduction", "Testing any change", "No difference assumed"], answer: 1 },
{ q: "7. A two-tailed test is used when:", ar: "يتم استخدام الاختبار ذو الطرفين للتحقق من وجود أي اختلاف (زيادة أو نقصان).", options: ["Expecting only increase", "Expecting only decrease", "Checking for any difference (increase or decrease)", "No hypothesis stated"], answer: 2 },
{ q: "8. Example of two-tailed hypothesis:", ar: "مثال على فرضية ذات طرفين (لا تحدد اتجاه الاختلاف):", options: ["BP > baseline", "BP < baseline", "BP ≠ baseline", "BP = baseline"], answer: 2 },
{ q: "9. In most studies, which test is preferred?", ar: "في معظم الدراسات الطبية والعلمية، يفضل الاختبار ذو الطرفين.", options: ["One-tailed", "Two-tailed", "No test", "Random test"], answer: 1 },
{ q: "10. One-tailed tests are risky because:", ar: "الاختبارات ذات الطرف الواحد خطيرة لأنها تزيد من احتمالية الرفض الخاطئ للفرضية الصفرية.", options: ["They are less powerful", "They increase false rejection of H₀", "They require larger samples", "They cannot be used in medicine"], answer: 1 },
{ q: "11. Example of parametric test:", ar: "مثال على اختبار معلمي (Parametric Test):", options: ["Mann–Whitney U", "Wilcoxon signed-rank", "t-test", "Kruskal–Wallis"], answer: 2 },
{ q: "12. ANOVA is used to compare:", ar: "يُستخدم تحليل التباين (ANOVA) لمقارنة المتوسطات لثلاث مجموعات أو أكثر.", options: ["Two groups", "Three or more groups", "One group only", "Paired samples"], answer: 1 },
{ q: "13. Non-parametric tests assume:", ar: "الاختبارات غير المعلمية تفترض عدم وجود توزيع محدد للبيانات.", options: ["Normal distribution", "No specific distribution", "Large sample size", "Interval data only"], answer: 1 },
{ q: "14. Wilcoxon signed-rank test is alternative to:", ar: "اختبار ويلكوكسون للرتب الموقعة هو البديل غير المعلمي لاختبار t للعينات المرتبطة.", options: ["Independent t-test", "Paired t-test", "ANOVA", "Pearson correlation"], answer: 1 },
{ q: "15. Kruskal–Wallis test is alternative to:", ar: "اختبار كروسكال واليس هو البديل غير المعلمي لتحليل التباين أحادي الاتجاه (ANOVA).", options: ["ANOVA", "t-test", "Chi-square", "Pearson correlation"], answer: 0 },
{ q: "16. Advantage of non-parametric tests:", ar: "من مزايا الاختبارات غير المعلمية أنها قوية ومتينة في التعامل مع القيم المتطرفة (Outliers).", options: ["Require normality", "Robust to outliers", "Always more precise", "Use mean values"], answer: 1 },
{ q: "17. The Chi-square test is primarily used for:", ar: "يُستخدم اختبار كاي تربيع (Chi-square) بشكل أساسي لاختبار الارتباط بين المتغيرات الفئوية.", options: ["Continuous data like blood pressure", "Comparing means between two groups", "Testing association between categorical variables", "Measuring correlation between two continuous variables"], answer: 2 },
{ q: "18. In a 2×2 contingency table, the expected frequency for each cell is calculated as:", ar: "طريقة حساب التكرار المتوقع في جدول التوافق 2x2.", options: ["(Row total × Column total) ÷ Grand total", "(Row total ÷ Column total) × Grand total", "(Observed frequency ÷ Expected frequency) × 100", "(Row total + Column total) ÷ Grand total"], answer: 0 },
{ q: "19. When should Fisher’s Exact Test be used instead of Chi-square?", ar: "يُستخدم اختبار فيشر الدقيق بدلاً من كاي تربيع عندما تكون التكرارات المتوقعة في أي خلية أقل من 5.", options: ["When sample size is large", "When expected frequencies are all ≥ 5", "When expected frequencies in any cell are < 5", "When data are continuous"], answer: 2 },
{ q: "20. The Chi-square test is most appropriate for:", ar: "اختبار كاي تربيع هو الأكثر ملاءمة لفحص العلاقات بين المتغيرات الفئوية (Categorical Variables).", options: ["Comparing two means", "Testing association between categorical variables", "Measuring correlation between continuous variables", "Predicting regression coefficients"], answer: 1 },
{ q: "21. Which of the following is a categorical variable?", ar: "أي مما يلي يعتبر متغيراً فئويًا (Categorical)؟", options: ["Blood pressure", "Cholesterol level", "Gender", "Height"], answer: 2 },
{ q: "22. The Chi-square statistic formula is:", ar: "الصيغة الرياضية لحساب قيمة إحصاء كاي تربيع.", options: ["∑(O−E)² / E", "∑(E−O)² / E", "(O−E)² / O", "(O/E)²"], answer: 0 },
{ q: "23. The Chi-square goodness-of-fit test is used to:", ar: "يُستخدم اختبار جودة المطابقة لكاي تربيع لمعرفة مدى تطابق التوزيع الملاحظ مع التوزيع المتوقع.", options: ["Test if two categorical variables are independent", "Test if observed distribution matches expected distribution", "Compare two proportions", "Test correlation between variables"], answer: 1 },
{ q: "24. Fisher’s Exact Test is preferred when:", ar: "يُفضل اختبار فيشر الدقيق في الجداول الصغيرة 2x2 عندما يقل التكرار المتوقع عن 5.", options: ["Sample size is large", "Expected frequencies are ≥ 5", "Expected frequencies are < 5 in a 2×2 table", "Data are continuous"], answer: 2 },
{ q: "25. A t-test is used to:", ar: "يُستخدم اختبار t لمقارنة المتوسطات بين المجموعات.", options: ["Measure correlation", "Compare means", "Calculate variance only", "Classify data"], answer: 1 },
{ q: "26. The null hypothesis (H₀) states:", ar: "الفرضية الصفرية تفترض دائماً عدم وجود فرق أو علاقة.", options: ["There is a difference", "No difference exists", "Data is normal", "Data is independent"], answer: 1 },
{ q: "27. The alternative hypothesis (H₁) suggests:", ar: "الفرضية البديلة تشير إلى وجود فرق حقيقي بين المجموعات.", options: ["No change", "Equal means", "There is a difference", "No data"], answer: 2 },
{ q: "28. One-sample t-test compares:", ar: "اختبار t لعينة واحدة يقارن متوسط العينة بقيمة معلومة أو معيارية.", options: ["Two groups", "One group to a known value", "Three groups", "Variables"], answer: 1 },
{ q: "29. Independent t-test is used for:", ar: "اختبار t للعينات المستقلة يقارن بين مجموعتين غير مرتبطتين تماماً.", options: ["Same group before/after", "Two unrelated groups", "Multiple groups", "One variable only"], answer: 1 },
{ q: "30. Paired t-test is used when:", ar: "اختبار t الأزواج المرتبطة يُستخدم عند قياس نفس الأشخاص مرتين (قبل وبعد).", options: ["Groups are independent", "Data is categorical", "Same subjects are measured twice", "No measurements"], answer: 2 },
{ q: "31. Comparing smokers vs non-smokers requires:", ar: "مقارنة المدخنين بغير المدخنين تتطلب اختبار t للعينات المستقلة لأن المجموعتين منفصلتان.", options: ["Paired t-test", "One-sample t-test", "Independent t-test", "Sign test"], answer: 2 },
{ q: "32. t-test cannot compare:", ar: "لا يمكن لاختبار t مقارنة ثلاث مجموعات أو أكثر في نفس الوقت.", options: ["Two groups", "Three or more groups", "Means", "Continuous data"], answer: 1 },
{ q: "33. Which test replaces t-test for 3+ groups?", ar: "الاختبار البديل لاختبار t عند مقارنة 3 مجموعات أو أكثر هو تحليل التباين (ANOVA).", options: ["Correlation", "ANOVA", "Regression", "Median test"], answer: 1 },
{ q: "34. The sign test focuses on:", ar: "يركز اختبار الإشارة على اتجاه التغيير فقط (إيجابي أو سلبي) وليس القيم الدقيقة.", options: ["Exact values", "Direction (+ / −)", "Mean values", "Variance"], answer: 1 },
{ q: "35. A typical confidence level used is:", ar: "مستوى الثقة النموذجية والأكثر شيوعاً هو 95٪.", options: ["10%", "50%", "95%", "5%"], answer: 2 },
{ q: "36. ANOVA analyzes:", ar: "تحليل ANOVA يحلل التباين بين المجموعات وداخل المجموعات للوصول للمقارنة.", options: ["Only means", "Only medians", "Variance (between and within groups)", "Percentages"], answer: 2 },
{ q: "37. The null hypothesis (H₀) in ANOVA states:", ar: "الفرضية الصفرية في ANOVA تنص على أن جميع متوسطات المجموعات متساوية.", options: ["All means are different", "At least one mean is different", "All group means are equal", "No data exists"], answer: 2 },
{ q: "38. Two-way ANOVA is used to:", ar: "تحليل ANOVA ثنائي الاتجاه يدرس تأثير عاملين مستقلين وتفاعلهما المشترك.", options: ["Test one factor only", "Test two factors and interaction", "Remove variables", "Calculate mean"], answer: 1 },
{ q: "39. Factorial ANOVA includes:", ar: "تحليل ANOVA العاملي يتضمن دراسة عدة عوامل مستقلة وتأثيراتها.", options: ["Only one-way ANOVA", "Only two-way ANOVA", "All ANOVA with multiple factors", "Only three-way ANOVA"], answer: 2 },
{ q: "40. One-way ANOVA requires:", ar: "تحليل التباين أحادي الاتجاه يتطلب وجود ثلاث مجموعات أو أكثر لمقارنتها.", options: ["Two groups", "Three or more groups", "One group", "No groups"], answer: 1 },
{ q: "41. ANOVA can be used to compare:", ar: "يمكن استخدام تحليل ANOVA عند مقارنة تأثير ثلاثة أنواع مختلفة من الأدوية.", options: ["One drug effect", "Three drug types", "No treatments", "Only medians"], answer: 1 },
{ q: "42. ANCOVA combines:", ar: "تحليل ANCOVA يجمع بين تحليل التباين (ANOVA) وتحليل الانحدار (Regression).", options: ["ANOVA and correlation", "ANOVA and regression", "Mean and median", "Variance only"], answer: 1 },
{ q: "43. ANCOVA adjusts results based on:", ar: "تحليل ANCOVA يقوم بتعديل وتحييد أثر المتغيرات المصاحبة الخارجية (Covariates).", options: ["Group size", "External variables (covariates)", "Means only", "Sample type"], answer: 1 },
{ q: "44. The main advantage of ANCOVA is:", ar: "الميزة الأساسية لتحليل ANCOVA هي إزالة أثر المتغيرات المربكة لضمان مقارنة عادلة.", options: ["Simplicity only", "Comparing two groups only", "Providing a fair comparison by removing confounders", "Increasing error"], answer: 2 },
{ q: "45. Correlation describes:", ar: "الارتباط يصف طبيعة وقوة العلاقة بين المتغيرات بدون تحديد السبب والنتيجة.", options: ["A cause-and-effect relationship", "The relationship between variables", "Only differences between groups", "Experimental results"], answer: 1 },
{ q: "46. The value of correlation coefficient (r) ranges between:", ar: "تتراوح قيمة معامل الارتباط (r) دائماً بين -1.0 و +1.0.", options: ["0 to 100", "−10 to +10", "−1.0 to +1.0", "0 to 1 only"], answer: 2 },
{ q: "47. Positive correlation means:", ar: "الارتباط الطردي الإيجابي يعني حركة المتغيرين في نفس الاتجاه معاً (يزيدان معاً).", options: ["One variable increases, the other decreases", "Both variables move in opposite directions", "Both variables move in the same direction", "No relationship"], answer: 2 },
{ q: "48. Negative correlation means:", ar: "الارتباط العكسي السلبي يعني أنه عندما يرتفع متغير ينخفض الآخر.", options: ["Both variables increase", "One increases while the other decreases", "No change in variables", "Variables are equal"], answer: 1 },
{ q: "49. A correlation of 0.75 is considered:", ar: "قيمة الارتباط 0.75 تعتبر ارتباطاً قوياً (Strong).", options: ["Weak", "Moderate", "Strong", "Very weak"], answer: 2 },
{ q: "50. A correlation of 0.10 is:", ar: "قيمة الارتباط 0.10 تعتبر ارتباطاً ضعيفاً جداً أو يكاد ينعدم.", options: ["Very strong", "Weak or none", "Moderate", "Strong"], answer: 1 },
{ q: "51. Which value indicates very strong correlation?", ar: "أي من القيم التالية تشير إلى ارتباط قوي جداً؟", options: ["0.25", "0.45", "0.85", "0.10"], answer: 2 },
{ q: "52. Phi coefficient (φ) is used when:", ar: "يُستخدم معامل فاي عندما يكون كلا المتغيرين ثنائيين (Binary Variables).", options: ["Both variables are continuous", "Both variables are binary", "Data is ranked", "Data is normal"], answer: 1 },
{ q: "53. Pearson correlation (r) is used when:", ar: "ارتباط بيرسون يُستخدم عندما تكون البيانات رقمية مستمرة وموزعة طبيعياً.", options: ["Data is ordinal only", "Data is binary only", "Data is continuous and normally distributed", "Data is random"], answer: 2 },
{ q: "54. Point-biserial correlation is used when:", ar: "الارتباط النقطي ثنائي السلسلة يُستخدم عندما يكون أحد المتغيرين ثنائياً والآخر مستمراً.", options: ["Both variables are continuous", "Both variables are binary", "One binary and one continuous variable", "Data is ranked only"], answer: 2 },
{ q: "55. What is the primary goal of medical bioinformatics?", ar: "الهدف الأساسي للمعلوماتية الحيوية الطبية هو استخدام الأدوات الحوسبية لتحسين التشخيص والعلاج وفهم الأمراض.", options: ["To replace doctors with computers", "To use computational tools to improve understanding, diagnosis, and treatment of diseases", "To store patient records only", "To eliminate the need for laboratory testing"], answer: 1 },
{ q: "56. Machine learning in medical bioinformatics can be used to:", ar: "يمكن استخدام التعلم الآلي في هذا مجال لتحليل وتفسير الصور الطبية مثل الأشعة السينية.", options: ["Analyze X-ray images", "Replace DNA sequencing machines", "Store patient health records", "Manufacture drugs directly"], answer: 0 },
{ q: "57. Personalized medicine in bioinformatics is based on:", ar: "الطب الشخصي والمفصل يقوم بالأساس على التركيب الجيني الفريد لكل مريض.", options: ["Patient’s lifestyle only", "Patient’s genetic makeup", "Doctor’s experience", "Hospital resources"], answer: 1 },
{ q: "58. AI helps drug discovery by:", ar: "الذكاء الاصطناعي يسرع اكتشاف الأدوية عبر فحص وتحليل ملايين المركبات الكيميائية بسرعة فائقة.", options: ["Analyzing millions of chemical compounds", "Manufacturing drugs automatically", "Eliminating clinical trials", "Replacing pharmacists"], answer: 0 },
{ q: "59. Why is medical bioinformatics important in modern medicine?", ar: "أهميتها تكمن في قدرتها على تحليل كميات ضخمة من البيانات الطبية المعقدة لتحسين جودة الرعاية.", options: ["It reduces the need for doctors", "It helps analyze massive medical data to improve diagnosis and treatment", "It eliminates the need for patient history", "It focuses only on psychology"], answer: 1 },
{ q: "60. Which of the following is a common data type in medical bioinformatics?", ar: "نوع البيانات الأكثر شيوعاً في المعلوماتية الحيوية هو تتابعات الـ DNA والـ RNA.", options: ["DNA/RNA sequences", "Weather patterns", "Traffic flow data", "Economic statistics"], answer: 0 },
{ q: "61. AI can assist in medical imaging by:", ar: "يساعد الذكاء الاصطناعي في الكشف عن الأورام بدقة داخل الأشعة المقطعية أو الرنين المغناطيسي.", options: ["Detecting tumors in CT or MRI scans", "Replacing radiologists entirely", "Designing hospital buildings", "Managing patient billing"], answer: 0 },
{ q: "62. Machine learning models can predict diseases by analyzing:", ar: "يمكن للنماذج التنبؤ بالأمراض عبر ربط وتحليل البيانات الجينية والسريرية ونمط الحياة.", options: ["Patient’s favorite food", "Genetic, clinical, and lifestyle data", "Hospital budgets", "Doctor’s handwriting"], answer: 1 },
{ q: "63. Which of the following is a limitation of AI in medicine?", ar: "من عيوب وحدود الذكاء الاصطناعي في الطب أنه يعتمد كلياً على جودة ونظافة البيانات المدخلة.", options: ["It requires high-quality data", "It eliminates the need for doctors", "It guarantees perfect accuracy", "It never inherits bias"], answer: 0 },
{ q: "64. What is one major challenge in medical bioinformatics?", ar: "التحدي الأكبر هو الحجم الضخم جداً والهائل للبيانات الناتجة والتي تحتاج لتحليل دقيق.", options: ["Lack of diseases", "Large amount of data", "Too few computers", "No need for analysis"], answer: 1 },
{ q: "65. Why is understanding genes difficult?", ar: "دراسة وفهم الجينات صعبة جداً نظراً للتعقيد البالغ والتشابك في الأنظمة الجينية.", options: ["They are too small to study", "They change daily", "They are very complex", "They are not important"], answer: 2 },
{ q: "66. Why must patient data be protected?", ar: "يجب حماية بيانات المرضى بقوة لأنها معلومات جينية وسريرية شديدة الخصوصية والحساسية.", options: ["To reduce computer usage", "Because it is cheap", "Because it is private and sensitive", "To share it publicly"], answer: 2 },
{ q: "67. One challenge of Medical Bioinformatics is:", ar: "من أبرز التحديات الحالية النقص الشديد في الكوادر والمتخصصين الذين يجمعون بين الطب والحوسبة.", options:
    bio: [
{ q: "1. Hypothesis testing is a statistical method used to:", ar: "اختبار الفرضيات هو طريقة إحصائية تُستخدم لاتخاذ القرارات أو استخلاص الاستنتاجات حول المجتمع بناءً على بيانات العينة.", options: ["Make decisions or draw conclusions about a population based on sample data", "Predict future financial trends without any data", "Collect and clean raw data from the field", "Avoid any kind of statistical analysis"], answer: 0 },
{ q: "2. The null hypothesis (H₀) usually states that:", ar: "الفرضية الصفرية (H₀) تنص عادةً على عدم وجود تأثير أو عدم وجود فرق حقيقي بين المجموعات.", options: ["There is a strong and significant effect", "There is no effect or no real difference between groups", "A strong relationship exists between variables", "The sample data is biased and completely invalid"], answer: 1 },
{ q: "3. The alternative hypothesis (H₁) states that:", ar: "الفرضية البديلة (H₁) تشير إلى وجود تأثير حقيقي، أو اختلاف، أو علاقة بين المتغيرات محل الدراسة.", options: ["No difference exists between the studied groups", "There is a real effect, difference, or relationship in the population", "The study data are totally invalid and corrupt", "The statistical test is inconclusive"], answer: 1 },
{ q: "4. The common significance level (α) used in hypothesis testing is:", ar: "مستوى المعنوية الشائع (ألفا) المستخدم في اختبار الفرضيات هو 0.05، وهو ما يعني نسبة خطأ مقبولة 5%.", options: ["0.01", "0.05", "0.10", "0.50"], answer: 1 },
{ q: "5. A right-tailed test is appropriate when the alternative hypothesis predicts a:", ar: "يكون اختبار الطرف الأيمن مناسباً عندما تتوقع الفرضية البديلة زيادة أو قيمة أكبر من القيمة المرجعية.", options: ["Decrease in the outcome parameter", "Increase or a value higher than the baseline reference", "Any change regardless of its direction", "No difference or zero change at all"], answer: 1 },
{ q: "6. A left-tailed test is appropriate when the alternative hypothesis predicts a:", ar: "يكون اختبار الطرف الأيسر مناسباً عندما تتوقع الفرضية البديلة نقصاناً أو انخفاضاً عن القيمة المرجعية.", options: ["Increase in the outcome parameter", "Decrease or a value lower than the baseline reference", "Any change regardless of its direction", "No difference or zero change at all"], answer: 1 },
{ q: "7. A two-tailed test is used when the alternative hypothesis predicts:", ar: "يُستخدم الاختبار ذو الطرفين عندما تتوقع الفرضية البديلة وجود أي اختلاف أو تغير، بغض النظر عن اتجاهه (زيادة أو نقصان).", options: ["Only an increase in the parameter value", "Only a decrease in the parameter value", "Any difference or change in either direction from the baseline", "No hypothesis is formally stated"], answer: 2 },
{ q: "8. An example of a two-tailed hypothesis statement is:", ar: "مثال على الفرضية ذات الطرفين: ضغط الدم بعد تناول الدواء لا يساوي ضغط الدم المرجعي (قد يكون أعلى أو أقل).", options: ["Blood pressure is greater than baseline", "Blood pressure is strictly less than baseline", "Blood pressure is not equal to baseline (BP ≠ baseline)", "Blood pressure is exactly equal to baseline"], answer: 2 },
{ q: "9. In most biomedical research studies, which type of test is standard and preferred?", ar: "في معظم أبحاث الطب الحيوي، يُعتبر الاختبار ذو الطرفين (Two-tailed) هو المعيار المفضل لتجنب التحيز.", options: ["One-tailed test", "Two-tailed test", "Random statistical test", "No hypothesis testing at all"], answer: 1 },
{ q: "10. One-tailed tests are generally considered risky because they:", ar: "تُعتبر الاختبارات ذات الطرف الواحد خطيرة عموماً لأنها قد تؤدي إلى رفع معدل الرفض الخاطئ وتتجاهل التغيرات في الاتجاه المعاكس.", options: ["Are less statistically powerful", "Can overlook unexpected differences in the opposite direction and increase error rates", "Require massive sample sizes to be valid", "Cannot be computed by standard software"], answer: 1 },
{ q: "11. Which of the following is a classic example of a parametric statistical test?", ar: "أي مما يلي يُعد مثالاً كلاسيكياً على الاختبارات الإحصائية المعلمية (التي تفترض التوزيع الطبيعي)؟", options: ["Mann–Whitney U test", "Wilcoxon signed-rank test", "Student's t-test", "Kruskal–Wallis test"], answer: 2 },
{ q: "12. The Analysis of Variance (ANOVA) is primarily used to compare means among:", ar: "تحليل التباين (ANOVA) يُستخدم أساساً لمقارنة المتوسطات الحسابية بين ثلاث مجموعات مستقلة أو أكثر.", options: ["Two groups only", "Three or more independent groups", "One group measured at a single time point", "Paired or matched clinical samples"], answer: 1 },
{ q: "13. Non-parametric statistical tests are selected when data assumes:", ar: "يتم اختيار الاختبارات غير المعلمية عندما لا تتبع البيانات توزيعاً محدداً (مثل التوزيع الطبيعي)، أو تكون رتبية.", options: ["A strict normal distribution", "No specific underlying distribution (Distribution-free data)", "An extremely large and clean sample size", "Interval or ratio level scale data exclusively"], answer: 1 },
{ q: "14. The Wilcoxon signed-rank test is the non-parametric alternative to the:", ar: "اختبار ويلكوكسون للرتب الموقعة هو البديل غير المعلمي لاختبار t للعينات المرتبطة (قبل وبعد).", options: ["Independent samples t-test", "Paired samples t-test", "One-way ANOVA", "Pearson correlation test"], answer: 1 },
{ q: "15. The Kruskal–Wallis test serves as the non-parametric alternative to the:", ar: "اختبار كروسكال واليس هو البديل غير المعلمي لتحليل التباين أحادي الاتجاه (One-way ANOVA).", options: ["One-way ANOVA", "Independent samples t-test", "Chi-square test of independence", "Pearson linear correlation"], answer: 0 },
{ q: "16. A major advantage of non-parametric tests over parametric tests is that they are:", ar: "الميزة الكبرى للاختبارات غير المعلمية هي أنها قوية ولا تتأثر بالقيم المتطرفة أو الالتواء الشديد في البيانات.", options: ["Dependent on strict normality assumptions", "Robust to outliers and highly skewed distribution scales", "Always more precise and powerful", "Based purely on calculating mean values"], answer: 1 },
{ q: "17. The Chi-square test of independence is primarily applied to examine association between:", ar: "يُطبق اختبار كاي تربيع للاستقلالية بشكل أساسي لفحص العلاقة أو الارتباط بين المتغيرات الفئوية (Categorical).", options: ["Continuous data variables", "Comparing means of multiple groups", "Testing the association between categorical variables", "Measuring linear correlation coefficient"], answer: 2 },
{ q: "18. The formula for calculating the expected frequency in a contingency table cell is:", ar: "صيغة حساب التكرار المتوقع في خلايا جدول التوافق هي: (مجموع الصف × مجموع العمود) ÷ المجموع الكلي.", options: ["(Row total × Column total) / Grand total", "(Row total / Column total) * Grand total", "(Observed - Expected)² / Expected", "Observed × Expected"], answer: 0 },
{ q: "19. Fisher’s Exact Test is preferred over the Chi-square test when:", ar: "يُفضل استخدام اختبار فيشر الدقيق بدلاً من كاي تربيع عندما يكون التكرار المتوقع في أي خلية أقل من 5.", options: ["The sample size is extremely large", "The expected frequency is greater than or equal to 5", "The expected frequency is less than 5 in any cell of a 2x2 table", "The variables are continuous and normal"], answer: 2 },
{ q: "20. The Chi-square test is most suitable for analyzing which type of variables?", ar: "اختبار كاي تربيع هو الأكثر ملاءمة لتحليل المتغيرات الفئوية/الاسمية (Categorical/Nominal).", options: ["Continuous metrics", "Categorical or nominal variables", "Ratio scales", "Linear regressions"], answer: 1 },
{ q: "21. Which of the following variables is considered a categorical variable?", ar: "أي من المتغيرات التالية يُعتبر متغيراً فئوياً؟", options: ["Systolic Blood pressure", "Serum Cholesterol level", "Biological Gender (Sex)", "Body Height in centimeters"], answer: 2 },
{ q: "22. The formula used to calculate the Chi-square statistic is:", ar: "الصيغة المستخدمة لحساب قيمة اختبار كاي تربيع هي: مجموع مربع (الملاحظ - المتوقع) مقسوماً على المتوقع.", options: ["∑(Observed − Expected)² / Expected", "∑(Expected − Observed)² / Expected", "(Observed - Expected)² / Observed", "Observed / Expected"], answer: 0 },
{ q: "23. The Chi-square goodness-of-fit test is specifically designed to determine if:", ar: "اختبار جودة المطابقة لكاي تربيع مصمم لتحديد ما إذا كان توزيع البيانات الملاحظ يطابق التوزيع المتوقع.", options: ["Two continuous variables are independent", "The observed data distribution matches an expected distribution", "The group means are equal to each other", "A prediction model is completely linear"], answer: 1 },
{ q: "24. Fisher’s Exact Test is highly recommended for small samples because it calculates:", ar: "يُوصى بشدة باختبار فيشر للعينات الصغيرة لأنه يحسب الاحتمالية الدقيقة (Exact probability) بدلاً من التقريبية.", options: ["An approximate value for large tables", "An exact probability rather than a large-sample approximation", "The mean difference between two groups", "The variance within a single population sample"], answer: 1 },
{ q: "25. A t-test is fundamentally utilized to:", ar: "يُستخدم اختبار t بشكل أساسي لمقارنة المتوسطات الحسابية وتحديد ما إذا كانت الفروق دالة إحصائياً.", options: ["Measure a non-linear correlation", "Compare means between groups to see if differences are significant", "Calculate the total population variance", "Classify images or texts"], answer: 1 },
{ q: "26. The null hypothesis (H₀) for an independent samples t-test states that:", ar: "الفرضية الصفرية لاختبار t للعينات المستقلة تنص على أن متوسطات المجموعتين متساوية (لا يوجد فرق حقيقي).", options: ["A massive difference exists between the two means", "The population means of the two groups are equal (μ₁ = μ₂)", "The data lacks normal distribution characteristics", "The two samples are highly dependent on each other"], answer: 1 },
{ q: "27. The alternative hypothesis (H₁) for a t-test suggests that:", ar: "الفرضية البديلة لاختبار t تشير إلى وجود فرق حقيقي دال إحصائياً بين متوسطات المجموعات.", options: ["No change or difference exists", "The group means are perfectly equal", "There is a statistically significant difference between the means", "There is no available data for the test"], answer: 2 },
{ q: "28. A one-sample t-test compares the mean of a single sample to:", ar: "يقارن اختبار t لعينة واحدة متوسط هذه العينة بقيمة معيارية أو متوسط مجتمع معلوم ومحدد مسبقاً.", options: ["The mean of another completely independent sample", "A known, specified baseline standard or population mean", "The means of three or more separate groups", "The variance of the same sample over time"], answer: 1 },
{ q: "29. An independent samples t-test is appropriate for comparing:", ar: "يكون اختبار t للعينات المستقلة مناسباً لمقارنة المتوسطات بين مجموعتين منفصلتين تماماً وغير مرتبطتين.", options: ["The same group measured at two different time periods", "Two entirely separate, unrelated, and independent groups", "Multiple variables measured within a single clinical subject", "Categorical distributions inside a large contingency table"], answer: 1 },
{ q: "30. A paired samples t-test is specifically indicated when:", ar: "يُستطرق اختبار t للعينات المرتبطة عندما يتم قياس نفس الأفراد مرتين (مثل قياس قبل وآخر بعد العلاج).", options: ["The two groups are completely independent and randomized", "The data is purely categorical and nominal", "The same subjects are measured twice under different conditions (e.g., Before/After)", "No statistical variance can be calculated"], answer: 2 },
{ q: "31. Comparing the mean cholesterol levels of smokers versus non-smokers requires an:", ar: "مقارنة متوسط مستويات الكوليسترول بين المدخنين وغير المدخنين تتطلب اختبار t للعينات المستقلة.", options: ["Paired samples t-test", "One-sample t-test", "Independent samples t-test", "Non-parametric sign test"], answer: 2 },
{ q: "32. A major limitation of the standard t-test is that it cannot:", ar: "من العيوب الرئيسية لاختبار t القياسي أنه لا يستطيع مقارنة أكثر من مجموعتين في نفس الوقت.", options: ["Compare means of two groups", "Compare means of three or more groups simultaneously", "Analyze continuous numerical data", "Be applied to small sample sizes"], answer: 1 },
{ q: "33. Which statistical procedure should replace the t-test when comparing three or more group means?", ar: "ما هو الإجراء الإحصائي الذي يحل محل اختبار t عند مقارنة متوسطات ثلاث مجموعات أو أكثر؟ إنه تحليل ANOVA.", options: ["Simple Linear Correlation", "Analysis of Variance (ANOVA)", "Multiple Linear Regression", "Non-parametric Median test"], answer: 1 },
{ q: "34. The non-parametric sign test focuses primarily on evaluating:", ar: "يركز اختبار الإشارة غير المعلمي بشكل أساسي على تقييم اتجاه الاختلافات (+ أو -) بدلاً من قيمتها الكلية.", options: ["The exact numeric values and variances", "The direction of differences (+ or −) between paired observations", "The mean values of large normal distributions", "The ratio of variance between independent groups"], answer: 1 },
{ q: "35. A standard confidence level widely adopted in medical and biological research is:", ar: "مستوى الثقة القياسي المعتمد على نطاق واسع في الأبحاث الطبية والحيوية هو 95%.", options: ["10%", "50%", "95%", "5%"], answer: 2 },
{ q: "36. The Analysis of Variance (ANOVA) evaluates group differences by analyzing:", ar: "تحليل التباين (ANOVA) يقيم الفروق بين المجموعات عبر دراسة التباين بين المجموعات ومقارنته بالتباين داخلها.", options: ["The group medians exclusively", "The individual sample modes", "The variance between groups relative to the variance within groups", "The percentages of categorical outcomes"], answer: 2 },
{ q: "37. The null hypothesis (H₀) for a one-way ANOVA states that:", ar: "الفرضية الصفرية لتحليل التباين أحادي الاتجاه تنص على أن جميع متوسطات المجموعات متساوية تماماً.", options: ["All group means are completely different", "At least one group mean is significantly different", "All population means of the compared groups are equal (μ₁ = μ₂ = μ₃...)", "The population variance is equal to zero"], answer: 2 },
{ q: "38. A two-way ANOVA is distinct because it allows the researcher to test:", ar: "يتميز تحليل ANOVA ثنائي الاتجاه بأنه يسمح للباحث باختبار تأثير عاملين مستقلين وتفاعلهما المشترك.", options: ["Only one independent factor with two outcomes", "The effects of two independent categorical factors and their interaction on a continuous variable", "The correlation between two non-normal variables", "The difference between two sample medians"], answer: 1 },
{ q: "39. Factorial ANOVA is a term used when the research design includes:", ar: "يُطلق مصطلح ANOVA العاملي عندما تتضمن الدراسة عاملين مستقلين (متغيرين مستقليْن) أو أكثر معاً.", options: ["Only a single independent variable", "Exactly two paired samples", "Multiple independent categorical factors studied simultaneously", "Only three-way designs"], answer: 2 },
{ q: "40. To perform a standard one-way ANOVA, the independent variable must be:", ar: "لإجراء تحليل ANOVA أحادي الاتجاه، يجب أن يكون المتغير المستقل فئوياً ويحتوي على 3 مجموعات أو أكثر.", options: ["A continuous metric scale", "A categorical variable with three or more distinct groups", "A single binary indicator", "An ordinal rank with zero variance"], answer: 1 },
{ q: "41. Which of the following scenario is appropriate for a one-way ANOVA?", ar: "أي السيناريوهات التالية مناسب لإجراء تحليل ANOVA أحادي الاتجاه؟ مقارنة كفاءة 3 أدوية ضغط مختلفة.", options: ["Comparing blood pressure before and after one drug treatment", "Comparing the efficacy of three different blood pressure medications", "Testing the correlation between age and cholesterol", "Evaluating a single patient's recovery rate over a year"], answer: 1 },
{ q: "42. Analysis of Covariance (ANCOVA) is a statistical technique that combines:", ar: "تحليل التباين المصاحب (ANCOVA) هو تقنية تجمع بين تحليل التباين (ANOVA) والتحليل الانحداري (Regression).", options: ["ANOVA and non-parametric correlation tests", "ANOVA and linear regression analysis", "Mean testing and median testing formulas", "Variance calculations and descriptive summaries"], answer: 1 },
{ q: "43. ANCOVA is specifically used to adjust and control the dependent variable for the effects of:", ar: "يُستخدم ANCOVA خصيصاً لتعديل وضبط المتغير التابع من تأثيرات المتغيرات المصاحبة المستمرة (Covariates).", options: ["The primary categorical factor size", "Continuous continuous variables known as covariates (confounders)", "The overall sample size", "The total number of study groups"], answer: 1 },
{ q: "44. The main advantage of using ANCOVA in clinical trials is to:", ar: "الميزة الرئيسية لاستخدام ANCOVA في التجارب السريرية هي زيادة دقة الاختبار عبر تحييد وإزالة أثر المتغيرات المربكة.", options: ["Simplify the manual computational process", "Compare only two groups with non-normal data", "Increase statistical power and precision by removing variations caused by confounding variables", "Artificially increase the study's error variance"], answer: 2 },
{ q: "45. Correlation is a statistical measure that describes:", ar: "الارتباط هو مقياس إحصائي يصف قوة واتجاه العلاقة الخطية بين متغيرين رقميين.", options: ["A strict cause-and-effect mechanism", "The strength and direction of a linear relationship between two variables", "The absolute difference between group means", "The experimental manipulation of a clinical group"], answer: 1 },
{ q: "46. The value of the correlation coefficient (r) must always fall within the range of:", ar: "يجب أن تقع قيمة معامل الارتباط (r) دائماً في النطاق بين -1.0 و +1.0.", options: ["0 to 100", "−10 to +10", "−1.0 to +1.0", "0 to 1"], answer: 2 },
{ q: "47. A positive correlation coefficient indicates that as one variable increases, the other variable:", ar: "معامل الارتباط الإيجابي (الطردي) يشير إلى أنه كلما زاد أحد المتغيرين، فإن المتغير الآخر يميل إلى الزيادة أيضاً.", options: ["Decreases in a predictable manner", "Remains completely constant and unchanged", "Tends to increase as well", "Moves in a random and unpredictable direction"], answer: 2 },
{ q: "48. A negative correlation coefficient indicates that as one variable increases, the other variable:", ar: "معامل الارتباط السلبي (العكسي) يشير إلى أنه كلما زاد أحد المتغيرين، يميل المتغير الآخر إلى الانخفاض.", options: ["Increases at the same rate", "Tends to decrease", "Stays completely stable", "Becomes zero immediately"], answer: 1 },
{ q: "49. A correlation coefficient value of r = 0.75 is interpreted as a:", ar: "قيمة معامل ارتباط تبلغ r = 0.75 تُفسر على أنها ارتباط طردي قوي.", options: ["Weak positive correlation", "Moderate negative correlation", "Strong positive correlation", "Very weak non-significant relationship"], answer: 2 },
{ q: "50. A correlation coefficient value of r = 0.10 indicates a relationship that is:", ar: "قيمة معامل ارتباط تبلغ r = 0.10 تشير إلى وجود علاقة ضعيفة جداً أو شبه منعدمة بين المتغيرين.", options: ["Very strong and highly predictable", "Weak or almost non-existent linear relationship", "Moderately stable and reliable", "Perfectly inverse"], answer: 1 },
{ q: "51. Which of the following correlation coefficients represents the strongest relationship?", ar: "أي من معاملات الارتباط التالية يمثل العلاقة الأقوى بين المتغيرين؟ (الأقرب للقيمة المطلقة 1).", options: ["0.25", "−0.45", "0.85", "0.10"], answer: 2 },
{ q: "52. The Phi coefficient (φ) is a specialized correlation measure used exclusively when:", ar: "معامل فاي (φ) هو مقياس ارتباط متخصص يُستخدم حصرياً عندما يكون كلا المتغيرين ثنائيين (Binary).", options: ["Both variables are continuous and normal", "Both variables are binary or dichotomous (e.g., Yes/No)", "One variable is ordinal and one is ratio", "Data consists of large ranks and scales"], answer: 1 },
{ q: "53. Pearson product-moment correlation (r) requires that both variables are:", ar: "يتطلب ارتباط بيرسون (r) أن يكون كلا المتغيرين مستمرين وموزعين توزيعاً طبيعياً.", options: ["Purely ordinal rankings", "Dichotomous and binary indicators", "Continuous metric scales and normally distributed", "Completely independent categorical categories"], answer: 2 },
{ q: "54. Point-biserial correlation is the appropriate method to use when:", ar: "الارتباط النقطي ثنائي السلسلة هو الطريقة المناسبة عندما يكون أحد المتغيرين ثنائياً والآخر مستمراً.", options: ["Both variables are continuous scales", "Both variables are nominal categories", "One variable is naturally dichotomous and the other is a continuous scale", "The data involves multi-group rankings"], answer: 2 },
{ q: "55. The primary overarching goal of medical bioinformatics is to:", ar: "الهدف الشامل للمعلوماتية الحيوية الطبية هو استخدام الأدوات الحوسبية لتحليل البيانات الحيوية وتحسين الرعاية.", options: ["Replace hospital physicians with autonomous robots", "Use computational tools and models to analyze biological data for improving healthcare", "Store financial spreadsheets of medical institutions", "Cancel all laboratory diagnostics and imaging protocols"], answer: 1 },
{ q: "56. Machine learning models in bioinformatics are increasingly applied to analyze:", ar: "تُطبق نماذج التعلم الآلي في المعلوماتية الحيوية بشكل متزايد لتحليل الصور الطبية وتصنيفها بدقة.", options: ["X-ray, MRI, and complex medical diagnostic images", "DNA replication hardware parts", "Hospital monthly budget sheets", "Pharmaceutical international shipping tracking data"], answer: 0 },
{ q: "57. The paradigm of personalized (precision) medicine relies heavily on analyzing a patient's:", ar: "يعتمد نموذج الطب الشخصي الدقيق بشكل كبير على تحليل التركيب الجيني الفريد لكل مريض لتفصيل العلاج.", options: ["General daily lifestyle choices only", "Unique genetic makeup and biomarker profiles", "Attending physician's age and experience", "Hospital physical clinic size and geography"], answer: 1 },
{ q: "58. Artificial Intelligence assists in the drug discovery pipeline primarily by:", ar: "يساعد الذكاء الاصطناعي في عملية اكتشاف الأدوية بشكل أساسي عبر فحص وتوقع ملايين المركبات الكيميائية بسرعة.", options: ["Predicting and analyzing interactions of millions of chemical compounds rapidly", "Physically manufacturing medicine bottles", "Completely skipping all human clinical safety trials", "Replacing retail pharmacists in community pharmacies"], answer: 0 },
{ q: "59. Why is bioinformatics considered essential for modern molecular medicine?", ar: "لماذا تُعتبر المعلوماتية الحيوية أساسية للطب الجزيئي الحديث؟ لأنها تحلل كميات هائلة من البيانات الجينية المعقدة.", options: ["It reduces the number of working nurses", "It provides mechanisms to handle and interpret massive genomic data to tailor treatments", "It replaces clinical patient history forms", "It focuses exclusively on behavioral psychological evaluations"], answer: 1 },
{ q: "60. Which of the following represents a common data type managed in bioinformatics pipelines?", ar: "أي مما يلي يمثل نوعاً شائعاً من البيانات التي يتم إدارتها والتعامل معها في خطوط تحليل المعلوماتية الحيوية؟", options: ["High-throughput DNA and RNA sequences", "Macroeconomic weather indicators", "Urban traffic density logs", "Hospital insurance billing sheets"], answer: 0 },
{ q: "61. Artificial Intelligence helps clinicians in oncology by:", ar: "يساعد الذكاء الاصطناعي الأطباء في مجال الأورام عن طريق رصد وتحديد ملامح الأورام بدقة في صور الأشعة.", options: ["Detecting and segmenting tumors automatically in medical scans", "Taking full legal responsibility for surgeries", "Building hospital structures and physical spaces", "Managing patient financial billing accounts"], answer: 0 },
{ q: "62. Machine learning algorithms can predict patient disease susceptibility by integrating:", ar: "تستطيع خوارزميات التعلم الآلي التنبؤ بقابلية المريض للإصابة بالمرض عبر دمج البيانات الجينية والسريرية والبيئية.", options: ["The patient's preferred diet and culinary tastes", "Genetic, clinical history, and environmental lifestyle datasets", "The clinic's commercial brand name", "The cursive handwriting style of the physician"], answer: 1 },
{ q: "63. A major technical limitation of current AI models applied in clinical settings is that they:", ar: "من العيوب التقنية الكبرى لنماذج الذكاء الاصطناعي الحالية هي اعتمادها الشديد على جودة ونظافة البيانات المدخلة.", options: ["Depend heavily on extremely high-quality, standardized, and unbiased training data", "Have completely eliminated the necessity of human medical expertise", "Are always 100% accurate without any probability of error", "Do not exhibit any algorithmic or data-driven bias"], answer: 0 },
{ q: "64. What is a primary data-related challenge currently faced in bioinformatics?", ar: "ما هو التحدي الرئيسي المتعلق بالبيانات والذي تواجهه المعلوماتية الحيوية حالياً؟ التعامل مع الأحجام الهائلة والضخمة.", options: ["A total absence of human diseases to study", "Managing the massive, multi-terabyte volume and storage requirements of genetic data", "A complete lack of computational servers and internet infrastructure", "Analytical calculations are no longer needed"], answer: 1 },
{ q: "65. Why is deciphering genetic data challenging for standard clinical computation?", ar: "لماذا يمثل فك تشفير البيانات الجينية تحدياً للحوسبة الطبية القياسية؟ لأن الأنظمة البيولوجية معقدة للغاية ومتشابكة.", options: ["DNA molecules are too small to be physically visualized", "Genes change their sequence structure every single hour", "Biological pathways represent highly complex, non-linear, and interconnected networks", "Genetic profiles are not clinically relevant to diseases"], answer: 2 },
{ q: "66. Why is it ethically imperative to implement strict security protocols for patient genomic data?", ar: "لماذا من الضروري أخلاقياً تطبيق بروتوكولات أمنية صارمة على بيانات المرضى الجينية؟ لأنها بيانات سرية وحساسة للغاية.", options: ["To reduce the server's electrical consumption costs", "Genomic sequence datasets are highly inexpensive to recreate", "Because genomic data is deeply personal, immutable, and sensitive to patient privacy", "To make it easier to share openly on social media"], answer: 2 },
{ q: "67. A major current workforce challenge in the field of clinical bioinformatics is:", ar: "من أبرز التحديات الحالية المتعلقة بالقوى العاملة في مجال المعلوماتية الحيوية السريرية هو النقص الحاد في المتخصصين المشتركين.", options: ["An overabundance of dual-trained medical and computational experts", "A severe global shortage of specialized professionals trained in both biology and data science", "Computational software has rendered human experts obsolete", "Viruses and pathogens are no longer discovered"], answer: 1 },
{ q: "68. Computational errors or misalignments in clinical bioinformatics pipelines can lead directly to:", ar: "الأخطاء الحوسبية أو الخلل في محاذاة التتابعات الجينية قد يؤدي مباشرة إلى تشخيص خاطئ أو وضع خطة علاجية ضارة.", options: ["Accelerated and miraculous patient healing rates", "Perfect diagnostic accuracy scores across all hospitals", "Incorrect medical diagnosis or ineffective, potentially harmful treatment selections", "Zero practical impact on the clinical workflow"], answer: 2 },
{ q: "69. In personalized medicine, targeted therapies are selected based on matching treatments to:", ar: "في الطب الشخصي، يتم اختيار العلاجات الموجهة بناءً على مطابقة الدواء مع الطفرات الجينية المحددة للمريض وحالته.", options: ["The chronological age of the patient exclusively", "A set of random non-clinical options", "The patient’s exact genetic mutations and molecular disease profile", "The personal aesthetic choice of the clinical institution"], answer: 2 },
{ q: "70. Bioinformatics tools accelerate the pharmaceutical pipeline by dramatically:", ar: "تُسرع أدوات المعلوماتية الحيوية خطوط إنتاج الأدوية بشكل كبير عن طريق تقليل الوقت والتكلفة اللازمين للفحص المخبري.", options: ["Increasing the market cost of new therapeutic agents", "Reducing the time and financial cost required for empirical pre-clinical drug screening", "Avoiding all safety protocols and lab documentation requirements", "Restricting evaluation to large animal testing models exclusively"], answer: 1 },
{ q: "71. Targeted oncological therapy, like tyrosine kinase inhibitors, depends on discovering specific:", ar: "تعتمد العلاجات السرطانية الموجهة (مثل مثبطات التيراوزين كينيز) على اكتشاف طفرات جينية محددة مثل طفرة EGFR.", options: ["Subjective patient symptoms like mild nausea", "Genetic mutations within the tumor cells (e.g., EGFR mutations)", "Chronological age thresholds of the patient", "Dietary and caloric habits of the clinical subject"], answer: 1 },
{ q: "72. Pharmacogenomics, a core branch of bioinformatics, enables medical practitioners to:", ar: "علم الصيدلة الجيني (أحد الفروع الأساسية للمعلوماتية الحيوية) يمكن الممارسين الصحيين من اختيار الدواء والجرعة الأنسب.", options: ["Delay therapeutic intervention intentionally", "Administer the exact same drug dose to all global populations blindly", "Predict a patient's drug response to select the safest drug and optimal dosage", "Skip all safety baseline testing before chemotherapy"], answer: 2 },
{ q: "73. Bioinformatics enhances diagnostic precision in complex diseases by combining:", ar: "تُعزز أدوات المعلوماتية الحيوية دقة التشخيص في الأمراض المعقدة من خلال دمج المؤشرات الحيوية المتعددة مع الذكاء الاصطناعي.", options: ["Data deletion and compression algorithms", "Multi-omic biomarkers with advanced artificial intelligence classification models", "Manual paper records and unstandardized archives", "Traditional physical charts exclusively"], answer: 1 },
{ q: "74. A molecular biomarker is formally defined as a:", ar: "المؤشر الحيوي الجزيئي يُعرف رسمياً بأنه مؤشر حيوي قابل للقياس والتقييم بشكل موضوعي ليدل على حالة بيولوجية أو مرضية.", options: ["New class of oral capsule or chemical pill", "Measurable and objectively evaluated indicator of a normal or pathogenic biological state", "Type of advanced high-voltage X-ray hardware", "Subjective clinical complaint reported by the family"], answer: 1 },
{ q: "75. Genomic sequence data requires a higher tier of cybersecurity protection because:", ar: "تتطلب بيانات التتابع الجيني مستوى أعلى من الحماية السيبرانية لأنها بيانات فريدة وحساسة للغاية ولا يمكن تغييرها.", options: ["It is medically irrelevant and completely temporary", "It updates and mutates its code on a daily basis", "It is uniquely identifiable, immutable, and carries health predictions for the individual and relatives", "It is public domain property"], answer: 2 },
{ q: "76. Genetic discrimination is defined as an ethical violation occurring when:", ar: "التمييز الجيني هو انتهاك أخلاقي يحدث عندما يستغل أرباب العمل أو شركات التأمين المخاطر الجينية للشخص ضده.", options: ["Clinical data is accidentally deleted from servers", "Employers or insurers use an individual's genetic risk factors unfairly to deny jobs or coverage", "A patient refuses to undergo standard genomic screening", "A hospital changes its medical record encryption software"], answer: 1 },
{ q: "77. In genetic testing, obtaining informed consent strictly requires ensuring the patient has:", ar: "الحصول على الموافقة المستنيرة في الفحص الجيني يتطلب بدقة ضمان فهم المريض الكامل للمخاطر والمنافع والخصوصية.", options: ["Signed a legal form without reviewing its contents", "A full, comprehensive understanding of the test's scope, potential risks, benefits, and privacy implications", "Allowed the attending physician to make the final choice autonomously", "Paid the diagnostic fees prior to sample collection"], answer: 1 },
{ q: "78. A patient's genomic profile can impact their biological relatives because genetic data:", ar: "الملف الجيني للمريض قد يؤثر على أقاربه لأن المعلومات الجينية والصفات الوراثية مشتركة بين أفراد العائلة البيولوجية.", options: ["Is purely individual and has zero external predictive capacity", "Is naturally shared and inherited among biological family members", "Changes entirely when a person interacts with relatives", "Is strictly temporary and dissipates with age"], answer: 1 },
{ q: "79. A prominent psychological risk associated with undergoing predictive genetic testing is:", ar: "من المخاطر النفسية البارزة المصاحبة لإجراء الفحوصات الجينية التنبؤية هو حدوث القلق الحاد والتوتر بسبب النتائج.", options: ["Uncontrollable clinical joy and immediate physical healing", "Acute anxiety, distress, or depression regarding future chronic disease probabilities", "A complete permanent loss of physical eyesight", "An immediate alteration in personality metrics"], answer: 1 },
{ q: "80. Ethical debates regarding 'data ownership' in biobanks center on determining:", ar: "تتمحور النقاشات الأخلاقية حول 'ملكية البيانات' في البنوك الحيوية حول من يملك ويتحكم في استخدام عينات البيانات الجينية.", options: ["The physical cost of local computer hardware and network cables", "Who owns, controls, and profits from commercialized human genetic datasets and biological samples", "The total processing speed of the computational servers", "The formal naming conventions of newly discovered viral pathogens"], answer: 1 },
{ q: "81. Algorithmic bias in medical machine learning tools can result in:", ar: "التحيز الخوارزمي في أدوات التعلم الآلي الطبي قد يؤدي إلى تفاوتات غير عادلة ومخرجات رعاية صحية سيئة للمجموعات المهمشة.", options: ["Perfect, objective equality in healthcare delivery across all ethnicities", "Artificially high diagnostic test scores for all patients", "Systemic inequalities and poor healthcare outcomes for underrepresented demographic groups", "An exponential increase in the speed of industrial chemical manufacturing"], answer: 2 },
{ q: "82. The application of CRISPR gene-editing technology raises profound ethical concerns regarding:", ar: "تطبيق تقنية التعديل الجيني كريسبر يثير مخاوف أخلاقية عميقة تتعلق بإمكانية إنتاج (أطفال بمواصفات مصممة تجميلياً).", options: ["The speed of standard local area network connections", "The potential creation of 'designer babies' with non-medical cosmetic genetic enhancements", "The migration of healthcare database registers to cloud servers", "The basic utilization of web browsing software"], answer: 1 },
{ q: "83. A primary cybersecurity threat specific to large genomic databases is the risk of:", ar: "من مهددات الأمن السيبراني الرئيسية لقواعد البيانات الجينية الضخمة هو خطر الاختراق والتسريب وإعادة التعرف على الهوية.", options: ["Massive local file deletion due to simple hardware dust accumulation", "Malicious hacking, data breaches, and re-identification attacks on anonymized samples", "A systematic slowing down of local descriptive analytic calculations", "A severe global shortage of physical human chromosomes to store"], answer: 1 }
],
ip: [
{ q: "1. What is Intellectual Property (IP)?", ar: "ما هي الملكية الفكرية؟ هي إبداعات العقل والابتكارات التي يحميها القانون.", options: ["Physical real estate and buildings owned by individuals", "Creations of the human mind protected by legal frameworks like patents and copyrights", "Liquid cash assets stored in international banking accounts", "Public domain materials available to anyone without restriction"], answer: 1 },
{ q: "2. Which of the following is protected under Copyright law?", ar: "ما الذي تحميه قوانين حق المؤلف (Copyright)؟ تحمي المصنفات الأدبية والفنية كالأصول الموسيقية والكتب والبرمجيات.", options: ["Industrial manufacturing inventions", "Commercial corporate logos and slogans", "Original literary, artistic, musical works, and software code", "Product visual aesthetic designs"], answer: 2 },
{ q: "3. The primary purpose of a Patent is to protect:", ar: "الغرض الأساسي من براءة الاختراع هو حماية الاختراعات والعمليات التقنية الجديدة والقابلة للتطبيق الصناعي.", options: ["A company's commercial brand reputation", "New, useful, and non-obvious inventions or technical processes", "Original musical scores and theatrical plays", "Confidential business customer lists and secret formulas"], answer: 1 },
{ q: "4. Trademarks are legally designed to protect:", ar: "العلامات التجارية مصممة قانونياً لحماية الهوية والمؤشرات التجارية كالشعارات والأسماء التي تميز المنتجات.", options: ["Novel mechanical mechanisms and industrial machines", "Brand identifiers like logos, business names, distinctive symbols, and slogans", "The source code of operating system software", "Proprietary secret manufacturing chemical formulas"], answer: 1 },
{ q: "5. Trade Secrets law protects which type of information?", ar: "ما الذي تحميه قوانين الأسرار التجارية؟ تحمي المعلومات التجارية السرية التي تمنح ميزة تنافسية (مثل التركيبات السرية).", options: ["Information published openly in international science journals", "Confidential commercial information that provides a competitive edge (e.g., Coca-Cola formula)", "Works that have entered the public domain after expiration", "Trademarks registered officially with government offices"], answer: 1 },
{ q: "6. Industrial Designs protection focuses exclusively on:", ar: "يركز نظام حماية التصاميم الصناعية حصرياً على المظهر الخارجي الجمالي أو الشكلي للمنتج.", options: ["The functional or mechanical utility of a device", "The visual aesthetic look, shape, or ornamentation of a commercial product", "The underlying computational source code of a platform", "The legal corporate identity name of a manufacturer"], answer: 1 },
{ q: "7. WIPO is a specialized global agency that stands for:", ar: "منظمة WIPO هي وكالة عالمية متخصصة ترمز لـ: المنظمة العالمية للملكية الفكرية.", options: ["World International Property Alliance", "World Intellectual Property Organization", "World Invention and Patent Office", "Western Intellectual Protection Organization"], answer: 1 },
{ q: "8. A standard utility patent generally provides legal protection for a duration of:", ar: "توفر براءة الاختراع القياسية عادةً حماية قانونية للمبتكر تدوم لمدة 20 عاماً من تاريخ إيداع الطلب.", options: ["10 years", "20 years from the formal filing date", "50 years", "The lifetime of the individual inventor"], answer: 1 },
{ q: "9. Copyright protection for an individual author typically lasts for:", ar: "تستمر حماية حق المؤلف للمصنفات الفردية طوال حياة المؤلف بالإضافة إلى 50 أو 70 عاماً بعد وفاته حسب النظام.", options: ["10 years following initial publication", "20 years fixed duration", "The entire lifetime of the author plus 50 to 70 years post-mortem", "Indefinitely without any legal expiration date"], answer: 2 },
{ q: "10. Can a Trademark registration be renewed indefinitely?", ar: "هل يمكن تجديد تسجيل العلامة التجارية إلى الأبد؟ نعم، طالما أنها قيد الاستخدام التجاري الفعلي ويتم دفع رسوم التجديد دورياً.", options: ["No, it has a maximum absolute life of 20 years", "Yes, provided it remains in active commercial use and renewal fees are paid periodically", "No, it expires permanently after 50 years", "Only if the trademark is owned by a government body"], answer: 1 },
{ q: "11. What is the legal concept of 'Fair Use' in copyright law?", ar: "ما هو المفهوم القانوني لـ 'الاستخدام العادل'؟ هو استثناء يسمح باستخدام محدود للمواد المحمية دون إذن لأغراض كالتعليم والنقد.", options: ["The right to copy a whole textbook and sell it for profit", "A legal exception allowing limited use of copyrighted material without permission for criticism, education, or news reporting", "Using patented industrial machinery without a license", "Registering another person's logo under your own name"], answer: 1 },
{ q: "12. Intellectual Property (IP) infringement is defined as:", ar: "انتهاك الملكية الفكرية يُعرف بأنه: الاستخدام أو النسخ أو الاستغلال غير المصرح به للأصول الفكرية المحمية قانوناً.", options: ["The lawful purchase of an authorized product or book", "The unauthorized use, copying, or exploitation of legally protected IP assets", "Filing a completely new patent application at the office", "Sharing open-source public scientific research data sets"], answer: 1 },
{ q: "13. Geographical Indications (GI) protect products based on:", ar: "تحمي المؤشرات الجغرافية (GI) المنتجات بناءً على منشئها الجغرافي المحدد والخصائص أو السمعة المرتبطة بهذا المكان.", options: ["The market retail price of the manufactured item", "A specific geographical origin and the unique quality or reputation attributable to that location", "The age and academic degree of the primary artisan", "The computational machinery type utilized in production"], answer: 1 },
{ q: "14. Plagiarism is distinct from IP infringement and is primarily an ethical issue of:", ar: "السرقة الأدبية تختلف عن انتهاك الملكية الفكرية، وهي قضية أخلاقية تتمثل في نسبة أعمال الآخرين وأفكارهم لنفسك.", options: ["Stealing physical money from a library or laboratory", "Passing off someone else's intellectual work or ideas as one's own without proper attribution", "Using a registered corporate logo without paying royalties", "Breaching a signed non-disclosure corporate secret agreement"], answer: 1 },
{ q: "15. Software source code is unique because it can be protected by both:", ar: "يتميز الكود المصدري للبرمجيات بأنه فريد حيث يمكن حمايته بقانون حق المؤلف كإصدار أدبي، وبقانون الأسرار التجارية.", options: ["Copyright law (as a literary work) and Trade Secrets law", "Trademarks and Industrial Designs exclusively", "Patents and Geographical Indications only", "Plant Variety Protection and Trademarks law"], answer: 0 },
{ q: "16. To qualify for a patent, an invention must meet three core criteria:", ar: "لكي يحصل الاختراع على براءة، يجب أن يستوفي ثلاثة شروط أساسية: الجدة (أن يكون جديداً)، والخطوة الابتكارية، والقابلية للتطبيق الصناعي.", options: ["Be highly expensive, complex, and developed by a corporation", "Be entirely novel, possess an inventive step (non-obvious), and be industrially applicable", "Be kept completely secret from the public forever", "Be formally approved by an academic university committee"], answer: 1 },
{ q: "17. The symbol ® indicates that a trademark is:", ar: "الرمز ® يشير إلى أن العلامة التجارية مسجلة رسمياً لدى مكتب العلامات الحكومي وتحت حماية القانون بالكامل.", options: ["Unregistered but claimed by a local business entity", "Officially registered with a government trademark office and fully protected by law", "Protected under international copyright frameworks", "Subject to an open active patent application"], answer: 1 },
{ q: "18. The symbol © is used to notify the public of:", ar: "يُستخدم الرمز © لإخطار الجمهور بأن المصنف محمي بحقوق النشر والتأليف (Copyright).", options: ["An active commercial utility patent application", "A pending industrial design registration status", "A claim of copyright protection over an original work", "A trade secret category designation"], answer: 2 },
{ q: "19. Works that are in the 'Public Domain' are those that:", ar: "المصنفات الموجودة في 'الملك العام' هي تلك التي انتهت مدة حمايتها الفكرية، وبالتالي يمكن للجميع استخدامها مجاناً.", options: ["Are owned exclusively by a multi-national corporate entity", "Have expired intellectual property rights and are completely free for public use without permission", "Are classified as high-level national military secrets", "Have been stolen from a creative author without tracking"], answer: 1 },
{ q: "20. What is the official government entity responsible for intellectual property in Saudi Arabia?", ar: "ما هي الجهة الحكومية الرسمية المسؤولة عن أنظمة وحماية الملكية الفكرية في المملكة العربية السعودية؟ هي الهيئة السعودية للملكية الفكرية (SAIP).", options: ["Saudi Arabian Patent Association (SAPA)", "Saudi Authority for Intellectual Property (SAIP)", "Saudi Intellectual Property Bureau (SIPB)", "Saudi National Inventions Organization (SNIO)"], answer: 1 }
],
 path: [
{ q: "1. Pathology is formally defined as the scientific study of:", ar: "علم الأمراض يُعرف رسمياً بأنه الدراسة العلمية لطبيعة الأمراض وأسبابها وآلياتها وتأثيراتها البنيوية والوظيفية على الجسم.", options: ["Normal human anatomy and physiological parameters", "Diseases, including their essential causes, mechanisms of development, and structural/functional changes", "The synthesis and manufacturing of pharmaceutical agents", "Human psychiatric behavior and social interactions"], answer: 1 },
{ q: "2. Cell injury transition from reversible to irreversible is marked by:", ar: "يتميز انتقال إصابة الخلية من مرحلة المرتجعة إلى غير المرتجعة بحدوث تلف شديد ودائم في الميتوكوندريا وأغشية الخلايا.", options: ["Severe, permanent damage to mitochondrial function and cell membrane integrity", "Mild, transient intracellular swelling and blebbing", "A temporary reduction in the overall rate of protein synthesis", "The accumulation of glycogen particles in the cytoplasm"], answer: 0 },
{ q: "3. Apoptosis is characteristically described as:", ar: "الموت الخلوي المبرمج (Apoptosis) يُوصف بأنه موت خلوي منظم ومبرمج جينياً، لا يسبب التهاباً للأنسجة المحيطة.", options: ["Accidental and unregulated cell death resulting from severe external trauma", "Programmed, highly regulated cell death that eliminates unwanted cells without inducing inflammation", "Cellular death caused exclusively by a severe acute lack of oxygen (ischemia)", "The rapid and uncontrolled malignant proliferation of altered cells"], answer: 1 },
{ q: "4. Necrosis is a process that is always considered:", ar: "عملية التنخر النسيجي (Necrosis) هي عملية مرضية دائماً (غير طبيعية) وتكون مصحوبة دائماً بحدوث التهاب حاد.", options: ["A normal, programmed physiological mechanism for tissue remodeling", "A pathological process resulting from severe irreversible injury, always accompanied by inflammation", "A reversible phase of cellular adaptation to stressful conditions", "Beneficial to the survival and function of adjacent cell networks"], answer: 1 },
{ q: "5. Coagulative necrosis is the characteristic pattern typically seen in:", ar: "التنخر التجلطي هو النمط الكلاسيكي النموذجي المصاحب لاحتشاء وموت الأنسجة في الأعضاء الصلبة (مثل القلب والكلى)، باستثناء الدماغ.", options: ["Ischemic infarctions of the central nervous system (brain)", "Ischemic infarctions of solid visceral organs such as the heart, kidney, and spleen", "Severe localized acute bacterial and fungal infections", "Granulomatous lesions associated with pulmonary tuberculosis"], answer: 1 },
{ q: "6. Liquefactive necrosis is typically characteristic of:", ar: "التنخر التميعي يميز بشكل أساسي احتشاءات الدماغ (الجهاز العصبي المركزي) والالتهابات البكتيرية الموضعية التي تنتج صديداً.", options: ["Myocardial infarctions and renal ischemic events", "Infarctions within the central nervous system (brain) and focal suppurative bacterial infections", "Chronic mycobacterial infections like tuberculosis", "Acute enzymatic destruction seen in acute pancreatitis"], answer: 1 },
{ q: "7. Caseous necrosis is a distinct form found characteristically in:", ar: "التنخر الجبني (الشبيه بالجبن) هو شكل مميز من الموت النسيجي يظهر نموذجياً في بؤر عدوى مرض السل (Tuberculosis).", options: ["Ischemic myocardial necrosis", "Infections caused by Mycobacterium tuberculosis (Tuberculosis)", "Acute pancreatic fat necrosis secondary to enzyme leakage", "Tertiary syphilitic lesions known as gummas"], answer: 1 },
{ q: "8. Acute inflammation is clinically and histologically characterized by:", ar: "يتميز الالتهاب الحاد نسيجياً وسريرياً ببدايته السريعة (خلال دقائق أو ساعات)، وخروج السوائل (الوذمة)، وتراكم خلايا النيوتروفيل.", options: ["A slow, insidious onset dominated by lymphocytes and tissue fibrosis", "Rapid onset (minutes/hours), fluid exudation (edema), and extensive neutrophil accumulation", "The formation of structured epithelioid granulomas", "The replacement of normal tissue architecture with permanent dense scar tissue"], answer: 1 },
{ q: "9. The five cardinal signs of acute inflammation include:", ar: "العلامات الخمس الأساسية للالتهاب الحاد هي: الحرارة (الدفء)، الاحمرار، التورم، الألم، وفقدان الوظيفة.", options: ["Pallor, hypothermia, tissue shrinkage, numbness, and rigid immobility", "Heat (calor), redness (rubor), swelling (tumor), pain (dolor), and loss of function (functio laesa)", "Fibrosis, intracellular calcification, atrophy, apoptosis, and amyloidosis", "Atrophy, hypertrophy, hyperplasia, metaplasia, and dysplasia"], answer: 1 },
{ q: "10. The predominant cellular components involved in chronic inflammation are:", ar: "الخلايا الرئيسية والمهيمنة في بؤر الالتهاب المزمن هي الخلايا البلعمية (Macrophages) والخلايا الليمفاوية (Lymphocytes).", options: ["Neutrophils and blood platelets", "Macrophages, lymphocytes, and plasma cells", "Eosinophils and basophilic granulocytes", "Erythrocytes and endothelial cells"], answer: 1 },
{ q: "11. Granulomatous inflammation is a specialized morphological pattern of:", ar: "الالتهاب الحبيبي هو نمط شكلي خاص ومتميز من أنماط الالتهاب المزمن (يتميز بتجمع خلايا الماكروفاج المتحولة).", options: ["Acute inflammation responding to pyogenic bacteria", "Chronic inflammation characterized by collections of activated macrophages or epithelioid cells", "Reversible adaptive responses seen in epithelial tissues", "Malignant cellular transformations in connective tissues"], answer: 1 },
{ q: "12. Hypertrophy is formally defined as an:", ar: "الضخامة (Hypertrophy) تُعرف رسمياً بأنها زيادة في حجم الخلايا الفردية، مما يؤدي بالتالي إلى زيادة حجم العضو المصاب.", options: ["Increase in the total absolute number of cells within a tissue", "Increase in the size of individual cells, leading to an increase in the size of the organ", "Reversible substitution of one mature cell type by another adult cell type", "Abnormal, disordered cellular development and architectural loss"], answer: 1 },
{ q: "13. Hyperplasia is formally defined as an:", ar: "فرط التنسج (Hyperplasia) يُعرف رسمياً بأنه زيادة في عدد الخلايا الفردية داخل النسيج أو العضو نتيجة انقسامها.", options: ["Increase in the volume and structural size of individual cells", "Increase in the absolute number of cells within an organ or tissue in response to a stimulus", "Disordered, pre-cancerous cellular growth pattern", "Shrinkage in cell size due to a loss of nutritional support"], answer: 1 },
{ q: "14. Metaplasia represents a cellular adaptation characterized by:", ar: "التحول النسيجي (Metaplasia) هو تكيف خلوي يتميز باستبدال نوع خلية بالغة بنوع خلية بالغة أخرى لتتحمل بيئة قاسية.", options: ["An uncontrolled, autonomous malignant cellular proliferation", "A reversible change in which one adult cell type is replaced by another adult cell type", "A progressive decrease in cell number and size within a tissue", "A complete failure of a primitive organ to develop during embryonic life"], answer: 1 },
{ q: "15. Dysplasia is histologically characterized by:", ar: "عسر التنسج (Dysplasia) يتميز نسيجياً بنمو غير منظم وفقدان للترتيب المعماري وتغيرات خلوية غير طبيعية (تعتبر مرحلة قبل سرطانية).", options: ["Perfectly coordinated adaptive tissue restructuring", "Disordered growth, atypical cellular features, and loss of architectural orientation (pre-cancerous)", "A fully benign, non-progressive adaptive process that never transforms", "Programmed cell death designed to clean up defective cells"], answer: 1 },
{ q: "16. Benign neoplasms are typically characterized as being:", ar: "تتميز الأورام الحميدة عادةً بأنها بطيئة النمو، ولها حدود واضحة (محاطة بكبسولة غالباً)، ولا تنتشر إطلاقاً لأعضاء بعيدة.", options: ["Highly invasive, rapidly growing, and capable of widespread metastasis", "Slow-growing, well-circumscribed, encapsulated, and remaining localized without metastasis", "Inevitably fatal within a short period if not treated with aggressive chemotherapy", "Lacking any differentiated cellular structures under standard microscopic review"], answer: 1 },
{ q: "17. Malignant neoplasms characteristically display:", ar: "تظهر الأورام الخبيثة علامات فارقة تشمل غزو الأنسجة المجاورة، وتدميرها، والقدرة على الانتقال والانتشار لأعضاء بعيدة.", options: ["Slow, expansile growth restricted within a fibrous protective capsule", "Invasive growth, destruction of adjacent normal tissues, and the capacity for distant metastasis", "A perfectly normal cellular morphology and architectural arrangement", "An absence of clinical impact on the patient's physiological state"], answer: 1 },
{ q: "18. Metastasis explicitly refers to the process of:", ar: "الانتشار (Metastasis) يشير صراحةً إلى عملية انتقال وانتشار خلايا الورم إلى مواقع تشريحية بعيدة وغير متصلة بالورم الأصلي.", options: ["Local tumor expansion within the primary organ of origin", "The spread of tumor cells to distant, discontinuous anatomical sites", "The reversible differentiation of benign cells into normal structures", "The acute inflammatory reaction surrounding a necrotic tumor core"], answer: 1 },
{ q: "19. A Carcinoma is precisely defined as a malignant neoplasm arising from:", ar: "الكارسينوما هي التسمية العلمية الدقيقة للورم الخبيث الذي ينشأ من الخلايا ذات الأصل الطلائي (Epithelial).", options: ["Mesenchymal or connective tissue elements", "Epithelial cell origin (including squamous, glandular, or transitional surfaces)", "Lymphoid cells and bone marrow precursors", "Glial supportive cells of the central nervous system"], answer: 1 },
{ q: "20. A Sarcoma is precisely defined as a malignant neoplasm arising from:", ar: "الساركوما هي التسمية العلمية الدقيقة للورم الخبيث الذي ينشأ من الخلايا ذات الأصل الميزنشيمي/النسيج الضام (كالعظام والعضلات).", options: ["Surface epithelial cell linings", "Mesenchymal or connective tissue origin (such as bone, cartilage, muscle, or fat)", "Glandular epithelial tissues and structures", "The protective coverings of the brain and spinal cord"], answer: 1 },
{ q: "21. Edema is defined as the accumulation of excess fluid within:", ar: "الوذمة (Edema) تُعرف بأنها تجمع وتراكم كميات زائدة من السوائل داخل الفراغات الخلالية للأنسجة أو تجاويف الجسم.", options: ["The intravascular space increasing total blood volume", "The interstitial tissue spaces or body cavities", "The intracellular cytoplasm causing universal cell bursting", "The main lymphatic ducts exclusively"], answer: 1 },
{ q: "22. A Thrombus is defined as:", ar: "الخثرة الدموية (Thrombus) هي كتلة دموية متجلطة متماسكة تتكون داخل الأوعية الدموية أو القلب في إنسان حي.", options: ["A detached piece of material traveling freely through the bloodstream", "An intravascular solid or semi-solid mass formed from blood constituents within the living cardiovascular system", "A benign vascular tumor commonly found in the skin layers", "An accumulation of free serous fluid within the lower lungs"], answer: 1 },
