{ q: "23. An Embolus is defined as a:", ar: "الصمة (Embolus) عبارة عن كتلة صلبة أو سائلة أو غازية منفصلة تسير داخل الوعاء الدموي وتنتقل عبر الدم لتسد وعاءً بعيداً.", options: ["Stationary blood clot tightly attached to an injured vessel wall", "Detached intravascular solid, liquid, or gaseous mass carried by the blood to a site distant from its point of origin", "Normal regulatory protein found in healthy human plasma", "Type of phagocytic white blood cell migrating into injured tissue"], answer: 1 },
{ q: "24. Ischemia is defined as:", ar: "نقص التروية (Ischemia) هو النقص أو الانقطاع في الإمداد الدموي الشرياني عن نسيج أو عضو معين، مما يحرمه من الأكسجين والمغذيات.", options: ["An enhanced and excessive oxygen supply to a metabolic tissue", "A deficiency of arterial blood supply to a tissue or organ, compromising oxygen and nutrient delivery", "The proper and physiological drainage of local interstitial fluid volumes", "A systemic infection caused by blood-borne viable bacteria"], answer: 1 },
{ q: "25. An Infarction is an anatomical area of:", ar: "الاحتشاء (Infarction) هو منطقة نخر نسيجي إقفاري (تموت الأنسجة) ناتج عن انسداد في الإمداد الدموي الشرياني أو التصريف الوريدي.", options: ["Ischemic necrosis caused by occlusion of either the arterial supply or the venous drainage", "Acute inflammatory suppuration and abscess formation", "Benign neoplastic cellular proliferation and expansion", "Reversible hydropic cellular swelling and glycogen loading"], answer: 0 },
{ q: "26. Systemic Shock is fundamentally characterized by:", ar: "الصدمة الجهازية تتميز أساساً بهبوط حاد في التروية الدموية، مما يؤدي لعدم كفاية الأكسجين لتلبية احتياجات الأعضاء الحيوية.", options: ["Severe systemic hypertension and slowed heart rates", "Systemic hypoperfusion resulting from insuﬃcient cardiac output or reduced effective circulating blood volume", "Localized tissue edema restricted to the lower extremities", "A permanent pathologically elevated cardiac output rate"], answer: 1 },
{ q: "27. Primary tuberculosis characteristically involves the formation of the:", ar: "يتضمن مرض السل الأولي كلاسيكياً تشكل ما يُعرف بـ (مركب غون) والذي يتكون من بؤرة رئوية صغيرة مع إصابة العقد الليمفاوية.", options: ["Extensive cavitation within the bilateral lung apices", "Ghon complex, which consists of a parenchymal lung lesion combined with involved draining lymph nodes", "Widespread caseous lesions throughout every major systemic organ", "Ischemic infarction zones across the upper renal cortex"], answer: 1 },
{ q: "28. Secondary tuberculosis typically occurs in a:", ar: "يحدث السل الثانوي في عائل تم تحسيسه مسبقاً بالجرثومة، ويظهر نموذجياً في قمم الرئتين مع ميل شديد لتشكيل كهوف ونخر.", options: ["Completely unexposed, non-immunized pediatric individual", "Previously sensitized host, frequently localized to the lung apices with marked caseous necrosis and cavitation", "Infant population presenting with acute skin lesions only", "Patient's bone marrow without affecting pulmonary air spaces"], answer: 1 },
{ q: "29. Atherosclerosis is a chronic vascular disease that primarily affects:", ar: "التصلب العصيدي هو مرض وعائي مزمن يصيب بشكل أساسي الشرايين المرنة والعضلية الكبيرة والمتوسطة الحجم (مثل الأبهر والتاجية).", options: ["Small microscopic capillaries and thin post-capillary venules", "Large and medium-sized elastic and muscular arteries (e.g., aorta, coronary arteries)", "Systemic veins and specialized deep venules", "The main collecting lymphatic vessels within the limbs"], answer: 1 },
{ q: "30. The major structural components of an advanced atherosclerotic plaque include:", ar: "تشمل المكونات الهيكلية الرئيسية للويحة التصلبية المتقدمة: خلايا عضلية ملساء، خلايا بلعمية، كولاجين، ودهون (كوليسترول).", options: ["Neutrophils, fibrin networks, and acute serous exudate fluids exclusively", "Smooth muscle cells, macrophages, T lymphocytes, extracellular matrix (collagen), and intracellular/extracellular lipids", "Granulomatous giant cells and widespread caseous necrotic debris", "Pure calcium crystals without any lipid or cellular elements"], answer: 1 },
{ q: "31. The most common anatomical site for the occurrence of a myocardial infarction is the:", ar: "أكثر المواقع التشريحية شيوعاً لحدوث احتشاء عضلة القلب (الجلطة القلبية) هو الجدار الأمامي للبطين الأيسر.", options: ["Free wall of the right atrium", "Anterior or lateral walls of the left ventricle", "Posterior surface of the right ventricle", "Interatrial septum near the sinus node"], answer: 1 },
{ q: "32. The predominant microscopic change observed 1 to 2 days after a myocardial infarction is:", ar: "التغير المجهري المهيمن الذي يظهر بعد يوم إلى يومين من احتشاء عضلة القلب هو النخر التجلطي مع ارتشاح كثيف لخلايا النيوتروفيل.", options: ["Dense collagenous fibrosis and complete scar consolidation", "Coagulative necrosis of myocytes with a prominent acute neutrophilic infiltrate", "Extensive granulation tissue formation rich in new capillaries", "Complete cellular regeneration of cardiac myocytes back to normal"], answer: 1 },
{ q: "33. Lobar pneumonia is characterized anatomically by:", ar: "يتميز الالتهاب الرئوي الفصي تشريحياً بوجود تصلب حاد وموحد يشمل فصاً كاملاً أو جزءاً كبيراً جداً من فصوص الرئة.", options: ["Patchy, multi-focal consolidation distributed randomly across multiple lobes", "Diffuse, uniform consolidation and hepatization involving an entire anatomical lobe of the lung", "The presence of chronic caseating granulomas centered within the lung apices", "Severe fibrotic thickening and scarring confined to the bronchiolar walls"], answer: 1 },
{ q: "34. Bronchopneumonia is histopathologically distinguished by:", ar: "يتميز الالتهاب الرئوي الشعبي نسيجياً بوجود بؤر التهابية صديدية حادة متفرقة ومبعثرة تتركز حول الشعب الهوائية الصغيرة.", options: ["A homogenous, continuous consolidation of an entire single pulmonary lobe", "Patchy, acute suppurative inflammatory consolidation centered directly on bronchioles and adjacent alveoli", "Universal caseous necrosis of the alveolar septa without cellular response", "Diffuse, non-suppurative interstitial infiltration by mature lymphocytes"], answer: 1 },
{ q: "35. Chronic bronchitis is clinically diagnosed and defined based on:", ar: "يتم تشخيص التهاب الشعب الهوائية المزمن سريرياً بوجود سعال مستمر منتج للبلغم لمدة 3 أشهر على الأقل في سنتين متتاليتين.", options: ["An acute viral destruction of the main large bronchial epithelial linings", "A persistent productive cough for at least 3 consecutive months in at least 2 successive years", "The permanent anatomical destruction of the interalveolar walls", "The finding of structured non-caseating granulomas along the respiratory tract"], answer: 1 },
{ q: "36. Emphysema is histopathologically characterized by:", ar: "يتميز النفاخ الرئوي (Emphysema) نسيجياً باتساع دائم غير طبيعي في المجاري الهوائية الواقعة بعد الشعيبات الانتهائية مع تدمير جدرانها.", options: ["Acute, completely reversible smooth muscle bronchospasm inside the airways", "Permanent, abnormal enlargement of airspaces distal to terminal bronchioles, accompanied by destruction of alveolar walls", "Massive fluid accumulation and transudation within the local pleural cavity space", "Extensive dense fibrotic scarring and architectural obliteration of the visceral pleura"], answer: 1 },
{ q: "37. The defining histopathological triad of liver cirrhosis features:", ar: "الثلاثية النسيجية المميزة لتليف الكبد تشمل: وجود تليف منتشر، وتحول معمارية الكبد إلى عقد تجددية، وتدمير الهيكل الوعائي.", options: ["Universal simple fatty change, mild portal edema, and normal lobular veins", "Diffuse fibrosis, conversion of normal liver architecture into regenerative nodules, and vascular rearrangement", "A localized benign epithelial adenoma expanding slowly without altering architecture", "Acute neutrophilic lobular infiltration with complete absence of collagen deposition"], answer: 1 },
{ q: "38. The primary global risk factor for developing primary hepatocellular carcinoma is:", ar: "العامل الأساسي والأهم عالمياً للإصابة بسرطان الكبد الأولي هو التهاب الكبد الفيروسي المزمن (B أو C) والتليف الكبدي.", options: ["The regular long-term use of standard over-the-counter aspirin", "Chronic infection with Hepatitis B or C virus (HBV/HCV) and underlying liver cirrhosis", "An acute episode of uncomplicated bacterial cholecystitis", "The presence of isolated congenital Gilbert syndrome"], answer: 1 },
{ q: "39. The major causative etiological agent responsible for chronic gastritis and peptic ulcers is:", ar: "العامل المسبب الرئيسي والمسؤول عن معظم حالات التهاب المعدة المزمن وقرحة المعدة والاثني عشر هو بكتيريا الملوية البوابية (H. pylori).", options: ["High dietary intake of insoluble vegetable fibers", "Infection with the Gram-negative spiral bacterium Helicobacter pylori", "Excessive daily consumption of pure filtered water", "Chronic deficiency in vitamin C dietary supplementation"], answer: 1 },
{ q: "40. Peptic ulcer disease occurs most commonly within which anatomical locations?", ar: "تحدث قرحة المعدة الهضمية بشكل أكثر شيوعاً في بطانة المعدة (الانحناء الصغير) والجزء القريب من الاثني عشر.", options: ["The distal esophagus and the descending colon segments", "The stomach (antrum/lesser curvature) and the proximal first part of the duodenum", "The mid-jejunum and the distal areas of the ileum", "The vermiform appendix lumen exclusively"], answer: 1 },
{ q: "41. The histological gold standard required to establish a diagnosis of acute appendicitis is:", ar: "المعيار النسيجي الحاسم لتأكيد تشخيص التهاب الزائدة الدودية الحاد هو ارتشاح خلايا النيوتروفيل الحادة داخل الطبقة العضلية للزائدة.", options: ["The presence of dense clusters of mature lymphocytes in the mucosal layer", "Neutrophilic infiltration within the muscularis propria layer of the appendix wall", "Well-formed granulomas presenting inside the outer serosal coverings", "Extensive lamellar fibrosis completely obliterating the central appendiceal lumen"], answer: 1 },
{ q: "42. The primary screening and diagnostic procedure recommended for colorectal carcinoma is:", ar: "الإجراء التشخيصي والفحصي الأساسي الموصى به للكشف عن سرطان القولون والمستقيم هو منظار القولون مع أخذ خزعة.", options: ["A standard plain abdominal flat-plate X-ray scan", "Full colonoscopy combined with direct tissue biopsy and histopathological review", "A series of routine baseline serum liver function blood panels", "The assessment of total serum amylase and lipase concentration levels"], answer: 1 },
{ q: "43. Nephrotic syndrome is clinically and biochemically defined by which constellation?", ar: "المتلازمة الكلوية (Nephrotic) تُعرف سريرياً وحيوياً بوجود بروتين مكثف في البول (>3.5g)، ونقص ألبومين الدم، ووذمة شديدة.", options: ["Gross hematuria, acute oliguria, and significant systemic hypertension", "Heavy proteinuria (>3.5 g/day), hypoalbuminemia, hyperlipidemia, and severe generalized edema", "Anuria, high fever, widespread skin rash, and joint pain", "Isolated glycosuria combined with profound polyuria and weight loss"], answer: 1 },
{ q: "44. Nephritic syndrome is clinically distinguished from nephrotic syndrome by presenting with:", ar: "تتميز المتلازمة الكلوية (Nephritic) عن النيفروتية بوجود دم في البول (Hematuria)، وارتفاع ضغط الدم، وقلة بول معتدلة.", options: ["Massive isolated proteinuria without any cellular elements in urine", "Hematuria (blood in urine), azotemia, hypertension, and mild-to-moderate proteinuria", "A completely normal glomerular filtration rate and zero urinary changes", "Pathologically elevated blood glucose and massive fluid intake requirements"], answer: 1 },
{ q: "45. The most common benign neoplasm of the breast in young adult women is:", ar: "أكثر ورم حميد شيوعاً في ثدي النساء الشابات هو الفيبروادينوما (Fibroadenoma) وهو ورم ليفي غدي متماسك.", options: ["Infiltrating ductal adenocarcinoma of the breast", "Fibroadenoma, a well-defined fibroepithelial tumor", "Intraductal papilloma localized within the primary lactiferous ducts", "Malignant phyllodes tumor expanding rapidly into the chest wall"], answer: 1 },
{ q: "46. The most common morphological type of malignant breast cancer is:", ar: "أكثر أنواع سرطان الثدي الخبيث شيوعاً وانتشاراً من الناحية الشكلية هو الكارسينوما القنوية الغازية (Infiltrating ductal carcinoma).", options: ["Lobular carcinoma in situ remaining confined to the terminal lobules", "Infiltrating (invasive) ductal carcinoma", "Medullary carcinoma presenting with dense lymphoid tissue", "Mucinous (colloid) carcinoma forming large gelatinous lakes"], answer: 1 },
{ q: "47. Osteosarcoma is histologically characterized by the explicit production of:", ar: "يتميز سرطان العظام (Osteosarcoma) نسيجياً بإنتاج الخلايا السرطانية الخبيثة لمركب العظم غير الناضج (المادة العظمية المرضية).", options: ["Purely benign, mature hyaline cartilage matrices", "Malignant osteoid (immature bone matrix) directly synthesized by neoplastic spindle cells", "Chronic granulomatous bone destruction and secondary repair tissue", "Uric acid crystal deposition creating localized tophi formations"], answer: 1 },
{ q: "48. Rheumatoid arthritis is pathologically characterized as a chronic:", ar: "التهاب المفاصل الروماتويدي يُصنف مرضياً بأنه مرض مناعي ذاتي مزمن يسبب التهاباً في الغشاء الزلالي وتشكيل السبل (Pannus) وتدمير المفاصل.", options: ["Degenerative wear-and-tear disease of the articular hyaline cartilage layers", "Chronic autoimmune synovitis leading to joint destruction, pannus formation, and ankylosis", "Acute purulent joint infection secondary to direct hematogenous bacterial seeding", "Metabolic disorder caused by monosodium urate crystal precipitation in joint cavities"], answer: 1 },
{ q: "49. The classic clinical and pathological triad describing acute bacterial meningitis consists of:", ar: "تتكون الثلاثية السرطانية والتشريحية الكلاسيكية لالتهاب السحايا البكتيري الحاد من: الحمى، الصداع الشديد، وتصلب الرقبة.", options: ["Severe hypotension, diffuse maculopapular rash, and watery diarrhea", "Fever, headache, and nuchal rigidity (stiff neck representing meningeal irritation)", "Generalized grand mal seizures, sudden total blindness, and massive polyuria", "Acute crushing chest pain, productive purulent cough, and severe dyspnea"], answer: 1 }
],
cc: [
{ q: "1. Communication is most comprehensively defined as:", ar: "الاتصال هو عملية تبادل المعلومات والأفكار والمشاعر بين البشر لإنشاء فهم مشترك.", options: ["Speaking continuously without allowing the other party to talk", "The dynamic process of exchanging information, ideas, thoughts, and feelings between individuals to create shared meaning", "The exclusive practice of writing formal corporate administrative records", "Using digital computers to transmit raw binary data structures"], answer: 1 },
{ q: "2. The five core fundamental elements of the communication process are:", ar: "العناصر الخمسة الأساسية للاتصال هي: المرسل، الرسالة، القناة (الوسيلة)، المستقبل، والتغذية الراجعة.", options: ["Sender, Message, Channel, Receiver, Feedback", "Computer, Internet connection, Cable, Monitor screen, User", "Vocabulary words, Grammar rules, Written text, Vocal cords, Hearing", "Chief executive, Subordinate employee, Assigned task, Physical office, Corporate report"], answer: 0 },
{ q: "3. Non-verbal communication channels primarily include:", ar: "تشمل قنوات الاتصال غير اللفظي بشكل أساسي: لغة الجسد، وتعبيرات الوجه، والتواصل البصري، والوضع الجسدي.", options: ["Spoken dialogue and formal written language systems", "Body language, facial expressions, eye contact, gestures, and physical posture", "Sending encrypted digital emails and official text memos", "Reading medical textbooks and parsing literature reviews"], answer: 1 },
{ q: "4. Active listening is a behavioral technique that directly involves:", ar: "الاستماع الفعال هو تقنية سلوكية تتطلب الانتباه الكامل للمتحدث، وفهم الرسالة، وتقديم استجابات مدروسة.", options: ["Hearing acoustic sounds passively while performing unrelated operational tasks", "Paying complete, undivided attention, decoding the core emotional/factual message, and providing reflective feedback", "Interrupting the speaker frequently to insert rapid corrective clinical solutions", "Formulating a personal response or defense while the other person is still speaking"], answer: 1 },
{ q: "5. A communication barrier is formally defined as:", ar: "عائق الاتصال هو أي عامل أو تشويش يعيق أو يشوه أو يمنع النقل والاستقبال الواضح والدقيق للرسالة.", options: ["A highly accelerated, direct pathway for data transmission", "Any internal or external factor that distorts, interrupts, or prevents the clear transmission and accurate reception of a message", "A technical system used to translate foreign languages in real-time", "The conceptual layout of the primary underlying message itself"], answer: 1 },
{ q: "6. Verbal communication explicitly relies on which of the following?", ar: "يعتمد الاتصال اللفظي صراحةً على استخدام الكلمات المنطوقة أو المكتوبة لتوصيل المعاني والأفكار.", options: ["Facial muscle movements exclusively", "The strategic utilization of spoken or written words to convey meaning", "The maintaining of a fixed corporate physical posture", "Complete conversational silence and passive observation"], answer: 1 },
{ q: "7. Feedback in the communication cycle functions to:", ar: "تعمل التغذية الراجعة في حلقة الاتصال على إعلام المرسل بمدى دقة وصحة فهم واستيعاب الرسالة من قبل المستقبل.", options: ["Act as the original source and generator of the concept", "Provide the receiver's response, informing the sender if the message was accurately received and decoded", "Generate environmental background noise to challenge the speaker", "Select the optimal technological framework for digital data delivery"], answer: 1 },
{ q: "8. Empathy within the clinical patient care paradigm means:", ar: "التعاطف في سياق الرعاية الصحية يعني القدرة على فهم ومشاركة مشاعر وآلام المريض ورؤية الأمور من منظوره الخاص.", options: ["Feeling profound pity and sorrow for the patient's unfortunate state", "Accurately understanding, sharing, and reflecting the patient's emotional state and perspective from their point of view", "Providing immediate, unprompted medical directives and administrative solutions", "Ignoring patient emotional expressions to maintain a cold, unattached professional distance"], answer: 1 },
{ q: "9. Open-ended questions are strategically utilized during an interview to:", ar: "تُستخدم الأسئلة المفتوحة استراتيجياً لتشجيع المريض على سرد قصته المرضية بالتفصيل وبعباراته الخاصة.", options: ["Elicit a highly restricted, single-word 'Yes' or 'No' clinical confirmation", "Encourage the patient to share detailed, comprehensive information in their own descriptive words", "Strictly minimize the total chronological duration of the patient visit", "Evaluate the cognitive memory capacity of an elderly clinical subject"], answer: 1 },
{ q: "10. Close-ended questions are highly effective when the interviewer needs to:", ar: "تكون الأسئلة المغلقة فعالة جداً عندما يحتاج القائم بالمقابلة إلى جمع معلومات محددة وحقائق سريعة وتأكيدات قطعية.", options: ["Establish a deep, long-term therapeutic relationship with a complex subject", "Gather specific, narrow factual pieces of data or rapid confirmation (e.g., Yes/No binary metrics)", "Allow the patient unrestricted freedom to express deep-seated personal anxieties", "Explain the intricate molecular mechanisms of a proposed surgical treatment"], answer: 1 },
{ q: "11. The term 'Noise' in communication theory refers to:", ar: "يُشير مصطلح 'التشويش' في نظرية الاتصال إلى أي عائق أو تداخل يشوه أو يفسد وضوح الرسالة المنقولة.", options: ["Loud music playing inside an adjacent room exclusively", "Any form of physical, psychological, or environmental interference that distorts or confuses the message", "The high vocal amplitude and volume of the speaking entity", "Technological innovations that accelerate internet bandwidth speeds"], answer: 1 },
{ q: "12. In therapeutic communication, medical jargon should be:", ar: "في الاتصال العلاجي، يجب تجنب المصطلحات الطبية المعقدة تماماً، أو شرحها بتبسيط شديد لضمان فهم المريض وحمايته.", options: ["Utilized as frequently as possible to establish professional superiority and expertise", "Avoided completely or translated immediately into simple, plain language terms for the patient", "Used exclusively in formal written letters directed to family members", "Shared only with administrative staff during insurance authorizations"], answer: 1 },
{ q: "13. Assertive communication is characterized by:", ar: "يتميز الاتصال الحازم بالتعبير الصادق والواضح عن الأفكار والاحتياجات والحقوق الشخصية باحترام تام دون عدوانية.", options: ["Dominating the conversation aggressively to force compliance with one's desires", "Expressing thoughts, needs, and feelings clearly, honestly, and directly while fully respecting the rights of others", "Remaining completely passive and accepting unfair decisions without comment", "Manipulating the emotions of others covertly to achieve personal goals"], answer: 1 },
{ q: "14. Paraphrasing as a communication technique is defined as:", ar: "إعادة الصياغة كتقنية اتصال تُعرف بأنها إعادة صياغة رسالة المتحدث وجوهر كلامه بكلماتك الخاصة للتأكد من صحة الفهم.", options: ["Repeating the speaker's exact words back to them verbatim without any change", "Restating the core content of the speaker's message using your own words to verify accurate understanding", "Transcribing every single word spoken into a formal written computer log", "Changing the conversation topic rapidly to prevent awkward moments of pause"], answer: 1 },
{ q: "15. The primary overarching objective of a comprehensive medical interview is to:", ar: "الهدف الأساسي للمقابلة الطبية الشاملة هو جمع تاريخ صحي دقيق وبناء علاقة علاجية قوية مبنية على الثقة متبادلة.", options: ["Complete and process institutional financial billing and insurance paperwork", "Elicit an accurate health history, understand patient concerns, and establish a trusting relationship", "Educate the patient on the advanced molecular science of generic human physiology", "Minimize the overall chronological contact time between the clinician and the subject"], answer: 1 },
{ q: "16. Which of the following represents a classic non-verbal sign of acute anxiety in a patient?", ar: "أي مما يلي يمثل علامة كلاسيكية غير لفظية على القلق الحاد لدى المريض؟ تجنب التواصل البصري والتململ.", options: ["A warm, genuine smile combined with a relaxed forward-leaning posture", "Avoiding direct eye contact, frequent fidgeting, hyperventilating, and a rigid, tense body posture", "Speaking in a slow, rhythmic, low-pitched, and completely calm tone of voice", "Sitting in a fully relaxed, open manner with uncrossed arms and legs"], answer: 1 },
{ q: "17. When initiating the process of breaking bad news to a patient, the first step is to:", ar: "عند البدء في عملية نقل الأخبار الطبية السيئة، الخطوة الأولى هي تهيئة بيئة خصوصية مريحة وقياس مدى إدراك المريض وفهمه.", options: ["Deliver all technical medical and diagnostic data immediately to save time", "Establish a private, comfortable physical environment and assess the patient's current perception of their illness", "Provide the patient with a detailed written report and exit the room immediately", "Instruct all immediate family members to leave the clinic space instantly"], answer: 1 },
{ q: "18. Cultural competence in healthcare communication requires the clinician to:", ar: "تتطلب الكفاءة الثقافية في الاتصال الطبي من الممارس فهم واحترام والوعي بالاختلافات والخلفيات الثقافية المتنوعة للمرضى.", options: ["Speak every major international global language with absolute native fluency", "Understand, respect, and adapt communication styles to the diverse cultural backgrounds and beliefs of patients", "Treat every single patient with rigid uniformity without accounting for cultural variations", "Compel patients to abandon their traditional cultural practices to follow hospital rules"], answer: 1 },
{ q: "19. Legal and professional standards require that written medical documentation must be:", ar: "تتطلب المعايير القانونية والمهنية أن يكون التوثيق الطبي المكتوب واضحاً، دقيقاً، موضوعياً، وسرياً للغاية لحماية المريض.", options: ["Complicated, lengthy, and filled with ambiguous poetic descriptions", "Clear, highly accurate, completely objective, timely, and strictly confidential", "Accessible and shared freely with any individual who formally requests to read it", "Composed using casual local slang phrases to appear friendly to auditors"], answer: 1 },
{ q: "20. Interprofessional communication is defined as interaction and coordination occurring between:", ar: "الاتصال بين المهنيين يُعرف بأنه التفاعل والتنسيق والتعاون الذي يحدث بين مختلف ممارسي الرعاية الصحية لتنظيم الخطة.", options: ["An attending specialist physician and an individual patient's immediate family", "Different healthcare professionals (e.g., doctors, nurses, pharmacists) to coordinate safe patient care", "The senior hospital administrative management and local news media organizations", "Two medical students discussing course topics outside the clinical area"], answer: 1 },
{ q: "21. Therapeutic communication is highly focused on achieving which primary outcome?", ar: "يركز الاتصال العلاجي بشكل مكثف على تحقيق الرفاهية الجسدية والنفسية للمريض ودعم عملية شفائه.", options: ["Maximizing corporate profitability for the private medical institution", "Supporting the patient’s physical and emotional well-being, healing, and adaptive coping mechanisms", "Accelerating the chronological speed of academic clinical trials and data entry", "Ensuring the absolute physical comfort and convenience of the medical staff during shifts"], answer: 1 },
{ q: "22. The communication technique of clarification is explicitly deployed to:", ar: "يتم استخدام تقنية الاستيضاح صراحةً لضمان الفهم التام للنقاط الغامضة أو غير الواضحة في حديث المريض ومنع اللبس.", options: ["Judge and critique the morality of the patient’s lifestyle and choices", "Ensure that ambiguous, vague, or unclear statements made by the patient are fully understood by the clinician", "Correct the patient's grammar and pronunciation errors during the formal interview", "Bring the medical interview to an abrupt close to save clinic operational time"], answer: 1 },
{ q: "23. Validation in communication theory is best exemplified by:", ar: "التحقق والاعتراف (Validation) يتمثل بشكل أفضل في إظهار القبول لمشاعر المريض والاعتراف بها كاستجابة طبيعية.", options: ["Blindly agreeing with every single medical self-diagnosis the patient proposes", "Acknowledging, respecting, and validating the patient's emotional reactions as legitimate and understandable", "Verifying the legal validity of the patient’s health insurance or identification card", "Signing a formal medical prescription slip at the conclusion of a clinical evaluation"], answer: 1 },
{ q: "24. Self-disclosure by a healthcare professional during a patient interaction should be:", ar: "يجب أن يكون الإفصاح الذاتي من قبل الممارس الصحي محدوداً للغاية، ومدروساً، ويوجه لغرض علاجي يخدم مصلحة المريض فقط.", options: ["Used frequently to build a deep personal friendship and social relationship with the subject", "Highly limited, intentional, purposeful, and deployed solely when it provides a distinct therapeutic benefit to the patient", "Avoided under absolutely any imaginative clinical circumstance without exception", "Used to share personal financial or psychological hardships to elicit patient sympathy"], answer: 1 },
{ q: "25. The SBAR communication tool is a standardized medical framework that stands for:", ar: "أداة SBAR الطبية الشهيرة هي إطار عمل قياسي للتواصل السريع والآمن يرمز لـ: الوضع، الخلفية، التقييم، والتوصية.", options: ["Situation, Background, Assessment, Recommendation", "Status, Beliefs, Action, Response", "Sender, Bureau, Analysis, Review", "Safety, Biosecurity, Alert, Reaction"], answer: 0 },
{ q: "26. High emotional intelligence enables a healthcare professional to successfully:", ar: "الذكاء العاطفي المرتفع يُمكّن الممارس الصحي من التعرف على عواطفه وعواطف المرضى وإدارتها وتوجيهها لدعم العلاج.", options: ["Calculate advanced pharmacological drug dosages at an accelerated speed", "Recognize, understand, and effectively manage their own emotions and empathize with the emotions of patients", "Avoid engaging in any emotionally driven discussions with terminal patients completely", "Bypass hospital administrative protocols legally without facing professional penalties"], answer: 1 },
{ q: "27. Chronemics in non-verbal communication theory refers to the study of the use of:", ar: "علم Chronemics في الاتصال غير اللفظي يدرس كيفية استخدام وتنظيم الوقت وتأثيره (مثل الالتزام بالمواعيد ووقت الانتظار).", options: ["Physical personal space, distance, and architectural boundaries during conversation", "Time, including concept parameters like punctuality, response speed, and patient waiting room time", "Tactile touch behaviors, handshakes, and physical therapeutic contact parameters", "Vocal vocalics, voice pitch variations, accents, and volume control levels"], answer: 1 },
{ q: "28. Proxemics is formally defined as the scientific study of:", ar: "علم Proxemics يُعرف رسمياً بأنه الدراسة العلمية لكيفية استخدام وتأثير المساحة الشخصية والمسافة الجسدية بين البشر أثناء الحديث.", options: ["Micro-expressions flashing briefly across the human face during stress", "The use of personal space and physical distance parameters maintained between individuals during interaction", "The tracking of saccadic eye movements during high-stakes clinical diagnostic interviews", "The structural symbolic meaning of complex manual hand gestures and signals"], answer: 1 },
{ q: "29. Kinesics is a sub-field of communication that evaluates:", ar: "علم Kinesics هو أحد فروع علم الاتصال الذي يدرس ويقيم حركات الجسم، والوضعيات، والإيماءات، ولغة الجسد العامة.", options: ["Vocal auditory parameters such as pitch, tone, cadence, and pause variations", "Body movements, physical gestures, postures, and universal non-verbal behavioral signs", "The spelling accuracy and syntactic layout of formal written medical documents", "The effective structural management of chronological time and clinic scheduling parameters"], answer: 1 },
{ q: "30. Paralanguage components in non-verbal communication include which of the following?", ar: "مكونات اللغة الموازية (Paralanguage) تشمل العناصر الصوتية المصاحبة للكلام مثل النبرة، والحدة، والسرعة، والتردد، وليس الكلمات.", options: ["The actual literal vocabulary words and definitions chosen by the speaker", "Vocal characteristics such as tone, pitch, rate of delivery, volume, and vocal hesitations or sighing", "The structured hand signals and sign language patterns used by specialized populations", "The graphic font design, layout, and margins of automated digital email updates"], answer: 1 },
{ q: "31. Delivering an effective summary at the conclusion of a clinical interview helps to:", ar: "يساعد تقديم ملخص فعال في نهاية المقابلة السريرية على مراجعة النقاط الرئيسية، وتأكيد الفهم المشترك، وتوضيح خطة العلاج.", options: ["Intentionally confuse the patient regarding their actual discharge parameters", "Review the primary points discussed, confirm mutual understanding, and clearly outline the next clinical steps", "Justify an artificial increase in the financial operational billing cost of the visit", "Prevent the patient from asking any further pressing questions due to time expiration"], answer: 1 },
{ q: "32. Maintaining direct eye contact in traditional Western cultures typically communicates:", ar: "الحفاظ على التواصل البصري المباشر في الثقافات الغربية التقليدية يعبر عن الانتباه، والصدق، والثقة بالنفس، والاحترام.", options: ["Profound disrespect, social arrogance, and underlying hostile anger", "Attentiveness, honesty, interest, and professional self-confidence", "Inherent shyness, psychological submission, and a desire to avoid discussion", "An urgent personal desire to terminate the meeting and exit the space immediately"], answer: 1 },
{ q: "33. The most critical systemic risk associated with poor communication within a hospital team is:", ar: "الخطر الأكثر خطورة والناجم عن ضعف الاتصال داخل الفرق الطبية هو حدوث الأخطاء الطبية، وتهديد سلامة وأرواح المرضى.", options: ["A temporary drop in the local building's wireless internet connection speeds", "The occurrence of preventable medical errors, severe misunderstandings, and compromised patient safety", "An inflation in the baseline monthly salaries of the senior administrative staff", "Superficial physical damage to secondary non-critical office furniture assets"], answer: 1 },
{ q: "34. To ensure constructive professional growth, feedback within a team should always be:", ar: "لضمان النمو المهني البناء، يجب أن تكون التغذية الراجعة والتقييم محددين، وموجهين نحو السلوك، وفي الوقت المناسب تماماً.", options: ["Highly vague, generalized, emotionally driven, and substantially delayed", "Constructive, specific, focused on actionable behaviors, and delivered in a timely manner", "Inherently punitive, overly harsh, personal, and Broadcasted publicly to ensure compliance", "Transmitted exclusively through unmonitored automated institutional digital messaging boards"], answer: 1 },
{ q: "35. Interviewers are advised to strictly avoid leading questions because they:", ar: "يُنصح بضرورة تجنب الأسئلة الإيحائية (Leading) لأنها توجه المريض بشكل غير مباشر نحو إجابة معينة قد لا تمثل الحقيقة.", options: ["Take an excessive amount of chronological time for the patient to comprehend", "Subconsciously guide or pressure the patient toward a specific answer rather than eliciting the objective truth", "Are explicitly classified as illegal criminal acts under local constitutional laws", "Mandatorily require the physical presence of a certified medical translator to process"], answer: 1 },
{ q: "36. The strategic use of silence during a medical interview is a tool designed to:", ar: "الاستخدام الاستراتيجي للصمت المدروس هو أداة تمنح المريض وقتاً ومساحة للتفكير وجمع الأفكار للتعبير عن أمور حساسة.", options: ["Communicate to the patient that the attending clinician is bored or exhausted", "Provide the patient with essential cognitive space to process thoughts, reflect, and share sensitive information", "Bring the clinical consultation to an immediate, absolute close without discussion", "Subconsciously punish the patient for non-compliant verbal behaviors during evaluation"], answer: 1 },
{ q: "37. An aggressive communication style is fundamentally characterized by:", ar: "يتميز أسلوب الاتصال العدواني بالتركيز الكامل على احتياجات الفرد وحقوقه مع تجاهل أو انتهاك مشاعر وحقوق الآخرين.", options: ["Sacrificing one's personal rights and boundaries to keep the absolute social peace", "Advancing one's own needs, thoughts, and feelings at the direct expense and violation of the rights of others", "Adhering strictly to formal institutional administrative guidelines and protocols", "Utilizing complex academic grammar and syntax patterns exclusively to communicate"], answer: 1 },
{ q: "38. Passive-aggressive communication is behaviorally defined as:", ar: "الاتصال السلبي العدواني يُعرف سلوكياً بالتعبير عن مشاعر الغضب أو المقاومة بشكل غير مباشر وخفي مع تظاهر بالتعاون.", options: ["Providing clear, unadulterated, honest, and highly direct feedback during a crisis", "Expressing underlying anger, resentment, or resistance indirectly and covertly while appearing cooperative on the surface", "Deploying immediate physical violence or verbal shouting patterns during an active dispute", "Withdrawing completely into absolute physical isolation and refusing any human contact parameters"], answer: 1 },
{ q: "39. Psychological noise within communication loops is best exemplified by:", ar: "التشويش النفسي في حلقات الاتصال يتمثل في وجود تحيزات مسبقة، أو قلق حاد، أو إجهاد عاطفي يعيق الاستماع الموضوعي.", options: ["Loud commercial traffic sounds roaring outside the clinical facility windows", "Prejudices, severe cognitive anxiety, emotional stress, or biases that block objective and fair listening", "Annoying static sounds or line distortion on an ungrounded analog telephone connection", "Illegible or highly distorted cursive handwriting patterns inside an unstandardized chart"], answer: 1 },
{ q: "40. A physiological barrier to effective communication refers explicitly to:", ar: "العائق الفسيولوجي (الجسدي) للاتصال الفعال يشير صراحةً إلى مشاكل جسدية مثل فقدان السمع، أو الألم الشديد، أو التعب الحاد.", options: ["A total difference in the primary native spoken languages of the two parties", "Physical biological challenges such as profound hearing loss, severe acute pain, or extreme structural exhaustion", "High levels of subjective anger and interpersonal stress between corporate team members", "Inadequate or poorly designed physical room lighting and layout parameters within the workspace"], answer: 1 },
{ q: "41. Environmental barriers to clear communication typically include:", ar: "تشمل العوائق البيئية للاتصال الواضح: الضوضاء الصاخبة في الخلفية، وانعدام الخصوصية، أو درجات الحرارة المزعجة في الغرفة.", options: ["High internal cognitive anxiety or depression affecting the clinical subject", "Loud environmental background noise, a complete lack of structural privacy, or uncomfortable room temperatures", "The excessive deployment of advanced specialized medical terminology by a clinician", "A limited or deficient total vocabulary capacity on the part of the receiving entity"], answer: 1 },
{ q: "42. The standardized 'SPIKES' protocol is explicitly engineered for which medical purpose?", ar: "بروتوكول SPIKES القياسي مصمم هندسياً وطبياً لغرض محدد وهو: نقل الأخبار الطبية السيئة أو الصادمة بطريقة فعالة ومتعاطفة.", options: ["Mapping out sterile infection control pathways inside a major operating theater", "Delivering highly distressing, bad, or catastrophic medical news to patients and families effectively", "Calculating precise mathematical adjustments for pediatric chemotherapy dosages", "Conducting structured pre-surgical safety checklists prior to administering anesthesia"], answer: 1 },
{ q: "43. The 'P' in the acronym SPIKES protocol stands for:", ar: "حرف P في بروتوكول SPIKES يرمز لـ (Perception - الإدراك)، ويعني تقييم وفحص مدى فهم وإدراك المريض لحالته الحالية.", options: ["Patience", "Perception (assessing and evaluating what the patient understands or perceives about their condition)", "Prescription", "Privacy setup"], answer: 1 },
{ q: "44. The 'E' in the acronym SPIKES protocol stands for:", ar: "حرف E في بروتوكول SPIKES يرمز لـ (Empathy - التعاطف)، ويعني رصد مشاعر المريض والاستجابة لها بأسلوب عاطفي داعم.", options: ["Evaluation", "Empathy (identifying, validating, and responding supportively to the patient's emotional expressions)", "Education", "Equipment check"], answer: 1 },
{ q: "45. A clinically sound empathic response formula requires the professional to:", ar: "تتطلب صيغة الاستجابة التعاطفية السليمة سريرياً من الممارس رصد وتسمية العاطفة التي يمر بها المريض ثم الاعتراف بوجاهتها ودعمها.", options: ["Ignore the expressed emotion entirely and jump immediately to a factual operational solution", "Identify and explicitly name the patient's emotion and formally validate or support their feelings", "Instruct the patient firmly not to cry or display distress to maintain structural clinical efficiency", "Rapidly alter the conversation topic to prevent an emotional environment inside the treatment space"], answer: 1 },
{ q: "46. Sign-posting as an interview management tool is defined as:", ar: "التوجيه أو العبارات الإرشادية (Sign-posting) تُعرف بأنها تنبيه المريض مسبقاً عند الانتقال من جزء أو موضوع لآخر في المقابلة.", options: ["Hanging diagnostic anatomical posters along the corridors of the clinical department", "Explicitly introducing a structural transition or change in the interview topic to guide the patient through the process", "Typing cross-reference notes on an active computerized electronic medical record interface", "Requesting the patient's mandatory physical signature on institutional consent documentation packets"], answer: 1 },
{ q: "47. Health literacy refers explicitly to a patient's capacity to:", ar: "الوعي الصحي (Health literacy) يشير صراحةً إلى قدرة المريض على الحصول على المعلومات الصحية الأساسية وفهمها وتطبيقها لاتخاذ قراراته.", options: ["The attending medical professional's cumulative academic degrees and titles", "The patient's capacity to obtain, process, understand, and apply basic health information to make sound decisions", "The total quantity of peer-reviewed medical textbooks available in a clinical library", "The ability to compose highly technical scientific research papers for publication"], answer: 1 },
{ q: "48. The 'Teach-Back' validation method is best deployed to:", ar: "تُستخدم طريقة Teach-Back للتأكد من استيعاب المريض تماماً عبر الطلب منه إعادة شرح خطة الرعاية بأسلوبه وكلماته الخاصة.", options: ["Conduct high-stakes examinations for graduating senior medical students", "Ask the patient to explain the care plan or directives in their own words to verify absolute comprehension", "Assign home reading work to the patient's immediate family members", "Review outdated historical medical records during a secondary retrospective research study"], answer: 1 },
{ q: "49. When conducting a clinical interview assisted by a professional translator, you should:", ar: "عند إجراء مقابلة طبية بمساعدة مترجم محترف، يجب عليك توجيه النظر والحديث للمريض مباشرة وليس للمترجم.", options: ["Look and speak directly to the translator throughout the clinical exchange", "Look and speak directly to the patient, maintaining standard therapeutic rapport lines", "Speak with an exceptionally loud vocal amplitude to ensure translation clarity", "Avoid any direct eye contact parameters with both the patient and the translator"], answer: 1 },
{ q: "50. Patient-centered communication fundamentally prioritizes which of the following values?", ar: "الاتصال المتمحور حول المريض يضع قيم المريض الفردية، وتفضيلاته، واحتياجاته المعلنة فوق أي اعتبارات أخرى.", options: ["The rigid compliance with institutional administrative schedules above all else", "The patient's individual values, personal preferences, and expressed human needs within the care plan", "The absolute, unquestioned authoritative control of the attending senior physician", "The minimization of conversational dialogue to clear clinic queues quickly"], answer: 1 },
{ q: "51. Regular clinical self-awareness helps a healthcare professional to successfully:", ar: "يساعد الوعي بالذات الممارس الصحي بشكل دوري على رصد تحيزاته الشخصية ومنعها من التأثير سلباً على جودة الرعاية المقدمة للمريض.", options: ["Increase their mechanical physical execution speeds during urgent surgical operations", "Recognize personal biases, emotional triggers, and prevent them from negatively impacting patient care quality", "Avoid entering into collaborative professional discussions with departmental colleagues", "Perform advanced clinical duties continuously without taking regulated operational breaks"], answer: 1 },
{ q: "52. Face-to-face, in-person communication is explicitly indicated and optimal for:", ar: "الاتصال المباشر وجهاً لوجه هو الخيار الأمثل والضروري عند مناقشة مواقف طبية معقدة، أو حساسة، أو مشحونة عاطفياً.", options: ["Transmitting quick, routine numerical statistical datasets between departments", "Discussing highly complex, deeply sensitive, or profoundly emotional medical situations and diagnoses", "Processing routine, automated scheduling alterations for low-risk review appointments", "Broadcasting generic institutional administrative policy updates to a massive workforce group"], answer: 1 },
{ q: "53. Email communication is highly appropriate and legally sufficient for:", ar: "يُعد البريد الإلكتروني ملائماً وفعالاً لمشاركة التحديثات الإدارية الروتينية، أو الوثائق، أو السجلات غير العاجلة.", options: ["Breaking devastating, life-altering bad medical news to an isolated family member", "Sharing non-urgent administrative updates, professional documentation, or standard organizational records", "Issuing immediate, high-priority emergency alerts during an active clinical crisis event", "Resolving intense, deep-seated emotional and interpersonal conflicts between senior clinicians"], answer: 1 },
{ q: "54. Objective medical documentation strictly requires the writer to record:", ar: "يتطلب التوثيق الطبي الموضوعي من الكاتب بدقة تسجيل الملاحظات الواقعية والبيانات القابلة للقياس دون آراء أو أحكام شخصية.", options: ["Personal speculative guesses, emotional judgments, and unverified professional opinions", "Factual observations, measurable physiological data, direct clinical signs, and statements completely free of bias", "Strictly and exclusively what the patient's family requests to be documented in the file", "Highly emotional and dramatic descriptions of the subject's baseline behaviors"], answer: 1 },
{ q: "55. Subjective data within a comprehensive medical record incorporates:", ar: "تتضمن البيانات الذاتية (Subjective) في السجل الطبي: الأعراض التي يبلغ عنها المريض بنفسه، ومشاعره، ووصفه الخاص للألم.", options: ["Automated laboratory blood cell count panels and values", "The patient's self-reported symptoms, personal feelings, expressions of discomfort, and descriptions of pain", "Calibrated digital blood pressure machine output readings", "Formal radiologic diagnostic imaging findings and structural interpretations"], answer: 1 },
{ q: "56. Objective data within a comprehensive medical record incorporates:", ar: "تتضمن البيانات الموضوعية (Objective) في السجل الطبي: العلامات الحيوية المقاسة، والنتائج المخبرية، والملاحظات الإكلينيكية المرئية.", options: ["The patient's internal thoughts and private philosophical positions", "Measurable physical signs, vital signs, certified lab values, and verified clinical observations", "Subjective speculative complaints presented by extended neighborhood acquaintances", "The patient's private spiritual fears regarding long-term therapeutic outcomes"], answer: 1 },
{ q: "57. During an active institutional or clinical crisis situation, communication must be:", ar: "أثناء أوقات الأزمات أو الطوارئ الطبية النشطة، يجب أن يكون الاتصال واضحاً، موجزاً، مباشراً، ومحافظاً على الهدوء التام.", options: ["Extremely long, highly descriptive, poetic, and filled with peripheral background details", "Highly clear, concise, direct, targeted, and delivered with a calm, controlled professional demeanor", "Substantially passive, slow-paced, and indirect to prevent raising local alarm levels", "Transmitted exclusively via formal written channels rather than fast verbal exchanges"], answer: 1 },
{ q: "58. Successful conflict resolution within a multidisciplinary healthcare team necessitates:", ar: "يتطلب حل النزاعات بنجاح داخل الفريق الطبي المشترك: الاستماع الفعال، والتركيز على الحلول الجماعية، وتقديم مصلحة المريض أولاً.", options: ["Allocating blame to a single individual publicly to establish professional authority", "Active listening, collaborative and non-defensive problem-solving, and keeping focus tightly on patient outcomes", "Ignoring the underlying systemic issue completely until it naturally dissipates over chronological time", "Enforcing strict, non-negotiable authoritarian decisions without reviewing input data metrics"], answer: 1 },
{ q: "59. Building a robust baseline of trust within the patient-provider relationship directly results in:", ar: "بناء أساس قوي من الثقة في العلاقة بين المريض والممارس يؤدي مباشرة إلى رفع نسب الالتزام بالخطة العلاجية وتحسين النتائج.", options: ["An exponential inflation in universal patient anxiety and clinical dissatisfaction metrics", "Enhanced patient adherence to prescribed treatment plans, elevated satisfaction scores, and superior clinical outcomes", "A predictable and dangerous amplification in the overall likelihood of medical malpractice lawsuits", "Chronological delays in processing standard clinical consultations and operational flows"], answer: 1 },
{ q: "60. The ultimate, overarching primary goal of all healthcare-related communication frameworks is to:", ar: "الهدف الأسمى والنهائي لجميع أطر الاتصال الطبي هو ضمان تقديم رعاية صحية آمنة، وشاملة، وبأعلى جودة ممكنة للمريض.", options: ["Ensure all assigned daily operational clinical tasks are completed with maximum speed", "Ensure the delivery of safe, high-quality, comprehensive, and error-free patient care", "Elevate the total quantity of scientific research papers published by the institution annually", "Minimize the overall operational financial expenditures of the physical hospital facility"], answer: 1 }
]
};

function startQuiz(sub) {
    subject = sub;
    current = 0;
    answered = {};
    isShowingFeedback = false;
    
    document.getElementById("menu").classList.remove("active");
    document.getElementById("quiz").classList.add("active");
    
    showQuestion();
}

function showQuestion() {
    const qList = bank[subject];
    const qData = qList[current];
    
    document.getElementById("progressBadge").innerText = `${current + 1} / ${qList.length}`;
    document.getElementById("question").innerText = qData.q;
    document.getElementById("translation").innerText = qData.ar || "";
    
    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";
    
    document.getElementById("feedback").style.display = "none";
    isShowingFeedback = false;
    
    qData.options.forEach((opt, idx) => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.innerText = opt;
        
        if (answered[current] !== undefined) {
            if (idx === qData.answer) {
                btn.classList.add("correct-flash");
            } else if (idx === answered[current]) {
                btn.classList.add("wrong-flash");
            }
        } else {
            btn.onclick = () => selectOption(idx);
        }
        optionsDiv.appendChild(btn);
    });
}

function selectOption(idx) {
    if (answered[current] !== undefined || isShowingFeedback) return;
    
    const qData = bank[subject][current];
    answered[current] = idx;
    isShowingFeedback = true;
    
    const buttons = document.getElementById("options").getElementsByClassName("option");
    
    if (idx === qData.answer) {
        buttons[idx].classList.add("correct-flash");
        showFeedback(true, "إجابة صحيحة مذهلة! ✨👏");
    } else {
        buttons[idx].classList.add("wrong-flash");
        buttons[qData.answer].classList.add("correct-flash");
        showFeedback(false, "إجابة خاطئة، حاول في السؤال القادم 🌸");
    }
}

function showFeedback(isCorrect, text) {
    const fb = document.getElementById("feedback");
    fb.style.display = "block";
    fb.innerText = text;
    if (isCorrect) {
        fb.style.background = "#d1fae5";
        fb.style.color = "#065f46";
    } else {
        fb.style.background = "#ffe4e6";
        fb.style.color = "#9f1239";
    }
}

function nextQuestion() {
    const qList = bank[subject];
    if (current < qList.length - 1) {
        current++;
        showQuestion();
    } else {
        alert("🎉 لقد أكملت الاختبار بنجاح يا بطل!");
        goMenu();
    }
}

function backQuestion() {
    if (current > 0) {
        current--;
        showQuestion();
    }
}

function goMenu() {
    document.getElementById("quiz").classList.remove("active");
    document.getElementById("menu").classList.add("active");
}
</script>
