<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Quiz App</title>

<style>
body{
font-family: Arial;
text-align:center;
background: linear-gradient(to right,#ffd6ec,#e6ccff);
}

h1{
color:#a64dff;
}

button{
padding:12px;
margin:10px;
width:260px;
border:none;
border-radius:20px;
background:#ffb6d9;
color:white;
font-size:16px;
cursor:pointer;
}

.option{
display:block;
margin:10px auto;
width:80%;
padding:10px;
border-radius:12px;
border:1px solid #ddd;
cursor:pointer;
background:white;
}

.option:hover{
background:#ffe6f2;
}

.small{
font-size:12px;
color:#888;
}

.correct{
background:#d4f7e6 !important;
}

.wrong{
background:#ffd6e0 !important;
}

#nextBtn{
background:#ff66b2;
color:white;
border:none;
padding:12px 25px;
border-radius:30px;
font-size:16px;
cursor:pointer;
box-shadow:0 5px 15px rgba(255,102,178,0.3);
}

#nextBtn:disabled{
background:#ccc;
cursor:not-allowed;
box-shadow:none;
}
</style>
</head>

<body>

<h1>اختاري المادة 💗</h1>

<div id="menu">
<button onclick="startQuiz('ip')">حقوق الملكية الفكرية</button>
<button onclick="startQuiz('comm')">Communication Concepts</button>
<button onclick="startQuiz('patho')">Pathology</button>
</div>

<div id="quiz" style="display:none;"></div>

<script>

let current=0;
let score=0;
let questions=[];
let answered=false;

/* ================= START ================= */

function startQuiz(type){
document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";

current=0;
score=0;

if(type==="comm") questions=commQuestions;
if(type==="patho") questions=pathoQuestions;
if(type==="ip") questions=ipQuestions;

showQuestion();
}

/* ================= SHOW QUESTION ================= */

function showQuestion(){
answered=false;

let q=questions[current];

let html=`<h2>${current+1}/20</h2>`;

if(q.ar){
html+=`<p>${q.en}</p>
<p class="small">${q.ar}</p>`;
}else{
html+=`<p>${q.q}</p>`;
}

q.options.forEach((opt,i)=>{
html+=`<div class="option" onclick="check(${i})">${opt}</div>`;
});

html+=`<br><button id="nextBtn" onclick="nextQuestion()" disabled>💗 Next</button>`;

document.getElementById("quiz").innerHTML=html;
}

/* ================= CHECK ANSWER ================= */

function check(i){
if(answered) return;
answered=true;

let q=questions[current];
let correctIndex=q.answer;

let options=document.querySelectorAll(".option");

options.forEach((el,index)=>{
el.onclick=null;

if(index===correctIndex){
el.classList.add("correct");
}

if(index===i && i!==correctIndex){
el.classList.add("wrong");
}
});

if(i!==correctIndex){
document.getElementById("quiz").innerHTML+=
`<p style="color:#ff4d88;font-weight:bold;">💔 غلط</p>
<p style="color:#ff66b2;font-weight:bold;">الإجابة الصحيحة: ${q.options[correctIndex]}</p>`;
}else{
document.getElementById("quiz").innerHTML+=
`<p style="color:#ff66b2;font-weight:bold;">💗 صح</p>`;
}

document.getElementById("nextBtn").disabled=false;

if(i===correctIndex) score++;
}

/* ================= NEXT ================= */

function nextQuestion(){
current++;

if(current<questions.length){
showQuestion();
}else{
document.getElementById("quiz").innerHTML=
`<h2>خلصتي 💗</h2>
<p>درجتك: ${score}/20</p>
<button onclick="location.reload()">إعادة</button>`;
}
}
