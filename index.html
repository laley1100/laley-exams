<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Quiz</title>

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ffc0cb,#caa6ff);
}

.option{
display:block;
margin:10px auto;
padding:10px;
width:70%;
border-radius:12px;
background:#f3e6ff;
cursor:pointer;
}

.correct{background:#b6ffb6;}
.wrong{background:#ffb6b6;}

button{
padding:10px;
margin:10px;
border:none;
border-radius:10px;
background:#ffb6c1;
cursor:pointer;
}

#tr{font-size:13px;color:#444}
</style>
</head>

<body>

<div id="home">
<h2>اختاري المادة 💗</h2>
<button onclick="start('rights')">حقوق الملكية الفكرية</button>
<button onclick="start('comm')">Communication</button>
<button onclick="start('path')">Pathology</button>
</div>

<div id="quiz" style="display:none">

<h2 id="title"></h2>
<h3 id="qnum"></h3>

<h2 id="q"></h2>
<p id="tr"></p>

<div id="options"></div>

<h3>Score: <span id="score">0</span></h3>

<button onclick="next()">Next 💗</button>
</div>

<script>

let i=0;
let score=0;
let qset=[];

/* ========== الملكية الفكرية (عربي فقط) ========== */
const rights=[
{q:"من خصائص العنصر المعنوي لحق المؤلف عدم قابليته للتنازل",o:["أ","ب","ج","د"],a:0},
{q:"حق المؤلف حق لصيق بشخصية الإنسان",o:["أ","ب","ج","د"],a:0},
{q:"الحقوق المعنوية لا يجوز التنازل عنها",o:["أ","ب","ج","د"],a:0},
{q:"بيع المصنف لا ينقل الحقوق المعنوية",o:["أ","ب","ج","د"],a:0},
{q:"الحقوق المالية قابلة للتنازل",o:["أ","ب","ج","د"],a:0},
{q:"الحق المالي يمكن الحجز عليه",o:["أ","ب","ج","د"],a:0},
{q:"الحقوق المعنوية لا تسقط بالتقادم",o:["أ","ب","ج","د"],a:0},
{q:"العنصر المادي يظهر عند النشر",o:["أ","ب","ج","د"],a:0},
{q:"الحق سلطة تحقق منفعة",o:["أ","ب","ج","د"],a:0},
{q:"منع التشويه من الحقوق المعنوية",o:["أ","ب","ج","د"],a:0},
{q:"للمؤلف حق نشر مصنفه أول مرة",o:["أ","ب","ج","د"],a:0},
{q:"للمؤلف اختيار طريقة النشر",o:["أ","ب","ج","د"],a:0},
{q:"نسبة المصنف للمؤلف حق",o:["أ","ب","ج","د"],a:0},
{q:"يجوز النشر باسم مستعار",o:["أ","ب","ج","د"],a:0},
{q:"الترجمة بدون إذن اعتداء",o:["أ","ب","ج","د"],a:0},
{q:"إساءة الترجمة اعتداء",o:["أ","ب","ج","د"],a:0},
{q:"للمؤلف حق منع التشويه",o:["أ","ب","ج","د"],a:0},
{q:"الحقوق المعنوية شخصية",o:["أ","ب","ج","د"],a:0},
{q:"يجوز سحب المصنف",o:["أ","ب","ج","د"],a:0},
{q:"إذا لا يوجد ورثة تنتقل الحقوق للدولة",o:["أ","ب","ج","د"],a:0}
];

/* ========== Communication ========== */
const comm=[
{
q:"Therapeutic communication is best defined as",
tr:"التواصل العلاجي",
o:[
"Casual conversation",
"A planned professional act",
"Medical instructions only",
"Calming talk"
],
a:1
},
{
q:"Shared understanding helps to",
tr:"الفهم المشترك",
o:[
"Achieve goals",
"Reduce paperwork",
"Save time only",
"Limit interaction"
],
a:0
},
{
q:"Silence allows patient to",
tr:"الصمت يسمح للمريض",
o:[
"Feel ignored",
"Think",
"Lose interest",
"End conversation"
],
a:1
},
{
q:"Clarification is used to",
tr:"التوضيح",
o:[
"Check understanding",
"Challenge patient",
"Give orders",
"End talk"
],
a:0
},
{
q:"Reflecting focuses on",
tr:"الانعكاس",
o:[
"Facts only",
"Feelings",
"Opinion",
"Docs"
],
a:1
},
{
q:"Communication is",
tr:"التواصل",
o:[
"One way",
"Two way",
"Written only",
"None"
],
a:1
},
{
q:"Handover means",
tr:"التسليم",
o:[
"Equipment transfer",
"Responsibility transfer",
"Policy",
"Money"
],
a:1
},
{
q:"Noise affects communication",
tr:"الضوضاء",
o:[
"True",
"False",
"-",
"-"
],
a:0
},
{
q:"SBAR is",
tr:"SBAR",
o:[
"Tool",
"Disease",
"Drug",
"None"
],
a:0
},
{
q:"Communication failure leads to",
tr:"فشل التواصل",
o:[
"Safety",
"Errors",
"Fast discharge",
"None"
],
a:1
}
];

/* ========== Pathology ========== */
const path=[
{
q:"60% of body is water",
tr:"ماء الجسم",
o:["40%","50%","60%","70%"],
a:2
},
{
q:"Neoplasm is",
tr:"ورم",
o:["Normal growth","Abnormal growth","Inflammation","Infection"],
a:1
},
{
q:"Benign tumor is",
tr:"حميد",
o:["Invasive","Non invasive","Metastatic","Fatal"],
a:1
},
{
q:"Metastasis is",
tr:"انتشار",
o:["Local","Spread","Shrink","Heal"],
a:1
},
{
q:"Hypovolemic shock caused by",
tr:"صدمة نقص الدم",
o:["Bleeding","Infection","Allergy","Stress"],
a:0
},
{
q:"Most common thrombus",
tr:"خثرة",
o:["Arterial","Venous","Capillary","Cardiac"],
a:1
},
{
q:"Amyloidosis affects",
tr:"أميلويد",
o:["Liver","Kidney","Skin","Brain"],
a:1
},
{
q:"Tumor is",
tr:"ورم",
o:["Mass","Virus","Bacteria","Fluid"],
a:0
},
{
q:"Benign tumor is",
tr:"حميد",
o:["Well defined","Irregular","Metastatic","Necrotic"],
a:0
},
{
q:"Malignant tumor",
tr:"خبيث",
o:["Non invasive","Invasive","Benign","Small"],
a:1
}
];

function start(type){
i=0;score=0;

if(type==="rights") qset=rights;
if(type==="comm") qset=comm;
if(type==="path") qset=path;

document.getElementById("home").style.display="none";
document.getElementById("quiz").style.display="block";

document.getElementById("title").innerText=type;

show();
}

function show(){
let q=qset[i];

document.getElementById("qnum").innerText="Q"+(i+1);
document.getElementById("q").innerText=q.q;
document.getElementById("tr").innerText=q.tr||"";

let box=document.getElementById("options");
box.innerHTML="";

q.o.forEach((x,idx)=>{
let d=document.createElement("div");
d.className="option";
d.innerText=x;

d.onclick=()=>check(idx);
box.appendChild(d);
});
}

function check(idx){
let q=qset[i];
let opts=document.querySelectorAll(".option");

opts.forEach(o=>o.onclick=null);

if(idx===q.a){
opts[idx].classList.add("correct");
score++;
}else{
opts[idx].classList.add("wrong");
opts[q.a].classList.add("correct");
}
document.getElementById("score").innerText=score;
}

function next(){
i++;
if(i<qset.length) show();
else document.getElementById("quiz").innerHTML=
`<h2>Finished 💗</h2><h3>${score}/${qset.length}</h3>`;
}
</script>

</body>
</html>
