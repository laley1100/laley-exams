<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exam Platform</title>

<style>
body{
font-family: Arial;
background: linear-gradient(135deg,#ff9ed1,#bda0ff);
text-align:center;
padding:20px;
}

.card{
background: rgba(255,255,255,0.25);
padding:20px;
border-radius:20px;
width:85%;
margin:auto;
}

button{
display:block;
margin:10px auto;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:#ff4fa3;
color:white;
width:80%;
}

button.correct{background:#2ecc71 !important;}
button.wrong{background:#e74c3c !important;}

#nextBtn{background:#6c5ce7;}

.small{
font-size:11px;
color:#333;
margin-top:5px;
}
</style>
</head>

<body>

<h2>💗 Exam Platform</h2>

<div id="menu">

<button onclick="start('comm')">Communication</button>
<button onclick="start('path')">Pathology</button>
<button onclick="start('stats')">Statistics</button>
<button onclick="start('ip')">IP Rights</button>

</div>

<div class="card" id="quiz" style="display:none">

<h3 id="q"></h3>
<div class="small" id="q_ar"></div>

<div id="options"></div>

<p id="result"></p>

<button id="nextBtn" onclick="next()" disabled>Next</button>

</div>

<script>

let subject="";
let index=0;
let answered=false;

// ================= START =================
function start(s){
subject=s;
index=0;
document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";
show();
}

// ================= DATA =================

{q:"Communication is",ar:"التواصل هو",o:["One way","Two way","Written only","Tech"],a:1},
{q:"Handover factor negative",ar:"عامل سلبي للتسليم",o:["Noise","Clear docs","Tools","Team"],a:0},
{q:"Handover means",ar:"التسليم يعني",o:["Equipment","Responsibility","Policy","Money"],a:1},
{q:"NOT benefit",ar:"ليس من الفوائد",o:["Accuracy","Safety","Workload","Speed"],a:2},
{q:"Pause time",ar:"مدة التوقف",o:["5s","20-30s","1-2min","None"],a:1},

const path = [

{q:"Gold standard",ar:"أفضل فحص",o:["Blood","IHC","H&E","Flow"],a:2},
{q:"t-test",ar:"اختبار t",o:["Means 2 groups","Proportions","Counts","SD"],a:0},
{q:"ANOVA",ar:"ANOVA",o:["2 groups","3+ means","Categories","Percent"],a:1},
{q:"Incidence",ar:"حدوث جديد",o:["Total","New","Old","Ratio"],a:1},

const stats = [

// IP RIGHTS (20)
const ip = [

{q:"WIPO",ar:"الويبو",o:["Author","Creator","Authority","Sale"],a:1},
{q:"Transfer forms",ar:"نقل الحقوق",o:["Sale","Gift","All","None"],a:2},

{q:"Can prevent distortion",ar:"منع التشويه",o:["Yes","No","Maybe","None"],a:0},
{q:"Publishing",ar:"النشر",o:["Hidden","Public","Private","None"],a:1},
{q:"Translation",ar:"ترجمة",o:["Allowed","Forbidden","Always wrong","None"],a:0},
{q:"Bad translation",ar:"ترجمة سيئة",o:["No issue","Legal","Ignore","None"],a:1},
{q:"No heirs",ar:"بدون ورثة",o:["Court","State","Friend","None"],a:1},
{q:"Name usage",ar:"اسم المؤلف",o:["Must","Hide","Random","None"],a:0},
{q:"Refusal publish",ar:"رفض النشر",o:["Allowed","Forced","Illegal","None"],a:0},
{q:"Moral protection",ar:"الحماية",o:["Honor","Money","Trade","None"],a:0},
{q:"Violation",ar:"انتهاك",o:["Allowed","Not allowed","Optional","None"],a:1},
{q:"Author control",ar:"تحكم",o:["Author","Gov","None","Random"],a:0},
{q:"Attribution",ar:"نسبة العمل",o:["Author","Anyone","None","Fake"],a:0},
{q:"Publishing control",ar:"تحكم نشر",o:["Author","Gov","None","Random"],a:0},
{q:"Right protection",ar:"حماية",o:["Yes","No","Maybe","None"],a:0},
{q:"Work ownership",ar:"ملكية",o:["Author","Other","None","Random"],a:0}
];

// ================= ENGINE =================
function getData(){
if(subject==="comm") return comm;
if(subject==="path") return path;
if(subject==="stats") return stats;
return ip;
}

function show(){
answered=false;
document.getElementById("nextBtn").disabled=true;

let arr = getData();
let q = arr[index];

document.getElementById("q").innerText = (index+1)+" ) "+q.q;
document.getElementById("q_ar").innerText = q.ar;

let html="";
q.o.forEach((opt,i=>{
html += `<button onclick="check(this,${i})">${opt}</button>`;
});

document.getElementById("options").innerHTML=html;
document.getElementById("result").innerText="";
}

function check(btn,i){
if(answered) return;
answered=true;

let arr = getData();
let correct = arr[index].a;

let buttons=document.querySelectorAll("#options button");

if(i===correct){
btn.classList.add("correct");
document.getElementById("result").innerText="💚 صح";
}else{
btn.classList.add("wrong");
buttons[correct].classList.add("correct");
document.getElementById("result").innerText="💔 غلط";
}

document.getElementById("nextBtn").disabled=false;
}

function next(){
index++;
let arr = getData();

if(index>=arr.length){
document.querySelector(".card").innerHTML="💗 خلص الاختبار";
return;
}

show();
}

</script>

</body>
</html>
