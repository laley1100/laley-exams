<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(to right,#ffd6e7,#e6ccff);
    text-align:center;
    padding:20px;
}

h1{ color:#a64ca6; }

button{
    padding:10px;
    margin:10px;
    border:none;
    border-radius:10px;
    background:#ffb6d9;
    cursor:pointer;
    font-size:16px;
}

.container{
    background:white;
    padding:20px;
    border-radius:15px;
    max-width:500px;
    margin:auto;
}

.option{
    display:block;
    background:#f3e6ff;
    margin:6px auto;
    padding:8px;
    border-radius:10px;
    cursor:pointer;
    width:80%;
    font-size:14px;
}

.small{
    font-size:12px;
    color:gray;
}
</style>
</head>

<body>

<h1>Choose Subject</h1>

<div id="menu">
<button onclick="startQuiz('comm')">Communication Concept</button>
<button onclick="startQuiz('path')">Pathology</button>
<button onclick="startQuiz('ip')">حقوق الملكية الفكرية</button>
</div>

<div id="quiz" class="container" style="display:none;">
<h2 id="title"></h2>
<h3 id="question"></h3>
<div id="answers"></div>
<p id="result"></p>
</div>

<script>

let index=0;
let current=[];

/* ================= COMMUNICATION ================= */

const comm=[
{
q:"Therapeutic communication is best defined as",
ar:"التواصل العلاجي يُعرّف بأنه",
o:[
["Casual conversation between paramedic and patient","محادثة عادية"],
["A planned, deliberate, professional act using communication techniques","عملية مهنية مخططة"],
["Giving medical instructions only","تعليمات فقط"],
["Talking to calm the patient","تهدئة المريض"]
],
a:1
},

{
q:"Shared understanding of information helps to",
ar:"الفهم المشترك للمعلومات يساعد على",
o:[
["Achieve desired patient-care goals","تحقيق أهداف الرعاية"],
["Reduce documentation","تقليل التوثيق"],
["Save time only","توفير الوقت"],
["Limit patient interaction","تقليل التفاعل"]
],
a:0
}
];

/* ================= PATHOLOGY ================= */

const path=[
{
q:"Approximately what percentage of body weight is water?",
ar:"كم نسبة الماء في جسم الإنسان تقريبًا",
o:[
["40%","٤٠٪"],
["50%","٥٠٪"],
["60%","٦٠٪"],
["70%","٧٠٪"]
],
a:2
}
];

/* ================= IP ================= */

const ip=[
{
q:`1- من خصائص العنصر المعنوي لحق المؤلف`,
options:[
"أ- عدم قابليته للتنازل عنه أو التعامل به",
"ب- قابليته للتنازل عنه والتعامل به",
"ج- يسقط بالتقادم",
"د- قابليته للحجز"
],
a:0
},

{
q:`2- حق المؤلف يعتبر حقًا لصيقًا بشخصية الإنسان وهذا ما أُطلق عليه بموجب اتفاقية WIPO`,
options:[
"أ- المصنف أو المؤلف",
"ب- المؤلف أو المبدع أو المبتكر",
"ج- السلطة الأبوية",
"د- الاستغلال والتصرف"
],
a:1
}
];

/* ================= LOGIC ================= */

function startQuiz(type){
document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";
index=0;

if(type==="comm"){
current=comm;
document.getElementById("title").innerText="Communication Concept 💜";
}
if(type==="path"){
current=path;
document.getElementById("title").innerText="Pathology 💜";
}
if(type==="ip"){
current=ip;
document.getElementById("title").innerText="حقوق الملكية الفكرية 💜";
}

show();
}

function show(){
let q=current[index];
let box=document.getElementById("answers");
box.innerHTML="";
document.getElementById("result").innerText="";

/* ===== عرض السؤال ===== */

if(q.ar){
document.getElementById("question").innerHTML=
q.q + "<div class='small'>"+q.ar+"</div>";
}else{
document.getElementById("question").innerText=q.q;
}

/* ===== عرض الخيارات ===== */

if(q.o){
q.o.forEach((opt,i)=>{
let btn=document.createElement("div");
btn.className="option";
btn.innerHTML=opt[0]+"<div class='small'>"+opt[1]+"</div>";
btn.onclick=()=>check(i);
box.appendChild(btn);
});
}

if(q.options){
q.options.forEach((opt,i)=>{
let btn=document.createElement("div");
btn.className="option";
btn.innerText=opt;
btn.onclick=()=>check(i);
box.appendChild(btn);
});
}
}

/* ===== تحقق ===== */

function check(i){
let correct=current[index].a;

if(i===correct){
document.getElementById("result").innerHTML="صح 💖";
}else{
document.getElementById("result").innerHTML="غلط 💔";
}

setTimeout(()=>{
index++;
if(index<current.length){
show();
}else{
document.getElementById("question").innerText="خلصت 🎉";
document.getElementById("answers").innerHTML="";
}
},1000);
}

</script>

</body>
</html>
