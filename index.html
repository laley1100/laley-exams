<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Quiz</title>

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ffc0cb,#caa6ff);
}

.option{
display:block;
margin:10px auto;
padding:10px;
width:70%;
border-radius:12px;
background:#f3e6ff;
cursor:pointer;
}

.correct{background:#b6ffb6;}
.wrong{background:#ffb6b6;}

button{
padding:10px;
margin:10px;
border:none;
border-radius:10px;
background:#ffb6c1;
cursor:pointer;
}
</style>
</head>

<body>

<div id="home">
<h2>اختاري المادة 💗</h2>
<button onclick="start('rights')">حقوق الملكية الفكرية</button>
<button onclick="start('comm')">Communication</button>
<button onclick="start('path')">Pathology</button>
</div>

<div id="quiz" style="display:none">

<h2 id="title"></h2>
<h3 id="qnum"></h3>

<h2 id="q"></h2>
<p id="tr" style="font-size:13px;color:#444"></p>

<div id="options"></div>

<h3>Score: <span id="score">0</span></h3>

<button onclick="next()">Next 💗</button>
</div>

<script>

let i=0;
let score=0;
let qset=[];

/* ================= حقوق الملكية الفكرية ================= */
const rights=[

{q:"حق المؤلف حق لصيق بشخصية الإنسان",o:["المصنف","المؤلف","الحكومة","السوق"],a:1},
{q:"لا يجوز التنازل عن الحقوق المعنوية",o:["صح","خطأ","أحياناً","غير معروف"],a:0},
{q:"بيع المصنف لا ينقل الحقوق المعنوية",o:["صح","خطأ","أحياناً","غير مهم"],a:0},
{q:"الحقوق المالية يمكن التنازل عنها",o:["صح","خطأ","ممنوع","غير قانوني"],a:0},
{q:"الحق المالي يمكن الحجز عليه",o:["صح","خطأ","أحياناً","لا"],a:0},
{q:"العنصر المادي يظهر عند نشر المصنف",o:["صح","خطأ","فكرة","صمت"],a:0},
{q:"الحق هو سلطة تحقق منفعة",o:["صح","خطأ","اسم","لا شيء"],a:0},
{q:"منع التشويه من الحقوق المعنوية",o:["صح","خطأ","مال","بيع"],a:0},
{q:"المؤلف له حق نشر عمله",o:["صح","خطأ","غير ذلك","ممنوع"],a:0},
{q:"تحديد طريقة النشر حق للمؤلف",o:["صح","خطأ","دولة","سوق"],a:0},
{q:"نسبة المصنف للمؤلف حق",o:["صح","خطأ","بيع","حذف"],a:0},
{q:"إخفاء الاسم مسموح",o:["صح","خطأ","ممنوع","إجباري"],a:0},
{q:"الترجمة بدون إذن اعتداء",o:["صح","خطأ","حر","مسموح"],a:0},
{q:"إساءة الترجمة اعتداء",o:["صح","خطأ","عادي","مقبول"],a:0},
{q:"المؤلف يمنع التشويه",o:["صح","خطأ","بيع","سوق"],a:0},
{q:"الحقوق المعنوية شخصية",o:["صح","خطأ","مالية","تجارية"],a:0},
{q:"يجوز سحب المصنف",o:["صح","خطأ","بيع","شراء"],a:0},
{q:"الحقوق لا تسقط بالتقادم",o:["صح","خطأ","دائماً","أبداً"],a:0},
{q:"بدون ورثة تنتقل للدولة",o:["صح","خطأ","صديق","شركة"],a:0}
];

/* ================= Communication ================= */
const comm=[
{q:"Therapeutic communication is planned professional act",tr:"التواصل العلاجي عمل مهني مخطط",o:["صح","خطأ","عشوائي","غير مهم"],a:0},
{q:"Shared understanding helps patient goals",tr:"الفهم المشترك يساعد أهداف المريض",o:["صح","خطأ","لا","أحياناً"],a:0},
{q:"Silence allows patient to think",tr:"الصمت يساعد التفكير",o:["صح","خطأ","إلغاء","تجاهل"],a:0},
{q:"Exploring means digging deeper",tr:"الاستكشاف تعمق",o:["صح","خطأ","وقف","إنهاء"],a:0},
{q:"Clarification checks understanding",tr:"التوضيح للتأكد من الفهم",o:["صح","خطأ","إرباك","رفض"],a:0},
{q:"Communication is two-way",tr:"التواصل ثنائي",o:["صح","خطأ","واحد","صمت"],a:0},
{q:"Handover transfers responsibility",tr:"التسليم نقل مسؤولية",o:["صح","خطأ","مال","أداة"],a:0},
{q:"SBAR is communication tool",tr:"SBAR أداة تواصل",o:["صح","خطأ","مرض","دواء"],a:0},
{q:"Noise affects communication",tr:"الضوضاء تؤثر",o:["صح","خطأ","لا","دائماً"],a:0},
{q:"Failure leads to errors",tr:"الفشل يؤدي لأخطاء",o:["صح","خطأ","نجاح","راحة"],a:0},
{q:"Reflecting focuses on feelings",tr:"الانعكاس مشاعر",o:["صح","خطأ","أجهزة","قانون"],a:0},
{q:"Touch can be clinical",tr:"اللمس مهني",o:["صح","خطأ","عاطفي","مزاح"],a:0},
{q:"Communication improves safety",tr:"التواصل يحسن السلامة",o:["صح","خطأ","يضر","لا"],a:0},
{q:"Impasses are blocks",tr:"العوائق مشاكل",o:["صح","خطأ","نجاح","سرعة"],a:0},
{q:"Handover must be structured",tr:"التسليم منظم",o:["صح","خطأ","عشوائي","لا"],a:0},
{q:"Clarification example is what do you mean",tr:"مثال ماذا تقصد",o:["صح","خطأ","اذهب","توقف"],a:0},
{q:"Silence can be therapeutic",tr:"الصمت علاجي",o:["صح","خطأ","سيء","ممنوع"],a:0},
{q:"Communication is exchange",tr:"التواصل تبادل",o:["صح","خطأ","بيع","شراء"],a:0},
{q:"SBAR stands Situation Background Assessment Recommendation",tr:"SBAR حالة خلفية تقييم توصية",o:["صح","خطأ","لا","غير"],a:0},
{q:"Effective communication reduces errors",tr:"التواصل يقلل الأخطاء",o:["صح","خطأ","يزيد","لا"],a:0}
];

/* ================= Pathology ================= */
const path=[
{q:"60% of body is water",tr:"60% ماء",o:["صح","خطأ","50","70"],a:0},
{q:"Neoplasm is abnormal growth",tr:"ورم نمو غير طبيعي",o:["صح","خطأ","شفاء","التهاب"],a:0},
{q:"Benign tumor is non invasive",tr:"حميد غير غازي",o:["صح","خطأ","خبيث","سريع"],a:0},
{q:"Malignant tumor invades",tr:"خبيث يغزو",o:["صح","خطأ","حميد","طبيعي"],a:0},
{q:"Metastasis is spread",tr:"انتشار",o:["صح","خطأ","توقف","شفاء"],a:0},
{q:"Hypovolemic shock bleeding",tr:"صدمة نزيف",o:["صح","خطأ","قلب","دماغ"],a:0},
{q:"Venous thrombus common",tr:"خثرة وريدية",o:["صح","خطأ","دماغ","عظم"],a:0},
{q:"Kidney affected amyloidosis",tr:"الكلى تتأثر",o:["صح","خطأ","جلد","عظم"],a:0},
{q:"Tumor is abnormal mass",tr:"ورم كتلة غير طبيعية",o:["صح","خطأ","طبيعي","شفاء"],a:0},
{q:"Benign well defined",tr:"حميد واضح",o:["صح","خطأ","غير واضح","خبيث"],a:0},
{q:"Malignant invades tissue",tr:"خبيث يغزو",o:["صح","خطأ","محاط","بطيء"],a:0},
{q:"Histopathology gold standard",tr:"فحص نسيجي معيار ذهبي",o:["صح","خطأ","دم","بول"],a:0},
{q:"Carcinoma epithelial",tr:"سرطان طلائي",o:["صح","خطأ","عظمي","دهني"],a:0},
{q:"Sarcoma mesenchymal",tr:"ساركوما ضامة",o:["صح","خطأ","جلد","دم"],a:0},
{q:"Brain tumor dangerous",tr:"دماغ خطير",o:["صح","خطأ","بسيط","صغير"],a:0},
{q:"Metastasis defines malignancy",tr:"انتشار خباثة",o:["صح","خطأ","حميد","عادي"],a:0},
{q:"Benign encapsulated",tr:"محاط",o:["صح","خطأ","منتشر","خبيث"],a:0},
{q:"Ulcer mass malignant",tr:"قرحة خباثة",o:["صح","خطأ","حميد","جلد"],a:0},
{q:"Tumor uncontrolled growth",tr:"نمو غير مسيطر",o:["صح","خطأ","شفاء","طبيعي"],a:0},
{q:"Liposarcoma soft tissue tumor",tr:"ورم دهني",o:["صح","خطأ","عظم","دم"],a:0}
];

function start(type){
i=0;score=0;

if(type==="rights") qset=rights;
if(type==="comm") qset=comm;
if(type==="path") qset=path;

document.getElementById("home").style.display="none";
document.getElementById("quiz").style.display="block";

document.getElementById("title").innerText=type;

show();
}

function show(){
let q=qset[i];
document.getElementById("qnum").innerText="Q"+(i+1);
document.getElementById("q").innerText=q.q;
document.getElementById("tr").innerText=q.tr||"";

let box=document.getElementById("options");
box.innerHTML="";

q.o.forEach((x,idx)=>{
let d=document.createElement("div");
d.className="option";
d.innerText=x;
d.onclick=()=>check(idx);
box.appendChild(d);
});
}

function check(idx){
let q=qset[i];
let opts=document.querySelectorAll(".option");

opts.forEach(o=>o.onclick=null);

if(idx===q.a){
opts[idx].classList.add("correct");
score++;
}else{
opts[idx].classList.add("wrong");
opts[q.a].classList.add("correct");
}

}

function next(){
i++;
if(i<qset.length) show();
else document.getElementById("quiz").innerHTML=`<h2>Done 💗</h2><h3>${score}/60</h3>`;
}
</script>

</body>
</html>
