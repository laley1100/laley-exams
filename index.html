<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXAM PLATFORM 🤍</title>

<style>
/* إعدادات الخلفية والنعومة العامة */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #fff2f6 0%, #f3e8ff 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
}

/* حاوية العرض الرئيسية الكيوت */
.container {
    background: rgba(255, 250, 245, 0.95); 
    width: 100%;
    max-width: 700px;
    padding: 35px 25px;
    border-radius: 32px;
    border: 2px solid rgba(252, 231, 243, 0.8); 
    box-shadow: 0 20px 40px rgba(244, 63, 94, 0.05), 0 1px 3px rgba(0,0,0,0.01);
    backdrop-filter: blur(10px);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* عنوان المنصة الأنيق في الصفحة الأولى */
#title { 
    font-size: 32px; 
    font-weight: 800; 
    color: #db2777; 
    letter-spacing: 1px;
    margin-bottom: 5px;
    text-shadow: 1px 1px 2px rgba(219, 39, 119, 0.1);
}

.subtitle {
    color: #8b5cf6; 
    font-size: 16px; 
    font-weight: 600; 
    margin-top: 0;
    margin-bottom: 30px;
}

/* تقسيم أزرار المواد في عمودين متناسقين */
.menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
}

/* تصميم أزرار المواد الكيوت والناعمة */
.menuBtn { 
    background: #f3e8ff; 
    color: #6b21a8; 
    padding: 20px 15px;
    border: 1px solid #e9d5ff;
    border-radius: 20px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 700;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 10px rgba(107, 33, 168, 0.03);
} 

.menuBtn:hover {
    background: #e9d5ff;
    transform: translateY(-4px);
    box-shadow: 0 8px 20px rgba(107, 33, 168, 0.08);
}

.menuBtn span.badge {
    font-size: 12px;
    background: rgba(255, 255, 255, 0.7);
    padding: 3px 10px;
    border-radius: 12px;
    color: #7c3aed;
    font-weight: bold;
}

/* خيارات الأسئلة النود المشمشي والوردي */
.option {
    display: block;
    margin: 14px auto;
    padding: 16px;
    background: #fff7ed; 
    border: 1px solid #ffedd5;
    border-radius: 16px;
    cursor: pointer;
    width: 92%;
    text-align: left;
    font-size: 15px;
    font-weight: 600;
    color: #5c4d66;
    transition: all 0.2s ease;
}

.option:hover {
    background: #ffedd5;
    transform: translateX(3px);
}

.option.selected {
    background: #fce7f3; 
    border-color: #f472b6;
    color: #9d174d;
}

.option.correct-flash {
    background: #d1fae5;
    border-color: #10b981;
    color: #065f46;
}

.option.wrong-flash {
    background: #ffe4e6;
    border-color: #fb7185;
    color: #9f1239;
}

/* أزرار التحكم بالأسئلة */
.controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 25px;
    padding: 0 15px;
}

button.action-btn {
    padding: 12px 24px;
    border: none;
    border-radius: 16px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
}

button.action-btn:hover {
    opacity: 0.9;
    transform: translateY(-1px);
}

.next { background: #f472b6; color: white; box-shadow: 0 4px 12px rgba(244, 114, 182, 0.3); } 
.back { background: #cbd5e1; color: #475569; }
.homeBtn { background: #c084fc; color: white; box-shadow: 0 4px 12px rgba(192, 132, 252, 0.3); }

/* نصوص التوضيح والترجمات المريحة */
.small { font-size: 15px; opacity: 0.95; margin-top: 10px; color: #b45309; font-weight: 600; direction: rtl; text-align: right; line-height: 1.5; }
.feedback { margin-top: 20px; font-weight: bold; font-size: 17px; padding: 14px; border-radius: 16px; direction: rtl; text-align: right; }

.screen { display: none; }
.active { display: block; animation: fadeIn 0.4s ease-out; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

/* تقرير الأخطاء النهائي المرتب */
.wrong-report {
    text-align: right;
    direction: rtl;
    background: #fff5f5;
    padding: 16px;
    margin-top: 14px;
    border-right: 5px solid #fb7185;
    border-radius: 14px;
}
</style>
</head>

<script>
let current = 0;
let answered = {}; 
let subject = "";
let isShowingFeedback = false;

// دالة توليد صوت كيوت وناعم رقمياً عند اختيار المادة
function playCuteSound() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // النوتة الأولى الفاتحة
        const osc1 = audioCtx.createOscillator();
        const gain1 = audioCtx.createGain();
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(523.25, audioCtx.currentTime); // نوتة C5
        gain1.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc1.connect(gain1);
        gain1.connect(audioCtx.destination);
        osc1.start();
        osc1.stop(audioCtx.currentTime + 0.1);

        // النوتة الثانية الأعلى والكيت بعد جزء من الثانية
        setTimeout(() => {
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(659.25, audioCtx.currentTime); // نوتة E5 مرتبطة ومبهجة
            gain2.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start();
            osc2.stop(audioCtx.currentTime + 0.15);
        }, 60);

    } catch (e) {
        console.log("Audio feedback not supported or blocked by browser policies.");
    }
}

{ q: "50. A correlation of 0.10 is:", ar: "قيمة الارتباط 0.10 تعتبر ارتباطاً ضعيفاً جداً أو يكاد ينعدم.", options: ["Very strong", "Weak or none", "Moderate", "Strong"], answer: 1 },
{ q: "51. Which value indicates very strong correlation?", ar: "أي من القيم التالية تشير إلى ارتباط قوي جداً؟", options: ["0.25", "0.45", "0.85", "0.10"], answer: 2 },
{ q: "52. Phi coefficient (φ) is used when:", ar: "يُستخدم معامل فاي عندما يكون كلا المتغيرين ثنائيين (Binary Variables).", options: ["Both variables are continuous", "Both variables are binary", "Data is ranked", "Data is normal"], answer: 1 },
{ q: "53. Pearson correlation (r) is used when:", ar: "ارتباط بيرسون يُستخدم عندما تكون البيانات رقمية مستمرة وموزعة طبيعياً.", options: ["Data is ordinal only", "Data is binary only", "Data is continuous and normally distributed", "Data is random"], answer: 2 },
{ q: "54. Point-biserial correlation is used when:", ar: "الارتباط النقطي ثنائي السلسلة يُستخدم عندما يكون أحد المتغيرين ثنائياً والآخر مستمراً.", options: ["Both variables are continuous", "Both variables are binary", "One binary and one continuous variable", "Data is ranked only"], answer: 2 },
{ q: "55. What is the primary goal of medical bioinformatics?", ar: "الهدف الأساسي للمعلوماتية الحيوية الطبية هو استخدام الأدوات الحوسبية لتحسين التشخيص والعلاج وفهم الأمراض.", options: ["To replace doctors with computers", "To use computational tools to improve understanding, diagnosis, and treatment of diseases", "To store patient records only", "To eliminate the need for laboratory testing"], answer: 1 },
{ q: "56. Machine learning in medical bioinformatics can be used to:", ar: "يمكن استخدام التعلم الآلي في هذا مجال لتحليل وتفسير الصور الطبية مثل الأشعة السينية.", options: ["Analyze X-ray images", "Replace DNA sequencing machines", "Store patient health records", "Manufacture drugs directly"], answer: 0 },
{ q: "57. Personalized medicine in bioinformatics is based on:", ar: "الطب الشخصي والمفصل يقوم بالأساس على التركيب الجيني الفريد لكل مريض.", options: ["Patient’s lifestyle only", "Patient’s genetic makeup", "Doctor’s experience", "Hospital resources"], answer: 1 },
{ q: "58. AI helps drug discovery by:", ar: "الذكاء الاصطناعي يسرع اكتشاف الأدوية عبر فحص وتحليل ملايين المركبات الكيميائية بسرعة فائقة.", options: ["Analyzing millions of chemical compounds", "Manufacturing drugs automatically", "Eliminating clinical trials", "Replacing pharmacists"], answer: 0 },
{ q: "59. Why is medical bioinformatics important in modern medicine?", ar: "أهميتها تكمن في قدرتها على تحليل كميات ضخمة من البيانات الطبية المعقدة لتحسين جودة الرعاية.", options: ["It reduces the need for doctors", "It helps analyze massive medical data to improve diagnosis and treatment", "It eliminates the need for patient history", "It focuses only on psychology"], answer: 1 },
{ q: "60. Which of the following is a common data type in medical bioinformatics?", ar: "نوع البيانات الأكثر شيوعاً في المعلوماتية الحيوية هو تتابعات الـ DNA والـ RNA.", options: ["DNA/RNA sequences", "Weather patterns", "Traffic flow data", "Economic statistics"], answer: 0 },
{ q: "61. AI can assist in medical imaging by:", ar: "يساعد الذكاء الاصطناعي في الكشف عن الأورام بدقة داخل الأشعة المقطعية أو الرنين المغناطيسي.", options: ["Detecting tumors in CT or MRI scans", "Replacing radiologists entirely", "Designing hospital buildings", "Managing patient billing"], answer: 0 },
{ q: "62. Machine learning models can predict diseases by analyzing:", ar: "يمكن للنماذج التنبؤ بالأمراض عبر ربط وتحليل البيانات الجينية والسريرية ونمط الحياة.", options: ["Patient’s favorite food", "Genetic, clinical, and lifestyle data", "Hospital budgets", "Doctor’s handwriting"], answer: 1 },
{ q: "63. Which of the following is a limitation of AI in medicine?", ar: "من عيوب وحدود الذكاء الاصطناعي في الطب أنه يعتمد كلياً على جودة ونظافة البيانات المدخلة.", options: ["It requires high-quality data", "It eliminates the need for doctors", "It guarantees perfect accuracy", "It never inherits bias"], answer: 0 },
{ q: "64. What is one major challenge in medical bioinformatics?", ar: "التحدي الأكبر هو الحجم الضخم جداً والهائل للبيانات الناتجة والتي تحتاج لتحليل دقيق.", options: ["Lack of diseases", "Large amount of data", "Too few computers", "No need for analysis"], answer: 1 },
{ q: "65. Why is understanding genes difficult?", ar: "دراسة وفهم الجينات صعبة جداً نظراً للتعقيد البالغ والتشابك في الأنظمة الجينية.", options: ["They are too small to study", "They change daily", "They are very complex", "They are not important"], answer: 2 },
{ q: "66. Why must patient data be protected?", ar: "يجب حماية بيانات المرضى بقوة لأنها معلومات جينية وسريرية شديدة الخصوصية والحساسية.", options: ["To reduce computer usage", "Because it is cheap", "Because it is private and sensitive", "To share it publicly"], answer: 2 },
{ q: "67. One challenge of Medical Bioinformatics is:", ar: "من أبرز التحديات الحالية النقص الشديد في الكوادر والمتخصصين الذين يجمعون بين الطب والحوسبة.", options: ["Too many specialists", "Lack of specialists", "No data", "No diseases"], answer: 1 },
{ q: "68. Errors in medical bioinformatics analysis may lead to:", ar: "حدوث أي خطأ في التحليل الجيني قد يتسبب في تشخيص خاطئ أو إعطاء علاج غير مناسب للمريض.", options: ["Faster recovery", "Correct diagnosis", "Wrong diagnosis or treatment", "No effect"], answer: 2 },
{ q: "69. Personalized medicine is based on:", ar: "يقوم الطب الشخصي على مواءمة العلاج مع جينات المريض وحالته الصحية الدقيقة.", options: ["Age only", "Random selection", "Patient genes and condition", "Doctor preference"], answer: 2 },
{ q: "70. Bioinformatics helps develop new drugs by:", ar: "تساهم المعلوماتية الحيوية في تقليص الوقت والتكلفة اللازمين لتطوير واختبار الأدوية الجديدة.", options: ["Increasing cost", "Reducing time and cost", "Avoiding research", "Using animals only"], answer: 1 },
{ q: "71. Targeted cancer therapy is based on:", ar: "يعتمد العلاج الموجه للسرطان على استهدف طفرات جينية محددة وخاصة بالورم (مثل EGFR).", options: ["Symptoms only", "Genetic mutations (e.g., EGFR)", "Age", "Diet"], answer: 1 },
{ q: "72. Bioinformatics helps doctors to:", ar: "تساعد الأطباء في اختيار الدواء والجرعة المناسبة تماماً بناءً على استجابة الجسم الجينية.", options: ["Delay treatment", "Give the same drug to all", "Choose the right drug and dose", "Avoid diagnosis"], answer: 2 },
{ q: "73. Bioinformatics improves diagnosis by:", ar: "تحسين التشخيص يتم عبر توظيف المؤشرات الحيوية وتقنيات الذكاء الاصطناعي المتقدمة.", options: ["Ignoring patient data", "Using biomarkers and AI", "Using manual methods only", "Removing lab tests"], answer: 1 },
{ q: "74. A biomarker is:", ar: "المؤشر الحيوي هو علامة بيولوجية قابلة للقياس تدل على وجود أو تطور المرض.", options: ["A type of drug", "A measurable indicator of disease", "A machine", "A symptom"], answer: 1 },
{ q: "75. Genetic data should be protected because:", ar: "البيانات الجينية حساسة وشخصية للغاية ويجب حمايتها لمنع إساءة استخدامها.", options: ["It is unimportant", "It is temporary", "It is sensitive and personal", "It changes daily"], answer: 2 },
{ q: "76. Genetic discrimination may occur when:", ar: "التمييز الجيني يحدث عندما يستغل أصحاب العمل أو الشركات المخاطر الجينية بشكل غير عادل.", options: ["Data is deleted", "Employers use genetic risk unfairly", "Data is hidden", "Patients refuse treatment"], answer: 1 },
{ q: "77. Informed consent means:", ar: "الموافقة المستنيرة تعني الفهم الكامل والواضح من المريض لكيفية استخدام بياناته الجينية.", options: ["Signing without reading", "Full understanding of data use", "Doctor decides alone", "No permission needed"], answer: 1 },
{ q: "78. Genetic data affects family members because:", ar: "المعلومات الجينية تؤثر على العائلة بأكملها نظراً لوجود جينات مشتركة ومورثة بينهم.", options: ["It is private only", "It is shared genetically", "It is unrelated", "It is temporary"], answer: 1 },
{ q: "79. One psychological impact of genetic testing is:", ar: "من التأثيرات النفسية المحتملة للفحص الجيني حدوث القلق أو التوتر بانتظار النتائج.", options: ["Happiness only", "Anxiety or stress", "No effect", "Memory loss"], answer: 1 },
{ q: "80. Data ownership concerns relate to:", ar: "مخاوف ملكية البيانات ترتبط بتحديد من يملك ومن له حق التحكم في البيانات الجينية المخزنة.", options: ["Weather changes", "Who controls genetic data", "Machine speed", "Virus infections"], answer: 1 },
{ q: "81. Bias in AI can cause:", ar: "التحيز في نماذج الذكاء الاصطناعي قد يؤدي إلى عدم المساواة والتمييز في تقديم الرعاية الصحية.", options: ["Equal outcomes", "Perfect results", "Inequality in healthcare", "Faster drugs"], answer: 2 },
{ q: "82. CRISPR raises concerns about:", ar: "تقنية تعديل الجينات كريسبر (CRISPR) تثير مخاوف أخلاقية حول إمكانية تصميم أطفال بمواصفات معينة (Designer babies).", options: ["Faster computers", "Designer babies", "Data storage", "Internet speed"], answer: 1 },
{ q: "83. Genetic data security risk includes:", ar: "مخاطر أمن البيانات تتضمن احتمالية التعرض للاختراق وتسريب البيانات الحساسة.", options: ["Data deletion", "Hacking and data breaches", "Slow analysis", "Lack of genes"], answer: 1 }
],

path: [
{ q: "1. Approximately what percentage of body weight is water?", ar: "ما هي النسبة المئوية التقريبية للماء في وزن الجسم ؟", options: ["40%", "50%", "60%", "70%"], answer: 2 },
{ q: "2. Non-pitting edema occurs in which condition?", ar: "في أي حالة يحدث الوذمة غير التجويفية؟", options: ["Cardiac edema", "Renal edema", "Nutritional edema", "Lymphatic edema"], answer: 3 },
{ q: "3. Which of the following is an example of physiological hyperemia?", ar: "أي مما يلي هو مثال على فرط الدم الفسيولوجي؟", options: ["Hyperemia in acute inflammation", "Hyperemia in skeletal muscles during exercise", "Hyperemia in congestive heart failure", "Hyperemia in venous obstruction"], answer: 1 },
{ q: "4. Which type of thrombus is most common in the human body?", ar: "أي نوع من الجلطة الدموية هو الأكثر شيوعا في جسم الإنسان؟", options: ["Arterial thrombus", "Capillary thrombus", "Venous thrombus", "Cardiac mural thrombus"], answer: 2 },
{ q: "5. A thrombus that contains pyogenic bacteria is called:", ar: "تسمى الجلطة الدموية التي تحتوي على بكتيريا صديدية بـ:", options: ["Aseptic thrombus", "Red thrombus", "Septic thrombus", "Mixed thrombus"], answer: 2 },
{ q: "6. Which type of shock is most likely to affect a patient with massive hemorrhage?", ar: "أي نوع من الصدمة من المرجح أن يصيب مريضا يعاني من نزيف حاد؟", options: ["Cardiogenic shock", "Hypovolemic shock", "Anaphylactic shock", "Neurogenic shock"], answer: 1 },
{ q: "7. Amniotic fluid embolism typically occurs during:", ar: "يحدث انسداد السائل السلوي (الأمينوسي) عادة أثناء:", options: ["Early pregnancy", "Labor and delivery", "Postpartum period after 1 month", "Abdominal trauma in first trimester"], answer: 1 },
{ q: "8. Fat embolism is most commonly associated with:", ar: "يرتبط الانسداد الدهني بشكل شائع بـ:", options: ["Deep vein thrombosis", "Fractures of long bones", "Bacterial endocarditis", "Air bubble injection"], answer: 1 },
{ q: "9. Pale (white) infarcts typically occur in which of the following organs?", ar: "تحدث الاحتشاءات الشاحبة البيضاء عادة في أي من الأعضاء التالية؟", options: ["Lungs", "Small intestine", "Heart and Spleen", "Liver"], answer: 2 },
{ q: "10. Red (hemorrhagic) infarcts are typically seen in:", ar: "تظهر الاحتشاءات الحمراء (النزفية) عادة في:", options: ["Kidneys", "Spleen", "Lungs and Gastrointestinal tract", "Heart"], answer: 2 },
{ q: "11. Septic shock is primarily caused by:", ar: "تحدث الصدمة التسممية بشكل أساسي بسبب:", options: ["Severe allergic reaction", "Gram-negative or Gram-positive bacterial infections", "Acute myocardial infarction", "Spinal cord injury"], answer: 1 },
{ q: "12. What is the definition of ischemia?", ar: "ما هو تعريف نقص التروية (الإقفار)؟", options: ["Inability of cells to use oxygen", "Inadequate blood supply to a tissue or organ", "Increase in venous blood flow", "Excessive oxygenation of tissues"], answer: 1 },
{ q: "13. In decompression sickness, the bubbles are composed of:", ar: "في مرض تخفيف الضغط ، تتكون الفقاعات من:", options: ["Oxygen", "Carbon dioxide", "Nitrogen", "Helium"], answer: 2 },
{ q: "14. Chronic passive congestion of the liver leads to a condition known macroscopically as:", ar: "يؤدي الاحتقان السلبي المزمن في الكبد إلى حالة تُعرف عيانياً باسم:", options: ["Nutmeg liver", "Sago spleen", "Bread and butter pericarditis", "Fatty liver"], answer: 0 },
{ q: "15. A 65-year-old bedridden patient develops sudden chest pain and dyspnea. The most likely cause is:", ar: "مريض يبلغ من العمر 65 عاماً طريح الفراش أصيب بألم مفاجئ في الصدر وضيق في التنفس. السبب المرجح هو:", options: ["Air embolism", "Pulmonary thromboembolism", "Fat embolism", "Amniotic fluid embolism"], answer: 1 },
{ q: "16. Which type of necrosis is most characteristic of brain infarction?", ar: "أي نوع من النخر هو الأكثر تميزاً لاحتشاء الدماغ؟", options: ["Coagulative necrosis", "Liquefactive necrosis", "Caseous necrosis", "Fat necrosis"], answer: 1 },
{ q: "17. Lines of Zahn are characteristic features of:", ar: "خطوط زاهن هي سمات مميزة لـ:", options: ["Postmortem clots", "Thrombi formed in flowing blood", "Atherosclerotic plaques without thrombus", "Air emboli"], answer: 1 },
{ q: "18. What is the major protective mechanism against edema in normal tissues?", ar: "ما هو الآلية الوقائية الرئيسية ضد الوذمة في الأنسجة الطبيعية؟", options: ["Increased capillary permeability", "Lymphatic drainage", "High hydrostatic pressure", "Decreased interstitial oncotic pressure"], answer: 1 },
{ q: "19. Anasarca refers to:", ar: "الاستسقاء العام (Anasarca) يشير إلى:", options: ["Edema confined to the lower limbs", "Severe, generalized edema of the whole body", "Edema in the peritoneal cavity", "Edema in the pleural cavity"], answer: 1 },
{ q: "20. The primary force that drives fluid out of capillaries into the interstitial space is:", ar: "القوة الرئيسية التي تدفع السوائل خارج الشعيرات الدموية إلى الفراغ الخلالي هي:", options: ["Plasma colloid osmotic pressure", "Capillary hydrostatic pressure", "Tissue hydrostatic pressure", "Interstitial colloid osmotic pressure"], answer: 1 },
{ q: "21. Reduced plasma oncotic pressure leading to edema is most commonly caused by:", ar: "انخفاض الضغط الاسموزي الغرواني للبلازما المؤدي إلى الوذمة يحدث بشكل شائع بسبب:", options: ["Heart failure", "Loss or reduced synthesis of albumin", "Lymphatic obstruction", "Sodium retention only"], answer: 1 },
{ q: "22. Active hyperemia is caused by:", ar: "يحدث فرط الدم النشط بسبب:", options: ["Arteriolar dilation", "Impaired venous outflow", "Decreased cardiac output", "Thrombus formation"], answer: 0 },
{ q: "23. In heart failure cells found in the lung alveoli, the brown pigment is:", ar: "في خلايا قصور القلب الموجودة في الحويصلات الهوائية، يكون الصباغ البني هو:", options: ["Lipofuscin", "Melanin", "Hemosiderin", "Bilirubin"], answer: 2 },
{ q: "24. What is the fate of most small thrombi?", ar: "ما هو مصير معظم الجلطات الصغيرة؟", options: ["Embolization", "Organization and recanalization", "Resolution / Dissolution by fibrinolysis", "Propagation"], answer: 2 },
{ q: "25. Which of the following defines a benign tumor?", ar: "أي مما يلي يحدد الورم الحميد؟", options: ["Infiltrative growth pattern", "High rate of metastasis", "Slow growth, well-circumscribed, remains localized", "Frequent mitotic figures and cellular atypia"], answer: 2 },
{ q: "26. The term 'adenoma' refers to a benign tumor of:", ar: "يشير مصطلح 'adenoma' إلى ورم حميد في:", options: ["Squamous epithelium", "Glandular epithelium", "Smooth muscle", "Fibrous tissue"], answer: 1 },
{ q: "27. Malignant tumors of mesenchymal origin are called:", ar: "تسمى الأورام الخبيثة ذات الأصل الميزنشيمي بـ:", options: ["Carcinomas", "Sarcomas", "Adenomas", "Melanomas"], answer: 1 },
{ q: "28. What is the most definitive feature distinguishing malignant from benign tumors?", ar: "ما هي السمة الأكثر حسمًا التي تميز الأورام الخبيثة عن الحميدة؟", options: ["Slow growth rate", "Presence of a capsule", "Metastasis", "Cellular pleomorphism"], answer: 2 },
{ q: "29. The term 'anaplasia' indicates:", ar: "يشير مصطلح 'anaplasia' إلى:", options: ["Increased differentiation", "Lack of differentiation", "Orderly cellular growth", "Benign behavior"], answer: 1 },
{ q: "30. Which of the following is a malignant tumor despite having the suffix '-oma'?", ar: "أي مما يلي هو ورم خبيث على الرغم من وجود اللاحقة '-oma'؟", options: ["Fibroma", "Lipoma", "Melanoma", "Osteoma"], answer: 2 },
{ q: "31. Carcinomas preferentially metastasize through which pathway?", ar: "تنتشر السرطانات (Carcinomas) بشكل تفضيلي عبر أي مسار؟", options: ["Hematogenous pathway", "Lymphatic pathway", "Seeding of body cavities", "Nervous pathway"], answer: 1 },
{ q: "32. Sarcomas preferentially metastasize through which pathway?", ar: "تنتشر الساركومات (Sarcomas) بشكل تفضيلي عبر أي مسار؟", options: ["Lymphatic pathway", "Hematogenous pathway", "Seeding of body cavities", "Direct contact only"], answer: 1 },
{ q: "33. A benign tumor composed of blood vessels is called:", ar: "يسمى الورم الحميد المكون من أوعية دموية بـ:", options: ["Lymphangioma", "Hemangioma", "Leiomyoma", "Fibroma"], answer: 1 },
{ q: "34. What is a 'teratoma'?", ar: "ما هو الورم المسخي (Teratoma)؟", options: ["A benign tumor of fibrous tissue", "A tumor containing tissues from more than one germ layer", "A malignant tumor of squamous epithelium", "A tumor of placental tissue"], answer: 1 },
{ q: "35. Cachexia in cancer patients is primarily driven by:", ar: "الدنف (Cachexia) لدى مرضى السرطان ينتج بشكل أساسي عن:", options: ["Purely mechanical obstruction of the GI tract", "Cytokines like TNF-alpha and IL-1 causing metabolic changes", "Decreased physical activity", "Hormone deficiencies"], answer: 1 },
{ q: "36. Tumor staging (e.g., TNM system) evaluates:", ar: "يقيم تصنيف الورم (مثل نظام TNM):", options: ["The degree of cellular differentiation", "The size and anatomical extent of the tumor spread", "The number of mitotic figures", "The color of the tumor"], answer: 1 },
{ q: "37. Tumor grading evaluates:", ar: "يقيم تدرج الورم (Grading):", options: ["The size of the primary tumor", "The number of lymph nodes involved", "The degree of cellular differentiation and mitotic activity", "The presence of distant metastasis"], answer: 2 },
{ q: "38. Paraneoplastic syndromes are:", ar: "المتلازمات المصاحبة للسرطان (Paraneoplastic syndromes) هي:", options: ["Symptoms caused by local tumor invasion", "Symptoms caused by distant tumor metastasis", "Symptom complexes not readily explained by local/distant spread or hormones indigenous to tissue", "Complications of chemotherapy"], answer: 2 },
{ q: "39. Metastatic calcification occurs in:", ar: "يحدث التكلس النقيلي (Metastatic calcification) في:", options: ["Dead or dying tissues with normal calcium levels", "Normal tissues associated with hypercalcemia", "Inflammatory areas only", "Atherosclerotic plaques only"], answer: 1 },
{ q: "40. Dystrophic calcification occurs in:", ar: "يحدث التكلس الضموري (Dystrophic calcification) في:", options: ["Normal tissues with high calcium levels", "Dead or degenerated tissues with normal serum calcium levels", "Healthy organs without any injury", "Bone tissues only"], answer: 1 },
{ q: "41. A leiomyoma is a benign tumor of:", ar: "الورم العضلي الأملس (Leiomyoma) هو ورم حميد في:", options: ["Skeletal muscle", "Smooth muscle", "Cardiac muscle", "Adipose tissue"], answer: 1 },
{ q: "42. A malignant tumor of skeletal muscle is called:", ar: "يسمى الورم الخبيث في العضلات الهيكلية بـ:", options: ["Leiomyosarcoma", "Rhabdomyosarcoma", "Liposarcoma", "Fibrosarcoma"], answer: 1 },
{ q: "43. Proto-oncogenes are normal genes that, when mutated, become:", ar: "الجينات الورمية الأولية هي جينات طبيعية عندما تتحور تصبح:", options: ["Tumor suppressor genes", "Oncogenes", "DNA repair genes", "Apoptotic genes"], answer: 1 },
{ q: "44. The p53 gene is a well-known:", ar: "يعتبر جين p53 معروفاً بأنه:", options: ["Oncogene", "Tumor suppressor gene", "Growth factor", "Angiogenic factor"], answer: 1 },
{ q: "45. Which clinical feature is most suggestive of a malignant tumor?", ar: "أي ميزة سريرية هي الأكثر دلالة على وجود ورم خبيث؟", options: ["Slow growth over 10 years", "Mobile, non-fixed mass", "Unintentional weight loss and fixation to surrounding tissues", "Bleeding"], answer: 2 },
{ q: "46. A patient presents with a suspicious breast lump. Which cytology technique is minimally invasive, rapid, and low-cost?", ar: "مريض يعاني من كتلة مشبوهة في الثدي. أي تقنية فحص خلوي هي أقل تدخلا، سريعة، ومنخفضة التكلفة؟", options: ["Excisional biopsy", "Fine Needle Aspiration Cytology (FNAC)", "Endoscopic biopsy", "Liquid biopsy"], answer: 1 },
{ q: "47. Which immunohistochemistry (IHC) marker would be most useful to confirm a carcinoma (epithelial origin)?", ar: "من علامات الكيمياء المناعية النسيجية ستكون الأكثر فائدة لتأكيد وجود سرطانة ذات أصل طلائي؟", options: ["Vimentin", "Cytokeratin", "CD34", "Ki-67"], answer: 1 },
{ q: "48. A high Ki-67 proliferation index on IHC suggests:", ar: "ماذا يشير ارتفاع مؤشر التكاثر 67 في الكيمياء المناعية النسيجية؟", options: ["Benign tumor", "Low-grade malignancy", "High proliferative activity", "Hormone receptor positivity"], answer: 2 },
{ q: "49. Flow cytometry is particularly useful in diagnosing:", ar: "يعتبر تحليل التدفق الخلوي مفيدا بشكل خاص في تشخيص:", options: ["Liver cirrhosis", "Lung adenocarcinoma", "Leukemias and lymphomas", "Breast carcinoma"], answer: 2 },
{ q: "50. Molecular testing for Microsatellite Instability (MSI) is important in:", ar: "اختبار عدم الاستقرار في الأقمار المايكروساتلائية مهم في:", options: ["Colorectal cancer prognosis and therapy", "Diagnosing acute inflammation", "Evaluating iron deficiency anemia", "Detecting air embolism"], answer: 0 }

/* ============================
   ENGINE FUNCTIONS
============================ */
function startQuiz(sub) {
    playCuteSound(); // تشغيل الصوت اللطيف عند اختيار المادة
    subject = sub;
    current = 0;
    answered = {}; 
    isShowingFeedback = false;
    
    document.getElementById("menu").classList.remove("active");
    document.getElementById("quiz").classList.add("active");
    
    showQuestion();
}

function showQuestion() {
    const questions = bank[subject];
    const qData = questions[current];
    
    isShowingFeedback = false;
    document.getElementById("nextBtn").innerText = "Next";
    document.getElementById("nextBtn").style.display = "inline-block";
    document.getElementById("backBtn").style.display = current > 0 ? "inline-block" : "none";
    
    // تحديث شارة العداد الحالي للأسئلة بشكل ناعم
    document.getElementById("progressBadge").innerText = `Q: ${current + 1} / ${questions.length}`;
    
    document.getElementById("feedback").innerText = "";
    document.getElementById("feedback").className = "feedback";
    document.getElementById("feedback").style.background = "transparent";
    
    const questionEl = document.getElementById("question");
    if (/[\u0600-\u06FF]/.test(qData.q)) {
        questionEl.style.direction = "rtl";
        questionEl.style.textAlign = "right";
    } else {
        questionEl.style.direction = "ltr";
        questionEl.style.textAlign = "left";
    }
    questionEl.innerText = qData.q;
    
    const transEl = document.getElementById("translation");
    if (qData.ar) {
        transEl.style.display = "block";
        transEl.style.direction = "rtl";
        transEl.style.textAlign = "right";
        transEl.innerText = qData.ar;
    } else {
        transEl.style.display = "none";
        transEl.innerText = "";
    }
    
    const optionsContainer = document.getElementById("options");
    optionsContainer.innerHTML = "";
    
    qData.options.forEach((optionText, index) => {
        const button = document.createElement("button");
        button.className = "option";
        button.innerText = optionText;
        
        if (answered[current] === index) {
            button.classList.add("selected");
        }
        
        if (/[\u0600-\u06FF]/.test(optionText)) {
            button.style.textAlign = "right";
            button.style.direction = "rtl";
        } else {
            button.style.textAlign = "left";
            button.style.direction = "ltr";
        }
        
        button.onclick = () => {
            if (!isShowingFeedback) selectOption(index);
        };
        optionsContainer.appendChild(button);
    });
}

function selectOption(index) {
    answered[current] = index;
    const options = document.querySelectorAll(".option");
    options.forEach((opt, idx) => {
        if (idx === index) opt.classList.add("selected");
        else opt.classList.remove("selected");
    });
}

function nextQuestion() {
    const questions = bank[subject];
    const qData = questions[current];
    
    if (answered[current] === undefined) {
        const feedbackEl = document.getElementById("feedback");
        feedbackEl.style.color = "#dc2626";
        feedbackEl.style.direction = "rtl";
        feedbackEl.style.textAlign = "right";
        feedbackEl.innerText = "الرجاء اختيار إجابة أولاً لكيوتي الأمورة 🌸";
        return;
    }
    
    if (!isShowingFeedback) {
        isShowingFeedback = true;
        const selectedIdx = answered[current];
        const correctIdx = qData.answer;
        const optionsHTML = document.querySelectorAll(".option");
        
        const feedbackEl = document.getElementById("feedback");
        feedbackEl.style.direction = "rtl";
        feedbackEl.style.textAlign = "right";
        
        if (selectedIdx === correctIdx) {
            optionsHTML[selectedIdx].classList.remove("selected");
            optionsHTML[selectedIdx].classList.add("correct-flash");
            feedbackEl.style.color = "#047857";
            feedbackEl.style.background = "#d1fae5";
            feedbackEl.innerText = "إجابتك صحيحة! أداء أسطوري ❤️✨";
        } else {
            optionsHTML[selectedIdx].classList.remove("selected");
            optionsHTML[selectedIdx].classList.add("wrong-flash");
            optionsHTML[correctIdx].classList.add("correct-flash");
            
            feedbackEl.style.color = "#b91c1c";
            feedbackEl.style.background = "#fee2e2";
            feedbackEl.innerText = `حاول مرة أخرى 💔 الحل الصح: (${qData.options[correctIdx]})`;
        }
        
        document.getElementById("nextBtn").innerText = "Continue";
        return; 
    }
    
    if (current < questions.length - 1) {
        current++;
        showQuestion();
    } else {
        showResults();
    }
}

function backQuestion() {
    if (current > 0 && !isShowingFeedback) {
        current--;
        showQuestion();
    }
}

function showResults() {
    const questions = bank[subject];
    let score = 0;
    let wrongQuestionsHTML = "";
    
    questions.forEach((qData, index) => {
        if (answered[index] === qData.answer) {
            score++;
        } else {
            const userChoice = answered[index] !== undefined ? qData.options[answered[index]] : "لم يتم حلّه";
            const correctChoice = qData.options[qData.answer];
            
            wrongQuestionsHTML += `
                <div class="wrong-report">
                    <strong>سؤال:</strong> ${qData.q} <br>
                    ${qData.ar ? `<small style="color:#6b7280; display:block; margin: 4px 0;">${qData.ar}</small>` : ''}
                    <span style="color:#fb7185; font-weight:bold;">❌ إجابتك: ${userChoice}</span><br>
                    <span style="color:#10b981; font-weight:bold;">✅ الإجابة الصحيحة: ${correctChoice}</span>
                </div>
            `;
        }
    });
    
    const questionEl = document.getElementById("question");
    questionEl.style.direction = "rtl";
    questionEl.style.textAlign = "center";
    questionEl.innerText = "اكتمل الاختبار بنجاح! 🎉";
    
    document.getElementById("progressBadge").innerText = "Done! ✨";
    document.getElementById("translation").innerText = "";
    document.getElementById("backBtn").style.display = "none";
    document.getElementById("nextBtn").style.display = "none";
    
    let resultHeader = `<h3 style="direction: rtl; text-align: center; color: #6b21a8;">نتيجتك الإجمالية الرهيبة هي: ${score} من ${questions.length}</h3>`;
    
    if (score === questions.length) {
        document.getElementById("options").innerHTML = resultHeader + `<div class="feedback" style="background:#d1fae5; color:#047857; padding:18px; font-size:20px; text-align:center; border-radius:20px;">علامة كاملة، فنانة وممتازة كالعادة! 🏆🌸❤️</div>`;
    } else {
        document.getElementById("options").innerHTML = resultHeader + `
            <h4 style="color:#b45309; margin-top:25px; text-align:right; direction:rtl;">📋 مراجعة الأخطاء لتثبيت الحفظ:</h4>
            <div style="max-height: 380px; overflow-y: auto; border: 1px solid #ffedd5; padding: 12px; border-radius: 20px; background:#fffaf5;">
                ${wrongQuestionsHTML}
            </div>
        `;
    }
    
    document.getElementById("feedback").innerText = "";
    document.getElementById("feedback").style.background = "transparent";
}

function goMenu() {
    document.getElementById("quiz").classList.remove("active");
    document.getElementById("menu").classList.add("active");
}
</script>

</body>
</html>
