<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Quiz System</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#f3eeff;
  padding:20px;
}

h1{color:#6b3fd4}

button{
  display:block;
  margin:10px auto;
  padding:12px;
  width:80%;
  border-radius:15px;
  border:none;
  cursor:pointer;
  background:#e7ddff;
  font-size:16px;
}

button:hover{background:#d6c6ff}

.card{
  background:white;
  padding:15px;
  border-radius:15px;
  margin-top:20px;
}

.correct{color:green;font-weight:bold}
.wrong{color:red;font-weight:bold}
</style>
</head>

<body>

<h1 id="title">Choose Subject</h1>

<div id="menu"></div>
<div id="quiz"></div>
<div id="result"></div>

<script>

// ================= DATA =================

const data = {

// ================== 1) حقوق الملكية الفكرية ==================
"حقوق الملكية الفكرية": [
{q:"من خصائص العنصر المعنوي لحق المؤلف",options:["عدم قابليته للتنازل","قابليته للتنازل","يسقط بالتقادم","قابليته للحجز"],answer:0},
{q:"حق المؤلف يعتبر حقًا لصيقًا بالشخصية",options:["المؤلف أو المبدع","السلطة الأبوية","البيع","التجارة"],answer:0},
{q:"من أشكال التنازل عن العنصر المعنوي",options:["البيع والهبة","الطب","الإدارة","التعليم"],answer:0},
{q:"التصرف في النسخة المادية لا يعني التنازل عن الحقوق",options:["صح","خطأ","غير معروف","أحياناً"],answer:0},
{q:"الحقوق المعنوية لا تقبل التنازل",options:["صح","خطأ","تقبل","تنتهي"],answer:0},
{q:"الحق المعنوي هو",options:["لصيق بالشخصية","مالي","تجاري","مؤقت"],answer:0},
{q:"الحق الذي يقبل الحجز هو",options:["الحق المالي","المعنوي","الأدبي","الإنساني"],answer:0},
{q:"العنصر المادي لا يظهر إلا",options:["بنشر المصنف","بالحجز","بالإلغاء","بالتنازل"],answer:0},
{q:"الحق هو",options:["سلطة ومصلحة","اسم","عنوان","كتاب"],answer:0},
{q:"من الحقوق المعنوية",options:["منع التشويه","البيع","التجارة","الإيجار"],answer:0},
{q:"للمؤلف الحق في نشر مصنفه",options:["صح","خطأ","ممنوع","غير واضح"],answer:0},
{q:"تحديد طريقة النشر يكون للمؤلف",options:["صح","خطأ","للشركة","للحكومة"],answer:0},
{q:"نسبة المصنف للمؤلف حق",options:["صح","خطأ","غير موجود","ملغي"],answer:0},
{q:"الامتناع عن النشر",options:["حق للمؤلف","إجبار","ممنوع","غير قانوني"],answer:0},
{q:"إخفاء اسم المؤلف",options:["ممكن","ممنوع","إجباري","غير قانوني"],answer:0},
{q:"الترجمة بدون إساءة",options:["ليست اعتداء","اعتداء","سرقة","ممنوعة"],answer:0},
{q:"الإساءة في الترجمة تعتبر",options:["اعتداء","عادي","مسموح","مجهول"],answer:0},
{q:"الحق المعنوي يحمي",options:["الشرف","المال","التجارة","البيع"],answer:0},
{q:"سحب المصنف",options:["حق للمؤلف","ممنوع","للشركة","للقضاء"],answer:0},
{q:"إذا لا يوجد ورثة",options:["وزارة الثقافة","البائع","المشتري","لا أحد"],answer:0}
],

// ================== 2) Communication Concept ==================
"Communication Concept": [
{q:"Therapeutic communication is",options:["professional act","casual talk","no communication","orders"],answer:0},
{q:"Shared understanding helps",options:["patient goals","delay","confusion","ignore"],answer:0},
{q:"Silence allows patient to",options:["think","ignore","stop","panic"],answer:0},
{q:"Exploring means",options:["dig deeper","change topic","end talk","ignore"],answer:0},
{q:"Clarification used to",options:["check understanding","argue","stop","confuse"],answer:0},
{q:"Reflecting focuses on",options:["feelings","machines","documents","orders"],answer:0},
{q:"Communication is",options:["two-way","one-way","none","written only"],answer:0},
{q:"Handover affected by",options:["noise","clarity","tools","teamwork"],answer:0},
{q:"SBAR stands for",options:["Situation Background Assessment Recommendation","random","none","system"],answer:0},
{q:"EMD role is",options:["dispatch","operate surgery","billing","pharmacy"],answer:0},
{q:"Hard hearing patient avoid",options:["shouting","speaking clearly","writing","eye contact"],answer:0},
{q:"Angry patient should",options:["stay calm","argue","shout","ignore"],answer:0},
{q:"Rapport with child",options:["eye level","ignore","shout","leave"],answer:0},
{q:"OLD CARTS used for",options:["symptoms","money","drugs","surgery"],answer:0},
{q:"Why questions avoided",options:["accusation","help","clarity","support"],answer:0},
{q:"Interview is",options:["ongoing","once","never","late"],answer:0},
{q:"Open question example",options:["how did it start","yes/no","age","pain yes"],answer:0},
{q:"Interview purpose",options:["trust","speed","ignore","end"],answer:0},
{q:"Formal communication example",options:["lecture","gossip","rumor","chat"],answer:0},
{q:"Upward communication",options:["employee to manager","manager to employee","none","random"],answer:0}
],

// ================== 3) Pathology ==================
"Pathology": [
{q:"Body water percentage",options:["60%","40%","70%","80%"],answer:0},
{q:"Non pitting edema",options:["lymphatic","cardiac","renal","liver"],answer:0},
{q:"Physiological hyperemia",options:["exercise","disease","failure","block"],answer:0},
{q:"Most common thrombus",options:["venous","arterial","cardiac","capillary"],answer:0},
{q:"Septic thrombus contains",options:["bacteria","virus","fat","air"],answer:0},
{q:"Hypovolemic shock cause",options:["bleeding","infection","heart failure","block"],answer:0},
{q:"Amyloidosis organ",options:["kidney","brain","skin","bone"],answer:0},
{q:"Neoplasm is",options:["abnormal growth","infection","injury","normal cell"],answer:0},
{q:"Benign tumor",options:["well differentiated","metastasis","invasive","fast"],answer:0},
{q:"Metastasis means",options:["spread","local growth","repair","healing"],answer:0},
{q:"Carcinoma arises from",options:["epithelium","muscle","bone","fat"],answer:0},
{q:"Liposarcoma is",options:["soft tissue tumor","bone tumor","skin tumor","blood tumor"],answer:0},
{q:"Gold standard diagnosis",options:["histopathology","xray","blood test","urine"],answer:0},
{q:"Malignant feature",options:["invasion","capsule","slow","smooth"],answer:0},
{q:"Benign tumor feature",options:["capsulated","invasive","metastatic","fast"],answer:0},
{q:"Tumor prognosis depends on",options:["radiosensitivity","hair color","age only","height"],answer:0},
{q:"Shock type bleeding",options:["hypovolemic","cardiogenic","obstructive","neurogenic"],answer:0},
{q:"Amyloid affects",options:["kidney","lung","skin","bone"],answer:0},
{q:"Local invasion",options:["penetration","stay same","heal","reduce"],answer:0},
{q:"Cancer diagnosis best method",options:["H&E stain","CT","MRI","Xray"],answer:0}
]

};

// ================= LOGIC =================

let subject="";
let index=0;
let score=0;

function loadMenu(){
document.getElementById("menu").innerHTML="";
for(let s in data){
let b=document.createElement("button");
b.innerText=s;
b.onclick=()=>start(s);
document.getElementById("menu").appendChild(b);
}
}

function start(s){
subject=s;
index=0;
score=0;
document.getElementById("title").innerText=s;
document.getElementById("menu").style.display="none";
loadQ();
}

function loadQ(){
let q=data[subject][index];

document.getElementById("quiz").innerHTML=`
<div class="card">
<h3>${q.q}</h3>
${q.options.map((o,i)=>`
<button onclick="check(${i})">${o}</button>
`).join("")}
<div id="msg"></div>
</div>
`;
}

function check(i){
let q=data[subject][index];
let msg=document.getElementById("msg");

if(i===q.answer){
score++;
msg.innerHTML="💚 Correct";
msg.className="correct";
}else{
msg.innerHTML="💔 Wrong<br><span class='correct'>Correct: "+q.options[q.answer]+"</span>";
msg.className="wrong";
}

setTimeout(next,900);
}

function next(){
index++;
if(index<data[subject].length){
loadQ();
}else{
document.getElementById("quiz").innerHTML="";
document.getElementById("menu").style.display="block";
document.getElementById("result").innerHTML=
"Score: "+score+"/"+data[subject].length;
loadMenu();
}
}

loadMenu();

</script>

</body>
</html>
