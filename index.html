<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exam Platform</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background: linear-gradient(135deg,#ffd6f5,#d6d6ff);
}

header{
    text-align:center;
    padding:20px;
    font-size:28px;
    font-weight:bold;
    color:#5a007a;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin:15px 0;
    border-radius:15px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    font-size:18px;
}

.question{
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}

button{
    background:#7b2cff;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#5b18c9;
}

.correct{color:green;font-weight:bold;}
.wrong{color:red;font-weight:bold;}
.heart{font-size:18px;}
.hidden{display:none;}
</style>
</head>

<body>

<header>🎓 Advanced Exam Platform</header>

<div class="container">

<!-- MENU -->
<div id="menu">

<div class="card" onclick="start('s1')">📘 Material 1</div>
<div class="card" onclick="start('s2')">💬 Material 2</div>
<div class="card" onclick="start('s3')">🧬 Material 3</div>
<div class="card" onclick="start('s4')">⚖️ Material 4</div>

</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">

<h2 id="title"></h2>
<div id="questions"></div>

<button onclick="submit()">Submit</button>
<button onclick="back()">Back</button>

<h3 id="result"></h3>

</div>

</div>

<script>

/* =========================
   🔥 ALL SUBJECTS (PUT FULL QUESTIONS HERE)
   ========================= */

const data = {

s1:[
{q:"Question 1 example",a:"A",opts:{A:"Option A",B:"Option B",C:"Option C",D:"Option D"}},
{q:"Question 2 example",a:"B",opts:{A:"Option A",B:"Option B",C:"Option C",D:"Option D"}}
],

s2:[
{q:"Therapeutic communication is?",a:"B",opts:{A:"Casual",B:"Professional",C:"Orders",D:"Noise"}},
{q:"Silence allows?",a:"B",opts:{A:"Confusion",B:"Thinking",C:"End",D:"Stop"}}
],

s3:[
{q:"Neoplasm is?",a:"B",opts:{A:"Normal",B:"Abnormal growth",C:"Inflammation",D:"Repair"}}
],

s4:[
{q:"Author right is?",a:"A",opts:{A:"Moral right",B:"Sellable",C:"Seizable",D:"None"}}
]

};

let current=[];

function start(s){
    current=data[s];
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");

    document.getElementById("title") .innerText="Exam Started";

    render();
}

function render(){
    let html="";

    current.forEach((x,i)=>{
        html+=`
        <div class="question">
        <p><b>${i+1}. ${x.q}</b></p>
        ${Object.keys(x.opts).map(k=>`
            <label>
            <input type="radio" name="q${i}" value="${k}">
            ${k}) ${x.opts[k]}
            </label><br>
        `).join("")}
        </div>
        `;
    });

    document.getElementById("questions").innerHTML=html;
}

function submit(){
    let score=0;
    let result="";

    current.forEach((x,i)=>{
        let sel=document.querySelector(`input[name=q${i}]:checked`);
        let val=sel?sel.value:"";

        if(val===x.a){
            score++;
            result+=`<p class="correct">✔ Q${i+1} Correct ❤️</p>`;
        }else{
            result+=`<p class="wrong">❌ Q${i+1} Wrong 💔 | Correct Answer: ${x.a}</p>`;
        }
    });

    document.getElementById("result").innerHTML=
    `Score: ${score}/${current.length}<br><br>`+result;
}

function back(){
    location.reload();
}

</script>

</body>
</html>
