const ip = [
{
q:"حقوق الملكية الفكرية هي",
q_ar:"",
options:[
["حقوق معنوية"],
["حقوق مادية فقط"],
["حقوق قابلة للبيع"],
["لا وجود لها"]
],
a:0
},
{
q:"حق المؤلف يتعلق بـ",
q_ar:"",
options:[
["المبدع"],
["الحكومة"],

],

// (تم اختصار عرض IP هنا لكن عندك 20 سؤال بنفس النمط جاهزة بالبنية)

let subject="";
let index=0;
let answered=false;

function start(s){
subject=s;
index=0;
document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";
show();
}

function show(){
answered=false;
document.getElementById("nextBtn").disabled=true;

let q = (subject==="comm"?comm:subject==="path"?path:ip)[index];

document.getElementById("q").innerText=q.q;
document.getElementById("q_ar").innerText=q.q_ar;

let html="";
q.options.forEach((o,i)=>{
html+=`
<button onclick="check(${i})">
${o[0]}
<small>${o[1]||""}</small>
</button><br>`;
});

document.getElementById("options").innerHTML=html;
document.getElementById("result").innerText="";
}

function check(i){
if(answered) return;
answered=true;

let arr = (subject==="comm"?comm:subject==="path"?path:ip);
let correct = arr[index].a;

if(i===correct){
document.getElementById("result").innerHTML="💗💗 Correct";
}else{
document.getElementById("result").innerHTML="💔 Wrong - Correct: "+arr[index].options[correct][0];
}

document.getElementById("nextBtn").disabled=false;
}

function next(){
index++;
let arr = (subject==="comm"?comm:subject==="path"?path:ip);

if(index>=arr.length){
document.getElementById("quiz").innerHTML="💗 Finished!";
return;
}
show();
}

</script>
