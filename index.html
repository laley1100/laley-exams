<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Quiz</title>

<style>
body{
font-family: Arial;
direction: rtl;
background:#f7f7ff;
text-align:center;
}

.card{
background:white;
padding:20px;
margin:20px auto;
width:80%;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.option{
display:block;
padding:10px;
margin:8px;
background:#eee;
border-radius:10px;
cursor:pointer;
}

.correct{background:#b6f7c1;}
.wrong{background:#ffb3b3;}

.hidden{display:none;}
</style>
</head>

<body>

<div id="quiz"></div>

<script>

const questions = [

{
q:`1- من خصائص العنصر المعنوي لحق المؤلف:
أ- عدم قابليته للتنازل عنه أو التعامل به
ب- قابليته للتنازل عنه والتعامل به
ج- يسقط بالتقادم
د- قابليته للحجز`,
a:["أ- عدم قابليته للتنازل عنه أو التعامل به","ب- قابليته للتنازل عنه والتعامل به","ج- يسقط بالتقادم","د- قابليته للحجز"],
correct:0
},

{
q:`2- حق المؤلف يعتبر حقًا لصيقًا بشخصية الإنسان وهذا ما أُطلق عليه بموجب اتفاقية WIPO:
أ- المصنف أو المؤلف
ب- المؤلف أو المبدع أو المبتكر
ج- السلطة الأبوية
د- الاستغلال والتصرف`,
a:["أ- المصنف أو المؤلف","ب- المؤلف أو المبدع أو المبتكر","ج- السلطة الأبوية","د- الاستغلال والتصرف"],
correct:1
},

{
q:`3- من أشكال التنازل عن العنصر المعنوي:
أ- البيع، الهبة، التبرع
ب- المصنف أو المؤلف
ج- التبرع وأخذ قيمته
د- يسقط بالتقادم`,
a:["أ- البيع، الهبة، التبرع","ب- المصنف أو المؤلف","ج- التبرع وأخذ قيمته","د- يسقط بالتقادم"],
correct:0
},

{
q:`4- إذا تنازل أو باع الفرد المؤلف أو المنتج الخاص به هل ينتقل العنصر المعنوي؟
أ- لا يستتبع تصرف المؤلف في ملكية نسخته المادية من مصنفه تنازله عن أي من حقوق المؤلف
ب- يستتبع تصرف المؤلف في ملكية نسخته المادية من مصنفه تنازله عن أي من حقوق المؤلف
ج- يتصرف المؤلف في ملكية نسخته المادية من مصنفه
د- البيع`,
a:["أ- لا يستتبع تصرف المؤلف في ملكية نسخته المادية من مصنفه تنازله عن أي من حقوق المؤلف","ب- يستتبع تصرف المؤلف في ملكية نسخته المادية من مصنفه تنازله عن أي من حقوق المؤلف","ج- يتصرف المؤلف في ملكية نسخته المادية من مصنفه","د- البيع"],
correct:0
},

{
q:`5- تنازل المؤلف عن حقوقه المالية أو أي جزء منها لا يستتبع ذلك:
أ- الحقوق المعنوية
ب- الهبة
ج- التبرع
د- البيع`,
a:["أ- الحقوق المعنوية","ب- الهبة","ج- التبرع","د- البيع"],
correct:0
},

{
q:`6- الحقوق اللصيقة بشخصية الإنسان ليست حقوقًا مالية إنما هي:
أ- فرع من الحقوق العامة للأفراد
ب- فرع من فروع المعرفة
ج- البطلان المطلق للكافة
د- الحق المالي وحق البيع`,
a:["أ- فرع من الحقوق العامة للأفراد","ب- فرع من فروع المعرفة","ج- البطلان المطلق للكافة","د- الحق المالي وحق البيع"],
correct:0
}

];

let index=0;

function show(){
let q=questions[index];

let html=`<div class="card">
<h3>${q.q}</h3>`;

q.a.forEach((opt,i)=>{
html+=`<div class="option" onclick="check(${i})">${opt}</div>`;
});

html+=`<p id="res"></p></div>`;

document.getElementById("quiz").innerHTML=html;
}

function check(i){
let q=questions[index];
let res=document.getElementById("res");

let opts=document.querySelectorAll(".option");

opts.forEach(o=>o.style.pointerEvents="none");

if(i===q.correct){
opts[i].classList.add("correct");
res.innerHTML="✔ صح 💖";
}else{
opts[i].classList.add("wrong");
opts[q.correct].classList.add("correct");
res.innerHTML="✖ غلط 💔";
}

setTimeout(()=>{
index++;
if(index<questions.length){
show();
}else{
document.getElementById("quiz").innerHTML="<h2>انتهى الاختبار 💖</h2>";
}
},1200);
}

show();

</script>

</body>
</html>
