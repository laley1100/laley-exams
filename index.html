/* ================= logic ================= */

let qset=[];

function start(type){
i=0;score=0;

if(type==="rights") qset=rights;
if(type==="comm") qset=comm;
if(type==="path") qset=path;

document.getElementById("home").style.display="none";
document.getElementById("quiz").style.display="block";

document.getElementById("title").innerText=type;
show();
}

function show(){
let q=qset[i];

document.getElementById("qnum").innerText="Q"+(i+1);
document.getElementById("q").innerText=q.q;
document.getElementById("tr").innerText=q.tr||"";
document.getElementById("tr2").innerText="";

let box=document.getElementById("options");
box.innerHTML="";

q.o.forEach((x,idx)=>{
let d=document.createElement("div");
d.className="option";
d.innerText=x;

d.onclick=()=>check(idx,q.a);
box.appendChild(d);
});
}

function check(sel,ans){
let opts=document.querySelectorAll(".option");
opts.forEach(o=>o.onclick=null);

if(sel===ans){
opts[sel].classList.add("correct");
score++;
}else{
opts[sel].classList.add("wrong");
opts[ans].classList.add("correct");
}

document.getElementById("score").innerText=score;
}

function next(){
i++;
if(i<qset.length) show();
else document.getElementById("quiz").innerHTML=
`<h2>Finished 💗</h2><h3>${score}/${qset.length}</h3>`;
}
