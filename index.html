<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الامتحانات 🤍</title>
    <style>
        /* التنسيق الجمالي */
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: linear-gradient(135deg, #fff2f6 0%, #f3e8ff 100%); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin: 0; 
            padding: 20px; 
        }
        .container { 
            background: rgba(255, 250, 245, 0.95); 
            width: 100%; 
            max-width: 700px; 
            padding: 30px; 
            border-radius: 32px; 
            box-shadow: 0 20px 40px rgba(244, 63, 94, 0.05); 
            text-align: center; 
        }
        .menu-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }
        .menuBtn { 
            background: #f3e8ff; 
            color: #6b21a8; 
            padding: 20px; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: bold; 
        }
        .screen { display: none; } 
        .active { display: block; }
        .option { 
            display: block; 
            width: 90%; 
            margin: 10px auto; 
            padding: 15px; 
            background: #fff7ed; 
            border: 1px solid #ffedd5; 
            border-radius: 16px; 
            cursor: pointer; 
            text-align: right; 
        }
        .correct-flash { 
            background: #d1fae5 !important; 
            border-color: #10b981 !important; 
        }
        .wrong-flash { 
            background: #ffe4e6 !important; 
            border-color: #fb7185 !important; 
        }
        h3 { 
            color: #1f2937; 
            text-align: left; 
            direction: ltr; 
            margin-bottom: 5px; 
        }
        .arabic-text { 
            font-size: 14px; 
            color: #d97706; 
            text-align: right; 
            margin-bottom: 15px; 
            display: block; 
            font-weight: 600; 
        }
    </style>
</head>
<body>

<div id="menu" class="container screen active">
    <h2>منصة الامتحانات 🤍</h2>
    <div class="menu-grid">
        <button class="menuBtn" onclick="startQuiz('bio')">الإحصاء الحيوي</button>
        <button class="menuBtn" onclick="startQuiz('path')">علم الأمراض</button>
        <button class="menuBtn" onclick="startQuiz('cc')">التواصل</button>
        <button class="menuBtn" onclick="startQuiz('ip')">الملكية الفكرية</button>
    </div>
</div>

<div id="quiz" class="container screen">
    <div id="quiz-content"></div>
    <button onclick="nextQ()">السؤال التالي ➡️</button>
</div>

<script>
    const bank = {
        bio: [
            { q: "1. Hypothesis testing is used to:", ar: "يُستخدم اختبار الفرضيات لاتخاذ قرارات مبنية على البيانات.", options: ["Make decisions from data", "Predict future events", "Collect raw data", "Avoid statistical analysis"], answer: 0 },
            // (تابع باقي الأسئلة كما هي)
        ],
        cc: [
            { q: "1. Communication is defined as:", ar: "يُعرّف التواصل بأنه:", options: ["Sending messages", "Exchanging information", "Speaking only", "Writing"], answer: 1 },
            // (تابع باقي الأسئلة كما هي)
        ],
        ip: [
            { q: "1- من خصائص العنصر المعنوي لحق المؤلف:", ar: "", options: ["أ- عدم قابليته للتنازل عنه أو التعامل به", "ب- قابليته للتنازل عنه والتعامل به", "ج- يسقط بالتقادم", "د- قابليته للحجز"], answer: 0 },
            // (تابع باقي الأسئلة كما هي)
        ]
    };

    let currentSub = "", currentIdx = 0;

    function startQuiz(sub) {
        currentSub = sub; 
        currentIdx = 0;
        document.getElementById('menu').classList.remove('active');
        document.getElementById('quiz').classList.add('active');
        render();
    }

    function render() {
        let q = bank[currentSub][currentIdx];
        let html = `<h3>${q.q}</h3><span class="arabic-text">${q.ar}</span>`;
        q.options.forEach((o, i) => {
            html += `<div class="option" onclick="check(this, ${i}, ${q.answer})">${o}</div>`;
        });
        document.getElementById('quiz-content').innerHTML = html;
    }

    function check(el, s, c) {
        if (s === c) {
            el.classList.add('correct-flash');
        } else {
            el.classList.add('wrong-flash');
        }
        // إيقاف التفاعل بعد الاختيار
        document.querySelectorAll('.option').forEach(option => option.onclick = null);
    }

    function nextQ() {
        if (currentIdx < bank[currentSub].length - 1) { 
            currentIdx++; 
            render(); 
        } else {
            alert("لقد انتهيت من جميع الأسئلة!");
        }
    }
</script>
</body>
</html>
