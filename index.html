    { q: "17- إذا كان بالترجمة إساءة إلى سمعة المؤلف ومكانته فيعتبر ذلك:", ar: "", options: ["أ- ليس اعتداء على حقوق المؤلف", "ب- اعتداء يجيز للمؤلف رفعه عن طريق القضاء", "ج- التغاضي عن ذلك", "د- نسبة المصنف للمترجم"], answer: 1 },
    { q: "18- بموجب السلطة المعنوية من حق المؤلف أن:", ar: "", options: ["أ- يمنع أي عمل يتعلق بمصنفه فيه إضرار بشرفه أو سمعته", "ب- ليس واجب أخذ الإذن من المؤلف", "ج- تداول المصنف وطباعته من غير إذن المؤلف", "د- التغاضي عن ذلك"], answer: 0 },
    { q: "19- من حقوق المؤلف المعنوية ما يلي:", ar: "", options: ["أ- حظر طرح مصنفه للتداول", "ب- عدم سحب مصنفه الذي تم تداوله", "ج- البيع", "د- لا يحظر"], answer: 0 },
    { q: "20- إذا لم يكن للمؤلف ورثة تباشر الحقوق على المصنف من قبل:", ar: "", options: ["أ- القاضي", "ب- الهبة للغير", "ج- البيع للغير", "د- وزارة الثقافة"], answer: 3 }
]
   };
   let currentSub = "", currentIdx = 0;

   function startQuiz(sub) {
       currentSub = sub; currentIdx = 0;
       document.getElementById('menu').style.display = 'none';
       document.getElementById('quiz').style.display = 'block';
       render();
   }

   function render() {
       let q = bank[currentSub][currentIdx];
       let html = `<h3>${q.q}</h3><span class="arabic-text">${q.ar}</span>`;
       q.options.forEach((o, i) => {
           html += `<div class="option" onclick="check(this, ${i}, ${q.answer})">${o}</div>`;
       });
       document.getElementById('quiz-content').innerHTML = html;
   }

   function check(el, s, c) {
       let options = el.parentNode.querySelectorAll('.option');
       options.forEach(o => o.style.pointerEvents = 'none');
       if(s === c) { el.classList.add('correct'); }
       else { el.classList.add('wrong'); options[c].classList.add('correct'); }
   }

   function nextQ() {
       if(currentIdx < bank[currentSub].length - 1) { currentIdx++; render(); }
       else { alert("انتهت الأسئلة!"); location.reload(); }
   }
</script>
