<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title> 💗 Exam Platform 💗</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background: linear-gradient(135deg,#ffd6e8,#d8c7ff);
}

h1{
    text-align:center;
    margin:20px;
    color:#5a3d7a;
}

.container{
    width:92%;
    max-width:900px;
    margin:auto;
}

.cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

.card{
    width:170px;
    padding:18px;
    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(10px);
    border-radius:18px;
    cursor:pointer;
    text-align:center;
    font-weight:bold;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    background:rgba(255,255,255,0.4);
}

#q-text{
    font-size:19px;
    margin:15px 0;
    text-align:right;
}

#options{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.option{
    width:90%;
    max-width:500px;
    padding:14px;
    margin:8px;
    border-radius:14px;
    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.3);
    cursor:pointer;
    transition:0.2s;
    text-align:right;
}

.option:hover{background:rgba(255,255,255,0.4);}
.option.selected{background:#d8b4fe;}

.correct{color:green;font-weight:bold;}
.wrong{color:red;font-weight:bold;}

.controls{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:20px;
    flex-wrap:wrap;
}

.btn{
    padding:10px 18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.next{background:#a78bfa;color:white;}
.back{background:#fbbf24;}
.home{background:#f472b6;color:white;}

.btn:hover{transform:scale(1.05);}

@media(max-width:768px){
    .card{width:100%;}
}
</style>
</head>

<body>

<h1> 💗Exam Platform </h1>

<div class="container">

<div id="menu">
    <h2 style="text-align:center">اختارالمادة</h2>

        <div class="card" onclick="start('bio')">Biostatistics</div>
        <div class="card" onclick="start('health')">🩺 السلامة الصحية</div>
    </div>
</div>

<div id="quiz" style="display:none;">
    <h3 id="q-text"></h3>
    <div id="feedback"></div>
    <div id="options"></div>

    <div class="controls">
        <button class="btn back" onclick="prevQ()">رجوع</button>
        <button class="btn next" onclick="nextQ()">التالي</button>
        <button class="btn home" onclick="goHome()">الرئيسية</button>
    </div>
</div>

</div>

{ q: "1) Therapeutic communication is best defined as", ar: "التواصل العلاجي يُعرّف بأنه", options: ["Casual conversation between paramedic and patient", "A planned, deliberate, professional act using communication techniques", "Giving medical instructions only", "Talking to calm the patient"], answer: 1 },

{ q: "2) Shared understanding of information helps to", ar: "الفهم المشترك للمعلومات يساعد على", options: ["Achieve desired patient-care goals", "Reduce documentation", "Save time only", "Limit patient interaction"], answer: 0 },

{ q: "3) Using silence in communication allows the patient", ar: "استخدام الصمت في التواصل يسمح للمريض أن", options: ["Feel ignored", "Think and gain insight", "Lose interest", "End the conversation"], answer: 1 },

{ q: "9) When explaining procedures, paramedics should consider", ar: "عند شرح الإجراءات يجب على المسعفين مراعاة", options: ["Only time constraints", "Documentation only", "Personal opinions", "Age and language barriers"], answer: 3 },

{ q: "10) Therapeutic impasses are best described as", ar: "الانسدادات العلاجية تُعرّف بأنها", options: ["Successful interactions", "Blocks in the paramedic-client relationship", "Legal issues", "Communication goals"], answer: 1 },

{ q: "11) Communication failures in clinical settings mainly lead to", ar: "فشل التواصل في البيئات السريرية يؤدي إلى", options: ["Improved teamwork", "Faster discharge", "Adverse patient events", "Reduced workload"], answer: 2 },

{ q: "12) Communication is best described as", ar: "التواصل يُعرّف بأنه", options: ["A one-way process", "A two-way process", "A written process only", "A technological process"], answer: 1 },

{ q: "13) Which factor can negatively affect patient handover", ar: "أي عامل قد يؤثر سلبًا على تسليم المريض", options: ["Noise and interruptions", "Clear documentation", "Structured tools", "Team collaboration"], answer: 0 },

{ q: "14) Patient handover refers to the transfer of", ar: "يشير تسليم المريض إلى نقل", options: ["Medical equipment", "Responsibility and accountability of patient care", "Hospital policies", "Financial records"], answer: 1 },

{ q: "15) Which of the following is NOT a benefit of effective handover", ar: "أي مما يلي ليس من فوائد التسليم الفعال", options: ["Accurate information transfer", "Enhanced patient safety", "Increased workload", "Faster prioritization of care"], answer: 2 },

{ q: "16) During handover of critical patients, the recommended pause duration is", ar: "أثناء تسليم الحالات الحرجة، مدة التوقف الموصى بها", options: ["5–10 seconds", "20–30 seconds", "1–2 minutes", "No pause is required"], answer: 1 },

{ q: "17) SBAR stands for", ar: "SBAR تعني", options: ["Signs, Background, Action, Response", "Situation, Background, Assessment, Recommendation", "Symptoms, Baseline, Assessment, Report", "Status, Body, Airway, Response"], answer: 1 },

{ q: "18) IMIST-AMBO includes all the following EXCEPT", ar: "IMIST-AMBO تشمل جميع ما يلي ما عدا", options: ["Mechanism of injury", "Treatments and trends", "Allergies", "Financial status"], answer: 3 },

{ q: "19) One limitation of SBAR in paramedic-ED handover is that it", ar: "أحد قيود SBAR في تسليم ما قبل المستشفى هو أنه", options: ["Is too complex", "Lacks prehospital-specific details", "Is too long", "Is not structured"], answer: 1 },

{ q: "20) Which tool emphasizes patient identification more strongly", ar: "أي أداة تركز على تعريف المريض بشكل أقوى", options: ["SBAR", "ISBAR", "SOAP", "ATMIST"], answer: 1 },

{ q: "21) What should you avoid when communicating with a hard-of-hearing patient?", ar: "ما الذي يجب عليك تجنبه عند التواصل مع مريض ضعيف السمع؟", options: ["Using a paper and pen", "Shouting", "Facing the patient while speaking", "Asking short questions"], answer: 1 },

{ q: "22) How should a paramedic handle an overly talkative patient?", ar: "كيف يجب على المسعف التعامل مع مريض كثير الكلام؟", options: ["Allow the patient to speak without interruption for the entire interview", "Politely interrupt and focus the discussion on the most critical issues", "Ignore the patient's stories and move on", "Avoid asking further questions"], answer: 1 },

{ q: "23) What is a common pitfall that paramedics should avoid during patient interviews?", ar: "ما هو الخطأ الشائع الذي يجب على المسعفين تجنبه أثناء مقابلات المرضى؟", options: ["Providing false reassurance", "Using open-ended questions", "Empathizing with the patient", "Maintaining a calm demeanor"], answer: 0 },

{ q: "24) What is a key component of building rapport with a child during an interview?", ar: "ما هو المكون الرئيسي لبناء علاقة مع طفل أثناء المقابلة؟", options: ["Ignoring the child and only speaking to the caregiver", "Using complex medical terms", "Getting down to the child's eye level and speaking calmly", "Asking the child to leave the room"], answer: 2 },

{ q: "25) Why is it important to maintain eye contact and use a calm voice tone with elderly patients?", ar: "لماذا من المهم الحفاظ على التواصل البصري واستخدام نبرة صوت هادئة مع المرضى المسنين؟", options: ["To assert dominance", "To make them feel rushed", "To help them feel respected and understood", "To simplify the interview process"], answer: 2 },

{ q: "26) What should a paramedic do when interviewing a patient with low health literacy?", ar: "ماذا يجب على المسعف أن يفعل عند مقابلة مريض ذو ثقافة صحية منخفضة؟", options: ["Use medical jargon to appear knowledgeable", "Avoid using written materials", "Speak slowly and use simple language", "Skip the interview and proceed with treatment"], answer: 2 },

{ q: "27) What is an effective strategy when interviewing a visually impaired patient?", ar: "ما هي الاستراتيجية الفعالة عند مقابلة مريض يعاني من ضعف البصر؟", options: ["Shouting to ensure they hear you", "Avoiding physical contact", "Explaining everything you are doing as you do it", "Using sign language"], answer: 2 },

{ q: "28) How should a paramedic handle a patient who is under the influence of drugs or alcohol?", ar: "كيف يجب على المسعف التعامل مع مريض تحت تأثير المخدرات أو الكحول؟", options: ["Use confrontational language", "Ask simple and direct questions", "Ignore the patient's statements", "Display scolding or disgust"], answer: 1 },

{ q: "29) When dealing with an angry or hostile patient, what should a paramedic avoid doing?", ar: "عند التعامل مع مريض غاضب أو عدائي، ما الذي يجب على المسعف تجنبه؟", options: ["Raising their voice to match the patient's tone", "Restating the cause of the anger", "Offering a solution", "Empathizing with the patient"], answer: 0 },

{ q: "30) When interviewing a hostile patient, the paramedic should", ar: "عند مقابلة مريض عدائي، يجب على المسعف:", options: ["Stay calm and avoid responding to insults", "Argue to prove authority", "Match the patient's tone", "Interview the patient alone"], answer: 0 },
        { q: "31) Why are communication systems crucial during emergency events?", ar: "لماذا أنظمة التواصل مهمة أثناء الطوارئ؟", options: ["To reduce paperwork", "To ensure scene safety and coordinate emergency personnel", "To entertain responders", "To replace physical assessment"], answer: 1 },

{ q: "32) Which phase of an EMS event involves detecting the need for emergency services?", ar: "أي مرحلة من حدث الإسعاف تتضمن اكتشاف الحاجة للخدمة؟", options: ["Detection phase", "Occurrence of the event", "Arrival and treatment", "Preparation for next response"], answer: 0 },

{ q: "33) Which of the following best describes a base station radio?", ar: "أي مما يلي يصف محطة الراديو الثابتة؟", options: ["Handheld and portable", "Vehicle-mounted", "Fixed location with powerful transmitter and high antenna", "Used only in aircraft"], answer: 2 },

{ q: "34) Mobile transceivers usually have an effective range of:", ar: "عادة مدى أجهزة الإرسال والاستقبال المتنقلة هو:", options: ["1–3 miles", "5–7 miles", "10–15 miles", "Over 50 miles"], answer: 2 },

{ q: "35) Portable transceivers are mainly used when:", ar: "تُستخدم الأجهزة المحمولة غالبًا عندما:", options: ["Dispatching calls", "Working away from the emergency vehicle", "Communicating between hospitals", "Transmitting ECG only"], answer: 1 },

{ q: "36) The main advantage of multiplex transmission in EMS is:", ar: "الميزة الرئيسية للإرسال المتعدد في الإسعاف هي:", options: ["Shorter messages", "Better privacy", "Simultaneous transmission of voice and ECG", "Lower cost"], answer: 2 },

{ q: "37) Which is a role of an emergency medical dispatcher?", ar: "ما هو دور المرسل الطبي الطارئ؟", options: ["Provide on-scene medical direction to EMS", "Relay instructions from command physicians", "Provide pre-arrival instructions to the caller", "Decide to which hospital the patient should be transferred"], answer: 2 },

{ q: "38) The primary role of an Emergency Medical Dispatcher (EMD) is to:", ar: "الدور الأساسي لمرسل الطوارئ الطبية هو:", options: ["Collect information, dispatch units, and give pre-arrival instructions", "Provide hospital care", "Drive the ambulance", "Perform patient assessment"], answer: 0 },

{ q: "39) Trunked radio systems are best described as:", ar: "أنظمة الراديو المترابطة تُعرّف بأنها:", options: ["Single-frequency systems", "Computer-controlled systems using multiple repeaters", "Satellite-based systems", "Portable-only systems"], answer: 1 },

{ q: "40) What is the principal reason for radio communication in EMS?", ar: "ما السبب الرئيسي لاستخدام الراديو في الإسعاف؟", options: ["To entertain the team", "To facilitate communication between you and medical control", "To monitor the weather", "To make personal calls"], answer: 1 },

{ q: "41) In the paramedic-patient encounter, a successful patient interview is", ar: "في لقاء المسعف بالمريض، المقابلة الناجحة تعتبر", options: ["Less important than physical assessment", "Only important in medical cases", "As important as physical assessment skills", "Only used in non-emergency cases"], answer: 2 },

{ q: "42) The interview is considered a contract between the patient and the examiner because it includes", ar: "تُعتبر المقابلة عقدًا بين المريض والمُقيّم لأنها تشمل", options: ["Time, place, purpose, and confidentiality", "Diagnosis and treatment only", "Physical examination steps", "Legal documentation only"], answer: 0 },

{ q: "43) One major purpose of the patient interview is to", ar: "أحد الأهداف الرئيسية لمقابلة المريض هو", options: ["Replace the physical examination", "Establish a trusting relationship", "Save time during care", "Avoid asking family members questions"], answer: 1 },

{ q: "44) Observation, conversation, and exploration are used to assess", ar: "الملاحظة والمحادثة والاستكشاف تُستخدم لتقييم", options: ["Pain severity", "Physical injuries", "Mental status", "Medication compliance"], answer: 2 },

{ q: "45) Which technique involves repeating the patient’s words to encourage elaboration", ar: "أي تقنية تتضمن تكرار كلمات المريض لتشجيع التوضيح", options: ["Echoing", "Summarization", "Validation", "Transition"], answer: 0 },

{ q: "46) OLD CARTS is used to", ar: "يُستخدم OLD CARTS لـ", options: ["Assess mental status", "Clarify patient emotions", "Describe symptom characteristics", "Determine medication allergies"], answer: 2 },

{ q: "47) Before starting an interview, the paramedic should first", ar: "قبل بدء المقابلة يجب على المسعف أولاً", options: ["Begin physical examination", "Take medications history", "Perform self-reflection", "Call medical control"], answer: 2 },

{ q: "48) Which of the following is an example of an open-ended question", ar: "أي مما يلي مثال على سؤال مفتوح", options: ["Are you in pain?", "Does your chest hurt?", "How old are you?", "Can you tell me how this started?"], answer: 3 },

{ q: "49) Asking “Why” questions should generally be avoided because they", ar: "يجب تجنب أسئلة 'لماذا' لأنها", options: ["Waste time", "Confuse patients", "Can be viewed as accusations", "Are too technical"], answer: 2 },

{ q: "50) Patient interviews should be", ar: "مقابلات المرضى يجب أن تكون", options: ["Initiated early and continued throughout the encounter", "Done after physical assessment", "Performed only once", "Avoided in trauma cases"], answer: 0 },

{ q: "51) What does the word \"communicare\" mean?", ar: "ماذا تعني كلمة communicare؟", options: ["To communicate", "To share", "To talk", "To write"], answer: 1 },

{ q: "52) Which of the following is NOT a type of communication?", ar: "أي مما يلي ليس نوعًا من أنواع التواصل؟", options: ["Formal", "Social", "Therapeutic", "Grapevine"], answer: 3 },

{ q: "53) What is an example of formal communication?", ar: "ما هو مثال على التواصل الرسمي؟", options: ["Gossip", "Lectures", "Phone texts", "Rumors"], answer: 1 },

{ q: "54) Which of the following is an advantage of formal communication?", ar: "أي مما يلي يُعد من مزايا التواصل الرسمي؟", options: ["Quick relay of information", "Leakage of confidential information", "Orderly flow of information", "Possibility of rumor"], answer: 2 },

{ q: "55) What is a disadvantage of formal communication?", ar: "ما هو عيب التواصل الرسمي؟", options: ["It is fast", "It is expensive", "It maintains discipline", "It ensures answerability"], answer: 1 },

{ q: "56) What is downward communication?", ar: "ما هو التواصل النازل؟", options: ["Information flowing from employees to higher management", "Information flowing from higher management to employees", "Information flowing between peers", "Information flowing between different departments"], answer: 1 },

{ q: "57) What is upward communication?", ar: "ما هو التواصل الصاعد؟", options: ["Information flowing from higher management to employees", "Information flowing from employees to higher management", "Information flowing between peers", "Information flowing between different departments"], answer: 1 },

{ q: "58) What is the purpose of horizontal communication?", ar: "ما هو هدف التواصل الأفقي؟", options: ["To request support or coordinate activities", "To spread rumors", "To inform employees about decisions", "To notify upper management of complaints"], answer: 0 },

{ q: "59) What is diagonal communication?", ar: "ما هو التواصل القطري؟", options: ["Communication between employees of the same department", "Communication between employees of different departments at different levels", "Communication between employees and customers", "Communication between managers and subordinates"], answer: 1 },

{ q: "60) What is informal communication?", ar: "ما هو التواصل غير الرسمي؟", options: ["Communication that follows a prescribed path", "Communication that occurs outside the formal network", "Communication that uses professional language", "Communication that is slow and orderly"], answer: 1 },
{ q: "61) Which patient requires mandatory pre-arrival notification?", ar: "أي مريض يتطلب إخطار الإرسال قبل الوصول؟", options: ["Stable fracture", "Suspected stroke", "Minor wound", "Chronic back pain"], answer: 1 },

{ q: "62) Effective handover communication requires all EXCEPT", ar: "يتطلب تواصل التسليم الفعال كل ما يلي ما عدا:", options: ["Professional behavior", "Prioritizing critical information", "Multitasking during handover", "Respecting patient privacy"], answer: 2 },

{ q: "63) What type of radio system is used to increase the effective communications range of a portable radio", ar: "ما نوع نظام الراديو المستخدم لزيادة مدى الاتصالات الفعال للراديو المحمول عن طريق إعادة إرسال إشارات", options: ["Base station", "Mobile transceiver", "Portable transceiver", "Repeater"], answer: 3 },

{ q: "64) Which mode of radio transmission allows data to flow in one direction or the other, but not both at the same time", ar: "أي وضع من أوضاع إرسال الراديو يسمح بتدفق البيانات في اتجاه واحد أو الآخر، ولكن ليس كلاهما في نفس الوقت؟", options: ["Simplex", "Half-duplex", "Full-duplex", "Multiplex"], answer: 1 },

{ q: "65) What is the purpose of grapevine communication?", ar: "ما هو الغرض من تواصل Grapevine (غير الرسمي المتشعب)؟", options: ["To spread rumors", "To satisfy communication needs of members", "To transmit official information", "To maintain discipline"], answer: 1 }

    let current=0;
let questions=[];
let answers=[];
let locked=false;

function start(cat){
    playClick();

    questions=bank[cat];
    current=0;
    answers=new Array(questions.length).fill(null);

    document.getElementById("menu").style.display="none";
    document.getElementById("quiz").style.display="block";

    showQuestion();
}

function showQuestion(){
    locked=false;

    let q=questions[current];

    document.getElementById("q-text").innerHTML =
        q.q + "<br><small>"+(q.ar||"")+"</small>";

    let box=document.getElementById("options");
    let fb=document.getElementById("feedback");

    box.innerHTML="";
    fb.innerHTML="";

    q.options.forEach((o,i)=>{
        let div=document.createElement("div");
        div.className="option";
        div.innerText=o;

        div.onclick=()=>selectAnswer(i);
        box.appendChild(div);
    });
}

function selectAnswer(i){
    if(locked) return;

    playClick();

    let q = questions[current];
    answers[current] = i;
    locked = true;

    let fb = document.getElementById("feedback");
    let options = document.querySelectorAll(".option");

    options.forEach(opt=>{
        opt.style.background="";
        opt.style.color="";
    });

    if(i === q.answer){
        fb.innerHTML=`<div class="correct">✔ صح 🤍</div>`;
        playCorrect();
        options[i].style.background="#86efac";
    }else{
        fb.innerHTML=`
        <div class="wrong">❌ غلط 💔</div>
        <div>الإجابة الصحيحة: <b>${q.options[q.answer]}</b></div>
        `;
        options[i].style.background="#fca5a5";
        options[q.answer].style.background="#86efac";
    }
}

function nextQ(){
    if(answers[current] === null){
        alert("جاوبي أول 😅");
        return;
    }

    if(current < questions.length - 1){
        current++;
        showQuestion();
    }else{
        showResult();
    }
}

function prevQ(){
    if(current > 0){
        current--;
        showQuestion();
    }
}

function showResult(){

    let score=0;
    let wrongList="";

    questions.forEach((q,i)=>{

        if(answers[i] === q.answer){
            score++;
        }else{

            wrongList += `
            <div style="margin:20px 0;padding:15px;border-radius:12px;background:rgba(255,255,255,0.3)">
                
                ❌ <b>${q.q}</b><br><br>

                <b>الخيارات:</b>
                <ol>
                    ${q.options.map((opt,idx)=>{
                        let style="";

                        if(idx === q.answer){
                            style="color:green;font-weight:bold;";
                        }

                        if(idx === answers[i] && answers[i] !== q.answer){
                            style="color:red;font-weight:bold;text-decoration:line-through;";
                        }

                        return `<li style="${style}">${opt}</li>`;
                    }).join("")}
                </ol>

                ✔ الإجابة الصحيحة: <b style="color:green">${q.options[q.answer]}</b><br>

                ❌ إجابتك: <b style="color:red">
                    ${answers[i] !== null ? q.options[answers[i]] : "ما جاوبتي"}
                </b>

            </div>
            `;
        }
    });

    document.getElementById("quiz").innerHTML = `
        <h2 style="text-align:center">النتيجة 🤍</h2>
        <h3 style="text-align:center">${score} / ${questions.length}</h3>

        <h3>الأخطاء:</h3>
        ${wrongList || "<p>فل مارك 🎉🤍</p>"}

        <div style="text-align:center">
            <button class="btn home" onclick="location.reload()">الرئيسية</button>
        </div>
    `;
}

function goHome(){
    location.reload();
}

</script>
