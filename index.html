<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Communication Concept</title>

<style>
body{
  font-family: Arial;
  background:#f3e5f5;
  text-align:center;
  padding:20px;
}

h2{
  color:#6a1b9a;
}

button{
  display:block;
  width:80%;
  margin:10px auto;
  padding:12px;
  border:none;
  border-radius:15px;
  background:#e1bee7;
  cursor:pointer;
}

button:hover{
  background:#ce93d8;
}

#result{
  font-size:20px;
  margin-top:15px;
}

.correct{color:green;font-weight:bold;}
.wrong{color:red;font-weight:bold;}
</style>
</head>

<body>

<h2>Communication Concept</h2>

<div id="quiz"></div>
<div id="result"></div>

<button onclick="nextQ()" id="nextBtn" style="display:none;">Next</button>

<script>

let questions = [
{
q:"1- من خصائص العنصر المعنوي لحق المؤلف",
o:[
"أ عدم قابليته للتنازل عنه أو التعامل به",
"ب قابليته للتنازل عنه والتعامل به",
"ج يسقط بالتقادم",
"د قابليته للحجز"
],
a:0
},
{
q:"2- حق المؤلف يعتبر حقًا لصيقًا بشخصية الإنسان وهذا ما أُطلق عليه بموجب اتفاقية WIPO",
o:[
"A المصنف أو المؤلف",
"B المؤلف أو المبدع أو المبتكر",
"C السلطة الأبوية",
"D الاستغلال والتصرف"
],
a:1
},
{
q:"3- من أشكال التنازل عن العنصر المعنوي",
o:[
"أ البيع، الهبة، التبرع",
"ب المصنف أو المؤلف",
"ج التبرع وأخذ قيمته",
"د يسقط بالتقادم"
],
a:0
},
{
q:"4- إذا تنازل أو باع الفرد المؤلف أو المنتج الخاص به هل ينتقل العنصر المعنوي",
o:[
"أ لا يستتبع تصرف المؤلف في ملكية نسخته المادية من مصنفه تنازله عن أي من حقوق المؤلف",
"ب يستتبع تصرف المؤلف في ملكية نسخته المادية من مصنفه تنازله عن أي من حقوق المؤلف",
"ج يتصرف المؤلف في ملكية نسخته المادية من مصنفه",
"د البيع"
],
a:0
},
{
q:"5- تنازل المؤلف عن حقوقه المالية أو أي جزء منها لا يستتبع ذلك",
o:[
"أ الحقوق المعنوية",
"ب الهبة",
"ج التبرع",
"د البيع"
],
a:0
}
];

let i = 0;

function load(){
  let q = questions[i];

  document.getElementById("quiz").innerHTML =
  `<h3>${q.q}</h3>` +
  q.o.map((x,idx)=>
    `<button onclick="check(${idx})">${x}</button>`
  ).join("");

  document.getElementById("result").innerHTML="";
  document.getElementById("nextBtn").style.display="none";
}

function check(ans){
  let q = questions[i];
  let result = document.getElementById("result");

  if(ans === q.a){
    result.innerHTML = "صح 💗";
    result.className="correct";
  } else {
    result.innerHTML = "غلط 💔 <br> الإجابة الصحيحة: " + q.o[q.a];
    result.className="wrong";
  }

  document.getElementById("nextBtn").style.display="block";
}

function nextQ(){
  i++;
  if(i < questions.length){
    load();
  } else {
    document.getElementById("quiz").innerHTML="خلص الاختبار 💗";
    document.getElementById("nextBtn").style.display="none";
  }
}

load();

</script>

</body>
</html>
