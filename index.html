<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXAM PLATFORM 🤍</title>

<style>
/* إعدادات الخلفية والنعومة العامة المحترفة */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #fff0f5 0%, #f1e4ff 50%, #e8f5ff 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
}

/* حاوية العرض الرئيسية الكيوت بتأثير الزجاج اللامع */
.container {
    background: rgba(255, 255, 255, 0.85); 
    width: 100%;
    max-width: 700px;
    padding: 40px 30px;
    border-radius: 30px;
    border: 2px solid rgba(255, 255, 255, 0.6); 
    box-shadow: 0 20px 50px rgba(219, 39, 119, 0.08), 
                0 4px 12px rgba(139, 92, 246, 0.04);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    position: relative;
}

/* عنوان المنصة الأنيق واللامع */
#title { 
    font-size: 34px; 
    font-weight: 900; 
    color: #db2777; 
    letter-spacing: 1px;
    margin-bottom: 8px;
    text-shadow: 2px 2px 4px rgba(219, 39, 119, 0.15);
    text-align: center;
}

.subtitle {
    color: #7c3aed; 
    font-size: 16px; 
    font-weight: 600; 
    margin-top: 0;
    margin-bottom: 35px;
    text-align: center;
    opacity: 0.85;
}

/* تقسيم أزرار المواد في عمودين متناسقين */
.menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

/* تصميم أزرار المواد الاحترافية اللامعة الكيوت */
.menuBtn { 
    background: rgba(243, 232, 255, 0.6); 
    color: #5b21b6; 
    padding: 24px 20px;
    border: 1px solid rgba(233, 213, 255, 0.8);
    border-radius: 22px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    box-shadow: 0 4px 15px rgba(124, 58, 237, 0.05);
} 

/* تأثير البريق اللامع عند تمرير الماوس */
.menuBtn::after, .option::after, button.action-btn.next::after, button.action-btn.homeBtn::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -60%;
    width: 30%;
    height: 200%;
    background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
    transform: rotate(30deg);
    transition: none;
    pointer-events: none;
}

.menuBtn:hover::after, .option:hover::after, button.action-btn.next:hover::after, button.action-btn.homeBtn:hover::after {
    left: 140%;
    transition: all 0.75s ease-in-out;
}

.menuBtn:hover {
    background: rgba(233, 213, 255, 0.9);
    transform: translateY(-5px);
    border-color: #c084fc;
    box-shadow: 0 12px 24px rgba(124, 58, 237, 0.15);
}

.menuBtn span.badge {
    font-size: 12px;
    background: #ffffff;
    padding: 4px 12px;
    border-radius: 50px;
    color: #6d28d9;
    font-weight: 800;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

/* خيارات الأسئلة النود المشمشي والوردي المتناسقة والموزونة */
.option {
    display: block;
    margin: 16px auto;
    padding: 18px 22px;
    background: rgba(255, 247, 237, 0.7); 
    border: 1px solid rgba(255, 237, 213, 0.9);
    border-radius: 18px;
    cursor: pointer;
    width: 100%;
    box-sizing: border-box;
    text-align: left;
    font-size: 15px;
    font-weight: 600;
    color: #4a3e56;
    position: relative;
    overflow: hidden;
    transition: all 0.25s ease;
    box-shadow: 0 2px 8px rgba(251, 146, 60, 0.03);
}

.option:hover {
    background: #ffedd5;
    border-color: #fed7aa;
    transform: translateX(4px);
}

.option.selected {
    background: #fce7f3; 
    border-color: #f472b6;
    color: #9d174d;
    box-shadow: 0 4px 12px rgba(244, 114, 182, 0.2);
}

.option.correct-flash {
    background: #ecfdf5;
    border-color: #10b981;
    color: #065f46;
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
}

.option.wrong-flash {
    background: #fff1f2;
    border-color: #fb7185;
    color: #9f1239;
    box-shadow: 0 4px 12px rgba(251, 113, 133, 0.2);
}

/* أزرار التحكم بالأسئلة */
.controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 30px;
}

button.action-btn {
    padding: 14px 28px;
    border: none;
    border-radius: 18px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

button.action-btn:hover {
    opacity: 0.95;
    transform: translateY(-2px);
}

button.action-btn:active {
    transform: scale(0.97);
}

.next { background: linear-gradient(135deg, #f472b6, #db2777); color: white; box-shadow: 0 4px 15px rgba(219, 39, 119, 0.3); } 
.back { background: #e2e8f0; color: #475569; border: 1px solid #cbd5e1; }
.homeBtn { background: linear-gradient(135deg, #c084fc, #9333ea); color: white; box-shadow: 0 4px 15px rgba(147, 51, 234, 0.3); }

/* نصوص التوضيح والترجمات المريحة */
.small { font-size: 15px; line-height: 1.6; margin-top: 12px; color: #c2410c; font-weight: 600; direction: rtl; text-align: right; background: rgba(255, 247, 237, 0.5); padding: 10px 15px; border-radius: 12px; }
.feedback { margin-top: 20px; font-weight: 700; font-size: 16px; padding: 14px; border-radius: 16px; direction: rtl; text-align: right; animation: fadeIn 0.3s ease; }

.screen { display: none; }
.active { display: block; animation: fadeIn 0.4s ease-out; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* تقرير الأخطاء النهائي المرتب */
.wrong-report {
    text-align: right;
    direction: rtl;
    background: rgba(254, 242, 242, 0.8);
    padding: 18px;
    margin-top: 16px;
    border-right: 5px solid #f43f5e;
    border-radius: 16px;
    box-shadow: 0 2px 8px rgba(244, 63, 94, 0.05);
}
</style>
</head>

<body>

<!-- صفحة الواجهة والقائمة الرئيسية الافتراضية الكيوت -->
<div id="menu" class="container screen active">
    <div id="title">EXAM PLATFORM 🤍</div>
    <div class="subtitle">Select Your Subject To Start ✨</div>

    <div class="menu-grid">
        <button class="menuBtn" onclick="startQuiz('bio')">

        </button>
        <button class="menuBtn" onclick="startQuiz('path')">

            <span class="badge">14 Qs</span>
        </button>
        <button class="menuBtn" onclick="startQuiz('ip')">
            <span>💡 الملكية الفكرية</span>

        </button>
        <button class="menuBtn" onclick="startQuiz('cc')">

</div>

<!-- صفحة الأسئلة والاختبار -->
<div id="quiz" class="container screen">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <span style="font-weight: 800; color: #db2777; font-size: 14px; letter-spacing: 0.5px;">EXAM PLATFORM 🤍</span>

    </div>
    
    <h2 id="question" style="margin-top: 20px; font-size: 21px; color: #3b0764; line-height: 1.5; font-weight: 700;"></h2>

    <div id="options" style="margin-top: 25px;"></div>
    <div class="feedback" id="feedback"></div>

    <hr style="border: 0; border-top: 1px solid #fce7f3; margin: 30px 0;">
    
    <div class="controls">
        <button class="action-btn back" id="backBtn" onclick="backQuestion()">Back</button>
        <button class="action-btn homeBtn" onclick="goMenu()">Home</button>
        <button class="action-btn next" id="nextBtn" onclick="nextQuestion()">Next</button>
    </div>
</div>

<script>
let current = 0;
let answered = {}; 
let subject = "";
let isShowingFeedback = false;

function playCuteSound() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc1 = audioCtx.createOscillator();
        const gain1 = audioCtx.createGain();
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(523.25, audioCtx.currentTime);
        gain1.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc1.connect(gain1);
        gain1.connect(audioCtx.destination);
        osc1.start();
        osc1.stop(audioCtx.currentTime + 0.1);

        setTimeout(() => {
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(659.25, audioCtx.currentTime);
            gain2.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start();
            osc2.stop(audioCtx.currentTime + 0.15);
        }, 60);
    } catch (e) {
        console.log("Audio playback not supported.");
    }
}

/* بنك الأسئلة الخاص بك بالكامل */
const bank = {
bio: [
{ q: "1. Hypothesis testing is used to:", ar: "يُستخدم اختبار الفرضيات لاتخاذ قرارات مبنية على البيانات.", options: ["Make decisions from data", "Predict future events", "Collect raw data", "Avoid statistical analysis"], answer: 0 },
{ q: "2. The null hypothesis (H₀) usually states:", ar: "الفرضية الصفرية تعني عدم وجود تأثير أو فرق.", options: ["There is an effect", "No effect or no difference", "A strong relationship exists", "The sample is biased"], answer: 1 },
{ q: "3. The alternative hypothesis (H₁) states:", ar: "الفرضية البديلة (H₁) تشير إلى وجود تأثير أو فرق.", options: ["No difference exists", "There is an effect or difference", "Data are invalid", "The test is inconclusive"], answer: 1 },
{ q: "4. Common significance level (α) used in hypothesis testing:", ar: "مستوى المعنوية الشائع (α) المستخدم في اختبار الفرضيات:", options: ["0.01", "0.05", "0.10", "0.50"], answer: 1 },
{ q: "5. A right-tailed test is used when:", ar: "يتم استخدام الاختبار ذو الطرف الأيمن عند توقع زيادة أو تحسن.", options: ["Expecting decrease", "Expecting increase/improvement", "Testing any change", "No direction assumed"], answer: 1 },
{ q: "6. A left-tailed test is used when:", ar: "يتم استخدام الاختبار ذو الطرف الأيسر عند توقع انخفاض أو تقليل.", options: ["Expecting increase", "Expecting decrease/reduction", "Testing any change", "No difference assumed"], answer: 1 },
{ q: "7. A two-tailed test is used when:", ar: "يتم استخدام الاختبار ذو الطرفين للتحقق من وجود أي اختلاف (زيادة أو نقصان).", options: ["Expecting only increase", "Expecting only decrease", "Checking for any difference (increase or decrease)", "No hypothesis stated"], answer: 2 },
{ q: "8. Example of two-tailed hypothesis:", ar: "مثال على فرضية ذات طرفين (لا تحدد اتجاه الاختلاف):", options: ["BP > baseline", "BP < baseline", "BP ≠ baseline", "BP = baseline"], answer: 2 },
{ q: "9. In most studies, which test is preferred?", ar: "في معظم الدراسات الطبية والعلمية، يفضل الاختبار ذو الطرفين.", options: ["One-tailed", "Two-tailed", "No test", "Random test"], answer: 1 },
{ q: "10. One-tailed tests are risky because:", ar: "الاختبارات ذات الطرف الواحد خطيرة لأنها تزيد من احتمالية الرفض الخاطئ للفرضية الصفرية.", options: ["They are less powerful", "They increase false rejection of H₀", "They require larger samples", "They cannot be used in medicine"], answer: 1 },
{ q: "11. Example of parametric test:", ar: "مثال على اختبار معلمي (Parametric Test):", options: ["Mann–Whitney U", "Wilcoxon signed-rank", "t-test", "Kruskal–Wallis"], answer: 2 },
{ q: "12. ANOVA is used to compare:", ar: "يُستخدم تحليل التباين (ANOVA) لمقارنة المتوسطات لثلاث مجموعات أو أكثر.", options: ["Two groups", "Three or more groups", "One group only", "Paired samples"], answer: 1 },
{ q: "13. Non-parametric tests assume:", ar: "الاختبارات غير المعلمية تفترض عدم وجود توزيع محدد للبيانات.", options: ["Normal distribution", "No specific distribution", "Large sample size", "Interval data only"], answer: 1 },
{ q: "14. Wilcoxon signed-rank test is alternative to:", ar: "اختبار ويلكوكسون للرتب الموقعة هو البديل غير المعلمي لاختبار t للعينات المرتبطة.", options: ["Independent t-test", "Paired t-test", "ANOVA", "Pearson correlation"], answer: 1 },
{ q: "15. Kruskal–Wallis test is alternative to:", ar: "اختبار كروسكال واليس هو البديل غير المعلمي لتحليل التباين أحادي الاتجاه (ANOVA).", options: ["ANOVA", "t-test", "Chi-square", "Pearson correlation"], answer: 0 },
{ q: "16. Advantage of non-parametric tests:", ar: "من مزايا الاختبارات غير المعلمية أنها قوية ومتينة في التعامل مع القيم المتطرفة (Outliers).", options: ["Require normality", "Robust to outliers", "Always more precise", "Use mean values"], answer: 1 },
{ q: "17. The Chi-square test is primarily used for:", ar: "يُستخدم اختبار كاي تربيع (Chi-square) بشكل أساسي لاختبار الارتباط بين المتغيرات الفئوية.", options: ["Continuous data like blood pressure", "Comparing means between two groups", "Testing association between categorical variables", "Measuring correlation between two continuous variables"], answer: 2 },
{ q: "18. In a 2×2 contingency table, the expected frequency for each cell is calculated as:", ar: "طريقة حساب التكرار المتوقع في جدول التوافق 2x2.", options: ["(Row total × Column total) ÷ Grand total", "(Row total ÷ Column total) × Grand total", "(Observed frequency ÷ Expected frequency) × 100", "(Row total + Column total) ÷ Grand total"], answer: 0 },
{ q: "19. When should Fisher’s Exact Test be used instead of Chi-square?", ar: "يُستخدم اختبار فيشر الدقيق بدلاً من كاي تربيع عندما تكون التكرارات المتوقعة في أي خلية أقل من 5.", options: ["When sample size is large", "When expected frequencies are all ≥ 5", "When expected frequencies in any cell are < 5", "When data are continuous"], answer: 2 },
{ q: "20. The Chi-square test is most appropriate for:", ar: "اختبار كاي تربيع هو الأكثر ملاءمة لفحص العلاقات بين المتغيرات الفئوية (Categorical Variables).", options: ["Comparing two means", "Testing association between categorical variables", "Measuring correlation between continuous variables", "Predicting regression coefficients"], answer: 1 },

{ q: "22. The Chi-square statistic formula is:", ar: "الصيغة الرياضية لحساب قيمة إحصاء كاي تربيع.", options: ["∑(O−E)² / E", "∑(E−O)² / E", "(O−E)² / O", "(O/E)²"], answer: 0 },
{ q: "23. The Chi-square goodness-of-fit test is used to:", ar: "يُستخدم اختبار جودة المطابقة لكاي تربيع لمعرفة مدى تطابق التوزيع الملاحظ مع التوزيع المتوقع.", options: ["Test if two categorical variables are independent", "Test if observed distribution matches expected distribution", "Compare two proportions", "Test correlation between variables"], answer: 1 },
{ q: "24. Fisher’s Exact Test is preferred when:", ar: "يُفضل اختبار فيشر الدقيق في الجداول الصغيرة 2x2 عندما يقل التكرار المتوقع عن 5.", options: ["Sample size is large", "Expected frequencies are ≥ 5", "Expected frequencies are < 5 in a 2×2 table", "Data are continuous"], answer: 2 },
{ q: "25. A t-test is used to:", ar: "يُستخدم اختبار t لمقارنة المتوسطات بين المجموعات.", options: ["Measure correlation", "Compare means", "Calculate variance only", "Classify data"], answer: 1 },
{ q: "26. The null hypothesis (H₀) states:", ar: "الفرضية الصفرية تفترض دائماً عدم وجود فرق أو علاقة.", options: ["There is a difference", "No difference exists", "Data is normal", "Data is independent"], answer: 1 },
{ q: "27. The alternative hypothesis (H₁) suggests:", ar: "الفرضية البديلة تشير إلى وجود فرق حقيقي بين المجموعات.", options: ["No change", "Equal means", "There is a difference", "No data"], answer: 2 },
{ q: "28. One-sample t-test compares:", ar: "اختبار t لعينة واحدة يقارن متوسط العينة بقيمة معلومة أو معيارية.", options: ["Two groups", "One group to a known value", "Three groups", "Variables"], answer: 1 },
{ q: "29. Independent t-test is used for:", ar: "اختبار t للعينات المستقلة يقارن بين مجموعتين غير مرتبطتين تماماً.", options: ["Same group before/after", "Two unrelated groups", "Multiple groups", "One variable only"], answer: 1 },
{ q: "30. Paired t-test is used when:", ar: "اختبار t الأزواج المرتبطة يُستخدم عند قياس نفس الأشخاص مرتين (قبل وبعد).", options: ["Groups are independent", "Data is categorical", "Same subjects are measured twice", "No measurements"], answer: 2 },
{ q: "31. Comparing smokers vs non-smokers requires:", ar: "مقارنة المدخنين بغير المدخنين تتطلب اختبار t للعينات المستقلة لأن المجموعتين منفصلتان.", options: ["Paired t-test", "One-sample t-test", "Independent t-test", "Sign test"], answer: 2 },

{ q: "36. ANOVA analyzes:", ar: "تحليل ANOVA يحلل التباين بين المجموعات وداخل المجموعات للوصول للمقارنة.", options: ["Only means", "Only medians", "Variance (between and within groups)", "Percentages"], answer: 2 },
{ q: "37. The null hypothesis (H₀) in ANOVA states:", ar: "الفرضية الصفرية في ANOVA تنص على أن جميع متوسطات المجموعات متساوية.", options: ["All means are different", "At least one mean is different", "All group means are equal", "No data exists"], answer: 2 },
{ q: "38. Two-way ANOVA is used to:", ar: "تحليل ANOVA ثنائي الاتجاه يدرس تأثير عاملين مستقلين وتفاعلهما المشترك.", options: ["Test one factor only", "Test two factors and interaction", "Remove variables", "Calculate mean"], answer: 1 },
{ q: "39. Factorial ANOVA includes:", ar: "تحليل ANOVA العاملي يتضمن دراسة عدة عوامل مستقلة وتأثيراتها.", options: ["Only one-way ANOVA", "Only two-way ANOVA", "All ANOVA with multiple factors", "Only three-way ANOVA"], answer: 2 },
{ q: "40. One-way ANOVA requires:", ar: "تحليل التباين أحادي الاتجاه يتطلب وجود ثلاث مجموعات أو أكثر لمقارنتها.", options: ["Two groups", "Three or more groups", "One group", "No groups"], answer: 1 },
{ q: "41. ANOVA can be used to compare:", ar: "يمكن استخدام تحليل ANOVA عند مقارنة تأثير ثلاثة أنواع مختلفة من الأدوية.", options: ["One drug effect", "Three drug types", "No treatments", "Only medians"], answer: 1 },
{ q: "42. ANCOVA combines:", ar: "تحليل ANCOVA يجمع بين تحليل التباين (ANOVA) وتحليل الانحدار (Regression).", options: ["ANOVA and correlation", "ANOVA and regression", "Mean and median", "Variance only"], answer: 1 },
{ q: "43. ANCOVA adjusts results based on:", ar: "تحليل ANCOVA يقوم بتعديل وتحييد أثر المتغيرات المصاحبة الخارجية (Covariates).", options: ["Group size", "External variables (covariates)", "Means only", "Sample type"], answer: 1 },
{ q: "44. The main advantage of ANCOVA is:", ar: "الميزة الأساسية لتحليل ANCOVA هي إزالة أثر المتغيرات المربكة لضمان مقارنة عادلة.", options: ["Simplicity only", "Comparing two groups only", "Providing a fair comparison by removing confounders", "Increasing error"], answer: 2 },
{ q: "45. Correlation describes:", ar: "الارتباط يصف طبيعة وقوة العلاقة بين المتغيرات بدون تحديد السبب والنتيجة.", options: ["A cause-and-effect relationship", "The relationship between variables", "Only differences between groups", "Experimental results"], answer: 1 },
{ q: "46. The value of correlation coefficient (r) ranges between:", ar: "تتراوح قيمة معامل الارتباط (r) دائماً بين -1.0 و +1.0.", options: ["0 to 100", "−10 to +10", "−1.0 to +1.0", "0 to 1 only"], answer: 2 },
{ q: "47. Positive correlation means:", ar: "الارتباط الطردي الإيجابي يعني حركة المتغيرين في نفس الاتجاه معاً (يزيدان معاً).", options: ["One variable increases, the other decreases", "Both variables move in opposite directions", "Both variables move in the same direction", "No relationship"], answer: 2 },
{ q: "48. Negative correlation means:", ar: "الارتباط العكسي السلبي يعني أنه عندما يرتفع متغير ينخفض الآخر.", options: ["Both variables increase", "One increases while the other decreases", "No change in variables", "Variables are equal"], answer: 1 },
{ q: "49. A correlation of 0.75 is considered:", ar: "قيمة الارتباط 0.75 تعتبر ارتباطاً قوياً (Strong).", options: ["Weak", "Moderate", "Strong", "Very weak"], confidence: 2, answer: 2 },
{ q: "50. A correlation of 0.10 is:", ar: "قيمة الارتباط 0.10 تعتبر ارتباطاً ضعيفاً جداً أو يكاد ينعدم.", options: ["Very strong", "Weak or none", "Moderate", "Strong"], answer: 1 },
{ q: "51. Which value indicates very strong correlation?", ar: "أي من القيم التالية تشير إلى ارتباط قوي جداً؟", options: ["0.25", "0.45", "0.85", "0.10"], answer: 2 },
{ q: "52. Phi coefficient (φ) is used when:", ar: "يُستخدم معامل فاي عندما يكون كلا المتغيرين ثنائيين (Binary Variables).", options: ["Both variables are continuous", "Both variables are binary", "Data is ranked", "Data is normal"], answer: 1 },
{ q: "53. Pearson correlation (r) is used when:", ar: "ارتباط بيرسون يُستخدم عندما تكون البيانات رقمية مستمرة وموزعة طبيعياً.", options: ["Data is ordinal only", "Data is binary only", "Data is continuous and normally distributed", "Data is random"], answer: 2 },
{ q: "54. Point-biserial correlation is used when:", ar: "الارتباط النقطي ثنائي السلسلة يُستخدم عندما يكون أحد المتغيرين ثنائياً والآخر مستمراً.", options: ["Both variables are continuous", "Both variables are binary", "One binary and one continuous variable", "Data is ranked only"], answer: 2 },
{ q: "55. What is the primary goal of medical bioinformatics?", ar: "الهدف الأساسي للمعلوماتية الحيوية الطبية هو استخدام الأدوات الحوسبية لتحسين التشخيص والعلاج وفهم الأمراض.", options: ["To replace doctors with computers", "To use computational tools to improve understanding, diagnosis, and treatment of diseases", "To store patient records only", "To eliminate the need for laboratory testing"], answer: 1 },
{ q: "56. Machine learning in medical bioinformatics can be used to:", ar: "يمكن استخدام التعلم الآلي في هذا مجال لتحليل وتفسير الصور الطبية مثل الأشعة السينية.", options: ["Analyze X-ray images", "Replace DNA sequencing machines", "Store patient health records", "Manufacture drugs directly"], answer: 0 },
{ q: "57. Personalized medicine in bioinformatics is based on:", ar: "الطب الشخصي والمفصل يقوم بالأساس على التركيب الجيني الفريد لكل مريض.", options: ["Patient’s lifestyle only", "Patient’s genetic makeup", "Doctor’s experience", "Hospital resources"], answer: 1 },
{ q: "58. AI helps drug discovery by:", ar: "الذكاء الاصطناعي يسرع اكتشاف الأدوية عبر فحص وتحليل ملايين المركبات الكيميائية بسرعة فائقة.", options: ["Analyzing millions of chemical compounds", "Manufacturing drugs automatically", "Eliminating clinical trials", "Replacing pharmacists"], answer: 0 },
{ q: "59. Why is medical bioinformatics important in modern medicine?", ar: "أهميتها تكمن في قدرتها على تحليل كميات ضخمة من البيانات الطبية المعقدة لتحسين جودة الرعاية.", options: ["It reduces the need for doctors", "It helps analyze massive medical data to improve diagnosis and treatment", "It eliminates the need for patient history", "It focuses only on psychology"], answer: 1 },
{ q: "60. Which of the following is a common data type in medical bioinformatics?", ar: "نوع البيانات الأكثر شيوعاً في المعلوماتية الحيوية هو تتابعات الـ DNA والـ RNA.", options: ["DNA/RNA sequences", "Weather patterns", "Traffic flow data", "Economic statistics"], answer: 0 },
{ q: "61. AI can assist in medical imaging by:", ar: "يساعد الذكاء الاصطناعي في الكشف عن الأورام بدقة داخل الأشعة المقطعية أو الرنين المغناطيسي.", options: ["Detecting tumors in CT or MRI scans", "Replacing radiologists entirely", "Designing hospital buildings", "Managing patient billing"], answer: 0 },
{ q: "62. Machine learning models can predict diseases by analyzing:", ar: "يمكن للنماذج التنبؤ بالأمراض عبر ربط وتحليل البيانات الجينية والسريرية ونمط الحياة.", options: ["Patient’s favorite food", "Genetic, clinical, and lifestyle data", "Hospital budgets", "Doctor’s handwriting"], answer: 1 },
{ q: "63. Which of the following is a limitation of AI in medicine?", ar: "من عيوب وحدود الذكاء الاصطناعي في الطب أنه يعتمد كلياً على جودة ونظافة البيانات المدخلة.", options: ["It requires high-quality data", "It eliminates the need for doctors", "It guarantees perfect accuracy", "It never inherits bias"], answer: 0 },
{ q: "64. What is one major challenge in medical bioinformatics?", ar: "التحدي الأكبر هو الحجم الضخم جداً والهائل للبيانات الناتجة والتي تحتاج لتحليل دقيق.", options: ["Lack of diseases", "Large amount of data", "Too few computers", "No need for analysis"], answer: 1 },
{ q: "65. Why is understanding genes difficult?", ar: "دراسة وفهم الجينات صعبة جداً نظراً للتعقيد البالغ والتشابك في الأنظمة الجينية.", options: ["They are too small to study", "They change daily", "They are very complex", "They are not important"], answer: 2 },
{ q: "66. Why must patient data be protected?", ar: "يجب حماية بيانات المرضى بقوة لأنها معلومات جينية وسريرية شديدة الخصوصية والحساسية.", options: ["To reduce computer usage", "Because it is cheap", "Because it is private and sensitive", "To share it publicly"], answer: 2 },
{ q: "67. One challenge of Medical Bioinformatics is:", ar: "من أبرز التحديات الحالية النقص الشديد في الكوادر والمتخصصين الذين يجمعون بين الطب والحوسبة.", options: ["Too many specialists", "Lack of specialists", "No data", "No diseases"], answer: 1 },
{ q: "68. Errors in medical bioinformatics analysis may lead to:", ar: "حدوث أي خطأ في التحليل الجيني قد يتسبب في تشخيص خاطئ أو إعطاء علاج غير مناسب للمريض.", options: ["Faster recovery", "Correct diagnosis", "Wrong diagnosis or treatment", "No effect"], answer: 2 },
{ q: "69. Personalized medicine is based on:", ar: "يقوم الطب الشخصي على مواءمة العلاج مع جينات المريض وحالته الصحية الدقيقة.", options: ["Age only", "Random selection", "Patient genes and condition", "Doctor preference"], answer: 2 },

{ q: "71. Targeted cancer therapy is based on:", ar: "يعتمد العلاج الموجه للسرطان على استهدف طفرات جينية محددة وخاصة بالورم (مثل EGFR).", options: ["Symptoms only", "Genetic mutations (e.g., EGFR)", "Age", "Diet"], answer: 1 },
{ q: "72. Bioinformatics helps doctors to:", ar: "تساعد الأطباء في اختيار الدواء والجرعة المناسبة تماماً بناءً على استجابة الجسم الجينية.", options: ["Delay treatment", "Give the same drug to all", "Choose the right drug and dose", "Avoid diagnosis"], answer: 2 },
{ q: "73. Bioinformatics improves diagnosis by:", ar: "تحسين التشخيص يتم عبر توظيف المؤشرات الحيوية وتقنيات الذكاء الاصطناعي المتقدمة.", options: ["Ignoring patient data", "Using biomarkers and AI", "Using manual methods only", "Removing lab tests"], answer: 1 },
{ q: "74. A biomarker is:", ar: "المؤشر الحيوي هو علامة بيولوجية قابلة للقياس تدل على وجود أو تطور المرض.", options: ["A type of drug", "A measurable indicator of disease", "A machine", "A symptom"], answer: 1 },
{ q: "75. Genetic data should be protected because:", ar: "البيانات الجينية حساسة وشخصية للغاية ويجب حمايتها لمنع إساءة استخدامها.", options: ["It is unimportant", "It is temporary", "It is sensitive and personal", "It changes daily"], answer: 2 },

{ q: "77. Informed consent means:", ar: "الموافقة المستنيرة تعني الفهم الكامل والواضح من المريض لكيفية استخدام بياناته الجينية.", options: ["Signing without reading", "Full understanding of data use", "Doctor decides alone", "No permission needed"], answer: 1 },
{ q: "78. Genetic data affects family members because:", ar: "المعلومات الجينية تؤثر على العائلة بأكملها نظراً لوجود جينات مشتركة ومورثة بينهم.", options: ["It is private only", "It is shared genetically", "It is unrelated", "It is temporary"], answer: 1 },
{ q: "79. One psychological impact of genetic testing is:", ar: "من التأثيرات النفسية المحتملة للفحص الجيني حدوث القلق أو التوتر بانتظار النتائج.", options: ["Happiness only", "Anxiety or stress", "No effect", "Memory loss"], answer: 1 },
{ q: "80. Data ownership concerns relate to:", ar: "مخاوف ملكية البيانات ترتبط بتحديد من يملك ومن له حق التحكم في البيانات الجينية المخزنة.", options: ["Weather changes", "Who controls genetic data", "Machine speed", "Virus infections"], answer: 1 },
{ q: "81. Bias in AI can cause:", ar: "التحيز في نماذج الذكاء الاصطناعي قد يؤدي إلى عدم المساواة والتمييز في تقديم الرعاية الصحية.", options: ["Equal outcomes", "Perfect results", "Inequality in healthcare", "Faster drugs"], answer: 2 },
{ q: "82. CRISPR raises concerns about:", ar: "تقنية تعديل الجينات كريسبر (CRISPR) تثير مخاوف أخلاقية حول إمكانية تصميم أطفال بمواصفات معينة (Designer babies).", options: ["Faster computers", "Designer babies", "Data storage", "Internet speed"], answer: 1 },
{ q: "83. Genetic data security risk includes:", ar: "مخاطر أمن البيانات تتضمن احتمالية التعرض للاختراق وتسريب البيانات الحساسة.", options: ["Data deletion", "Hacking and data breaches", "Slow analysis", "Lack of genes"], answer: 1 }
],

function startQuiz(sub) {
    subject = sub;
    current = 0;
    answered = {};
    isShowingFeedback = false;
    playCuteSound();
    
    document.getElementById("menu").classList.remove("active");
    document.getElementById("quiz").classList.add("active");
    
    showQuestion();
}

function showQuestion() {
    const qList = bank[subject];
    if (!qList || qList.length === 0) {
        alert("No questions found!");
        return;
    }
    
    const qData = qList[current];
    document.getElementById("progressBadge").innerText = `${current + 1} / ${qList.length}`;
    document.getElementById("question").innerText = qData.q;
    document.getElementById("translation").innerText = qData.ar || "";
    
    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";
    
    document.getElementById("feedback").style.display = "none";
    document.getElementById("feedback").className = "feedback";
    isShowingFeedback = false;
    
    qData.options.forEach((opt, idx) => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.innerText = opt;
        
        if (answered[current] !== undefined) {
            if (idx === qData.answer) {
                btn.classList.add("correct-flash");
            } else if (idx === answered[current]) {
                btn.classList.add("wrong-flash");
            }
        } else {
            btn.onclick = () => selectOption(idx);
        }
        
        optionsDiv.appendChild(btn);
    });
}

function selectOption(idx) {
    if (answered[current] !== undefined || isShowingFeedback) return;
    
    const qData = bank[subject][current];
    answered[current] = idx;
    isShowingFeedback = true;
    
    const optionsDiv = document.getElementById("options");
    const buttons = optionsDiv.getElementsByClassName("option");
    
    if (idx === qData.answer) {
        buttons[idx].classList.add("correct-flash");
        showFeedback(true, "إجابة صحيحة بيرفكت! ✨👏");
    } else {
        buttons[idx].classList.add("wrong-flash");
        buttons[qData.answer].classList.add("correct-flash");
        showFeedback(false, "إجابة خاطئة، اوبس  🌸");
    }
}

function showFeedback(isCorrect, text) {
    const fb = document.getElementById("feedback");
    fb.style.display = "block";
    fb.innerText = text;
    if (isCorrect) {
        fb.style.background = "#d1fae5";
        fb.style.color = "#065f46";
    } else {
        fb.style.background = "#ffe4e6";
        fb.style.color = "#9f1239";
    }
}

function nextQuestion() {
    const qList = bank[subject];
    if (current < qList.length - 1) {
        current++;
        showQuestion();
    } else {
        alert("🎉 لقد أكملت الاختبار  !");
        goMenu();
    }
}

function backQuestion() {
    if (current > 0) {
        current--;
        showQuestion();
    }
}

function goMenu() {
    document.getElementById("quiz").classList.remove("active");
    document.getElementById("menu").classList.add("active");
}
