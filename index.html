<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Quiz App</title>

<style>
body{
font-family: Arial;
background: linear-gradient(135deg,#f8c8dc,#d6b3ff);
text-align:center;
margin:0;
}

.card{
background:white;
width:80%;
margin:auto;
margin-top:40px;
padding:20px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:15px;
background:#ffb6c1;
cursor:pointer;
font-weight:bold;
}

button:hover{background:#dda0dd;}

.option{
display:block;
padding:10px;
margin:10px;
border-radius:10px;
background:#f3e6ff;
cursor:pointer;
}

.correct{background:#b6ffb6 !important;}
.wrong{background:#ffb6b6 !important;}

.small{
font-size:12px;
color:gray;
}

#nextBtn{
background:#d8b4ff;
}
</style>
</head>

<body>

<!-- الصفحة الأولى -->
<div id="home" class="card">
<h2>💗 اختاري المادة</h2>
<button onclick="startQuiz('rights')">حقوق الملكية الفكرية</button>
<button onclick="startQuiz('comm')">Communication Concept</button>
<button onclick="startQuiz('path')">Pathology</button>
</div>

<!-- الاختبار -->
<div id="quiz" class="card" style="display:none">

<h3 id="title"></h3>
<div id="qnum"></div>

<p id="question"></p>
<p class="small" id="translation"></p>

<div id="options"></div>

<div id="result"></div>

<button id="nextBtn" onclick="nextQuestion()">Next 💗</button>

</div>

<script>

let current=0;
let score=0;
let selectedSubject="";
let questions=[];

/* ==================  حقوق الملكية الفكرية (عربي فقط) ================== */
const rights=[
{
q:"من خصائص العنصر المعنوي لحق المؤلف",
options:["عدم قابليته للتنازل","قابليته للتنازل","يسقط بالتقادم","يمكن الحجز عليه"],
answer:0
},
{
q:"حق المؤلف مرتبط بشخصية الإنسان",
options:["المصنف","المبدع أو المؤلف","الحكومة","السوق"],
answer:1
},
{
q:"من أشكال التنازل",
options:["البيع والهبة","التبرع فقط","التجاهل","التقادم"],
answer:0
},
{
q:"بيع المصنف يعني",
options:["نقل الحقوق المعنوية","نقل النسخة فقط","نقل كل الحقوق","إلغاء الملكية"],
answer:1
},
{
q:"الحقوق المعنوية",
options:["لا تنتقل","تنتقل","تباع","تُلغى"],
answer:0
}
];

/* ================== Communication ================== */
const comm=[
{
q:"Therapeutic communication is best defined as",
tr:"التواصل العلاجي يُعرّف بأنه",
options:[
"Casual conversation",
"Professional planned communication",
"Medical orders only",
"Calming talk only"
],
answer:1
},
{
q:"Shared understanding helps to",
tr:"الفهم المشترك يساعد على",
options:[
"Achieve goals",
"Reduce work",
"Save time only",
"Ignore patient"
],
answer:0
},
{
q:"Silence allows patient to",
tr:"الصمت يسمح للمريض",
options:[
"Feel ignored",
"Think and reflect",
"Stop talking",
"End session"
],
answer:1
}
];

/* ================== Pathology ================== */
const path=[
{
q:"Approximately body water percentage",
tr:"نسبة الماء في الجسم تقريباً",
options:["40%","50%","60%","70%"],
answer:2
},
{
q:"Neoplasm is",
tr:"الورم هو",
options:[
"Inflammation",
"Uncontrolled cell growth",
"Normal tissue",
"Infection"
],
answer:1
},
{
q:"Benign tumor characteristic",
tr:"الورم الحميد يتميز بـ",
options:[
"Metastasis",
"Well differentiated",
"Rapid spread",
"Invasion"
],
answer:1
}
];

function startQuiz(subject){
selectedSubject=subject;
current=0;
score=0;

if(subject==="rights"){
questions=rights;
document.getElementById("title").innerText="حقوق الملكية الفكرية";
}
if(subject==="comm"){
questions=comm;
document.getElementById("title").innerText="Communication Concept";
}
if(subject==="path"){
questions=path;
document.getElementById("title").innerText="Pathology";
}

document.getElementById("home").style.display="none";
document.getElementById("quiz").style.display="block";

showQuestion();
}

function showQuestion(){

let q=questions[current];

document.getElementById("qnum").innerText=`Question ${current+1}`;

document.getElementById("question").innerText=q.q;

document.getElementById("translation").innerText=q.tr || "";

let optDiv=document.getElementById("options");
optDiv.innerHTML="";

q.options.forEach((opt,i)=>{
let btn=document.createElement("div");
btn.className="option";
btn.innerText=opt;
btn.onclick=()=>checkAnswer(btn,i);
optDiv.appendChild(btn);
});

document.getElementById("result").innerHTML="";
}

function checkAnswer(btn,index){

let q=questions[current];
let opts=document.querySelectorAll(".option");

opts.forEach(o=>o.onclick=null);

if(index===q.answer){
btn.classList.add("correct");
document.getElementById("result").innerHTML="💗 صح";
score++;
}else{
btn.classList.add("wrong");
opts[q.answer].classList.add("correct");
document.getElementById("result").innerHTML="💔 غلط - الإجابة الصحيحة بالأخضر";
}
}

function nextQuestion(){
current++;
if(current<questions.length){
showQuestion();
}else{
document.getElementById("quiz").innerHTML=`<h2>انتهى الاختبار 💗</h2>
<p>النتيجة: ${score}/${questions.length}</p>`;
}
}

</script>

</body>
</html>
