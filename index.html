<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz Platform</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#ffb6c1,#c084fc);
    text-align:center;
    color:#fff;
}

.container{
    background:rgba(0,0,0,0.3);
    width:60%;
    margin:auto;
    margin-top:50px;
    padding:20px;
    border-radius:20px;
}

button{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.next{background:#7c3aed;color:white;}
.back{background:#ec4899;color:white;}

.option{
    display:block;
    margin:10px;
    padding:10px;
    background:white;
    color:black;
    border-radius:10px;
}

#heart{
    font-size:30px;
}
</style>
</head>

<body>

<div class="container">
    <div id="heart">🤍 Quiz Platform</div>
    <h2 id="question">Question</h2>

    <div id="options"></div>

    <button class="back" onclick="backQuestion()">Back</button>
    <button class="next" onclick="nextQuestion()">Next</button>
</div>

<script src="script.js"></script>

</body>
</html>
