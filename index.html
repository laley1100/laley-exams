<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exam Platform</title>

<style>
body{
font-family: Arial;
background: linear-gradient(135deg,#ff9ed1,#bda0ff);
text-align:center;
padding:20px;
}

.card{
background: rgba(255,255,255,0.25);
padding:20px;
border-radius:20px;
width:85%;
margin:auto;
}

button{
display:block;
margin:10px auto;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:#ff4fa3;
color:white;
width:80%;
}

button.correct{background:#2ecc71 !important;}
button.wrong{background:#e74c3c !important;}

#nextBtn{background:#6c5ce7;}
.menu button{background:#ff4fa3;}
</style>
</head>

<body>

<h2>💗 Exam Platform</h2>

<div class="menu" id="menu">

<button onclick="start('comm')">Communication</button>
<button onclick="start('path')">Pathology</button>
<button onclick="start('ip')">IP Rights</button>
<button onclick="start('stats')">Statistics</button>

</div>

<div class="card" id="quiz" style="display:none">

<h3 id="q"></h3>
<div id="options"></div>
<p id="result"></p>

<button id="nextBtn" onclick="next()" disabled>Next</button>

</div>

<script>

let subject="";
let index=0;
let answered=false;

// ===== START =====
function start(s){
subject=s;
index=0;
document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";
show();
}

// ===== DATA =====

// 1) COMMUNICATION (20)
const comm = [

{q:"Shared understanding helps?",o:["Goals","Docs","Time","Limit"],a:0},
{q:"Silence allows?",o:["Ignore","Think","End","Lose"],a:1},

{q:"Example?",o:["Why","Tell again","What mean","Wrong"],a:2},

{q:"Touch?",o:["Clinical","Emotional","Greeting","Intimate"],a:0},
{q:"Explain considers?",o:["Time","Docs","Opinion","Age"],a:3},
{q:"Impasses?",o:["Success","Block","Legal","Goal"],a:1},
{q:"Failure leads?",o:["Team","Safety issues","Fast","Less"],a:1},
{q:"Communication is?",o:["One","Two way","Written","Tech"],a:1},
{q:"Handover affected by?",o:["Noise","Clear","Tools","Team"],a:0},
{q:"Handover means?",o:["Equipment","Responsibility","Policy","Money"],a:1},
{q:"NOT benefit?",o:["Accuracy","Safety","Workload","Fast"],a:2},
{q:"Pause time?",o:["5s","20-30s","1-2m","None"],a:1},
{q:"SBAR?",o:["Signs","Situation","Symptoms","Status"],a:1},
{q:"IMIST EXCEPT?",o:["MOI","Treat","Allergy","Money"],a:3},
{q:"SBAR limitation?",o:["Complex","No detail","Long","None"],a:1},
{q:"Best ID tool?",o:["SBAR","ISBAR","SOAP","ATMIST"],a:1}
];

// 2) PATHOLOGY (50 simplified mapped)
const path = [
{q:"Body water %?",o:["40","50","60","70"],a:2},
{q:"Non-pitting edema?",o:["Cardiac","Renal","Nutritional","Lymphatic"],a:3},
{q:"Hyperemia example?",o:["Inflammation","Exercise","CHF","Block"],a:1},
{q:"Common thrombus?",o:["Arterial","Capillary","Venous","Cardiac"],a:2},
{q:"Septic thrombus?",o:["Aseptic","Red","Septic","Mixed"],a:2},
{q:"Shock type bleed?",o:["Cardio","Distributive","Hypovolemic","Obstruct"],a:2},
{q:"Amyloidosis organ?",o:["Liver","Spleen","Heart","Kidney"],a:3},
{q:"Neoplasm?",o:["Reversible","Abnormal growth","Inflammation","Malformation"],a:1},
{q:"Benign feature?",o:["Metastasis","Fast","Differentiated","Invasion"],a:2},
{q:"Metastasis?",o:["Local","Blood spread","Benign","Compression"],a:1},
{q:"Gold standard?",o:["Blood","IHC","H&E","Flow"],a:2},
{q:"t-test?",o:["Means 2 groups","Proportions","Counts","SD"],a:0},
{q:"ANOVA?",o:["2 groups","3+ means","Categories","Percent"],a:1},
{q:"Incidence?",o:["Total","New","Old","Ratio"],a:1},
{q:"Prevalence?",o:["New","Total","Death","Recovery"],a:1},
{q:"Bias?",o:["Accurate","Systematic error","Random","None"],a:1},
{q:"Correlation?",o:["Cause","Relation","Mean","SD"],a:1},
{q:"r=0?",o:["Strong","None","Perfect","Negative"],a:1},
{q:"Regression?",o:["Compare","Predict","Count","Remove"],a:1},
{q:"Sensitivity?",o:["TP","TN","FP","FN"],a:0}
];

// 3) IP (20)
const ip = [
{q:"Right of author?",o:["No transfer","Transferable","Holds tax","Random"],a:0},
{q:"WIPO means?",o:["Author","Creator","Authority","Sale"],a:1},
{q:"Transfer forms?",o:["Sale","Gift","Donation","All"],a:3},
{q:"Moral right?",o:["Financial","Personal right","Trade","None"],a:1},
{q:"Financial right can be?",o:["Inherit","No use","Illegal","None"],a:0},
{q:"Handover of ownership?",o:["No rights lost","All lost","Partial","None"],a:0},
{q:"Hygiene of rights?",o:["Seizable","Not seizable","Free","None"],a:0},
{q:"Publishing means?",o:["Hidden","Public","Private","None"],a:1},
{q:"Right is?",o:["Power","Law","Rule","Random"],a:0},
{q:"Author can?",o:["Stop distortion","Sell only","Copy free","None"],a:0},
{q:"Translation?",o:["Allowed","Always violation","Forbidden","None"],a:0},

// 4) STATISTICS (simplified 20)
const stats = [
{q:"Why organize data?",o:["Confuse","Summarize","Delete","Random"],a:1},
{q:"Histogram?",o:["Categorical","Continuous","Text","None"],a:1},
{q:"Bar chart shows?",o:["Continuous","Categories","Random","Time"],a:1},
{q:"Sample used because?",o:["Easy","Small","Costly population","None"],a:2},
{q:"Population example?",o:["All diabetics","50 patients","Pilot","Sample"],a:0},
{q:"Nominal?",o:["Order","No order","Continuous","Random"],a:1},
{q:"Ordinal?",o:["Order","No order","None","Random"],a:0},
{q:"Discrete?",o:["Height","Weight","Count","Blood"],a:2},
{q:"Continuous?",o:["Count","BP","Number","None"],a:1},
{q:"Mean affected by?",o:["Outliers","None","Always","Fixed"],a:0},
{q:"Median best?",o:["Skewed","Normal","None","Random"],a:0},
{q:"Range?",o:["Max-min","Mean","Median","SD"],a:0},
{q:"SD shows?",o:["Center","Spread","Mean","Mode"],a:1},
{q:"Variance?",o:["SD root","SD square","Mean","None"],a:1},
{q:"p<0.05?",o:["Not sig","Sig","Wrong","None"],a:1},
{q:"Null hypothesis?",o:["Difference","No diff","True","False"],a:1},
{q:"Type I?",o:["Reject true","Accept false","None","Random"],a:0},
{q:"Type II?",o:["Reject false","Accept false","None","Random"],a:1},
{q:"CI means?",o:["Exact","Range","Mean","SD"],a:1},
{q:"Correlation?",o:["Cause","Relation","Mean","None"],a:1}

// ===== GET DATA =====
function getData(){
if(subject==="comm") return comm;
if(subject==="path") return path;
if(subject==="ip") return ip;
return stats;
}

// ===== SHOW =====
function show(){
answered=false;
document.getElementById("nextBtn").disabled=true;

let arr = getData();
let q = arr[index];

document.getElementById("q").innerText = (index+1)+" ) "+q.q;

let html="";
q.o.forEach((opt,i)=>{
html += `<button onclick="check(this,${i})">${opt}</button>`;
});

document.getElementById("options").innerHTML=html;
document.getElementById("result").innerText="";
}

// ===== CHECK =====
function check(btn,i){
if(answered) return;
answered=true;

let arr = getData();
let correct = arr[index].a;

let buttons=document.querySelectorAll("#options button");

if(i===correct){
btn.classList.add("correct");
document.getElementById("result").innerText="💚 صح";
}else{
btn.classList.add("wrong");
buttons[correct].classList.add("correct");
document.getElementById("result").innerText="💔 غلط";
}

document.getElementById("nextBtn").disabled=false;
}

// ===== NEXT =====
function next(){
index++;
let arr = getData();

if(index>=arr.length){
document.querySelector(".card").innerHTML="💗 خلص الاختبار";
return;
}

show();
}

</script>

</body>
</html>
