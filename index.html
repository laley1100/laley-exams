<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Quiz Platform 💖</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: linear-gradient(135deg, #f8e8ff, #ffe6f0);
}

h1 { color: #6a0dad; }

button {
  padding: 12px;
  margin: 10px;
  width: 80%;
  border-radius: 15px;
  border: none;
  cursor: pointer;
  background: #e9d8ff;
}

button:hover { background: #d6b3ff; }

.cute {
  background: #7b2cbf;
  color: white;
  border-radius: 25px;
}

.en { font-weight: bold; }
.ar { font-size: 13px; color: #666; }

#quizBox { display:none; }
</style>
</head>

<body>

<h1>💖 Quiz Platform</h1>

<!-- MENU -->
<div id="menu">

  <button class="cute" onclick="startQuiz('rights')">⚖️ حقوق ملكية</button>
  <button class="cute" onclick="startQuiz('comm')">💬 Communication Concepts</button>
  <button class="cute" onclick="startQuiz('path')">🧫 Pathology</button>

</div>

<!-- QUIZ -->
<div id="quizBox">
  <h2 id="qNum"></h2>
  <div id="question"></div>
  <div id="answers"></div>
  <div id="feedback"></div>

  <button class="cute" onclick="next()">Next 💖</button>
</div>

<script>

let current = 0;
let score = 0;
let questions = [];

/* 💜 1) حقوق ملكية */
const rightsQuestions = [
  {
    q_en: "What is intellectual property?",
    q_ar: "ما هي الملكية الفكرية؟",
    options: [
      {en:"Creations of mind", ar:"إبداعات العقل"},
      {en:"Physical objects", ar:"أشياء مادية"},
      {en:"Buildings", ar:"مباني"},
      {en:"Tools", ar:"أدوات"}
    ],
    answer:0
  }
  // 👈 نكمل 20 لاحقًا
];

/* 💬 2) Communication */
const commQuestions = [
  {
    q_en: "Communication is:",
    q_ar: "الاتصال هو:",
    options: [
      {en:"Two-way process", ar:"عملية ثنائية"},
      {en:"One-way", ar:"اتجاه واحد"},
      {en:"Random", ar:"عشوائي"},
      {en:"None", ar:"لا شيء"}
    ],
    answer:0
  }
  // 👈 نكمل 20
];

/* 🧫 3) Pathology */
const pathQuestions = [
  {
    q_en: "Pathology studies:",
    q_ar: "علم الأمراض يدرس:",
    options: [
      {en:"Diseases", ar:"الأمراض"},
      {en:"Cars", ar:"سيارات"},
      {en:"Food", ar:"طعام"},
      {en:"Books", ar:"كتب"}
    ],
    answer:0
  }
  // 👈 نكمل 20
];

function startQuiz(type){

  if(type === 'rights') questions = rightsQuestions;
  if(type === 'comm') questions = commQuestions;
  if(type === 'path') questions = pathQuestions;

  current = 0;
  score = 0;

  document.getElementById("menu").style.display = "none";
  document.getElementById("quizBox").style.display = "block";

  loadQuestion();
}

function loadQuestion(){
  let q = questions[current];

  document.getElementById("qNum").innerText = "Question " + (current+1);

  document.getElementById("question").innerHTML =
    `<div class="en">${q.q_en}</div>
     <div class="ar">${q.q_ar}</div>`;

  document.getElementById("answers").innerHTML =
    q.options.map((o,i)=>
      `<button onclick="check(${i})">
        <div class="en">${o.en}</div>
        <div class="ar">${o.ar}</div>
      </button>`
    ).join("");

  document.getElementById("feedback").innerHTML = "";
}

function check(i){
  let q = questions[current];

  if(i === q.answer){
    score++;
    document.getElementById("feedback").innerHTML = "💚 Correct";
  } else {
    document.getElementById("feedback").innerHTML = "💔 Wrong";
  }
}

function next(){
  current++;

  if(current < questions.length){
    loadQuestion();
  } else {
    document.getElementById("quizBox").innerHTML =
      "<h2>💖 Finished!</h2><p>Score: "+score+" / "+questions.length+"</p>";
  }
}

</script>

</body>
</html>
