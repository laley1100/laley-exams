<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Quiz</title>

<style>
body{
font-family: Arial;
background:#f5f5ff;
text-align:center;
direction:rtl;
}

.subject-btn{
display:block;
margin:10px auto;
padding:12px;
width:270px;
border:none;
border-radius:12px;
background:#e6ccff;
cursor:pointer;
font-size:16px;
}

.card{
background:white;
padding:20px;
margin:20px auto;
width:85%;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
white-space:pre-line;
}

.option{
display:block;
padding:10px;
margin:8px;
background:#eee;
border-radius:10px;
cursor:pointer;
}

.correct{background:#b6f7c1;}
.wrong{background:#ffb3b3;}

.hidden{display:none;}
</style>
</head>

<body>

<h2>اختار المادة</h2>

<div id="menu">

<button class="subject-btn" onclick="start('ip')">حقوق الملكية الفكرية</button>
<button class="subject-btn" onclick="start('comm')">Communication Concepts</button>
<button class="subject-btn" onclick="start('path')">Pathology</button>

</div>

<div id="quiz" class="hidden"></div>

<script>

const data = {

/* =========================
   1) IP (ARABIC ONLY - NO CHANGE)
========================= */
ip:{
title:"حقوق الملكية الفكرية",
q:[
`1- من خصائص العنصر المعنوي لحق المؤلف:
أ- عدم قابليته للتنازل عنه أو التعامل به
ب- قابليته للتنازل عنه والتعامل به
ج- يسقط بالتقادم
د- قابليته للحجز`,

`2- حق المؤلف يعتبر حقًا لصيقًا بشخصية الإنسان وهذا ما أُطلق عليه بموجب اتفاقية WIPO:
أ- المصنف أو المؤلف
ب- المؤلف أو المبدع أو المبتكر
ج- السلطة الأبوية
د- الاستغلال والتصرف`
],
a:[
["أ- عدم قابليته للتنازل عنه أو التعامل به","ب- قابليته للتنازل عنه والتعامل به","ج- يسقط بالتقادم","د- قابليته للحجز"],
["أ- المصنف أو المؤلف","ب- المؤلف أو المبدع أو المبتكر","ج- السلطة الأبوية","د- الاستغلال والتصرف"]
],
c:[0,1]
},

/* =========================
   2) COMMUNICATION (AR + EN)
========================= */
comm:{
title:"Communication Concepts / مفاهيم الاتصال",
q:[
`1) Therapeutic communication is best defined as
التواصل العلاجي يُعرّف بأنه
A. Casual conversation / حديث عشوائي
B. Planned professional act / تواصل مهني مخطط
C. Instructions only / تعليمات فقط
D. Talking to calm / للتطمين فقط`,

`2) Shared understanding helps to
الفهم المشترك يساعد على
A. Achieve goals / تحقيق الأهداف
B. Reduce documentation / تقليل التوثيق
C. Save time / توفير الوقت
D. Limit interaction / تقليل التواصل`
],
a:[
["A","B","C","D"],
["A","B","C","D"]
],
c:[1,0]
},

/* =========================
   3) PATHOLOGY (AR + EN)
========================= */
path:{
title:"Pathology / علم الأمراض",
q:[
`1) Edema means
الوذمة تعني
A. Swelling / تورم
B. Blood / دم
C. Pain / ألم
D. Fracture / كسر`,

`2) Thrombus is
الخثرة هي
A. Tumor / ورم
B. Clot / جلطة
C. Infection / التهاب
D. Wound / جرح`
],
a:[
["A","B","C","D"],
["A","B","C","D"]
],
c:[0,1]
}

};

let subject=null;
let i=0;

function start(x){
subject=x;
i=0;

document.getElementById("menu").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");

show();
}

function show(){

let q=data[subject].q[i];
let a=data[subject].a[i];
let c=data[subject].c[i];

document.getElementById("quiz").innerHTML=`
<div class="card">
<h3>${data[subject].title}</h3>
<pre>${q}</pre>
<div>
${a.map((x,idx)=>`
<div class="option" onclick="check(${idx})">${x}</div>
`).join("")}
</div>
<p id="res"></p>
</div>`;
}

function check(x){

let c=data[subject].c[i];
let opts=document.querySelectorAll(".option");

opts.forEach(o=>o.style.pointerEvents="none");

let res=document.getElementById("res");

if(x===c){
opts[x].classList.add("correct");
res.innerHTML="✔ صح 💖";
}else{
opts[x].classList.add("wrong");
opts[c].classList.add("correct");
res.innerHTML="✖ غلط 💔";
}

setTimeout(()=>{
i++;
if(i<data[subject].q.length){
show();
}else{
document.getElementById("quiz").innerHTML="خلصت 💖";
}
},1200);

}

</script>

</body>
</html>
