<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exam Platform</title>

<style>
body {
    font-family: Arial;
    background: #ffe6f0;
    margin: 0;
}

header {
    background: #ff4d88;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 22px;
}

.container {
    display: flex;
}

.sidebar {
    width: 25%;
    background: #fff;
    height: 100vh;
    padding: 10px;
    border-right: 2px solid #ff4d88;
}

.sidebar button {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    background: #ffb3cc;
    border: none;
    cursor: pointer;
    font-size: 16px;
}

.sidebar button:hover {
    background: #ff4d88;
    color: white;
}

.content {
    width: 75%;
    padding: 20px;
}

.question {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
}

.correct { color: green; font-weight: bold; }
.wrong { color: red; font-weight: bold; }

button.submit {
    background: #ff4d88;
    color: white;
    padding: 10px;
    border: none;
    margin-top: 10px;
}
</style>
</head>

<body>

<header>📚 Exam Platform</header>

<div class="container">

<!-- INDEX -->
<div class="sidebar">
    <button onclick="loadQuiz('comm')">Communication</button>
    <button onclick="loadQuiz('path')">Pathology</button>
    <button onclick="loadQuiz('law')">Copyright Law</button>
    <button onclick="loadQuiz('m4')">Material 4 (ADD LATER)</button>
</div>

<!-- CONTENT -->
<div class="content" id="content">
    <h2>Choose a subject</h2>
</div>

</div>

<script>

/* =========================
   MATERIAL 1 (COMMUNICATION)
========================= */
const comm = [
{q:"Therapeutic communication is best defined as", a:"B"},
{q:"Shared understanding of information helps to", a:"A"},
{q:"Using silence in communication allows the patient", a:"B"},
{q:"Exploring is best described as", a:"B"},
{q:"Clarification is used when the paramedic wants to", a:"A"}
];

/* =========================
   MATERIAL 2 (PATHOLOGY)
========================= */
const path = [
{q:"Approximately what percentage of body weight is water?", a:"C"},
{q:"Non-pitting edema occurs in which condition?", a:"D"},
{q:"Most common type of thrombus?", a:"C"},
{q:"Neoplasm is:", a:"B"},
{q:"Metastasis is:", a:"B"}
];

/* =========================
   MATERIAL 3 (LAW)
========================= */
const law = [
{q:"من خصائص العنصر المعنوي لحق المؤلف:", a:"A"},
{q:"حق المؤلف يعتبر حقًا لصيقًا:", a:"B"},
{q:"من أشكال التنازل:", a:"A"},
{q:"هل ينتقل العنصر المعنوي عند البيع؟", a:"A"},
{q:"الحق المعنوي هو:", a:"A"}
];

/* =========================
   LOAD QUIZ
========================= */
function loadQuiz(type){

let data = [];
if(type=='comm') data = comm;
if(type=='path') data = path;
if(type=='law') data = law;

let html = "";

data.forEach((item,i)=>{
html += `
<div class="question">
<p>${i+1}) ${item.q}</p>

<label><input type="radio" name="q${i}" value="A"> A</label>
<label><input type="radio" name="q${i}" value="B"> B</label>
<label><input type="radio" name="q${i}" value="C"> C</label>
<label><input type="radio" name="q${i}" value="D"> D</label>

<p id="res${i}"></p>
</div>
`;
});

html += `<button class="submit" onclick="check('${type}')">Submit</button>`;

document.getElementById("content").innerHTML = html;
}

/* =========================
   CHECK ANSWERS
========================= */
function check(type){

let data = [];
if(type=='comm') data = comm;
if(type=='path') data = path;
if(type=='law') data = law;

let score = 0;

data.forEach((item,i)=>{
let ans = document.querySelector(`input[name=q${i}]:checked`);

let res = document.getElementById("res"+i);

if(ans && ans.value == item.a){
res.innerHTML = "✔ Correct";
res.className = "correct";
score++;
}else{
res.innerHTML = "✖ Wrong (Correct: " + item.a + ")";
res.className = "wrong";
}
});

alert("Your Score: " + score + "/" + data.length);
}

</script>

</body>
</html>
