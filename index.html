{q:"إذا كان بالترجمة إساءة إلى سمعة المؤلف ومكانته فيعتبر ذلك",o:["أ","ب","ج","د"],a:0},
{q:"بموجب السلطة المعنوية من حق المؤلف أن",o:["أ","ب","ج","د"],a:0},

/* ================= Pathology ================= */
const path=[
{q:"Approximately 60% of body weight is water",tr:"نسبة الماء",o:["40","50","60","70"],a:2},
{q:"Non-pitting edema occurs in",tr:"الوذمة",o:["Cardiac","Renal","Nutritional","Lymphatic"],a:3},

{q:"Leiomyosarcoma is",tr:"ورم",o:["Benign","Malignant","Normal","None"],a:1},

{q:"Gold standard",tr:"تشخيص",o:["Blood","IHC","H&E","CT"],a:2},
{q:"Benign tumor",tr:"حميد",o:["Invasive","Non invasive","Metastatic","Fatal"],a:1},
{q:"Malignant tumor",tr:"خبيث",o:["Non invasive","Invasive","Benign","Small"],a:1},
{q:"Tumor is",tr:"ورم",o:["Mass","Virus","Bacteria","Fluid"],a:0},

/* ================= logic ================= */

let i=0,score=0,qset=[];

function start(type){
i=0;score=0;

if(type==="rights") qset=rights;
if(type==="comm") qset=comm;
if(type==="path") qset=path;

document.getElementById("home").style.display="none";
document.getElementById("quiz").style.display="block";

document.getElementById("title").innerText=type;
show();
}

function backHome(){
document.getElementById("quiz").style.display="none";
document.getElementById("home").style.display="block";
}

function show(){
let q=qset[i];

document.getElementById("qnum").innerText="Q"+(i+1);
document.getElementById("q").innerText=q.q;
document.getElementById("tr").innerText=q.tr||"";

let box=document.getElementById("options");
box.innerHTML="";

q.o.forEach((x,idx)=>{
let d=document.createElement("div");
d.className="option";
d.innerText=x;

d.onclick=()=>check(idx,q.a);
box.appendChild(d);
});
}

function check(sel,ans){
let opts=document.querySelectorAll(".option");
opts.forEach(o=>o.onclick=null);

if(sel===ans){
opts[sel].classList.add("correct");
score++;
}else{
opts[sel].classList.add("wrong");
opts[ans].classList.add("correct");
}

document.getElementById("score").innerText=score;
}

function next(){
i++;
if(i<qset.length) show();
else document.getElementById("quiz").innerHTML=
`<h2>Finished 💗</h2><h3>${score}/${qset.length}</h3>`;
}

</script>
